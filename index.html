<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Formula One Direction — Pocket Racing Life</title>
<style>
/* ============================================================
   FORMULA ONE DIRECTION — PIXEL/TAMAGOTCHI STYLE SHEET
   Palette: LCD mint shell, cream screen, candy accents
   Type: pixel display face for headers/numbers, rounded body face for text
   Signature: circular "pod" screen that always centers the driver sprite
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap');

:root{
  --shell:#bfe3c9;
  --shell-dark:#9fcdae;
  --shell-shadow:#7fb090;
  --screen-bg:#fdf6e8;
  --screen-edge:#3a3a3a;
  --ink:#3a3226;
  --ink-soft:#8a8071;
  --pod-ring:#4a4238;
  --candy-pink:#ff8fab;
  --candy-yellow:#ffd23d;
  --candy-mint:#5ee6b8;
  --candy-blue:#6fb7ff;
  --candy-purple:#b98fff;
  --candy-red:#ff6b6b;
  --pixel-border:#3a3226;

  --font-pixel:'Press Start 2P', monospace;
  --font-body:'Nunito', sans-serif;
}

*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:linear-gradient(180deg,#e7d9b8,#d8c49a);
  color:var(--ink);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  image-rendering:pixelated;
}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--shell-shadow); border-radius:4px;}

/* ============ DEVICE SHELL ============ */
#device{
  width:100%;
  max-width:430px;
  height:100vh;
  height:100dvh;
  margin:0 auto;
  background:var(--shell);
  position:relative;
  display:flex;
  flex-direction:column;
  border-left:6px solid var(--shell-dark);
  border-right:6px solid var(--shell-dark);
  box-shadow:0 0 0 3px var(--pixel-border), 0 10px 40px rgba(0,0,0,0.35);
}
@media (min-width:431px){
  body{ display:flex; align-items:center; justify-content:center; }
  #device{ height:92vh; max-height:900px; border-radius:28px; overflow:hidden; border:6px solid var(--shell-dark); }
}

/* pixel corner studs, purely decorative device detail — kept clear of the
   status strip's text by pinning them to the very top of #device (above
   the strip's own box) rather than overlapping its content area. */
#device::before, #device::after{
  content:'';
  position:absolute;
  top:2px;
  width:6px; height:6px;
  background:var(--shell-shadow);
  box-shadow:2px 0 0 var(--shell-shadow);
  z-index:5;
}
#device::before{ left:6px; }
#device::after{ right:6px; }

/* ============ TOP STATUS STRIP (pixel LCD readout) ============ */
#status-strip{
  background:var(--screen-edge);
  color:#d7f7c8;
  font-family:var(--font-pixel);
  font-size:8.5px;
  padding:8px 20px;
  display:flex;
  align-items:center;
  gap:8px;
  border-bottom:3px solid var(--pixel-border);
  white-space:nowrap;
  flex-shrink:0;
  position:relative;
  z-index:1;
}
#status-strip .stat-row{ display:flex; align-items:center; gap:8px; overflow:hidden; min-width:0; }
#status-strip .stat-chip{ display:flex; align-items:center; gap:3px; flex-shrink:0; }
#status-strip .stat-chip .ic{ font-size:10px; }
#status-strip .spacer{ flex:1; min-width:4px; }
#status-strip .day-chip{ color:var(--candy-yellow); flex-shrink:0; }

/* ============ TICKER ============ */
#ticker{
  background:#2d2d2d;
  color:#9adfc0;
  font-family:var(--font-pixel);
  font-size:7.5px;
  padding:5px 0;
  overflow:hidden;
  white-space:nowrap;
  border-bottom:3px solid var(--pixel-border);
  flex-shrink:0;
}
#ticker-inner{
  display:inline-block;
  padding-left:100%;
  animation:ticker-move 22s linear infinite;
}
@keyframes ticker-move{ from{transform:translateX(0);} to{transform:translateX(-100%);} }
#ticker-inner span{ margin-right:40px; }

/* ============ MAIN SCREEN AREA ============ */
#screen{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  background:var(--screen-bg);
  padding:14px 12px 90px;
  position:relative;
}
#screen::-webkit-scrollbar{width:6px;}

/* ============ SIGNATURE: THE POD ============
   A circular screen-in-screen that always shows the driver.
   Present on the home/hub view, pinned near the top. */
.pod-wrap{
  display:flex;
  justify-content:center;
  margin:6px 0 14px;
}
.pod{
  width:150px; height:150px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ffffff, var(--screen-bg) 60%, #eee0c4 100%);
  border:5px solid var(--pod-ring);
  box-shadow:
    inset 0 0 0 3px #fff,
    inset 0 6px 14px rgba(0,0,0,0.08),
    0 6px 0 var(--shell-shadow),
    0 8px 14px rgba(0,0,0,0.25);
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
}
.pod:active{ transform:translateY(3px); box-shadow: inset 0 0 0 3px #fff, inset 0 6px 14px rgba(0,0,0,0.08), 0 3px 0 var(--shell-shadow); }
/* Smaller pod variant for use inside modals (e.g. Driver Profile) — the
   ring/shadow thicknesses are scaled down to match, so it reads as one
   cohesive bezel instead of two visually separate circles like the
   full-size pod's fixed-pixel rings would at a smaller diameter. */
.pod-sm{
  width:96px; height:96px;
  border-width:3px;
  box-shadow:
    inset 0 0 0 2px #fff,
    inset 0 4px 9px rgba(0,0,0,0.08),
    0 4px 0 var(--shell-shadow),
    0 5px 9px rgba(0,0,0,0.22);
}
.pod-sm .pod-sprite{ font-size:38px; }
.pod-sprite{
  font-size:64px;
  animation:pod-bounce 2.4s ease-in-out infinite;
  filter:drop-shadow(0 4px 2px rgba(0,0,0,0.15));
  user-select:none;
}
@keyframes pod-bounce{
  0%,100%{ transform:translateY(0) scaleX(1); }
  45%{ transform:translateY(-7px) scaleX(1); }
  50%{ transform:translateY(-8px) scaleX(1.03); }
  55%{ transform:translateY(-7px) scaleX(1); }
}
.pod-mood-badge{
  position:absolute;
  bottom:-2px; right:2px;
  background:var(--candy-yellow);
  border:3px solid var(--pixel-border);
  border-radius:50%;
  width:34px; height:34px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
}
.pod-name-tag{
  text-align:center;
  margin-top:8px;
}
.pod-name-tag .nm{
  font-family:var(--font-pixel);
  font-size:11px;
  color:var(--ink);
}
.pod-name-tag .sub{
  font-size:11px;
  color:var(--ink-soft);
  margin-top:4px;
  font-weight:700;
}

/* editable name pill (used for player AND every NPC) */
.editable-name{
  display:inline-flex;
  align-items:center;
  gap:5px;
  cursor:pointer;
  border-bottom:2px dashed var(--ink-soft);
  padding:1px 2px;
}
.editable-name .pencil{ font-size:11px; opacity:0.6; }
.editable-name:hover{ border-bottom-color:var(--candy-blue); }

/* ============ PIXEL PANELS ============ */
.pixel-panel{
  background:#fff;
  border:3px solid var(--pixel-border);
  border-radius:10px;
  box-shadow:0 4px 0 var(--pixel-border);
  padding:12px;
  margin-bottom:14px;
  position:relative;
}
.panel-title{
  font-family:var(--font-pixel);
  font-size:9px;
  color:var(--ink);
  margin-bottom:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.panel-title .tag{
  font-family:var(--font-body);
  font-weight:800;
  font-size:9.5px;
  background:var(--candy-yellow);
  border:2px solid var(--pixel-border);
  border-radius:6px;
  padding:2px 6px;
}

/* ============ PIXEL BUTTONS ============ */
.pbtn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-family:var(--font-pixel);
  font-size:9.5px;
  color:var(--ink);
  background:#fff;
  border:3px solid var(--pixel-border);
  border-radius:8px;
  padding:11px 12px;
  box-shadow:0 4px 0 var(--pixel-border);
  transition:transform 0.08s, box-shadow 0.08s;
  white-space:nowrap;
}
.pbtn:active{ transform:translateY(4px); box-shadow:0 0 0 var(--pixel-border); }
.pbtn.full{ width:100%; }
.pbtn.gold{ background:var(--candy-yellow); }
.pbtn.pink{ background:var(--candy-pink); color:#5c1730; }
.pbtn.mint{ background:var(--candy-mint); }
.pbtn.blue{ background:var(--candy-blue); color:#0b2c52; }
.pbtn.purple{ background:var(--candy-purple); color:#33115c; }
.pbtn.small{ padding:7px 10px; font-size:8px; box-shadow:0 3px 0 var(--pixel-border); }
.pbtn.small:active{ transform:translateY(3px); box-shadow:0 0 0 var(--pixel-border); }
.pbtn:disabled{ opacity:0.4; pointer-events:none; }
.pbtn-row{ display:flex; gap:8px; flex-wrap:wrap; }

/* ============ PIXEL BARS ============ */
.pixel-bar-row{ margin-bottom:9px; }
.pixel-bar-row .lbl-line{
  display:flex; justify-content:space-between;
  font-size:10.5px; font-weight:700; margin-bottom:4px; color:var(--ink);
}
.pixel-bar-row .lbl-line .v{ font-family:var(--font-pixel); font-size:8px; color:var(--ink-soft); }
.pixel-bar-track{
  height:16px;
  background:#eee0c4;
  border:2px solid var(--pixel-border);
  border-radius:4px;
  overflow:hidden;
  display:flex;
  align-items:stretch;
  padding:2px;
  gap:1px;
  box-sizing:border-box;
}
.pixel-bar-seg{
  flex:1 1 0;
  height:12px;
  background:#e6d8ba;
  border-radius:1px;
}
.pixel-bar-seg.on.energy{ background:var(--candy-blue); }
.pixel-bar-seg.on.mood{ background:var(--candy-yellow); }
.pixel-bar-seg.on.stress{ background:var(--candy-red); }
.pixel-bar-seg.on.stat{ background:var(--candy-mint); }
.pixel-bar-seg.on.confidence{ background:var(--candy-purple); }

/* ============ CHIP / PILL ============ */
.chip{
  display:inline-block;
  font-size:10px;
  font-weight:800;
  padding:4px 9px;
  border-radius:20px;
  background:#f2eadb;
  border:2px solid var(--pixel-border);
  color:var(--ink);
}
.chip.gold{ background:var(--candy-yellow); }
.chip.pink{ background:var(--candy-pink); }
.chip.mint{ background:var(--candy-mint); }
.chip.blue{ background:var(--candy-blue); }
.chip.purple{ background:var(--candy-purple); color:#fff; }
.chip.red{ background:var(--candy-red); color:#fff; }

/* ============ BOTTOM NAV ============ */
#bottom-nav{
  position:absolute;
  bottom:0; left:0; right:0;
  background:var(--screen-edge);
  border-top:3px solid var(--pixel-border);
  display:flex;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  gap:4px;
  z-index:20;
}
.nav-item{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  padding:6px 2px;
  border-radius:8px;
  color:#8fae9a;
  background:transparent;
  border:none;
}
.nav-item .nicon{ font-size:18px; }
.nav-item .nlbl{ font-family:var(--font-pixel); font-size:6.5px; }
.nav-item.active{ background:#3f3f3f; color:var(--candy-yellow); }

/* ============ MODAL ============ */
.modal-overlay{
  position:absolute;
  inset:0;
  background:rgba(20,20,20,0.55);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  z-index:100;
}
.modal{
  background:var(--screen-bg);
  border:3px solid var(--pixel-border);
  border-radius:16px 16px 0 0;
  width:100%;
  max-height:82%;
  display:flex;
  flex-direction:column;
  padding:0;
  box-shadow:0 -4px 0 var(--pixel-border);
  animation:modal-rise 0.22s ease;
  overflow:hidden;
}
@keyframes modal-rise{ from{transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;} }
@media (min-width:431px){
  .modal-overlay{ align-items:center; }
  .modal{ border-radius:16px; max-width:380px; box-shadow:0 6px 0 var(--pixel-border); }
}
.modal-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 16px 12px;
  flex-shrink:0;
  border-bottom:2px solid #eee0c4;
  background:var(--screen-bg);
}
.modal-header h3{ font-family:var(--font-pixel); font-size:11px; }
.modal-body{
  overflow-y:auto;
  padding:14px 16px 16px;
}
.modal-close{
  width:28px; height:28px;
  border:2px solid var(--pixel-border);
  border-radius:6px;
  background:var(--candy-red);
  color:#fff;
  font-size:14px;
  line-height:1;
  box-shadow:0 3px 0 var(--pixel-border);
  flex-shrink:0;
}
.modal-close:active{ transform:translateY(3px); box-shadow:none; }

/* ============ TOAST ============ */
.toast-wrap{
  position:absolute;
  top:70px; left:0; right:0;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  z-index:200; pointer-events:none;
  padding:0 14px;
}
.toast{
  background:#fff;
  border:3px solid var(--pixel-border);
  border-radius:10px;
  box-shadow:0 4px 0 var(--pixel-border);
  padding:9px 14px;
  font-size:12px;
  font-weight:700;
  max-width:100%;
}

/* ============ FORM ELEMENTS ============ */
.field-label{ font-family:var(--font-pixel); font-size:8px; color:var(--ink-soft); margin-bottom:6px; display:block; }
input[type=text]{
  width:100%;
  padding:11px 12px;
  border:3px solid var(--pixel-border);
  border-radius:8px;
  background:#fff;
  font-size:14px;
  font-weight:700;
  color:var(--ink);
}
input[type=text]:focus{ outline:2px solid var(--candy-blue); }
select{
  width:100%;
  padding:11px 12px;
  border:3px solid var(--pixel-border);
  border-radius:8px;
  background:#fff;
  font-size:13px;
  font-weight:700;
}
input[type=range]{
  width:100%; height:10px; border-radius:5px;
  -webkit-appearance:none; appearance:none;
  background:#eee0c4;
  border:2px solid var(--pixel-border);
}
/* Chrome/WebKit position a custom-styled (-webkit-appearance:none) thumb's
   CENTER across the range [thumbRadius, trackWidth-thumbRadius], not across
   the full 0-100% width — the thumb is a physical object inset by its own
   radius, same as any native slider. Our custom visual track/hint-band
   overlay needs to be inset by that same 10px (half the 20px thumb) on each
   side, or the overlay reads as edge-to-edge while the thumb visually stops
   short of it, making the thumb look permanently off-center. */
.setup-track-wrap{ position:relative; padding:0 10px; }
.setup-track-wrap input[type=range]{ position:relative; z-index:2; background:transparent; border-color:transparent; padding:0; }
.setup-track-wrap .setup-track-base{ position:absolute; top:0; left:10px; right:10px; height:10px; border-radius:5px; background:#eee0c4; border:2px solid var(--pixel-border); z-index:0; }
.setup-hint-band{ position:absolute; top:-2px; height:14px; border-radius:5px; pointer-events:none; z-index:1; background:var(--candy-mint); opacity:0.4; }
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none; appearance:none;
  width:20px; height:20px; border-radius:50%;
  background:var(--candy-pink);
  border:3px solid var(--pixel-border);
  cursor:pointer;
}
input[type=range]::-moz-range-thumb{
  width:20px; height:20px; border-radius:50%;
  background:var(--candy-pink); border:3px solid var(--pixel-border); cursor:pointer;
}
.slider-row{ margin-bottom:14px; }
.slider-row .top-line{ display:flex; justify-content:space-between; margin-bottom:6px; font-size:11px; font-weight:700; }
.slider-row .sval{ font-family:var(--font-pixel); font-size:9px; color:var(--candy-blue); }

/* ============ OPTION GRID (creation flow) ============ */
.option-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:8px; }
.option-card{
  padding:10px 8px;
  background:#fff;
  border:3px solid var(--pixel-border);
  border-radius:8px;
  text-align:center;
  font-size:11px;
  font-weight:700;
  box-shadow:0 3px 0 var(--pixel-border);
}
.option-card.selected{ background:var(--candy-yellow); }

/* ============ GENERIC HELPERS ============ */
.section-title{ font-family:var(--font-pixel); font-size:12px; margin-bottom:4px; }
.section-sub{ font-size:11.5px; color:var(--ink-soft); margin-bottom:12px; font-weight:600; }
.flex-between{ display:flex; align-items:center; justify-content:space-between; }
.grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stack-8{ display:flex; flex-direction:column; gap:8px; }
.empty-state{ text-align:center; padding:30px 10px; color:var(--ink-soft); font-size:12px; font-weight:700; }
.empty-state .ic{ font-size:30px; margin-bottom:8px; }
.row-item{
  display:flex; align-items:center; gap:10px;
  padding:9px 4px;
  border-bottom:2px dashed #eee0c4;
  font-size:12px;
}
.row-item:last-child{ border-bottom:none; }
.row-item .rname{ flex:1; font-weight:800; }
.row-item .rmeta{ color:var(--ink-soft); font-size:10.5px; }

/* headline card (newspaper feel, still pixel-bordered) */
.headline-card{
  background:#fff8e6;
  border:3px solid var(--pixel-border);
  border-radius:10px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 4px 0 var(--pixel-border);
}
.headline-card .kicker{ font-family:var(--font-pixel); font-size:7px; color:var(--candy-red); margin-bottom:6px; }
.headline-card h3{ font-family:var(--font-pixel); font-size:12px; line-height:1.5; margin-bottom:6px; }
.headline-card p{ font-size:12px; color:var(--ink); line-height:1.4; }

/* boot / creation screens */
.boot-wrap{
  min-height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:24px; text-align:center; padding:24px;
}
.boot-title{ font-family:var(--font-pixel); font-size:22px; line-height:1.5; }
.boot-title .accent{ color:var(--candy-pink); }
.boot-sprite{ font-size:70px; animation:pod-bounce 2.4s ease-in-out infinite; }
.boot-eyebrow{ font-size:11px; font-weight:800; color:var(--ink-soft); letter-spacing:0.5px; }

.create-wrap{ padding-bottom:20px; }

/* responsive tweaks for very small screens */
@media (max-width:360px){
  .pod{ width:130px; height:130px; }
  .pod-sprite{ font-size:54px; }
  #status-strip{ font-size:7.5px; gap:7px; }
}

</style>
</head>
<body>
  <div id="device">
    <div id="status-strip"></div>
    <div id="ticker"><div id="ticker-inner"></div></div>
    <div id="screen"></div>
    <div id="bottom-nav">
      <button class="nav-item active" data-nav="home"><span class="nicon">🏠</span><span class="nlbl">HOME</span></button>
      <button class="nav-item" data-nav="race"><span class="nicon">🏁</span><span class="nlbl">RACE</span></button>
      <button class="nav-item" data-nav="training"><span class="nicon">💪</span><span class="nlbl">TRAIN</span></button>
      <button class="nav-item" data-nav="team"><span class="nicon">🔧</span><span class="nlbl">TEAM</span></button>
      <button class="nav-item" data-nav="social"><span class="nicon">👥</span><span class="nlbl">SOCIAL</span></button>
      <button class="nav-item" data-nav="career"><span class="nicon">📊</span><span class="nlbl">STATS</span></button>
    </div>
  </div>

<script>/* ============================================================
   FORMULA ONE DIRECTION — DATA LAYER
   ============================================================ */

function clamp(v,min=0,max=100){ return Math.max(min,Math.min(max,v)); }
function rand(min,max){ return Math.random()*(max-min)+min; }
function randInt(min,max){ return Math.floor(rand(min,max+1)); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function uid(prefix='id'){ return prefix+'_'+Math.random().toString(36).slice(2,10); }

/* devTrend shapes each team's season-over-season development personality:
   ambition = average yearly car-strength drift target (can be negative for decline)
   volatility = how much a given season's roll can swing from that target (boom/bust risk)
   reliabilityFocus = how much of their development budget leans into reliability vs pure pace */
const TEAMS = [
  { id:'crimson', name:'Crimson Corse', flag:'🇮🇹', color:'#ff5d73', culture:'Emotional, fast, high pressure', carStrength:88, reliability:6, tier:1, devTrend:{ambition:0.4, volatility:2.6, reliabilityFocus:0.2} },
  { id:'silver',  name:'Silver Arrow', flag:'🇩🇪', color:'#9fb4c7', culture:'Professional, data-driven, strict', carStrength:95, reliability:9, tier:1, devTrend:{ambition:0.3, volatility:0.9, reliabilityFocus:0.5} },

/* ---------- Per-team car development state ----------
   Development upgrades (aero/engine/chassis/suspension/reliability, each
   1-10) now belong to the TEAM, not the player -- joining a team means
   inheriting whatever that team has already built (or not built), exactly
   like a real F1 seat change. Seeded once from each team's tier so bigger
   teams start further along, then persists and keeps compounding across
   seasons (development is never wiped -- see startNextSeason's devSlots
   reset, which restores the SEASON'S BUDGET of upgrade actions, not the
   upgrades themselves). buildInitialTeamUpgrades() is deterministic given a
   team's tier so it's safe to call once at TEAMS-definition time. */
function buildInitialTeamUpgrades(tier){
  const base = tier===1 ? 5 : tier===2 ? 3 : 1;
  return { aero:base, engine:base, chassis:base, suspension:base, reliability:base };
}
TEAMS.forEach(t=>{ t.upgrades = buildInitialTeamUpgrades(t.tier); t.devSlotsUsed = 0; });

/* Difficulty gates which starting teams are selectable in character
   creation -- Casual opens everything (lower-stakes, play whoever you
   like), Standard locks only the very top tier (tier 1) until you've
   proven yourself in a career, Realistic locks both tier 1 and tier 2 so
   a Realistic career always starts from the back of the grid and has to
   earn its way up, matching how the difficulty already sharpens every
   other part of the sim (see DIFFICULTY_SETTINGS below). */
function teamUnlockedForDifficulty(team, difficulty){
  if(difficulty==='Casual') return true;
  if(difficulty==='Realistic') return team.tier>=3;
  return team.tier>=2; // Standard
}

/* ---------- FIA regulation eras ----------
   Every few seasons, the FIA introduces a new technical regulation set —
   modeled here as a shift in how much the previous grid order "resets."
   A major reg change (new aero/power-unit rules) shakes up the competitive
   order: strong teams can fall behind if they misread the new rules, and
   weaker teams get a real chance to leapfrog forward. This is layered on
   top of (not a replacement for) each team's own devTrend personality from
   the normal season-to-season development system. Fully deterministic
   schedule (every 3rd year starting year 3) with a bounded random reshuffle
   magnitude — no AI, just a bigger one-time variance roll. */
const FIA_REGULATION_CYCLE_YEARS = 3;

function isRegulationChangeYear(careerYearNum){
  return careerYearNum > 1 && (careerYearNum - 1) % FIA_REGULATION_CYCLE_YEARS === 0;
}

/* ---------- Performance-clause contracts ----------
   Higher-tier teams (the ones with the most to lose from an underperforming
   driver) sometimes attach a performance clause to a contract offer.
   Checked once per season in handleSeasonEnd(); if unmet, the contract is
   forced to expire early (years set to 0) instead of running its full
   term, triggering the normal contract-offer flow but from a visibly worse
   negotiating position (see handleSeasonEnd's clause-check block).
   Deliberately simple boolean pass/fail per clause, checked against
   season-level stats that already exist (no new state needed beyond the
   clause object itself living on p.contract). */
const CONTRACT_CLAUSES = ['top10points', 'beatTeammate', 'podium'];
function pickContractClause(team){
  // Only tier 1-2 teams attach performance clauses -- lower tiers are just
  // happy to have a driver at all, matching the real-world pattern of big
  // teams demanding results and smaller ones being more forgiving.
  if(team.tier>2) return null;
  if(Math.random()>0.5) return null; // not every top-tier offer comes with a clause
  return { type: pick(CONTRACT_CLAUSES), met: null }; // met stays null until checked at season end
}
function contractClauseText(clause){
  if(!clause) return null;
  if(clause.type==='top10points') return 'Clause: finish Top 10 in the championship';
  if(clause.type==='beatTeammate') return "Clause: out-score your teammate at least once";
  if(clause.type==='podium') return 'Clause: score at least one podium';
  return null;
}
/* Returns true (met) or false (missed). standing is passed in explicitly
   (rather than reaching into App from here) to keep data.js free of any
   dependency on the App singleton, matching how every other pure-logic
   helper in this file works. Fails safe (assumes met) for an unrecognized
   clause type rather than punishing the player for a clause the game
   doesn't know how to check. */
function checkContractClauseMet(clause, state, standing){
  if(!clause) return true;
  if(clause.type==='top10points') return standing<=10;
  if(clause.type==='beatTeammate') return !!state.seasonStats.beatTeammate;
  if(clause.type==='podium') return (state.seasonStats.podiums||0) >= 1;
  return true;
}

   many rounds have been completed in total across the whole career, returns
   which cosmetic ids are currently unlocked. Purely a function of career
   progress — same inputs always produce the same unlocked set. */
function computeUnlockedCosmetics(careerStartSeason, currentSeason, totalRoundsCompletedThisSeason){
  const seasonOffset = currentSeason - careerStartSeason;
  return COSMETIC_POOL.filter(c=>{

    return totalRoundsCompletedThisSeason >= c.unlockRound;

function pickQuizQuestions(theme, count, recentlySeenIds){
  const pool = QUIZ_QUESTIONS.filter(q => q.theme===theme || theme==='any');
  const fresh = pool.filter(q => !(recentlySeenIds||[]).includes(q.id));
  const source = fresh.length >= count ? fresh : pool; // fall back to full pool if we've exhausted fresh ones
  const shuffled = [...source].sort(()=>Math.random()-0.5);
  return shuffled.slice(0, count);
}

function createDriverAttributes(baseSkill){
  const jitter = ()=> clamp(baseSkill + randInt(-12,12));
  return {
    driving: {
      racePace: jitter(), qualifyingPace: jitter(), cornering: jitter(), braking: jitter(),
      starts: jitter(), overtaking: jitter(), defending: jitter(), wetSkill: jitter(),
      tyreManagement: jitter(), fuelSaving: jitter(), consistency: jitter(), reaction: jitter(),
    },
    mental: { confidence: jitter(), focus: jitter(), pressure: jitter(), leadership: jitter(), discipline: jitter(), adaptability: jitter() },
    lifestyle: { fitness: jitter(), mood: 70, stress: 20, energy: 100 },
  };
}

function overallRating(attrs){
  const d = attrs.driving, m = attrs.mental;
  const driveAvg = Object.values(d).reduce((a,b)=>a+b,0)/Object.keys(d).length;
  const mentAvg = Object.values(m).reduce((a,b)=>a+b,0)/Object.keys(m).length;
  return Math.round(driveAvg*0.7 + mentAvg*0.3);
}

function makeRivalDriver(name, teamId){
  const team = TEAMS.find(t=>t.id===teamId);
  const baseSkill = clamp(50 + (team.carStrength-70)*0.25 + randInt(-8,10));
  const nation = pick(NATIONALITIES);
  return {
    id: uid('drv'), name, teamId, age: randInt(19,36), nationality: nation, flag: FLAG_BY_NATION[nation],
    gender: 'M', // the competitive grid is modeled as all-male, matching RIVAL_DRIVER_NAMES
    drivingStyle: pick(DRIVING_STYLES),
    attributes: createDriverAttributes(baseSkill),
    fanPopularity: randInt(20,60), mediaReputation: randInt(30,70), traits: [],
    careerStats: { starts:0, wins:0, podiums:0, poles:0, fastestLaps:0, dnfs:0, points:0 },
    memories: [], rivalryLevel: 0, respect: 50,
    romance: { status:'none', spark:0 },
    headToHead: { wins:0, losses:0 },
  };
}

function generateGrid(playerTeamId){
  const grid = [];
  for(const team of TEAMS){
    const names = RIVAL_DRIVER_NAMES[team.id];
    // On the player's own team, the player fills one of the two seats —
    // only generate ONE AI teammate for that team, so the full grid
    // (21 AI + 1 player) totals exactly 22 drivers, matching a real F1 grid.
    const namesToUse = (team.id === playerTeamId) ? names.slice(0, 1) : names;
    namesToUse.forEach(n=> grid.push(makeRivalDriver(n, team.id)));
  }
  return grid;
}

/* Keeps the 22-driver grid invariant intact whenever the player signs with
   a different team mid-career (Contract Offers). Every team must always
   have exactly 2 race seats total: the player's new team drops from 2 AI
   drivers to 1 (the player takes the other seat), and the team the player
   is LEAVING gains a fresh AI driver back up to 2 (their old seat needs a
   new occupant). Without this, switching teams silently grows the grid
   past 22 and leaves the old team a driver short. */
function rebalanceGridForTeamChange(state, oldTeamId, newTeamId){
  if(oldTeamId === newTeamId) return;

  // Drop one AI driver from the new team — the one with the fewest
  // championship points so far, so we don't remove a driver the player
  // has an established rivalry/history with if a stronger one is available.
  const newTeamDrivers = state.grid.filter(d=>d.teamId===newTeamId);
  if(newTeamDrivers.length >= 2){
    const toRemove = newTeamDrivers.slice().sort((a,b)=>(state.standings[a.id]||0)-(state.standings[b.id]||0))[0];
    state.grid = state.grid.filter(d=>d.id!==toRemove.id);
    if(state.rivalId === toRemove.id) state.rivalId = null;
  }

  // Give the old team a fresh AI driver back, entering as a young rookie —
  // this is the seat the player just vacated.
  const oldTeamDrivers = state.grid.filter(d=>d.teamId===oldTeamId);
  if(oldTeamDrivers.length < 2){
    const usedNames = new Set(oldTeamDrivers.map(d=>d.name));
    const freshName = pick((RIVAL_DRIVER_NAMES[oldTeamId]||[]).filter(n=>!usedNames.has(n))) || `${pick(NATIONALITIES)} Rookie`;
    const replacement = makeRivalDriver(freshName, oldTeamId);
    replacement.age = randInt(19, 23);
    state.grid.push(replacement);
  }
}

/* Internally `season` stays a real, ever-incrementing number (simplest for
   date-math and save compatibility). Everywhere the PLAYER sees it, we show
   "Year N" relative to when this career started, per product direction —
   real calendar years felt arbitrary and less personal for a life-sim. */
function seasonLabel(state){
  const start = state.careerStartSeason || state.season;
  return `Year ${state.season - start + 1}`;
}
/* For converting a STORED historical season number (e.g. from
   player.journal[i].season or state.history[i].season, recorded at the time
   as a real internal season number) back into the Year N the player would
   recognize, given the state's careerStartSeason. */
function seasonNumToYear(state, seasonNum){
  const start = state.careerStartSeason || state.season;
  return seasonNum - start + 1;
}
/* Standalone equivalent of App.pushNews(), for plain engine.js functions
   that receive `state` as a parameter rather than running with `this` bound
   to App. Keeps the same cap-enforcement guarantee — see App.pushNews() in
   app_core.js for why this must never be bypassed with a raw .unshift(). */
/* Applied only on regulation-change years (see isRegulationChangeYear in
   data.js). A big rules reset gives every team an extra, larger random
   swing on top of their normal seasonal development — some teams read the
   new rules well and leap forward, others misjudge them and fall back.
   Higher-tier (bigger-budget) teams get a slightly better expected outcome
   on average (more resources to interpret new regs correctly) but the
   variance is wide enough that a major upset is genuinely possible, which
   is the whole point of a regulation change in real F1. */
function applyRegulationChange(state){
  TEAMS.forEach(team=>{
    const budgetEdge = (4-team.tier) * 0.8; // tier 1 gets the biggest edge, tier 3 the least
    const swing = rand(-9, 9) + budgetEdge;
    team.carStrength = clamp(Math.round((team.carStrength + swing)*10)/10, 40, 99);
  });
  if(state && state.newsFeed){
    const sorted = [...TEAMS].sort((a,b)=>b.carStrength-a.carStrength);
    pushStateNews(state, `📋 New FIA technical regulations take effect — the competitive order has been shaken up. Early pace suggests ${sorted[0].flag} ${sorted[0].name} have read the rules best.`);
  }
}

function pushStateNews(state, text){
  if(!state.newsFeed) state.newsFeed = [];
  state.newsFeed.unshift(text);
  if(state.newsFeed.length > 12) state.newsFeed.length = 12;
}

const DAYS_OF_WEEK = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const RACE_WEEKEND_DAYS = { Friday:'practice', Saturday:'qualifying', Sunday:'race' };

/* Builds one season's calendar: every `permanent` track is always included;
   then a small number of rotating-pool tracks are randomly selected from
   whichever are eligible this career-year (respecting minYearOffset), mimicking
   the real FIA calendar adding/dropping venues year to year. A couple of
   eligible rounds are marked as Sprint weekends (see FIA regs section) —
   sprint-eligible tracks only, capped low so it stays a special occasion
   rather than the norm. careerYearNum defaults to 1 for callers (like the
   very first calendar built before a player exists) that don't have season
   context yet. */
function buildSeasonCalendar(careerYearNum){
  const yearNum = careerYearNum || 1;
  const permanentTracks = TRACKS.filter(t=>t.permanent);
  const rotatingPool = TRACKS.filter(t=>!t.permanent && (!t.minYearOffset || yearNum >= t.minYearOffset));
  const rotatingSlots = Math.min(2, rotatingPool.length);
  const shuffledRotating = [...rotatingPool].sort(()=>Math.random()-0.5).slice(0, rotatingSlots);

  const fullSeason = [...permanentTracks, ...shuffledRotating].sort(()=>Math.random()-0.5);

  const sprintCandidates = fullSeason.filter(t=>t.sprintEligible);
  const sprintCount = Math.min(2, sprintCandidates.length);
  const sprintTrackIds = new Set([...sprintCandidates].sort(()=>Math.random()-0.5).slice(0, sprintCount).map(t=>t.id));

  return fullSeason.map((track,i)=>{
    // Weather and temperature are rolled once per round, at calendar build
    // time — not re-rolled independently for practice vs qualifying vs race
    // — so the whole weekend shares one set of conditions the player can
    // actually plan around (visible on Race Center before Friday even
    // starts, not just revealed after the fact).
    const weather = Math.random() < track.rainChance ? 'rain' : 'clear';
    // Temperature drifts around the track's real-world baseline by up to
    // ±6°C weekend-to-weekend; rain always cools things down a bit.
    let trackTemp = Math.round((track.baseTemp||22) + rand(-6, 6));
    if(weather==='rain') trackTemp -= 4;
    return {
      round: i+1,
      trackId: track.id,
      completed: false,
      isSprint: sprintTrackIds.has(track.id),
      sprintCompleted: false,
      weather,
      trackTemp,
    };
  });
}

function tempBand(trackTemp){
  if(trackTemp===undefined || trackTemp===null) return {label:'Mild', icon:'⛅', tireWearMult:1.0, gripMult:1.0};
  if(trackTemp>=30) return {label:'Hot', icon:'🔥', tireWearMult:1.35, gripMult:0.97};
  if(trackTemp>=24) return {label:'Warm', icon:'☀️', tireWearMult:1.1, gripMult:1.0};
  if(trackTemp>=17) return {label:'Mild', icon:'⛅', tireWearMult:1.0, gripMult:1.0};
  return {label:'Cold', icon:'❄️', tireWearMult:0.85, gripMult:0.95};
}

/* ---------- Forecast-sharpening display helper ----------
   The real round.weather/round.trackTemp are rolled once at calendar-build
   time and never re-rolled (see buildSeasonCalendar) -- that stays exactly
   as-is. This is a second, purely-cosmetic "early guess" shown on the hub
   before the weekend arrives, deliberately noisy early in the week and
   converging to the true number as the round approaches. It's seeded off
   the round number + day index (not Math.random()) so it's stable across
   re-renders instead of flickering every time the hub redraws. */
function seededNoise(seed, spread){
  // simple deterministic hash -> pseudo-random in [-spread, spread]
  let h = seed * 2654435761 % 2147483647;
  if(h < 0) h += 2147483647;
  const frac = (h % 10000) / 10000; // 0..1
  return (frac*2 - 1) * spread;
}
function forecastGuess(round, daysUntil){
  // daysUntil: how many days before this round's race weekend starts (0 = race weekend itself, already exact)
  if(daysUntil<=0) return { temp: round.trackTemp, confidence:100, range:0 };
  const seed = (round.round||1) * 97 + daysUntil;
  // Confidence grows as the weekend approaches: far out it's a wide guess,
  // by the day before it's nearly exact.
  const spread = clamp(daysUntil * 1.6, 1, 9);
  const noisy = Math.round(round.trackTemp + seededNoise(seed, spread));
  const confidence = clamp(100 - daysUntil*14, 20, 95);
  return { temp: noisy, confidence, range: Math.round(spread) };
}

/* ---------- Race weekend simulation (driver-skill weighted) ---------- */
/* cosmeticBonus: a flat pace-equivalent nudge derived from equipped
   helmet/livery/suit/gloves bonuses (confidence/focus/braking flavor items
   only — fanPopularity/mediaReputation cosmetic bonuses are applied directly
   to those stats elsewhere, not through race pace). Kept small on purpose. */
function driverStrength(driver, team, track, weather, moraleBonus, setupBonus, cosmeticBonus, trackTemp){
  const d = driver.attributes.driving, m = driver.attributes.mental, l = driver.attributes.lifestyle;
  let pace = (d.racePace*0.35 + d.cornering*0.2 + d.consistency*0.15 + d.tyreManagement*0.15 + d.braking*0.15);
  pace += (team.carStrength-70)*0.55;
  pace += (m.confidence-50)*0.08 + (m.focus-50)*0.05 - (l.stress-20)*0.08 + (l.fitness-50)*0.05;
  if(weather==='rain'){ pace += (d.wetSkill-50)*0.35; }
  if(trackTemp!==undefined){
    const band = tempBand(trackTemp);
    // Hot track = tyres wear faster, so tyreManagement matters more (good
    // tyre-management drivers gain, poor ones lose more than usual). Cold
    // track = less grip everywhere, a small flat penalty for everyone.
    pace += (d.tyreManagement-50) * (band.tireWearMult-1) * 0.3;
    if(band.gripMult<1){
      // Adaptability: a driver who adapts well to unfamiliar/tricky
      // conditions loses less of the flat cold-track grip penalty than a
      // rigid one does. At 99 adaptability the penalty is cut by ~half; at
      // 0 it's unchanged. This was previously the one mental stat with zero
      // effect anywhere in the sim.
      const adaptRelief = 1 - (m.adaptability/99)*0.5;
      pace -= (1-band.gripMult) * 40 * adaptRelief;
    }
  }
  if(driver.familiarityBonus) pace += driver.familiarityBonus;
  if(moraleBonus) pace += moraleBonus;
  if(setupBonus) pace += setupBonus;
  if(cosmeticBonus) pace += cosmeticBonus;
  pace += rand(-6,6);
  return pace;
}

/* Converts equipped-cosmetic performance-flavor bonuses (confidence/focus/
   braking) into a single small flat pace nudge, on the same 0.05-0.08 scale
   driverStrength already uses for those stats — so a +2 confidence helmet
   behaves exactly like +2 confidence would, just without touching the
   player's real trained stat (fully reversible by re-equipping). */
function cosmeticPaceBonus(bonuses){
  if(!bonuses) return 0;
  let total = 0;
  if(bonuses.confidence) total += bonuses.confidence * 0.08;
  if(bonuses.focus) total += bonuses.focus * 0.05;
  if(bonuses.braking) total += bonuses.braking * 0.15;
  return total;
}

function simulateQualifying(grid, playerDriver, track, weather, playerPaceBonus, trackTemp){
  const all = [...grid, playerDriver];
  const results = all.map(drv=>{
    const t = TEAMS.find(tm=>tm.id===drv.teamId);
    const qp = drv.attributes.driving.qualifyingPace;
    // Reaction: a sharper reaction time helps nail the exact braking/turn-in
    // point on a single hot lap -- small compared to qualifyingPace itself,
    // but a real, previously-unused driving stat now has an effect.
    let score = qp*0.5 + (t.carStrength-70)*0.6 + (drv.attributes.mental.pressure-50)*0.1 + (drv.attributes.driving.reaction-50)*0.08;
    if(weather==='rain') score += (drv.attributes.driving.wetSkill-50)*0.4;
    if(trackTemp!==undefined){
      const band = tempBand(trackTemp);
      if(band.gripMult<1) score -= (1-band.gripMult) * 30; // cold track, less grip on a single hot lap
    }
    if(drv.id==='player' && playerPaceBonus) score += playerPaceBonus*1.4;
    score += rand(-5,5);
    return { driverId: drv.id, score };
  });
  results.sort((a,b)=>b.score-a.score);
  return results.map((r,i)=>({...r, position:i+1}));
}

function simulateRace(grid, playerDriver, qualyResults, track, weather, playerStrategy, difficulty, playerMorale, playerPaceBonus, trackTemp){
  const diff = difficulty || DIFFICULTY_SETTINGS.Standard;
  const all = [...grid, playerDriver];
  const byId = Object.fromEntries(all.map(d=>[d.id,d]));
  const moraleBonus = playerMorale!==undefined ? (playerMorale-65)*0.04 : 0;
  const band = trackTemp!==undefined ? tempBand(trackTemp) : null;
  const raceScores = qualyResults.map(q=>{
    const drv = byId[q.driverId];
    const team = TEAMS.find(t=>t.id===drv.teamId);
    let strength = driverStrength(drv, team, track, weather, drv.id==='player' ? moraleBonus : 0, drv.id==='player' ? playerPaceBonus : 0, undefined, trackTemp);
    if(drv.id!=='player') strength *= diff.aiStrength;
    // Overtaking: a strong overtaker claws back some of the grid-position
    // penalty on tracks where passing is possible at all (overtakeDiff<10 --
    // Monaco-style circuits stay almost pure "start position is destiny"
    // regardless of skill, matching real F1). At 99 overtaking on an
    // overtakeDiff 5 track, roughly a third of the penalty is clawed back.
    const overtakeRelief = 1 - (drv.attributes.driving.overtaking/99) * (1 - track.overtakeDiff/10) * 0.6;
    const startPenalty = q.position * (track.overtakeDiff*0.35) * overtakeRelief;
    let raceScore = strength*10 - startPenalty;
    // Discipline: a disciplined driver pushes the car less erratically,
    // trimming a little off their own mechanical failure chance on top of
    // whatever the car's reliability already gives them.
    const disciplineRelief = 1 - (drv.attributes.mental.discipline/99)*0.25;
    const baseReliability = team.reliability*10 + (drv.id==='player' ? diff.reliabilityBonus : 0);
    // A hot track wears equipment faster (higher failChance); a cold one is
    // gentler on the car. saveTires strategy still helps on top of this.
    const tireWearMult = band ? band.tireWearMult : 1;
    const failChance = clamp((100-baseReliability)*0.0009*tireWearMult*disciplineRelief, 0.001, 0.28);
    const dnf = Math.random() < failChance;
    // Defending: a strong defender is more consistent under pressure from
    // cars around them -- shrinks (doesn't eliminate) their share of the
    // race's random variance, so bad luck costs them a little less than it
    // would a poor defender, without ever making the outcome deterministic.
    // This is the sim's one variance term now, replacing the old flat
    // rand(-8,8) that used to apply equally regardless of skill.
    const defenseShrink = 1 - (drv.attributes.driving.defending/99)*0.3;
    raceScore += rand(-8,8) * defenseShrink;
    if(drv.id==='player' && playerStrategy){
      const tireMult = drv.id==='player' ? diff.tireForgiveness : 1;
      if(playerStrategy.approach==='push') raceScore += rand(-4,10);
      if(playerStrategy.approach==='saveTires') raceScore += rand(2,6)*tireMult;
      if(playerStrategy.approach==='defend') raceScore += rand(0,4);
      if(playerStrategy.approach==='attack') raceScore += rand(-6,14);
    }
    return { driverId: drv.id, raceScore: dnf ? -9999 : raceScore, dnf };
  });
  raceScores.sort((a,b)=>b.raceScore-a.raceScore);
  return raceScores.map((r,i)=>({...r, position: r.dnf? null : i+1, finishOrder:i+1}));
}

const DIFFICULTY_SETTINGS = {
  Casual:     { setupWindow:1.4, tireForgiveness:1.3, reliabilityBonus:8,  sponsorGoalMult:0.75, aiStrength:0.9,  aiDevMult:0.7 },
  Standard:   { setupWindow:1.0, tireForgiveness:1.0, reliabilityBonus:0,  sponsorGoalMult:1.0,  aiStrength:1.0,  aiDevMult:1.0 },
  Realistic:  { setupWindow:0.7, tireForgiveness:0.75,reliabilityBonus:-6, sponsorGoalMult:1.3,  aiStrength:1.12, aiDevMult:1.35 },
};

/* ---------- Car setup: hidden ideal + gradual hint reveal ----------
   The "true" ideal setup for a race weekend blends the track's own idealSetup
   with a small nudge from the player's own driving attributes (a cornering-
   heavy driver leans slightly toward more downforce; a braking/consistency-
   heavy driver leans slightly toward a more neutral balance; a fuel-saving/
   race-pace driver leans slightly toward taller gearing). This nudge is capped
   small (±8) so track character always dominates — it's flavor, not a
   difficulty-defining mechanic.
   Everything here is a fixed formula over existing stats — no randomness,
   no AI, fully deterministic and reproducible from the save file alone. */
function personalSetupNudge(driver){
  const d = driver.attributes.driving;
  const downforceNudge = clamp(((d.cornering-50) - (d.racePace-50)) * 0.16, -8, 8);
  const balanceNudge = clamp(((d.braking-50) - (d.consistency-50)) * 0.12, -6, 6);
  const gearNudge = clamp(((d.starts-50) - (d.fuelSaving-50)) * 0.14, -8, 8);
  return { downforce: downforceNudge, balance: balanceNudge, gearRatio: gearNudge };
}

function trueIdealSetup(track, player){
  const base = track.idealSetup;
  const nudge = personalSetupNudge(player);
  return {
    downforce: clamp(Math.round(base.downforce + nudge.downforce), 0, 100),
    balance: clamp(Math.round(base.balance + nudge.balance), 0, 100),
    gearRatio: clamp(Math.round(base.gearRatio + nudge.gearRatio), 0, 100),
  };
}

/* Hint confidence grows with: track familiarity (Practice sessions at THIS
   track feed knowledge of the track-side component) and total simulator/
   driving training sessions logged (feeds knowledge of the player's own
   tendency component). Returns 0-100. At low confidence the hint UI shows a
   wide fuzzy band around the true value; at high confidence it narrows down
   to a tight, near-exact recommendation. This makes the hint feel like it's
   "revealing little by little", exactly as requested, without ever being
   handed to the player for free. */
function setupHintConfidence(state, trackId){
  const p = state.player;
  const familiarity = p.trackFamiliarity[trackId] || 65; // 65-100
  const familiarityConfidence = clamp((familiarity-65)/35 * 60, 0, 60); // up to 60 pts from track knowledge
  const trainingSessions = p.setupTrainingSessions || 0;
  const trainingConfidence = clamp(trainingSessions * 6, 0, 40); // up to 40 pts from driver-tendency knowledge
  return clamp(Math.round(familiarityConfidence + trainingConfidence), 0, 100);
}

/* Turns a confidence 0-100 into a fuzzy band [min,max] around the true value.
   100 confidence = ±2 (essentially exact), 0 confidence = ±35 (barely a clue). */
function setupHintBand(trueVal, confidence){
  const spread = Math.round(35 - (confidence/100)*33);
  return { min: clamp(trueVal-spread, 0, 100), max: clamp(trueVal+spread, 0, 100), spread };
}

/* Small, real performance effect for how close currentSetup is to the true
   ideal — feeds into driverStrength() as setupBonus. Realistic difficulty
   narrows the forgiving window (setupWindow < 1), so mismatched setups are
   punished harder, exactly matching the DIFFICULTY_SETTINGS.setupWindow field
   that previously existed but was unused. */
function setupMatchBonus(currentSetup, ideal, setupWindow){
  const window = setupWindow || 1.0;
  const dDown = Math.abs(currentSetup.downforce - ideal.downforce);
  const dBal = Math.abs(currentSetup.balance - ideal.balance);
  const dGear = Math.abs(currentSetup.gearRatio - ideal.gearRatio);
  const avgOff = (dDown + dBal*1.2 + dGear) / 3.2; // balance mismatch hurts slightly more
  const tolerance = 18 * window; // Casual: ~25 tolerance, Realistic: ~12.6
  const normalized = clamp(1 - avgOff/(tolerance*2.4), -1, 1);
  return normalized * 3.2; // ±3.2 pace units — noticeable but never race-defining
}

/* ---------- Season-end AI team development ----------
   Every team (including the player's, on top of whatever the player manually
   bought) drifts carStrength/reliability at season end. Each team has its own
   ambition/volatility/reliabilityFocus (devTrend in data.js) so progression is
   not uniform: some teams climb steadily, some boom-or-bust, some slowly fade.
   A mild rubber-band nudges lower-tier teams' ambition up slightly and
   high-tier teams' ambition down slightly, so the grid doesn't diverge forever
   while still allowing a genuine title-fight upset over a multi-season save.
   Fully deterministic formula + bounded randomness per team — no AI involved. */
function developTeamsForNewSeason(state, difficultySettings){
  const diff = difficultySettings || DIFFICULTY_SETTINGS.Standard;
  const strengths = TEAMS.map(t=>t.carStrength);
  const avgStrength = strengths.reduce((a,b)=>a+b,0)/strengths.length;

  TEAMS.forEach(team=>{
    const trend = team.devTrend || {ambition:0.5, volatility:1.5, reliabilityFocus:0.3};
    // rubber-band: teams below average get a small ambition boost, teams above get a small penalty
    const gapFromAvg = avgStrength - team.carStrength;
    const rubberBand = clamp(gapFromAvg * 0.025, -0.5, 0.5);
    const seasonRoll = rand(-trend.volatility, trend.volatility);
    let delta = (trend.ambition + rubberBand + seasonRoll) * diff.aiDevMult;

    // split the season's development budget between pace and reliability
    const paceDelta = delta * (1 - trend.reliabilityFocus);
    const reliabilityDelta = delta * trend.reliabilityFocus * 0.6;

    team.carStrength = clamp(Math.round((team.carStrength + paceDelta)*10)/10, 40, 99);
    team.reliability = clamp(Math.round((team.reliability + reliabilityDelta)*10)/10, 3, 10);
  });

  if(state && state.newsFeed){
    const sorted = [...TEAMS].sort((a,b)=>b.carStrength-a.carStrength);
    const topTeam = sorted[0];
    pushStateNews(state, `🏗️ Off-season development complete. ${topTeam.flag} ${topTeam.name} enters the new season with the strongest car on the grid.`);
  }
}
function getDifficultySettings(state){
  return DIFFICULTY_SETTINGS[state.player.difficulty] || DIFFICULTY_SETTINGS.Standard;
}

const RIVALRY_LEVELS = [
  {min:0,  name:'Unfamiliar'},
  {min:20, name:'Competitive'},
  {min:45, name:'Rival'},
  {min:70, name:'Arch Rival'},
  {min:90, name:'Legendary Rival'},
];
function rivalryLevelName(val){
  let name = RIVALRY_LEVELS[0].name;
  for(const lvl of RIVALRY_LEVELS){ if(val>=lvl.min) name = lvl.name; }
  return name;
}

/* Driving style progress: each strategy choice nudges the player toward a signature style.
   Once one style reaches a threshold of uses, it becomes the player's official Driving Style. */
const STYLE_FOR_APPROACH = { push:'Aggressive', attack:'Aggressive', defend:'Defensive', saveTires:'Tyre Saver' };
function recordStyleProgress(player, approach){
  const style = STYLE_FOR_APPROACH[approach];
  if(!style) return null;
  player.styleProgress[style] = (player.styleProgress[style]||0) + 1;
  if(!player.drivingStyle && player.styleProgress[style] >= 5){
    player.drivingStyle = style;
    return style;
  }
  // style can shift if another style pulls far enough ahead
  if(player.drivingStyle && player.styleProgress[style] >= (player.styleProgress[player.drivingStyle]||0) + 6){
    player.drivingStyle = style;
    return style;
  }
  return null;
}

const POINTS_TABLE = [25,18,15,12,10,8,6,4,2,1];
function pointsForPosition(pos){ return (!pos || pos>10) ? 0 : POINTS_TABLE[pos-1]; }
const SPRINT_POINTS_TABLE = [8,7,6,5,4,3,2,1];
function sprintPointsForPosition(pos){ return (!pos || pos>8) ? 0 : SPRINT_POINTS_TABLE[pos-1]; }

function checkReputationArchetypes(driver){
  const earned = [];
  for(const arch of REPUTATION_ARCHETYPES){
    try{ if(arch.test(driver)) earned.push(arch.id); }catch(e){}
  }
  return earned;
}

/* ---------- Career legacy (retirement -> next career) ----------
   Fully deterministic: picking a perk applies a fixed, known bonus. No RNG,
   no AI — the player always knows exactly what they're choosing. */
const LEGACY_PERKS = [
  {id:'prodigy', name:'Family Name Recognition', icon:'📰', desc:'Start your next driver with +20 Fan Popularity and +10 Media Reputation.',
   apply:(cfg)=>{ cfg.legacyBonus = {...(cfg.legacyBonus||{}), fanPopularity:20, mediaReputation:10}; }},
  {id:'wealth', name:'Family Fortune', icon:'💰', desc:'Start your next driver with $15M banked instead of $5M.',
   apply:(cfg)=>{ cfg.legacyBonus = {...(cfg.legacyBonus||{}), money:15}; }},
  {id:'academy', name:'Old Racing Contacts', icon:'🤝', desc:'Start your next driver with a Tier 2 team offer available from lap one, even as a nobody.',
   apply:(cfg)=>{ cfg.legacyBonus = {...(cfg.legacyBonus||{}), tierBoost:true}; }},
  {id:'coaching', name:'Inherited Coaching', icon:'🎓', desc:'Start your next driver with +6 to every driving attribute.',
   apply:(cfg)=>{ cfg.legacyBonus = {...(cfg.legacyBonus||{}), drivingBoost:6}; }},
];

/* Carries a slice of the retiring driver's identity into the new save as a
   legendary AI grid entry, so their old career remains present in the world
   (a rival to race against, not an unbeatable wall — capped baseSkill so it
   stays fair at any difficulty). */
function makeLegendDriver(retiredPlayer, teamId){
  const team = TEAMS.find(t=>t.id===teamId) || pick(TEAMS.filter(t=>t.tier<=2)) || TEAMS[0];
  const legendSkill = clamp(overallRating(retiredPlayer.attributes) - 8, 55, 90);
  const legend = makeRivalDriver(`${retiredPlayer.name} (Legend)`, team.id);
  legend.attributes = createDriverAttributes(legendSkill);
  legend.isLegend = true;
  legend.age = clamp(retiredPlayer.age - 14, 24, 34); // returns as if entering their prime years, not their retirement age
  legend.careerStats = {...retiredPlayer.careerStats};
  return legend;
}

/* ---------- Grid driver aging & retirement ----------
   Every AI driver on the grid ages each season alongside the player. Once a
   driver crosses a soft retirement age, a small per-season retirement chance
   kicks in and grows with age — nobody is guaranteed to retire at a fixed
   age (avoids every driver retiring in lockstep), but by the late 30s it
   becomes very likely. A retiring driver is replaced by a freshly generated
   rookie at the same team, keeping grid size constant. Rivalry with the
   player is intentionally NOT carried over to the replacement — a new driver
   is a new relationship, not a reskin of the old rival. Deterministic
   formula + a single random roll per driver per season; no AI involved. */
function retirementChanceForAge(age){
  if(age < 34) return 0;
  if(age < 37) return 0.08;
  if(age < 40) return 0.22;
  if(age < 43) return 0.45;
  return 0.75;
}

function processGridRetirements(state){
  const retirees = [];
  state.grid.forEach((driver, idx)=>{
    if(driver.isLegend) return; // legacy legend drivers are exempt from random retirement churn
    const chance = retirementChanceForAge(driver.age);
    if(chance > 0 && Math.random() < chance){
      retirees.push({ name: driver.name, teamId: driver.teamId });
      const freshName = pick((RIVAL_DRIVER_NAMES[driver.teamId]||[]).filter(n=>n!==driver.name)) || `${pick(NATIONALITIES)} Rookie`;
      const replacement = makeRivalDriver(freshName, driver.teamId);
      replacement.age = randInt(19, 23); // replacements always enter as young rookies
      state.grid[idx] = replacement;
      if(state.rivalId === driver.id) state.rivalId = null; // rivalry ends when a rival retires
    }
  });
  if(retirees.length && state.newsFeed){
    retirees.forEach(r=>{
      const team = TEAMS.find(t=>t.id===r.teamId);
      pushStateNews(state, `🏁 ${r.name} announces retirement from ${team ? team.name : 'the grid'} at the end of the season.`);
    });
  }
  return retirees;
}

/* ---------- Team staff (npcRoster) aging & retirement ----------
   Every non-Team-Principal staff member (Chief Engineer, Race Engineer,
   Doctor, Journalist, Best Friend, Streamer Pal) has an implicit career
   length: after a set number of seasons in the role, they have a chance to
   move on, replaced by a new person with a freshly rolled personality. The
   Team Principal is explicitly exempt from this per-season churn — they only
   change once state.careerRetirementCount (a running tally of every grid
   driver retirement seen so far, across the whole career) crosses a
   multiple of 10, modeling a much rarer front-office shake-up rather than
   ordinary staff turnover. Relationship progress with a departing staff
   member is intentionally reset for their replacement — a new person hasn't
   earned that trust yet. */
function processStaffTurnover(state, retireeCountThisSeason){
  const changes = [];
  if(!state.npcRoster) return changes;
  state.npcRoster.forEach((npc, idx)=>{
    if(npc.role === 'Team Principal') return; // handled separately below
    npc.tenureSeasons = (npc.tenureSeasons||0) + 1;
    const baseChance = clamp((npc.tenureSeasons - 4) * 0.06, 0, 0.35);
    if(baseChance > 0 && Math.random() < baseChance){
      const oldName = npc.name;
      const engineerPersonality = pick(ENGINEER_PERSONALITIES);
      const gender = pick(['M','F']);
      const wasWellLiked = npc.relationship.friendship >= 65;
      state.npcRoster[idx] = {
        id: uid('npc'), role: npc.role, name: randomName(gender), gender,
        relationship: { friendship:35, trust:35, affection: npc.role==='Best Friend'?40:15, respect:35, compatibility:randInt(30,70), memories:[] },
        personality: npc.role==='Race Engineer' ? engineerPersonality : pick(['Calm','Energetic','Strict','Funny']),
        tenureSeasons: 0,
        romance: { status:'none', spark:0 },
      };
      changes.push({ role: npc.role, oldName, newName: state.npcRoster[idx].name });
      // Losing a well-liked engineer/principal dents team chemistry a little;
      // other departing roles (Doctor/Journalist/Best Friend/Streamer Pal)
      // don't affect car-side team morale.
      if(wasWellLiked && (npc.role==='Chief Engineer' || npc.role==='Race Engineer') && state.player){
        state.teamMorale = state.teamMorale || {};
        const teamId = state.player.teamId;
        state.teamMorale[teamId] = clamp((state.teamMorale[teamId]||65) - 5, 0, 100);
      }
    }
  });

  state.careerRetirementCount = (state.careerRetirementCount||0) + retireeCountThisSeason;
  const priorMilestone = Math.floor(((state.careerRetirementCount - retireeCountThisSeason)) / 10);
  const newMilestone = Math.floor(state.careerRetirementCount / 10);
  if(newMilestone > priorMilestone){
    const tpIdx = state.npcRoster.findIndex(n=>n.role==='Team Principal');
    if(tpIdx >= 0){
      const oldName = state.npcRoster[tpIdx].name;
      const gender = pick(['M','F']);
      state.npcRoster[tpIdx] = {
        id: uid('npc'), role:'Team Principal', name: randomName(gender), gender,
        relationship: { friendship:35, trust:35, affection:15, respect:35, compatibility:randInt(30,70), memories:[] },
        personality: pick(['Calm','Energetic','Strict','Funny']),
        tenureSeasons: 0,
        romance: { status:'none', spark:0 },
      };
      changes.push({ role:'Team Principal', oldName, newName: state.npcRoster[tpIdx].name });
    }
  }

  if(changes.length && state.newsFeed){
    changes.forEach(c=>{
      pushStateNews(state, `👋 ${c.oldName} steps down as ${c.role}. ${c.newName} takes over the role.`);
    });
  }
  return changes;
}

/* ---------- Dynamic scouting interest (mid-contract team interest) ----------
   Separate from the end-of-contract renewal flow: other teams can express
   interest in the player DURING an active contract, based on a mix of
   current standing, team morale, and reputation — modeling how real paddock
   interest works. Smaller/lower-tier teams reach out to a player having a
   rough season (a lifeline, "we believe in your potential"); bigger/higher-
   tier teams reach out to a player performing well or with strong morale.
   This never forces anything — it's a proactive one-off notification the
   player can act on via a dedicated "Talk Contract" flow, or ignore, and
   their current contract is untouched unless they choose to switch. Fully
   deterministic given the state + a single random roll for scoring/chance —
   no AI/LLM involved. */
function checkScoutingInterest(state){
  const s = state; const p = s.player;
  if(!p || p.retired) return null;
  if(s.scoutingOffer) return null; // don't stack multiple pending offers
  if(p.contract.years <= 1) return null; // let the normal renewal flow handle expiring contracts

  const standing = Object.entries(s.standings||{}).sort((a,b)=>b[1]-a[1]).findIndex(([id])=>id==='player');
  const playerStanding = standing===-1 ? 12 : standing+1;
  const currentTeam = TEAMS.find(t=>t.id===p.teamId);
  const morale = (s.teamMorale && s.teamMorale[p.teamId]) || 65;

  // Base weekly chance is small; it scales up if the player's situation is
  // notable in either direction (very strong or, for the lifeline case,
  // notably struggling relative to their team's own tier expectations).
  let baseChance = 0.015;
  let interestedTiers = [];

  if(playerStanding <= 6 || p.fanPopularity >= 65){
    // Strong performer or fan-favorite: bigger/equal teams take notice.
    baseChance = 0.03;
    interestedTiers = [1, 2].filter(t=>t <= currentTeam.tier); // equal-or-better tier
  } else if(playerStanding >= 16 && currentTeam.tier <= 2){
    // Struggling at a mid/top team: a smaller team sees an opportunity to
    // pick up undervalued talent at a discount — the "lifeline" case.
    baseChance = 0.025;
    interestedTiers = [3];
  } else if(morale >= 85){
    // Great team chemistry can itself draw attention (paddock notices happy,
    // settled drivers performing to potential).
    baseChance = 0.02;
    interestedTiers = [Math.max(1, currentTeam.tier-1)];
  }

  if(!interestedTiers.length) return null;
  if(Math.random() > baseChance) return null;

  const candidateTeams = TEAMS.filter(t=>t.id!==currentTeam.id && interestedTiers.includes(t.tier));
  if(!candidateTeams.length) return null;
  const suitor = pick(candidateTeams);

  const offer = {
    teamId: suitor.id,
    years: randInt(1,3),
    salary: Math.max(1, Math.round(suitor.carStrength/10) + randInt(-1,1)),
    reason: playerStanding<=6 ? 'performance' : playerStanding>=16 ? 'potential' : 'morale',
  };
  s.scoutingOffer = offer;
  const reasonText = offer.reason==='performance' ? `after watching ${p.name}'s recent results`
    : offer.reason==='potential' ? `and believe ${p.name} is undervalued at their current team`
    : `impressed by ${p.name}'s form and happy environment this season`;
  pushStateNews(s, `📞 ${suitor.flag} ${suitor.name} have quietly reached out ${reasonText}.`);
  return offer;
}

/* ---------- Save / Load ---------- */
const SAVE_KEY = 'apexpal_save_v1';
function saveGame(state){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); return true; }
  catch(e){ console.error('Save failed', e); return false; }
}
function loadGame(){
  try{ const raw = localStorage.getItem(SAVE_KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ console.error('Load failed', e); return null; }
}
function deleteSave(){ localStorage.removeItem(SAVE_KEY); }

/* ---------- Legacy storage (survives deleteSave, one pending record) ----------
   Written when a retiring player picks a legacy perk; consumed the next time
   startNewCareer() runs. Deliberately separate from SAVE_KEY so retiring and
   starting fresh doesn't fight with the normal save/delete lifecycle. */
const LEGACY_KEY = 'apexpal_legacy_v1';
function savePendingLegacy(record){
  try{ localStorage.setItem(LEGACY_KEY, JSON.stringify(record)); return true; }
  catch(e){ console.error('Legacy save failed', e); return false; }
}
function loadPendingLegacy(){
  try{ const raw = localStorage.getItem(LEGACY_KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
function clearPendingLegacy(){ localStorage.removeItem(LEGACY_KEY); }

/* ---------- Multi-career Hall of Fame (survives deleteSave, one array) ----------
   Currently p.careerStats/seasonAwardsWon only ever describe the ACTIVE
   career -- nothing about a retired driver persisted past deleteSave()
   except the single pendingLegacy record (which itself gets consumed and
   cleared on the next career start). This is a separate, append-only
   record of every retired career's headline numbers, isolated from
   SAVE_KEY/LEGACY_KEY so it survives new careers, deleted saves, and
   legacy-perk consumption indefinitely. A corrupt or missing HOF array
   must never be able to break an active career, hence the same defensive
   try/catch pattern as the save/legacy functions above, and every read
   site treats a failure as "no history yet" rather than propagating. */
const HOF_KEY = 'apexpal_hof_v1';
function loadHallOfFame(){
  try{ const raw = localStorage.getItem(HOF_KEY); const parsed = raw ? JSON.parse(raw) : []; return Array.isArray(parsed) ? parsed : []; }
  catch(e){ return []; }
}
function appendToHallOfFame(entry){
  try{
    const list = loadHallOfFame();
    list.unshift(entry);
    if(list.length>50) list.length = 50; // generous cap, avoids unbounded localStorage growth over many careers
    localStorage.setItem(HOF_KEY, JSON.stringify(list));
    return true;
  }catch(e){ console.error('Hall of Fame save failed', e); return false; }
}
/* Builds the compact summary record written at retirement -- deliberately
   just headline numbers (not the full player object like the legacy
   snapshot uses) since this needs to stay small across potentially many
   retired careers, and the retrospective/legacy systems already cover the
   detailed view of the MOST RECENT retirement. */
function buildHallOfFameEntry(state){
  const p = state.player;
  const bestSeason = [...state.history].sort((a,b)=>a.standing-b.standing)[0];
  const teamsRaced = [...new Set(state.history.map(h=>h.team))];
  return {
    name: p.name, flag: p.flag, nationality: p.nationality,
    seasons: state.history.length,
    wins: p.careerStats.wins, podiums: p.careerStats.podiums, poles: p.careerStats.poles,
    points: p.careerStats.points, starts: p.careerStats.starts,
    awardsCount: p.seasonAwardsWon.length,
    bestStanding: bestSeason ? bestSeason.standing : null,
    teamsRaced,
    retiredSeason: state.season,
  };
}

  startNewCareer(){
    const cfg = this.createConfig;
    if(!cfg.name || !cfg.name.trim()){ this.toast('Please enter a driver name.'); return; }

    // A new career should never inherit a previous career's team
    // development left mutated in memory from the same browser session
    // (TEAMS is a shared, not per-career, in-memory constant) -- reset every
    // team's carStrength/reliability/upgrades/devSlotsUsed back to its
    // data.js starting numbers first.
    TEAMS.forEach(t=>{
      const base = TEAMS_BASE_DEFAULTS[t.id];
      if(base){ t.carStrength = base.carStrength; t.reliability = base.reliability; }
      t.upgrades = buildInitialTeamUpgrades(t.tier);
      t.devSlotsUsed = 0;
    });

    // Apply any pending legacy perk from a previously retired driver.
    const pendingLegacy = loadPendingLegacy();
    if(pendingLegacy){
      const perk = LEGACY_PERKS.find(x=>x.id===pendingLegacy.perkId);
      if(perk) perk.apply(cfg);
    }

    const player = createPlayer(cfg);
    const bonus = cfg.legacyBonus;
    if(bonus){
      if(bonus.fanPopularity) player.fanPopularity = clamp(player.fanPopularity + bonus.fanPopularity, 0, 100);
      if(bonus.mediaReputation) player.mediaReputation = clamp(player.mediaReputation + bonus.mediaReputation, 0, 100);
      if(bonus.money) player.money = bonus.money;
      if(bonus.drivingBoost){
        Object.keys(player.attributes.driving).forEach(k=>{
          player.attributes.driving[k] = clamp(player.attributes.driving[k] + bonus.drivingBoost, 0, 99);
        });
      }
    }

    const grid = generateGrid(cfg.teamId);
    // Add the previous career's driver as a legendary AI rival, if a legacy
    // is pending — this REPLACES an existing AI driver on a strong team
    // other than the player's own (so every team's 2-seat count stays
    // intact) rather than being added as an extra body. The grid must
    // always total exactly 22 drivers (21 AI + player), no exceptions.
    if(pendingLegacy && pendingLegacy.retiredPlayerSnapshot){
      const eligibleTeams = TEAMS.filter(t=>t.id!==cfg.teamId && t.tier<=2);
      const legendTeam = (eligibleTeams.length ? pick(eligibleTeams) : TEAMS.find(t=>t.id!==cfg.teamId)) || TEAMS[0];
      const slotIdx = grid.findIndex(d=>d.teamId===legendTeam.id);
      if(slotIdx!==-1) grid[slotIdx] = makeLegendDriver(pendingLegacy.retiredPlayerSnapshot, legendTeam.id);
    }
    clearPendingLegacy();

    const season = 2027;
    this.state = {
      player, grid, season,
      careerStartSeason: season,
      calendar: { rounds: buildSeasonCalendar(1), currentRound: 0 },
      dayIndex: 0, week: 1,
      standings: {},
      newsFeed: [
        `📰 ${player.name} joins ${TEAMS.find(t=>t.id===player.teamId).name} as a rookie driver.`,
        ...(pendingLegacy ? [`🌟 The paddock remembers ${pendingLegacy.retiredPlayerSnapshot.name}'s legacy — and a new legend joins the grid.`] : []),
      ],
      seasonStats: { wins:0, podiums:0, points:0, beatTeammate:false, q3count:0 },
      seasonObjectives: null, // set below once TEAMS lookup is available
      npcRoster: this.generateNpcRoster(),
      history: [],
      retiredFlag:false,
      rivalId: null,
      // carUpgrades below is legacy/unused as of the per-team development
      // rework -- development levels now live on each TEAMS entry
      // (team.upgrades, seeded by buildInitialTeamUpgrades in data.js) so a
      // team switch inherits that team's real progress. Kept here only so
      // old save files still parse the same shape; nothing reads it anymore.
      carUpgrades: { aero:1, engine:1, chassis:1, suspension:1, reliability:1 },
      facilities: { gym:1, simulator:1, engineering:1, factory:1, media:1, hospitality:1 },
      currentSetup: { downforce:50, balance:50, gearRatio:50 },

      lastRaceHeadline: null,
    };
    this.state.seasonObjectives = generateSeasonObjectives(this.state);
    if(bonus && bonus.tierBoost){
      this.state.pendingTierOffer = true; // surfaced on Home/contract flow as an early opportunity
    }
    this.saveState();

        relationship: { friendship:40, trust:40, affection: role==='Best Friend'?45:20, respect:40, compatibility:randInt(30,70), memories:[] },
        personality: role==='Race Engineer' ? engineerPersonality : pick(['Calm','Energetic','Strict','Funny']),

        romance: { status:'none', spark:0 }, // status: 'none'|'flirting'|'dating'|'declined'
      };
    });

  saveState(){
    if(!this.state) return;
    this.syncTeamsToState();
    saveGame(this.state);
  },

  /* ---------------- TEAMS persistence ----------------
     TEAMS (data.js) is a plain in-memory JS constant -- it is NOT part of
     App.state and is NOT written to localStorage on its own. Before this
     pair of helpers existed, every mutation to team.carStrength/reliability/
     upgrades/devSlotsUsed (from AI seasonal development, player car
     upgrades, or regulation changes) was silently lost on every page
     reload, since a fresh page load re-runs data.js from scratch and
     resets every team back to its hardcoded starting numbers. This was a
     real, pre-existing bug independent of the per-team development rework
     -- it just became far more consequential once development stopped
     being a purely cosmetic display number.

     Fix: snapshot the mutable per-team fields into s.teamState right before
     every save, and restore TEAMS from that snapshot right after every
     load. Deliberately narrow (only the fields that actually change at
     runtime) so this stays cheap and easy to extend later. */
  syncTeamsToState(){
    if(!this.state) return;
    this.state.teamState = Object.fromEntries(TEAMS.map(t=>[t.id, {
      carStrength: t.carStrength,
      reliability: t.reliability,
      upgrades: {...(t.upgrades||buildInitialTeamUpgrades(t.tier))},
      devSlotsUsed: t.devSlotsUsed||0,
    }]));
  },
  syncTeamsFromState(){
    if(!this.state || !this.state.teamState) return;
    TEAMS.forEach(t=>{
      const saved = this.state.teamState[t.id];
      if(!saved) return;
      t.carStrength = saved.carStrength;
      t.reliability = saved.reliability;
      t.upgrades = {...(saved.upgrades||buildInitialTeamUpgrades(t.tier))};
      t.devSlotsUsed = saved.devSlotsUsed||0;
    });
  },

  adjustTeamMorale(teamId, delta){
    if(!this.state.teamMorale) this.state.teamMorale = Object.fromEntries(TEAMS.map(t=>[t.id, 65]));
    this.state.teamMorale[teamId] = clamp((this.state.teamMorale[teamId]||65) + delta, 0, 100);
  },
  getTeamMorale(teamId){
    if(!this.state.teamMorale) this.state.teamMorale = Object.fromEntries(TEAMS.map(t=>[t.id, 65]));
    return this.state.teamMorale[teamId] ?? 65;
  },

    `);

    input.select();
    this.wireModalClose();
    document.getElementById('btn-save-rename').onclick = ()=>{
      const val = input.value.trim();
      if(!val){ this.toast('Name cannot be empty.'); return; }
      this.setEntityName(id, kind, val);
      this.closeModal();
      this.saveState();
      this.rerenderCurrentScreen();
      this.toast('Name updated!');
    };
    input.onkeydown = (e)=>{ if(e.key==='Enter') document.getElementById('btn-save-rename').click(); };
  },

  getEntityName(id, kind){
    if(kind==='player') return this.state.player.name;
    if(kind==='driver') return (this.state.grid.find(d=>d.id===id)||{}).name || '';
    if(kind==='npc') return (this.state.npcRoster.find(n=>n.id===id)||{}).name || '';
    return '';
  },
  setEntityName(id, kind, val){
    if(kind==='player') this.state.player.name = val;
    else if(kind==='driver'){ const d = this.state.grid.find(d=>d.id===id); if(d) d.name = val; }
    else if(kind==='npc'){ const n = this.state.npcRoster.find(n=>n.id===id); if(n) n.name = val; }
  },

  /* Centralized news-feed writer. ALWAYS use this instead of calling
     state.newsFeed.unshift() directly — a bug where most call sites forgot
     to cap the list let it grow unbounded over a long career, which made the
     ticker (fixed-duration scroll) cram more and more text into the same
     time window and become unreadably fast. This helper is the single
     enforcement point so that can't regress again. */
  pushNews(text){
    const s = this.state;
    if(!s.newsFeed) s.newsFeed = [];
    s.newsFeed.unshift(text);
    if(s.newsFeed.length > 12) s.newsFeed.length = 12;
  },

  rerenderCurrentScreen(){
    if(this.currentScreen==='hub') this.renderHub();
    else if(this.currentScreen==='race') this.renderRaceCenterScreen();
    else if(this.currentScreen==='team') this.renderTeamScreen();
    else this.renderHub();
  },
};

Object.assign(App, {

  openModal(html){
    let overlay = document.querySelector('.modal-overlay');
    if(overlay) overlay.remove();
    overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const modalEl = document.createElement('div');
    modalEl.className = 'modal';
    modalEl.innerHTML = html;
    // If a .modal-header exists, keep it fixed and wrap the rest in a scrolling .modal-body
    const header = modalEl.querySelector('.modal-header');
    if(header){
      const bodyWrap = document.createElement('div');
      bodyWrap.className = 'modal-body';
      // move every sibling after the header into the body wrap
      let node = header.nextSibling;
      while(node){
        const next = node.nextSibling;
        bodyWrap.appendChild(node);
        node = next;
      }
      modalEl.appendChild(bodyWrap);
    } else {
      // no header (rare) - wrap everything so padding/scroll still behaves
      const bodyWrap = document.createElement('div');
      bodyWrap.className = 'modal-body';
      while(modalEl.firstChild) bodyWrap.appendChild(modalEl.firstChild);
      modalEl.appendChild(bodyWrap);
    }
    overlay.appendChild(modalEl);
    overlay.onclick = (e)=>{ if(e.target===overlay) this.closeModal(); };
    document.getElementById('device').appendChild(overlay);
    this.activeModal = overlay;
    this.wireEditableNames(overlay);
  },
  closeModal(){
    if(this.activeModal){ this.activeModal.remove(); this.activeModal=null; }
  },
  modalHeader(title){
    return `<div class="modal-header"><h3>${title}</h3><button class="modal-close" id="modal-close-btn">&times;</button></div>`;
  },
  wireModalClose(){
    const btn = document.getElementById('modal-close-btn');
    if(btn) btn.onclick = ()=> this.closeModal();
  },

  openActionModal(action){
    if(action==='training') return this.renderTrainingModal();
    if(action==='lifestyle') return this.renderLifestyleModal();
    if(action==='social') return this.renderRelationshipsModal();
    if(action==='media') return this.renderMediaModal();
    if(action==='sponsors') return this.renderSponsorsModal();
    if(action==='team') return this.renderTeamScreen();
  },

  /* ---------------- TRAINING ---------------- */
  /* Base training programs. moneyCost is the price at facility level 1 --
     trainingMoneyCost() scales this up as the relevant facility improves
     (better equipment/coaching costs more to run each session), mirroring
     the existing simBonus/gymBonus gain-scaling pattern so facility upgrades
     have a consistent "better AND pricier" feel across the whole training
     system rather than only affecting gains. */
  renderTrainingModal(){
    const p = this.state.player; const s = this.state;
    const PROGRAMS = [
      {id:'gym', label:'Gym Session', icon:'🏋️', cost:20, moneyCost:0.3, stat:'fitness', group:'lifestyle', facility:'gym'},
      {id:'sim_pace', label:'Sim: Race Pace', icon:'🖥️', cost:18, moneyCost:0.5, stat:'racePace', group:'driving', facility:'simulator'},
      {id:'sim_quali', label:'Sim: Qualifying', icon:'⏱️', cost:18, moneyCost:0.5, stat:'qualifyingPace', group:'driving', facility:'simulator'},
      {id:'sim_wet', label:'Sim: Wet Conditions', icon:'🌧️', cost:20, moneyCost:0.5, stat:'wetSkill', group:'driving', facility:'simulator'},
      {id:'sim_tyre', label:'Sim: Tyre Management', icon:'🛞', cost:18, moneyCost:0.5, stat:'tyreManagement', group:'driving', facility:'simulator'},
      {id:'braking', label:'Braking Drills', icon:'🦿', cost:14, moneyCost:0.3, stat:'braking', group:'driving', facility:'simulator'},
      {id:'cornering', label:'Cornering Study', icon:'📐', cost:14, moneyCost:0.3, stat:'cornering', group:'driving', facility:'simulator'},
      {id:'starts', label:'Start Practice', icon:'🚦', cost:12, moneyCost:0.25, stat:'starts', group:'driving', facility:'simulator'},
      {id:'consistency', label:'Race Craft Drills', icon:'🎯', cost:16, moneyCost:0.4, stat:'consistency', group:'driving', facility:'simulator'},
      {id:'mental', label:'Mental Coaching', icon:'🧠', cost:10, moneyCost:0.2, stat:'focus', group:'mental', facility:'media'},
    ];
    this.openModal(`
