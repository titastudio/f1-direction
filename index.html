  /* ---------------- SEASON END ---------------- */
  computeSeasonAwards(){
    const s = this.state; const p = s.player;
    const awards = [];
    const allDrivers = [...s.grid, p];
    const byOvertaking = [...allDrivers].sort((a,b)=>b.attributes.driving.overtaking-a.attributes.driving.overtaking)[0];
    if(byOvertaking.id==='player') awards.push('Best Overtaker');
    const rookiesByPoints = allDrivers.filter(d=>d.age<=19).sort((a,b)=>(s.standings[b.id]||0)-(s.standings[a.id]||0));
    if(rookiesByPoints.length && rookiesByPoints[0].id==='player') awards.push('Rookie of the Year');
    if(p.fanPopularity>=70) awards.push('Most Popular Driver');
    if(p.attributes.driving.qualifyingPace>=80) awards.push('Best Qualifier');
    if((p.careerStats.dnfs||0)===0 && p.careerStats.starts>0) awards.push('Cleanest Driver');
    if(s.seasonStats.beatTeammate) awards.push('Team Player');
    return awards;
  },

  /* Season objectives previously showed a progress bar with zero actual
     payoff when completed — this closes that gap. Runs once at season end
     (championshipPosition/standingPosition can only be judged fairly once
     the season is actually over) and pays out each objective's reward. */
  processSeasonObjectiveRewards(){
    const s = this.state; const p = s.player;
    const completed = [];
    (s.seasonObjectives||[]).forEach(o=>{
      const progress = this.objectiveProgress(o);
      const met = o.type==='beatTeammate' ? progress>=1 : progress>=o.target;
      if(met && o.reward){
        p.money = Math.round((p.money + o.reward.money)*10)/10;
        p.mediaReputation = clamp(p.mediaReputation + o.reward.rep, 0, 100);
        completed.push(o);
      }
    });
    if(completed.length){
      this.toast(`🎯 ${completed.length} season objective(s) completed!`);
      completed.forEach(o=>{
        p.journal.unshift({season:s.season, week:s.week, title:'Objective Complete', text:`"${o.text}" — +$${o.reward.money}M, +${o.reward.rep} media reputation.`, icon:'🎯'});
      });
      this.pushNews(`🎯 ${p.name} completed ${completed.length} season objective(s), earning bonus pay and reputation.`);
    }
    return completed;
  },

  handleSeasonEnd(){
    const s = this.state; const p = s.player;
    // Idempotency guard: this function does one-time-per-season things
    // (age++, retirements/staff turnover, awards, a history entry, a
    // journal entry) that must never apply twice. Without this guard, the
    // new #btn-season-wrap recovery button (see renderTodayActions -- it
    // exists specifically to rescue a save that got stuck on an off week
    // after the season-end modal was dismissed without being actioned)
    // could double-apply an entire season's worth of aging/awards/history
    // if clicked, or if handleSeasonEnd() were ever reachable twice for the
    // same season through some other path. s.lastWrappedSeason records
    // which season number was last fully wrapped; if we're being asked to
    // wrap that same season again, skip straight to re-showing the summary
    // modal (recomputed from already-applied state) instead of re-running
    // the one-time effects.
    if(s.lastWrappedSeason === s.season){
      this.renderSeasonWrapModal(s._lastSeasonWrapData);
      return;
    }
    const standing = this.standingPosition('player');
    const points = s.standings['player']||0;
    const team = this.getTeam(p.teamId);
    s.history.push({season:s.season, team:team.name, standing, points});

    // Constructors' Championship standing, captured the same moment the
    // driver's own standing is (before any grid/team churn below could
    // shift things) so the Season Wrap modal shows a snapshot consistent
    // with the rest of this season's summary.
    const constructorsRows = this.constructorsStandings();
    const constructorsPos = constructorsRows.findIndex(r=>r.team.id===team.id)+1;
    const constructorsPoints = (constructorsRows.find(r=>r.team.id===team.id)||{}).points||0;

    // Teammate relationship arc: capture the season's head-to-head tally
    // BEFORE processGridRetirements() runs below -- a retiring teammate is
    // replaced with a fresh driver object (state.grid[idx]=...), which
    // would silently wipe teammateTally before this could ever be read.
    // Always reset to a fresh {wins:0,losses:0} for whoever's the teammate
    // NEXT season (present or not) since this is inherently a THIS-season
    // story, same reasoning as seasonStats itself resetting every season.
    const currentTeammate = s.grid.find(d=>d.teamId===p.teamId);
    let teammateArcSummary = null;
    if(currentTeammate && currentTeammate.teammateTally){
      const {wins, losses} = currentTeammate.teammateTally;
      if(wins+losses > 0){
        teammateArcSummary = { name: currentTeammate.name, wins, losses };
      }
      currentTeammate.teammateTally = { wins:0, losses:0 };
    }

    p.age++;
    s.grid.forEach(d=> d.age++);
    developGridDriversForNewSeason(s);
    // Player skill decay (anti-overpower): a small season-over-season fade
    // on driving/mental stats, representing rust/aging the same way real
    // drivers need to keep training to stay sharp rather than banking a
    // stat forever once earned. Deliberately smaller than a single
    // training session's typical gain (see doTraining(), app_actions.js --
    // a base gain is ~2 before facility bonuses), so regular training more
    // than offsets it; a season spent NOT training is where this actually
    // bites. Runs before enforcePlayerSkillCap() gets its next chance to
    // apply (every saveState() call), so decay and the leader-relative cap
    // interact naturally rather than needing special-cased ordering.
    const SEASON_SKILL_DECAY = 2;
    ['driving','mental'].forEach(group=>{
      Object.keys(p.attributes[group]).forEach(stat=>{
        p.attributes[group][stat] = clamp(p.attributes[group][stat] - SEASON_SKILL_DECAY, 0, 99);
      });
    });
    const retirees = processGridRetirements(s);
    processStaffTurnover(s, retirees.length);
    // Driver market news ticker -- real AI-to-AI team switching (Pass 23
    // backlog closure). Runs AFTER retirements/replacements have already
    // settled for the season, so a driver who just retired this season
    // can never also be swapped. Player and player's own teammate are
    // never eligible -- see processDriverMarketMoves()'s own comment.
    processDriverMarketMoves(s);
    // Team Ownership Mode bugfix (Pass 25): p.contract.years was decrementing
    // every season for an owner exactly the same as a real driver career,
    // which meant an owner's contract would eventually hit 0 and force them
    // through renderContractOffersModal() -- a full driver free-agency
    // experience (browse other teams' offers, potentially a mid-career
    // "Choose Your Teammate" pick) that makes no sense for someone who
    // identified as a Team Principal, not a driver. There's no "owner
    // free agency" system in this codebase (deliberately -- building one
    // would be real scope creep past what Owner Mode is meant to be), so
    // an owner's contract simply auto-renews with their own team every
    // season instead of ever being allowed to hit 0.
    if(p.isTeamOwner) p.contract.years = Math.max(p.contract.years, 1);
    else p.contract.years = Math.max(0, p.contract.years - 1);

    // Performance-clause check: if this contract has a clause and it's
    // unmet, force the contract to expire right now regardless of years
    // remaining -- triggers the normal contract-offer flow, but the player
    // is now negotiating having just broken a promise to their team, which
    // the standing-based eligibleTiers logic in renderContractOffersModal
    // already naturally reflects (a bad season = worse tiers anyway; this
    // just makes sure the SAME season's shortfall can't be papered over by
    // a contract that still had years left on it).
    // Team Ownership Mode bugfix (Pass 25): skipped entirely for an owner
    // -- a personal performance clause is a driver-contract concept, and
    // forcing p.contract.years=0 here would undo the auto-renew just above
    // and still route an owner into the driver free-agency flow.
    let clauseMissed = null;
    if(!p.isTeamOwner && p.contract.clause && p.contract.clause.met===null){
      const metNow = checkContractClauseMet(p.contract.clause, s, standing);
      p.contract.clause.met = metNow;
      if(!metNow){
        clauseMissed = contractClauseText(p.contract.clause);
        p.contract.years = 0;
        this.pushNews(`📉 ${p.name} misses a contract clause with ${team.name} — renewal talks will be tougher.`);
        p.journal.unshift({season:s.season, week:s.week, title:'Clause Missed', text:`${clauseMissed} was not met — the contract ends early.`, icon:'📉'});
      }
    }

    // Feature idea #11 -- multi-year contract roadmap milestone check.
    // Checked at THIS season's end if it's the milestone's stated target
    // year (yearsIntoContract, counted from roadmapMilestone.signedSeason --
    // same "count seasons since a stored season number" pattern
    // seasonNumToYear() already uses elsewhere). Unlike the hidden
    // performance CLAUSE above, missing this milestone has NO penalty --
    // it's a pure upside roadmap, not a threat -- so a miss just quietly
    // resolves to met:false with no contract-ending consequence.
    let roadmapMilestoneResult = null;
    const rm = p.contract.roadmapMilestone;
    if(rm && rm.met===null){
      const yearsIntoContract = s.season - (rm.signedSeason||s.season) + 1;
      if(yearsIntoContract >= rm.targetYear){
        const metNow = rm.type==='podiumsByYear' ? (p.careerStats.podiums||0) >= (rm.podiumsAtSigning||0) + rm.target : true;
        rm.met = metNow;
        if(metNow){
          p.contract.salary = Math.round((p.contract.salary + rm.reward.salaryRaise)*10)/10;
          this.pushNews(`📈 ${p.name} hits the podium milestone in the contract with ${team.name} — pay rise unlocked!`);
          p.journal.unshift({season:s.season, week:s.week, title:'Milestone Reached', text:`Hit ${rm.target} podiums by Year ${rm.targetYear} as promised — salary rises by $${rm.reward.salaryRaise}M/season.`, icon:'📈'});
        } else {
          p.journal.unshift({season:s.season, week:s.week, title:'Milestone Missed', text:`Didn't reach ${rm.target} podiums by Year ${rm.targetYear} — the promised pay rise doesn't kick in, but the contract continues as normal.`, icon:'📉'});
        }
        roadmapMilestoneResult = { met: metNow, target: rm.target, targetYear: rm.targetYear, raise: rm.reward.salaryRaise };
      }
    }

    const awards = this.computeSeasonAwards();
    p.seasonAwardsWon.push(...awards.map(a=>({season:s.season, award:a})));
    // Season awards mechanical hook (SEASON_AWARD_REWARDS, data.js):
    // mirrors the archetype/trait hook pattern -- each award earned THIS
    // season applies its small one-time reward exactly once, right here,
    // never re-applied on a repeat win of the same award name in a later
    // season (this only reads off the `awards` array just computed for
    // THIS season, not the cumulative seasonAwardsWon history).
    const awardRewardLines = [];
    awards.forEach(awardName=>{
      const reward = seasonAwardReward(awardName);
      if(!reward) return;
      if(reward.money) p.money = Math.round((p.money + reward.money)*10)/10;
      if(reward.fanPopularity) p.fanPopularity = clamp(p.fanPopularity + reward.fanPopularity, 0, 999);
      if(reward.mediaReputation) p.mediaReputation = clamp(p.mediaReputation + reward.mediaReputation, 0, 100);
      if(reward.confidence) p.attributes.mental.confidence = clamp(p.attributes.mental.confidence + reward.confidence);
      if(reward.discipline) p.attributes.mental.discipline = clamp(p.attributes.mental.discipline + reward.discipline);
      if(reward.moraleBoost) this.adjustTeamMorale(p.teamId, reward.moraleBoost);
      awardRewardLines.push({award:awardName, desc:reward.desc});
    });

    const completedObjectives = this.processSeasonObjectiveRewards();

    this.checkHomeEvolution();

    const wins = s.seasonStats.wins||0, podiums = s.seasonStats.podiums||0;
    const tone = standing<=3 ? 'a championship-contending' : standing<=10 ? 'a solidly competitive' : 'a challenging rebuilding';
    const yearNum = seasonLabel(s);
    const summary = `${yearNum} complete: ${p.name} finishes P${standing} with ${points} points, ${wins} win(s), ${podiums} podium(s) — ${tone} campaign.`;

    p.journal.unshift({season:s.season, week:s.week, title:`${yearNum} Wrap`, text:summary, icon:'📖'});
    if(teammateArcSummary){
      const {name, wins:tw, losses:tl} = teammateArcSummary;
      const arcLine = tw>tl ? `You came out on top against ${name} this season, ${tw}-${tl}.`
        : tw<tl ? `${name} had the edge on you this season, ${tl}-${tw}.`
        : `A dead-even season against ${name}, ${tw}-${tl}.`;
      p.journal.unshift({season:s.season, week:s.week, title:'Teammate Battle', text:arcLine, icon:'🤜🤛'});
    }

    const paddockVote = this.computePaddockVote(standing);

    s.lastWrappedSeason = s.season;
    s._lastSeasonWrapData = { standing, points, awards, completedObjectives, summary, yearNum, clauseMissed, teammateArcSummary, awardRewardLines, constructorsPos, constructorsPoints, teamName: team.name, paddockVote, roadmapMilestoneResult };
    this.renderSeasonWrapModal(s._lastSeasonWrapData);
    this.saveState();
  },

  /* Feature idea #2 -- Post-season "paddock vote" driver-of-the-year flavor.
     Pure cosmetic comparison between the player and whoever's actually
     leading the championship (by s.standings, same aggregation shape as
     constructorsStandings() -- read the current totals, don't recompute
     anything simulateRace/simulateQualifying already scored) across a
     handful of simple, already-tracked categories. No mechanical effect of
     any kind -- this never touches money/reputation/morale/stats, it's a
     season-wrap flavor panel only, same spirit as the Career Retrospective
     modal's highlight reel. */
  computePaddockVote(standing){
    const s = this.state; const p = s.player;
    const leaderId = [...s.grid].sort((a,b)=>(s.standings[b.id]||0)-(s.standings[a.id]||0))[0]?.id;
    if(!leaderId || leaderId==='player') return null; // player IS the leader -- no separate comparison needed, the standings already say it all
    const leader = s.grid.find(d=>d.id===leaderId);
    if(!leader) return null;
    const categories = [
      { label:'Championship Points', playerVal: s.standings['player']||0, leaderVal: s.standings[leaderId]||0 },
      { label:'Race Wins', playerVal: s.seasonStats.wins||0, leaderVal: leader.careerStats.wins||0 },
      { label:'Podiums', playerVal: s.seasonStats.podiums||0, leaderVal: leader.careerStats.podiums||0 },
    ];
    const playerWonCategories = categories.filter(c=>c.playerVal>c.leaderVal).length;
    // Feature idea #3 -- a one-line shareable headline summary, purely
    // string formatting over the SAME categories array above (no new
    // comparison logic). Framed from the player's perspective, calling out
    // how many categories they actually won as a quick shareable soundbite
    // sitting under the fuller category breakdown.
    const s2 = this.state;
    const playerLabel = s2.player.age<=24 ? 'Rookie sensation' : this.standingPosition('player')<=3 ? 'Title contender' : 'Grid fighter';
    const wonList = categories.filter(c=>c.playerVal>c.leaderVal).map(c=>c.label);
    const shareHeadline = playerWonCategories===0
      ? `${leader.name} sweeps every category against ${s2.player.name} this year.`
      : playerWonCategories===categories.length
      ? `${playerLabel} ${s2.player.name} sweeps ${leader.name} in every category.`
      : `${playerLabel} ${s2.player.name} edges out ${leader.name} in ${playerWonCategories} of ${categories.length} categories${wonList.length ? ` (${wonList.join(', ')})` : ''}.`;
    return { leaderName: leader.name, leaderTeam: this.getTeam(leader.teamId).name, categories, playerWonCategories, shareHeadline };
  },

  renderSeasonWrapModal({ standing, points, awards, completedObjectives, summary, yearNum, clauseMissed, teammateArcSummary, awardRewardLines, constructorsPos, constructorsPoints, teamName, paddockVote, roadmapMilestoneResult }){
    const s = this.state; const p = s.player;
    this.openModal(`
      ${this.modalHeader(`${yearNum} Complete`)}
      <div class="headline-card">
        <div class="kicker">SEASON WRAP</div>
        <h3>${standing<=3?'A CAMPAIGN TO REMEMBER':standing<=10?'STEADY PROGRESS':'A YEAR TO REGROUP'}</h3>
        <p>${summary}</p>
      </div>
      <div class="pixel-panel" style="text-align:center;">
        <div style="font-family:var(--font-pixel); font-size:30px; color:${standing<=3?'var(--candy-yellow)':'var(--ink)'};">P${standing}</div>
        <div class="section-sub">${points} championship points</div>
        ${constructorsPos ? `<div class="section-sub" style="margin-top:6px;">🏆 ${teamName} finished P${constructorsPos} in the Constructors' Championship (${constructorsPoints} pts)</div>` : ''}
      </div>
      ${clauseMissed ? `<div class="pixel-panel" style="border-left:3px solid var(--candy-red);"><div class="panel-title">⚠️ Contract Clause Missed</div><div class="section-sub" style="margin:0;">${clauseMissed} — your contract ends early, and renewal talks will reflect it.</div></div>` : ''}
      ${roadmapMilestoneResult ? `<div class="pixel-panel" style="border-left:3px solid ${roadmapMilestoneResult.met?'var(--candy-mint)':'var(--candy-red)'};"><div class="panel-title">📈 Contract Milestone</div><div class="section-sub" style="margin:0;">${roadmapMilestoneResult.met ? `You hit ${roadmapMilestoneResult.target} podiums by Year ${roadmapMilestoneResult.targetYear} — salary rises by $${roadmapMilestoneResult.raise}M/season!` : `You didn't reach ${roadmapMilestoneResult.target} podiums by Year ${roadmapMilestoneResult.targetYear} — the promised raise doesn't kick in, but your contract continues.`}</div></div>` : ''}
      ${teammateArcSummary ? `<div class="pixel-panel"><div class="panel-title">🤜🤛 Teammate Battle</div><div class="section-sub" style="margin:0;">${teammateArcSummary.wins>teammateArcSummary.losses ? `You led ${teammateArcSummary.name} ${teammateArcSummary.wins}-${teammateArcSummary.losses} this season.` : teammateArcSummary.wins<teammateArcSummary.losses ? `${teammateArcSummary.name} led you ${teammateArcSummary.losses}-${teammateArcSummary.wins} this season.` : `Dead even with ${teammateArcSummary.name}, ${teammateArcSummary.wins}-${teammateArcSummary.losses}.`}</div></div>` : ''}
      ${awards.length ? `<div class="pixel-panel"><div class="panel-title">Season Awards</div><div class="pbtn-row">${awards.map(a=>`<span class="chip gold">🏅 ${a}</span>`).join('')}</div>${(awardRewardLines||[]).map(r=>`<div class="section-sub" style="margin:6px 0 0;">🏅 ${r.award}: ${r.desc}</div>`).join('')}</div>` : ''}
      ${completedObjectives.length ? `<div class="pixel-panel"><div class="panel-title">Objectives Completed</div>${completedObjectives.map(o=>`<div class="section-sub" style="margin:4px 0;">🎯 ${o.text} — +$${o.reward.money}M, +${o.reward.rep} reputation</div>`).join('')}</div>` : ''}
      ${paddockVote ? `<div class="pixel-panel"><div class="panel-title">🗳️ Paddock Vote: You vs. ${paddockVote.leaderName}</div><div class="section-sub" style="margin:0 0 6px;">A purely cosmetic look at how you stacked up against the championship leader (${paddockVote.leaderTeam}) this year.</div>${paddockVote.categories.map(c=>`<div class="row-item"><span class="rname">${c.label}</span><span class="rmeta">${c.playerVal>c.leaderVal?'🟢':c.playerVal<c.leaderVal?'🔴':'⚪'} You ${c.playerVal} — ${c.leaderVal} them</span></div>`).join('')}<div class="section-sub" style="margin-top:6px;">${paddockVote.playerWonCategories>=2?"The paddock is buzzing about your season.":paddockVote.playerWonCategories===1?'A mixed year, but real bright spots.':'Room to grow — next year is a fresh shot.'}</div>${paddockVote.shareHeadline ? `<div class="chip gold" style="margin-top:8px; display:block; text-align:center;">📰 "${paddockVote.shareHeadline}"</div>` : ''}</div>` : ''}
      <div class="section-sub" style="margin:4px 0 10px;">🔧 A quiet offseason still costs a little sharpness — your stats have faded slightly. Keep training to stay ahead.</div>
      <button class="pbtn full gold" id="btn-next-season">Continue</button>
    `);
    // No close button here -- this modal MUST resolve to startNextSeason(),
    // renderContractOffersModal(), or offerRetirement(). Dismissing via the
    // X (or a background tap) left the calendar permanently past its last
    // round with no route back to this modal, which is exactly the
    // "stuck cycling through an off week forever" stall this game's other
    // must-answer modals (quiz, podium interview, celebrity encounter) were
    // already built to avoid -- this one had been missed.
    // Team Ownership Mode (feature idea #13): while _ownerSilent is true
    // (mid race-weekend auto-resolve), openModal() no-ops, so the
    // #btn-next-season element was never actually added to the DOM --
    // wiring its onclick unconditionally would throw on a null element.
    // autoResolveOwnerRaceWeekend() always re-invokes this SAME function
    // for real (non-silent) right after a season wrap is detected, so
    // skipping the wiring here is safe -- the real, clickable version
    // always follows.
    if(!this._ownerSilent){
      const closeBtn = document.getElementById('modal-close-btn');
      if(closeBtn) closeBtn.style.display = 'none';
      if(this.activeModal) this.activeModal.onclick = null;
      document.getElementById('btn-next-season').onclick = ()=>{
        this.closeModal();
        // Team Ownership Mode bugfix (Pass 25): the age>=42 retirement
        // offer leads into a whole driver-career-legacy system (Hall of
        // Fame entry, legend-driver carryover) that's fundamentally about
        // a DRIVING career ending -- there's no equivalent "team owner
        // legacy" system built (deliberately -- see the contract-renewal
        // fix just above for the same "not building an owner-specific
        // parallel system" reasoning), so an owner simply keeps running
        // their team past 42 rather than being routed into a retirement
        // flow that's entirely about a driving career they were never
        // personally living out in the first place.
        if(p.age>=42 && !p.isTeamOwner){
          this.offerRetirement();
        } else if(p.contract.years<=0){
          this.renderContractOffersModal();
        } else {
          this.startNextSeason();
        }
      };
    }
    this.saveState();
  },

  /* ---------------- CONTRACT OFFERS ---------------- */
  renderScoutingOfferModal(){
    const s = this.state; const p = s.player;
    const offer = s.scoutingOffer;
    if(!offer){ this.toast('That offer is no longer on the table.'); return; }
    const suitor = this.getTeam(offer.teamId);
    const currentTeam = this.getTeam(p.teamId);
    const reasonText = offer.reason==='performance' ? 'They\'ve been impressed by your recent results.'
      : offer.reason==='potential' ? 'They think you\'re being undervalued where you are.'
      : 'They like what they\'ve seen from your form and team chemistry this season.';
    this.openModal(`
      ${this.modalHeader('Contract Interest')}
      <div class="pixel-panel">
        <div style="font-weight:800; font-size:14px;">${suitor.flag} ${suitor.name}</div>
        <div class="section-sub" style="margin:4px 0 0;">${reasonText}</div>
        <div class="section-sub" style="margin-top:8px;">Offer: ${offer.years} year(s) · $${offer.salary}M/season · Car ${suitor.carStrength}</div>
      </div>
      <div class="section-sub" style="margin:10px 0;">Leaving ${currentTeam.name} early ends your current contract immediately. This can't be undone once signed.</div>
      <div class="stack-8">
        <button class="pbtn full gold" id="btn-accept-scouting">Sign with ${suitor.name}</button>
        <button class="pbtn full" id="btn-decline-scouting">Stay with ${currentTeam.name}</button>
      </div>
    `);
    this.wireModalClose();
    document.getElementById('btn-accept-scouting').onclick = ()=>{
      this.closeModal();
      this.renderTeammatePickModal({
        teamId: offer.teamId,
        mode: 'midCareerSwitch',
        onPick: (chosenName, chosenId)=>{
          this.closeModal();
          rebalanceGridForTeamChange(s, p.teamId, offer.teamId, chosenId);
          p.teamId = offer.teamId;
          p.contract = {teamId: offer.teamId, years: offer.years, salary: offer.salary};
          // 19.1 #13 -- Team switch cooldown: a fresh seat costs some initial
          // team chemistry (an adjustment period, not instant rapport), which
          // then recovers naturally through the SAME race-result morale swings
          // every other week already applies (adjustTeamMorale in
          // executeRace()) -- no separate decay/ramp timer needed, the existing
          // system already provides the recovery curve. p.joinedTeamOnSeason is
          // tracked for display/flavor (e.g. "first season with this team") even
          // though the morale hit itself is a one-time event, not something
          // that reads this field again later.
          p.joinedTeamOnSeason = s.season;
          p.releaseClauseUsedThisContract = false; // fresh contract with a new team -- a new release request becomes available again
          this.adjustTeamMorale(offer.teamId, -12);
          // A mid-season team switch changes what's realistically achievable this
          // season (e.g. a tier-1 team's "Finish in the Top 3" objective is
          // meaningless after dropping to a tier-3 car) -- regenerate objectives
          // for the new team rather than leaving stale ones on the books. This is
          // a full reset, not a progress carry-over: a team switch is already a
          // big enough season-defining event that starting the new objectives
          // fresh is the simpler and more sensible behavior.
          s.seasonObjectives = generateSeasonObjectives(s);
          this.toast(`🤝 You've signed with ${suitor.name}, partnering ${chosenName}!`);
          this.pushNews(`🤝 ${p.name} leaves ${currentTeam.name} early to join ${suitor.name}.`);
          p.journal.unshift({season:s.season, week:s.week, title:'Mid-Season Switch', text:`Left ${currentTeam.name} early to sign with ${suitor.name} for ${offer.years} year(s) at $${offer.salary}M/season, partnering ${chosenName}.`, icon:'📝'});
          s.scoutingOffer = null;
          this.saveState();
          this.renderTeamScreen();
        },
      });
    };
    document.getElementById('btn-decline-scouting').onclick = ()=>{
      this.toast(`You turn down ${suitor.name}'s interest — for now.`);
      s.scoutingOffer = null;
      this.closeModal();
      this.saveState();
      this.renderTeamScreen();
    };
  },

  renderContractOffersModal(){
    const s = this.state; const p = s.player;
    const currentTeam = this.getTeam(p.teamId);
    // generate 2-3 offers: current team renewal + 1-2 other teams scaled to reputation
    const standing = this.standingPosition('player');
    let eligibleTiers = standing<=5 ? [1,2] : standing<=14 ? [2,3] : [3];
    if(s.pendingTierOffer){
      // Legacy perk "Old Racing Contacts": widen the eligible tiers once, on the
      // very first contract renewal, regardless of current standing.
      eligibleTiers = [...new Set([...eligibleTiers, Math.max(1, Math.min(...eligibleTiers)-1)])];
      s.pendingTierOffer = false;
      this.pushNews(`🤝 Old contacts open a door — a stronger team takes notice of ${p.name}.`);
    }
    const otherTeams = TEAMS.filter(t=>t.id!==currentTeam.id && eligibleTiers.includes(t.tier)).sort(()=>Math.random()-0.5).slice(0,2);
    // Team morale nudges the CURRENT team's renewal offer specifically -- a
    // happy driver at a happy team gets a small raise offered to stay, a
    // driver at a team with sour chemistry gets a slightly worse renewal.
    // Same shape as the sponsor loyalty multiplier in checkSponsorObjectives
    // (a relationship number scaling a monetary offer). Baseline morale is
    // 65 (see getTeamMorale), so this is ±0.5% salary per morale point away
    // from that baseline, capped at ±15% -- noticeable but never the whole
    // story behind an offer.
    const morale = this.getTeamMorale(currentTeam.id);
    const moraleMult = clamp(1 + (morale-65)*0.005, 0.85, 1.15);
    const renewalSalary = Math.max(1, Math.round((p.contract.salary+randInt(0,2)) * moraleMult * 10)/10);
    const offers = [
      {teamId:currentTeam.id, years:randInt(1,2), salary:renewalSalary, clause:pickContractClause(currentTeam, p)},
      ...otherTeams.map(t=>({teamId:t.id, years:randInt(1,3), salary:Math.max(1, Math.round(t.carStrength/10)), clause:pickContractClause(t, p)})),
    ];
    // Feature idea #11 -- multi-year contracts with performance milestones
    // shown UPFRONT (a visible roadmap the player negotiates before
    // signing, distinct from the existing hidden performance CLAUSE which
    // only threatens early termination). Only offered on genuinely
    // multi-year deals (years>=2) since a 1-year offer has no "by year N"
    // to speak of. Reuses the exact same season-level stats
    // checkContractClauseMet() already reads (podiums/standing) rather than
    // inventing new tracked fields -- roadmapMilestone lives on the offer,
    // then on p.contract once signed, checked in handleSeasonEnd() at the
    // stated year, paying out roadmapMilestone.reward exactly once.
    offers.forEach(o=>{
      if(o.years>=2 && Math.random()<0.6){
        const targetYear = randInt(2, o.years);
        const podiumTarget = randInt(2,4);
        o.roadmapMilestone = {
          type:'podiumsByYear', targetYear, target: podiumTarget,
          reward: { salaryRaise: Math.max(1, Math.round(o.salary*0.25*10)/10) },
          met: null, // null=pending, true/false once checked at targetYear's season end
        };
      }
    });
    this.openModal(`
      ${this.modalHeader('Contract Offers')}
      <div class="section-sub">Your contract has expired. Choose where you'll race next season.</div>
      <div class="stack-8">
        ${offers.map((o,i)=>{
          const t = this.getTeam(o.teamId);
          const clauseText = contractClauseText(o.clause);
          const roadmapText = o.roadmapMilestone ? `${o.roadmapMilestone.target} podiums by Year ${o.roadmapMilestone.targetYear} unlocks a +$${o.roadmapMilestone.reward.salaryRaise}M/season pay rise` : null;
          return `<button class="pbtn full" style="justify-content:flex-start; text-align:left; height:auto; padding:12px;" data-offer="${i}">
            <span>${t.flag} <b>${t.name}</b><br><span style="font-size:8px; color:var(--ink-soft);">${o.years}yr · $${o.salary}M/season · Car ${t.carStrength}</span>${clauseText?`<br><span style="font-size:8px; color:var(--candy-red);">⚠️ ${clauseText}</span>`:''}${roadmapText?`<br><span style="font-size:8px; color:#2a8a5c;">📈 ${roadmapText}</span>`:''}</span>
          </button>`;
        }).join('')}
      </div>
    `);
    // No X close button -- p.contract.years is already 0 by the time this
    // modal is reached (that's the trigger condition), so dismissing without
    // picking an offer previously left the player with no valid contract at
    // all, yet still able to freely race race weekends under no team --
    // confirmed reproducible, not just a theoretical gap. Same must-resolve
    // pattern as the season-wrap/race-result modals.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.querySelectorAll('[data-offer]').forEach(btn=>{
      btn.onclick = ()=>{
        const o = offers[parseInt(btn.dataset.offer)];
        const t = this.getTeam(o.teamId);
        const changedTeam = o.teamId !== p.teamId;
        const finishSigning = (teammateName)=>{
          p.teamId = o.teamId;
          p.contract = {teamId:o.teamId, years:o.years, salary:o.salary, clause:o.clause, roadmapMilestone: o.roadmapMilestone ? {...o.roadmapMilestone, signedSeason: s.season, podiumsAtSigning: p.careerStats.podiums||0} : null};
          p.releaseClauseUsedThisContract = false; // any new contract (renewal or switch) gets a fresh release option
          // 19.1 #13 -- same team-switch cooldown as the scouting-offer path.
          // A renewal with the SAME team is not a switch, so no penalty there.
          if(changedTeam){
            p.joinedTeamOnSeason = s.season;
            this.adjustTeamMorale(o.teamId, -12);
          }
          const clauseText = contractClauseText(o.clause);
          if(changedTeam){
            this.toast(`🤝 You've signed with ${t.name}${teammateName?`, partnering ${teammateName}`:''}!`);
            this.pushNews(`🤝 ${p.name} signs with ${t.name} for ${o.years} year(s).`);
            p.journal.unshift({season:s.season, week:s.week, title:'New Contract', text:`Signed with ${t.name} for ${o.years} year(s) at $${o.salary}M/season.${teammateName?` Partnering ${teammateName}.`:''}${clauseText?' '+clauseText+'.':''}`, icon:'📝'});
          } else {
            this.toast(`📝 Contract renewed with ${t.name}.`);
            p.journal.unshift({season:s.season, week:s.week, title:'Contract Renewed', text:`Stayed with ${t.name} for ${o.years} more year(s).${clauseText?' '+clauseText+'.':''}`, icon:'📝'});
          }
          this.closeModal();
          this.startNextSeason();
        };
        if(changedTeam){
          this.closeModal();
          this.renderTeammatePickModal({
            teamId: o.teamId,
            mode: 'midCareerSwitch',
            onPick: (chosenName, chosenId)=>{
              rebalanceGridForTeamChange(s, p.teamId, o.teamId, chosenId);
              finishSigning(chosenName);
            },
          });
        } else {
          finishSigning(null);
        }
      };
    });
  },

  /* ---------------- LEGEND EXHIBITION (feature idea #17) ----------------
     A bonus one-off "greatest grid ever" exhibition race, unlocked once the
     career has retired. Reuses makeLegendDriver()'s EXISTING math (engine.js
     -- already used for the retirement->next-career legacy AI rival) to
     build a curated field of legend-strength drivers, one of whom is THIS
     retiring career's own snapshot, then runs one race through the SAME
     simulateQualifying()/simulateRace() functions every normal race weekend
     uses. Deliberately self-contained and NON-PERSISTENT -- this never
     touches App.state (the real career is already over and about to be
     deleted via "Return to Title"), never writes standings/points/career
     stats anywhere, and can be re-run as many times as the player likes
     for a different random outcome each time. A curated pool of flavor
     "legend" identities (distinct from any real named driver in
     TEAM_DRIVER_PROFILES) fills out the rest of the grid. */
  LEGEND_EXHIBITION_POOL: [
    { name:'Ayrton Duval', nationality:'Brazil' }, { name:'Michael Steiner', nationality:'Germany' },
    { name:'Alain Rousseau', nationality:'France' }, { name:'Niki Brandt', nationality:'Austria' },
    { name:'Jim Hawthorne', nationality:'Britain' }, { name:'Juan Ibarra', nationality:'Argentina' },
    { name:'Sebastian Voss', nationality:'Germany' }, { name:'Lewis Okafor', nationality:'Britain' },
    { name:'Kimi Laine', nationality:'Finland' }, { name:'Fernando Reyes', nationality:'Spain' },
    { name:'Nigel Ashcroft', nationality:'Britain' }, { name:'Gilles Moreau', nationality:'France' },
    { name:'Mika Virtanen', nationality:'Finland' }, { name:'Nelson Alves', nationality:'Brazil' },
    { name:'Damon Whitfield', nationality:'Britain' }, { name:'Jack Sterling', nationality:'Australia' },
    { name:'Rosa Delgado', nationality:'Spain' }, { name:'Yuki Nakamura', nationality:'Japan' },
    { name:'Elena Petrova', nationality:'Switzerland' }, { name:'Priya Chandran', nationality:'Thailand' },
  ],
  buildLegendExhibitionGrid(){
    const s = this.state; const p = s.player;
    const grid = [];
    // The retiring driver's own snapshot -- same makeLegendDriver() math
    // the real legacy system uses, just built directly here rather than
    // going through the pending-legacy save/load round trip (this
    // exhibition doesn't need persistence).
    const teamsShuffled = [...TEAMS].sort(()=>Math.random()-0.5);
    const ownLegend = makeLegendDriver(p, teamsShuffled[0].id);
    grid.push(ownLegend);
    // Feature idea #17 -- pull the opponent pool from the player's own real
    // Hall of Fame entries (loadHallOfFame(), engine.js) when available,
    // falling back to the existing fixed LEGEND_EXHIBITION_POOL flavor pool
    // when the Hall of Fame is empty (a brand new save, or one where no
    // career has retired into it yet) -- instead of always using the fixed
    // 20-name list regardless of how many real retired careers exist. Real
    // entries read {name, flag, nationality} straight off
    // buildHallOfFameEntry()'s own shape (engine.js), same fields the
    // fixed-pool path already provides, so downstream code below needs no
    // branching of its own.
    const hof = loadHallOfFame();
    const usingRealHof = hof.length > 0;
    const sourcePool = usingRealHof
      ? hof.map(entry=>({ name: entry.name, nationality: entry.nationality }))
      : this.LEGEND_EXHIBITION_POOL;
    const poolShuffled = [...sourcePool].sort(()=>Math.random()-0.5).slice(0, 21);
    // If the real Hall of Fame has FEWER than 21 entries, top up the rest
    // from the fixed flavor pool rather than running a short/empty field --
    // "falls back correctly when empty" also has to cover "falls back
    // correctly when merely not enough yet", not just the zero case.
    if(poolShuffled.length < 21){
      const usedNames = new Set(poolShuffled.map(e=>e.name));
      const topUp = this.LEGEND_EXHIBITION_POOL.filter(e=>!usedNames.has(e.name));
      poolShuffled.push(...[...topUp].sort(()=>Math.random()-0.5).slice(0, 21-poolShuffled.length));
    }
    poolShuffled.forEach((entry, i)=>{
      const teamId = teamsShuffled[(i+1) % teamsShuffled.length].id;
      const legend = makeRivalDriver(entry.name, teamId);
      // Curated field: every exhibition entrant runs at genuine legend
      // strength (same clamp(55,90) band makeLegendDriver() itself uses),
      // not a fresh-rookie roll -- this is meant to read as a "greatest
      // grid ever" field, not a normal season.
      legend.attributes = createDriverAttributes(clamp(55 + randInt(-3,15), 55, 90));
      legend.nationality = entry.nationality;
      legend.flag = FLAG_BY_NATION[entry.nationality] || '🏁';
      legend.isLegend = true;
      grid.push(legend);
    });
    return grid;
  },
  /* Feature idea #5 -- let the player pick the track from a short list
     before running, instead of always randomizing it. Reuses the same
     permanent-tracks pool renderLegendExhibitionModal() always randomized
     from -- just surfaces a short (6-track) sample of it as a picker
     instead of pre-selecting one via pick(). */
  renderLegendExhibitionTrackPicker(){
    const permanentTracks = TRACKS.filter(t=>t.permanent);
    const choices = [...permanentTracks].sort(()=>Math.random()-0.5).slice(0, 6);
    this.openModal(`
      ${this.modalHeader('Legend Exhibition')}
      <div class="section-sub" style="margin-bottom:10px;">Pick a circuit for this one-off "greatest grid ever" exhibition.</div>
      <div class="stack-8">
        ${choices.map(t=>`<button class="pbtn full" data-legend-track="${t.id}">${t.country} — ${t.name}</button>`).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-legend-track]').forEach(btn=>{
      btn.onclick = ()=>{
        const track = TRACKS.find(t=>t.id===btn.dataset.legendTrack);
        this.closeModal();
        this.renderLegendExhibitionModal(track);
      };
    });
  },
  renderLegendExhibitionModal(chosenTrack){
    const s = this.state; const p = s.player;
    const track = chosenTrack || pick(TRACKS.filter(t=>t.permanent));
    const hofCount = loadHallOfFame().length;
    const fieldNote = hofCount>0
      ? `featuring ${p.name} alongside 21 legendary drivers drawn from your own Hall of Fame${hofCount<21?' (topped up with classic flavor legends)':''}.`
      : `featuring ${p.name} alongside 21 legendary AI drivers from across the sport's history.`;
    this.openModal(`
      ${this.modalHeader('Legend Exhibition')}
      <div class="section-sub" style="margin-bottom:10px;">A curated "greatest grid ever" one-off exhibition at ${track.name}, ${fieldNote} Purely for fun — nothing here is saved or counted toward any record.</div>
      <button class="pbtn full gold" id="btn-run-legend-exhibition">🏁 Run Exhibition Race</button>
    `);
    this.wireModalClose();
    document.getElementById('btn-run-legend-exhibition').onclick = ()=>{
      const legendGrid = this.buildLegendExhibitionGrid();
      const ownEntrant = legendGrid[0];
      const otherEntrants = legendGrid.slice(1);
      const weather = Math.random() < track.rainChance ? 'rain' : 'clear';
      const trackTemp = Math.round((track.baseTemp||22) + rand(-6,6));
      const qualy = simulateQualifying(otherEntrants, ownEntrant, track, weather, 0, trackTemp);
      const results = simulateRace(otherEntrants, ownEntrant, qualy, track, weather, {approach:'push', compound:'medium'}, getDifficultySettings(s), 65, 0, trackTemp);
      const top10 = results.slice(0,10).map(r=>{
        const drv = r.driverId===ownEntrant.id ? ownEntrant : otherEntrants.find(d=>d.id===r.driverId);
        const isOwn = r.driverId===ownEntrant.id;
        return `<div class="row-item" style="${isOwn?'background:#fff8e6;':''}"><span class="rname">${r.dnf?'DNF':'P'+r.position} ${drv.name}${isOwn?' (you)':''}</span><span class="rmeta">${r.dnf?'':plausibleLapTime(track, r.position, results.length)}</span></div>`;
      }).join('');
      const ownResult = results.find(r=>r.driverId===ownEntrant.id);
      const ownPos = ownResult && !ownResult.dnf ? ownResult.position : null;
      this.openModal(`
        ${this.modalHeader('Exhibition Result')}
        <div class="pixel-panel" style="text-align:center;">
          <div class="section-sub" style="margin-bottom:2px;">${p.name}'s finish</div>
          <div style="font-family:var(--font-pixel); font-size:30px; color:${ownPos && ownPos<=3?'var(--candy-yellow)':'var(--ink)'};">${ownPos?'P'+ownPos:'DNF'}</div>
        </div>
        <div class="section-title" style="font-size:10px;">Top 10</div>
        ${top10}
        <button class="pbtn full gold" id="btn-close-legend-exhibition" style="margin-top:12px;">Back</button>
      `);
      this.wireModalClose();
      document.getElementById('btn-close-legend-exhibition').onclick = ()=> this.renderRetirementScreen();
    };
  },

  renderCareerRetrospectiveModal(){
    const s = this.state; const p = s.player;
    const cs = p.careerStats;

    const totalYears = s.history.length;

      ${this.modalHeader('Career Retrospective')}
      <div class="headline-card">
        <div class="kicker">${totalYears} YEAR${totalYears===1?'':'S'} IN MOTORSPORT</div>
        <h3>${p.name}</h3>

      ` : ''}

  renderLegacyPerkModal(){
    const p = this.state.player;
    const existing = loadPendingLegacy();
    this.openModal(`
      ${this.modalHeader('Pass Down Your Legacy')}
      <div class="section-sub" style="margin-bottom:10px;">${p.name}'s career won't be forgotten. Choose ONE perk to carry into your next driver's career — and ${p.name} will appear as a legendary AI driver on the new grid, racing under their own name.</div>
      <div class="stack-8">
        ${LEGACY_PERKS.map(perk=>`
          <button class="pbtn full ${existing && existing.perkId===perk.id ? 'gold' : ''}" style="justify-content:flex-start; text-align:left; height:auto; padding:12px;" data-perk="${perk.id}">
            <span>${perk.icon} <b>${perk.name}</b><br><span style="font-size:9px; color:var(--ink-soft);">${perk.desc}</span></span>
          </button>
        `).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-perk]').forEach(btn=>{
      btn.onclick = ()=>{
        const perk = LEGACY_PERKS.find(x=>x.id===btn.dataset.perk);
        savePendingLegacy({
          perkId: perk.id,
          retiredPlayerSnapshot: JSON.parse(JSON.stringify(p)),
        });
        this.toast(`🌟 Legacy set: ${perk.name}`);
        this.closeModal();
        this.renderRetirementScreen();
      };
    });
  },

  startNextSeason(){
    const s = this.state;
    s.season++;
    const careerYearNum = s.season - (s.careerStartSeason||s.season) + 1;
    s.prevTeamStrength = Object.fromEntries(TEAMS.map(t=>[t.id, t.carStrength]));
    // Development itself is NEVER wiped -- last year's upgrade levels persist
    // and keep compounding, matching how a real team doesn't un-develop its
    // car over the winter. Only the SEASON'S BUDGET of dev actions resets,
    // so every team (player included) gets a fresh allotment of upgrade
    // slots to spend through the new season rather than an infinite tap.
    TEAMS.forEach(t=>{ t.devSlotsUsed = 0; });
    developTeamsForNewSeason(s, getDifficultySettings(s));
    if(isRegulationChangeYear(careerYearNum)){
      applyRegulationChange(s);
      this.toast('📋 New FIA regulations have shaken up the grid this year!');
    }
    s.calendar = (()=>{ const rounds = buildSeasonCalendar(careerYearNum); return { rounds, currentRound: 0, midSeasonDevRoundIndex: pickMidSeasonDevRoundIndex(rounds.length), midSeasonDevApplied: false }; })();
    s.lastRaceHeadline = null;
    s.standings = {};
    s.constructorPoints = {}; // Constructors' Championship -- same per-season reset as standings
    s.seasonStats = { wins:0, podiums:0, points:0, beatTeammate:false, q3count:0 };
    s.seasonObjectives = generateSeasonObjectives(s);
    s.dayIndex = 0; s.week = 1;
    if(!s.cosmetics) s.cosmetics = this.initialCosmeticsState();
    s.cosmetics.totalRoundsCompletedThisSeason = 0;
    this.checkCosmeticUnlocks();
    s.seasonStartCareerWins = Object.fromEntries(s.grid.map(d=>[d.id, d.careerStats.wins||0]));
    this.pushNews(`📅 ${seasonLabel(s)} begins! The grid resets to zero.`);
    this.toast(`Welcome to ${seasonLabel(s)}.`);
    this.saveState();
    this.renderHub();
  },

});

Object.assign(App, {

  /* Bugfix: this previously opened via setTimeout(..., 400), which left a
     genuine window (hub fully rendered and clickable, tutorial not yet
     open) where a fast player's very first tap on the hub -- most
     commonly "End Day" -- could land in that gap and then get silently
     swallowed the instant the tutorial modal appeared on top of it a
     moment later (confirmed reproducible: elementFromPoint at the
     button's own coordinates resolves to the newly-opened .modal-overlay,
     not the button, even though the button itself is still present and
     enabled underneath). Opening synchronously here, in the same tick as
     renderHub() finishes wiring the hub's own buttons, closes that window
     entirely -- the tutorial is now always on top BEFORE the hub is ever
     interactive, never after. */
  maybeShowTutorial(){
    if(!this.state.tutorialSeen){
      this.state.tutorialSeen = true;
      this.saveState();
      this.renderTutorialModal(0);
    }
  },

  renderTutorialModal(stepIdx){
    const step = TUTORIAL_STEPS[stepIdx];
    const isLast = stepIdx === TUTORIAL_STEPS.length-1;
    this.openModal(`
      <div style="text-align:center; padding:8px 0 4px;">
        <div style="font-size:44px; margin-bottom:8px;">${step.icon}</div>
        <div class="section-title" style="font-size:13px;">${step.title}</div>
        <div class="section-sub" style="margin-top:10px; line-height:1.5;">${step.text}</div>
      </div>
      <div style="display:flex; justify-content:center; gap:5px; margin:14px 0;">
        ${TUTORIAL_STEPS.map((s,i)=>`<div style="width:${i===stepIdx?16:6}px; height:6px; border-radius:3px; background:${i===stepIdx?'var(--candy-pink)':'#e6d8ba'}; transition:width 0.2s;"></div>`).join('')}
      </div>
      <div class="pbtn-row">
        <button class="pbtn" id="btn-tut-skip" style="flex:1;">Skip</button>
        <button class="pbtn gold" id="btn-tut-next" style="flex:2;">${isLast ? "Let's Go!" : 'Next'}</button>
      </div>
    `);
    document.getElementById('btn-tut-skip').onclick = ()=> this.closeModal();
    document.getElementById('btn-tut-next').onclick = ()=>{
      if(isLast) this.closeModal();
      else this.renderTutorialModal(stepIdx+1);
    };
  },

  renderHelpModal(){
    this.openModal(`
      ${this.modalHeader('How to Play')}
      <div class="section-sub" style="margin-bottom:12px;">Quick reference — or replay the intro tour below.</div>
      <button class="pbtn full mint" id="btn-replay-tutorial" style="margin-bottom:14px;">🔁 Replay Welcome Tour</button>
      <div class="stack-8">
        ${HELP_TOPICS.map((t)=>`
          <div class="pixel-panel" style="margin-bottom:0;">
            <div class="panel-title" style="margin-bottom:6px;">${t.icon} ${t.title}</div>
            <div class="section-sub" style="margin:0;">${t.text}</div>
          </div>
        `).join('')}
      </div>
    `);
    this.wireModalClose();
    document.getElementById('btn-replay-tutorial').onclick = ()=>{
      this.closeModal();
      setTimeout(()=> this.renderTutorialModal(0), 150);
    };
  },

});
