            return `<div style="flex-shrink:0; text-align:center; padding:6px 8px; border-radius:6px; border:2px solid var(--pixel-border); background:${active?'var(--candy-yellow)':'#fff'}; opacity:${isPast?0.45:1}; min-width:52px;">
              <div style="font-family:var(--font-pixel); font-size:7px;">${d.slice(0,3)}</div>
              <div style="font-size:14px; margin-top:3px;">${this.dayActivityIcon(act)}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="section-sub" style="margin:6px 0 0;">Race weekends are fixed (Fri/Sat/Sun). Other days are yours to plan freely — icons are just a suggestion.${round ? ` Next up: <b>${TRACKS.find(t=>t.id===round.trackId).name}</b>.` : ''}</div>
        ${this.renderForecastChip(round)}
        <button class="pbtn full" id="btn-view-calendar" style="margin-top:8px;">📅 Season Calendar</button>
      </div>

      <div class="pixel-panel">
        <div class="panel-title">Today — ${this.dayName().toUpperCase()} ${dayAct ? '🏁' : ''}</div>
        ${this.renderTodayActions(dayAct)}
      </div>

      <div class="pixel-panel">
        <div class="panel-title">Coming Up</div>
        <div class="section-sub" style="margin:0;">${this.renderComingUpHooks(dayAct, round).join('<br>')}</div>
      </div>

      ${this.renderRivalCard()}
      ${this.renderObjectivesSnapshot()}

      <div class="pbtn-row">
        <button class="pbtn small" id="btn-open-stats">📊 Stats</button>
        <button class="pbtn small" id="btn-open-journal">📔 Journal</button>
        <button class="pbtn small" id="btn-open-museum">🏆 Museum</button>
        <button class="pbtn small" id="btn-open-save">💾 Menu</button>
        <button class="pbtn small" id="btn-open-help">❓ Help</button>
      </div>
    `;
    this.wireHubEvents(dayAct);
    this.wireEditableNames(this.root);
    this.maybeShowTutorial();
  },

  renderRivalCard(){
    const rival = this.getRival ? this.getRival() : null;
    if(!rival) return '';
    const lvl = rivalryLevelName(rival.rivalryLevel||0);
    return `<div class="pixel-panel" style="border-color:#c0392b;">
      <div class="panel-title">⚔️ Your Rival <span class="tag">${lvl}</span></div>
      <div class="flex-between">
        <div>
          <div style="font-weight:800;">${rival.flag} ${rival.name}</div>
          <div class="section-sub" style="margin:2px 0 0;">${this.getTeam(rival.teamId).name} · P${this.standingPosition(rival.id)} in standings</div>
        </div>
      </div>
    </div>`;
  },

  renderObjectivesSnapshot(){
    const s = this.state;
    if(!s.seasonObjectives || s.seasonObjectives.length===0) return '';
    const top = s.seasonObjectives[0];
    const progress = this.objectiveProgress(top);
    const pct = Math.min(100, Math.round((progress/top.target)*100));
    return `<div class="pixel-panel">
      <div class="panel-title">Season Objective <span class="tag">${s.seasonObjectives.length} goals</span></div>
      <div class="flex-between" style="font-size:11.5px; margin-bottom:4px;"><span style="font-weight:700;">${top.text}</span><span style="color:var(--ink-soft);">${progress}/${top.target}</span></div>
      ${this.renderPixelBar(pct,'stat')}
      <div class="section-sub" style="margin:6px 0 0;">See all goals under Team & Car.</div>
    </div>`;
  },

  dayActivityIcon(act){
    return { practice:'🏎️', qualifying:'⏱️', race:'🏁', training:'💪', sponsor:'🤝', travel:'✈️', free:'🕐' }[act] || '🕐';
  },

  renderSeasonCalendarModal(){
    const s = this.state;
    const careerYearNum = s.season - (s.careerStartSeason||s.season) + 1;
    const isRegYear = isRegulationChangeYear(careerYearNum);
    this.openModal(`
      ${this.modalHeader('Season Calendar')}
      <div class="section-sub" style="margin-bottom:10px;">${seasonLabel(s)} · ${s.calendar.rounds.length} rounds${isRegYear ? ' · 📋 New FIA regulations this year' : ''}</div>
      <div class="stack-8">
        ${s.calendar.rounds.map(r=>{
          const track = TRACKS.find(t=>t.id===r.trackId);
          const isCurrent = r.round === s.calendar.currentRound+1;
          const isDone = r.completed;
          const wIcon = r.weather==='rain' ? '🌧️' : tempBand(r.trackTemp).icon;
          return `<div class="row-item" style="${isCurrent?'background:#fff8e6; border-radius:6px; padding-left:6px;':''} ${isDone?'opacity:0.5;':''}">
            <span class="rname" style="flex:0 0 24px;">${r.round}</span>
            <span class="rname">${track.country.split(' ')[0]} ${track.name}${r.isSprint?' 🏃':''}</span>
            <span class="rmeta">${wIcon} ${r.trackTemp}°C</span>
            <span class="rmeta">${isDone?'✓ Done':isCurrent?'Next up':''}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="section-sub" style="margin-top:10px;">🏃 = Sprint Weekend (an extra short race sets Sunday's grid)</div>
    `);
    this.wireModalClose();
  },

  suggestedActivity(day){
    return { Tuesday:'training', Wednesday:'sponsor', Thursday:'travel' }[day] || 'free';
  },

  /* Presentation-only forecast-sharpening chip. The real round.trackTemp/
     weather driving pace and DNF risk are untouched -- this only renders a
     second, deliberately-noisy "early guess" that narrows into the true
     number as the weekend approaches, so temperature-sensitive planning
     (car development, setup) has a "forecast sharpening" feel across the
     week without any risk to already-shipped gameplay math. */
  renderForecastChip(round){
    if(!round) return '';
    const s = this.state;
    const fridayIdx = DAYS_OF_WEEK.indexOf('Friday');
    const daysUntil = Math.max(0, fridayIdx - s.dayIndex);
    const track = TRACKS.find(t=>t.id===round.trackId);
    if(!track) return '';
    if(daysUntil<=0){
      const band = tempBand(round.trackTemp);
      const line = round.weather==='rain' ? `🌧️ Rain · ${round.trackTemp}°C` : `${band.icon} Clear · ${round.trackTemp}°C`;
      // Forecast-accuracy callback: compare the EARLIEST guess we ever showed
      // for this round (captured below, only the first time) against the
      // now-locked-in actual temperature. Purely a flavor line -- doesn't
      // touch round.weather/trackTemp themselves, which stay exactly as
      // fixed at calendar-build time.
      let callback = '';
      if(round._earlyGuess!==undefined){
        const diff = Math.abs(round._earlyGuess - round.trackTemp);
        callback = diff<=2
          ? `<div class="chip mint" style="margin-top:4px;">🎯 Your crew's early guess of ~${round._earlyGuess}°C was spot on.</div>`
          : `<div class="chip blue" style="margin-top:4px;">📋 Your crew predicted ~${round._earlyGuess}°C earlier in the week — it turned out to be ${round.trackTemp}°C.</div>`;
      }
      return `<div class="chip mint" style="margin-top:6px;">📡 Forecast locked in: ${line}</div>${callback}`;
    }
    const guess = forecastGuess(round, daysUntil);
    if(round._earlyGuess===undefined) round._earlyGuess = guess.temp;
    const rangeText = guess.range>0 ? `${guess.temp-guess.range}–${guess.temp+guess.range}°C` : `${guess.temp}°C`;
    return `<div class="chip blue" style="margin-top:6px;">📡 Early forecast: roughly ${rangeText} (${guess.confidence}% confidence) — sharpens as the weekend nears</div>${this.renderRadarTrendStrip(round, daysUntil)}`;
  },

  /* Feature idea #1 -- Weather radar mini-forecast. Purely a presentational
     extension of forecastGuess()'s existing noise-convergence math (engine.js):
     shows a small 3-day trend strip of "early guesses" leading into the race
     weekend, so a wet weekend is visible coming a few days out rather than
     only appearing once the forecast fully locks in on race weekend itself.
     Uses the exact same seeded/deterministic forecastGuess() calls the
     single-chip forecast already makes -- no new RNG, no change to
     round.weather/round.trackTemp, same reasoning as the forecast chip it
     sits underneath. Only renders in the 1-3 day window before a race
     weekend since that's the natural "wet weekend coming up" lead time. */
  renderRadarTrendStrip(round, daysUntil){
    if(daysUntil<1 || daysUntil>3) return '';
    const track = TRACKS.find(t=>t.id===round.trackId);
    if(!track) return '';
    const days = [];
    for(let d=daysUntil; d>=0; d--){
      const g = forecastGuess(round, d);
      const willBeRain = d===0 ? round.weather==='rain' : g.temp <= (track.baseTemp||22) - 3; // cooler-than-baseline guess reads as a rain signal, matching buildSeasonCalendar's own rain->cooler logic
      days.push({ d, temp:g.temp, icon: willBeRain ? '🌧️' : '☀️' });
    }
    const anyRain = days.some(x=>x.icon==='🌧️');
    // Feature idea #1 -- "track is rubbering in" flavor line: after several
    // consecutive DRY weekends at this specific track (s.trackDryStreak,
    // set in app_race.js finishExecuteRace()), layer a short flavor line
    // onto this same strip on a dry forecast too, instead of only ever
    // showing the strip ahead of a wet weekend. Pure flavor text -- doesn't
    // touch weather/grip/tyre math anywhere.
    const streak = (this.state.trackDryStreak||{})[track.id] || 0;
    const rubberingLine = (!anyRain && streak>=3)
      ? `<div class="chip mint" style="margin-top:4px;">🏁 Track is rubbering in — ${streak} dry sessions running here.</div>` : '';
    if(!anyRain) return rubberingLine;
    return `<div class="chip blue" style="margin-top:4px; display:flex; gap:6px; align-items:center;">
      📻 Radar: ${days.map(x=>`${x.d===0?'Race':'D-'+x.d} ${x.icon}`).join(' → ')}
    </div>${rubberingLine}`;
  },

  renderComingUpHooks(dayAct, round){
    const s = this.state;
    const hooks = [];
    if(dayAct) hooks.push(`🏁 ${dayAct==='race' ? 'Race day is today!' : dayAct.charAt(0).toUpperCase()+dayAct.slice(1)+' is today.'}`);
    else if(round) hooks.push(`🏁 Next race: ${TRACKS.find(t=>t.id===round.trackId).name}`);
    const gap = Math.abs((s.standings['player']||0) - Math.max(0,...s.grid.map(d=>s.standings[d.id]||0)));
    if(this.standingPosition('player')>1 && gap<=20) hooks.push(`📊 Championship gap: only ${gap} points.`);
    const bestie = s.npcRoster.find(n=>n.role==='Best Friend');
    if(bestie && bestie.relationship.friendship>=70) hooks.push(`❤️ ${bestie.name} wants to catch up soon.`);
    if(hooks.length===0) hooks.push('🌤️ A quiet day in the paddock.');
    return hooks;
  },

  renderTodayActions(dayAct){
    const s = this.state;
    const round = this.getCurrentRound();
    // If the calendar has run out of rounds (season fully complete) but the
    // season-end modal hasn't been actioned yet for some reason, don't
    // render a race-weekend action button that points at nothing — this
    // previously let a stale/duplicate click crash executeRace() with an
    // undefined round.
    //
    // IMPORTANT: this guard used to only fire when dayAct was truthy (i.e.
    // only on a Fri/Sat/Sun race-weekend day). On any ordinary weekday
    // after the season's last round completed but before handleSeasonEnd()
    // had been actioned (e.g. the season-end modal was dismissed via the
    // close button before that button was removed -- see handleSeasonEnd's
    // comment), the code fell through to the normal Training/Free Time/
    // etc. action grid instead, and "End Day" just advanced dayIndex
    // forever with nothing ever re-checking the calendar. That's the
    // "stuck on an off week after the season ended" stall. Checking `!round`
    // on its own (not `dayAct && !round`) catches this on every day of the
    // week, not just race weekends, and its button re-runs the season-end
    // sequence directly instead of just advancing the day again.
    if(!round){
      return `<p class="section-sub">The season has concluded — see your final standings and move on to next season.</p><button class="pbtn full gold" id="btn-season-wrap">See Season Results →</button>`;
    }
    // Team Ownership Mode (feature idea #13): every race-weekend day
    // collapses into a single auto-resolve button instead of the normal
    // practice/qualifying/race sequence -- the player isn't driving, so
    // there's no strategy/mini-game choice to make. Off days still show the
    // normal action grid below (swapped for management-flavored actions).
    if(s.player.isTeamOwner && dayAct){
      const label = dayAct==='practice' ? 'Run Practice (Auto)' : dayAct==='qualifying' ? (round.isSprint && !round.sprintCompleted ? 'Run Sprint Qualifying (Auto)' : round.isSprint ? 'Continue' : 'Run Qualifying (Auto)') : 'Run Race (Auto)';
      const alreadyDone = dayAct==='qualifying' && round.isSprint ? round.sprintCompleted : round.completed;
      // Team Ownership Mode full closure (Pass 25) -- on race day only, an
      // owner gets a REAL strategy call for each of their two AI drivers
      // before the auto-resolve button, instead of both always silently
      // defaulting to 'saveTires'/'medium'. Reuses simulateRace()'s new
      // OPTIONAL aiStrategyOverrides parameter (engine.js) -- see
      // renderOwnerStrategyModal() below.
      const strategyChip = (dayAct==='race' && !round.completed)
        ? `<button class="pbtn full ${s.player._ownerAiStrategy?'mint':''}" id="btn-owner-set-strategy" style="margin-bottom:10px;">📋 ${s.player._ownerAiStrategy?'Strategy Set — Review/Change':'Set Race Strategy for Your Drivers'}</button>`
        : '';
      return `${strategyChip}<p class="section-sub">🏗️ As team owner, you watch from the pit wall — this session resolves automatically.</p><button class="pbtn full gold" id="btn-owner-autoresolve" data-phase="${dayAct}" ${alreadyDone && dayAct!=='qualifying' ?'disabled':''}>${label}</button>`;
    }
    if(dayAct==='practice') return `<p class="section-sub">${round.isSprint?'🏃 Sprint Weekend practice — shorter track time than usual, so every lap counts before Sprint Qualifying.':'Free practice — dial in your setup before qualifying.'}</p><button class="pbtn full gold" id="btn-do-practice" ${round.completed?'disabled':''}>Run Practice</button>`;
    if(dayAct==='qualifying' && round.isSprint){
      return round.sprintCompleted
        ? `<p class="section-sub">Sprint complete — grid is set from Sprint results. See you Sunday!</p><button class="pbtn full gold" id="btn-advance-day">Continue</button>`
        : `<p class="section-sub">🏃 Sprint Weekend at ${this.getCurrentTrack().name} — a short qualifying lap sets the sprint grid, then the Sprint itself sets Sunday's starting order.</p><button class="pbtn full gold" id="btn-do-sprint">Start Sprint Qualifying</button>`;
    }
    if(dayAct==='qualifying') return `<p class="section-sub">One lap. Everything on the line.</p><button class="pbtn full gold" id="btn-do-qualifying" ${round.completed?'disabled':''}>Start Qualifying</button>`;
    if(dayAct==='race') return `<p class="section-sub">${round.isSprint?'🏃 Sprint Weekend — ':''}Race day at ${this.getCurrentTrack().name}.</p><button class="pbtn full gold" id="btn-do-race" ${round.completed?'disabled':''}>Start Race</button>`;

    // Feature idea #7 -- "Wet Setup" prep choice, offered specifically on
    // the Thursday eve of a forecasted-wet race weekend (round.weather is
    // locked in at calendar-build time, so it's already known this far
    // ahead -- see buildSeasonCalendar(), engine.js). A one-shot chip, not
    // part of the normal action grid below, since it's only relevant this
    // one day of a wet race week.
    const wetSetupChip = (this.dayName()==='Thursday' && round && !round.completed && round.weather==='rain' && !s.player._wetSetupChosen)
      ? `<div class="pixel-panel" style="border-color:var(--candy-blue); margin-bottom:10px;">
          <div class="section-sub" style="margin:0 0 6px;">🌧️ Rain is forecast for this weekend. Commit to a Wet Setup now? Trades a little dry-conditions pace for a bigger wet-conditions bonus if it actually rains.</div>
          <button class="pbtn full" id="btn-wet-setup-choice">🌧️ Run Wet Setup This Weekend</button>
        </div>`
      : '';

    // Feature idea #19 -- Weekend Media Day, offered on the Thursday of any
    // race week (not just a wet one -- distinct trigger from the Wet Setup
    // chip above, and the two can both appear the same Thursday) when the
    // player has at least one sponsor and hasn't already run it this
    // specific weekend (p._weekendMediaDayDoneThisWeekend, reset below by
    // resetWeekendMediaDayFlag() the next time a new race weekend's
    // Thursday comes around).
    const mediaDayChip = (this.dayName()==='Thursday' && round && !round.completed && !s.player.isTeamOwner && s.player.sponsors && s.player.sponsors.length && !s.player._weekendMediaDayDoneThisWeekend)
      ? `<div class="pixel-panel" style="border-color:var(--candy-yellow); margin-bottom:10px;">
          <div class="section-sub" style="margin:0 0 6px;">📸 Your sponsors have asked for a morning of photos and quick interviews before the weekend begins.</div>
          <button class="pbtn full" id="btn-weekend-media-day">📸 Run Weekend Media Day</button>
        </div>`
      : '';

    const actions = s.player.isTeamOwner ? [
      {id:'team', icon:'🏗️', label:'Team HQ'},
      {id:'lifestyle', icon:'🎯', label:'Free Time'},
      {id:'social', icon:'👥', label:'Socialize'},
      {id:'media', icon:'🎤', label:'Media'},
      {id:'sponsors', icon:'🤝', label:'Sponsors'},
    ] : [
      {id:'training', icon:'💪', label:'Training'},
      {id:'lifestyle', icon:'🎯', label:'Free Time'},
      {id:'social', icon:'👥', label:'Socialize'},
      {id:'media', icon:'🎤', label:'Media'},
      {id:'sponsors', icon:'🤝', label:'Sponsors'},
      {id:'team', icon:'🔧', label:'Team & Car'},
    ];
    // Mentor action unlocks at homeLevel>=3 -- home tier's first real
    // mechanical hook (19.8), sharing its home with the mentor/protégé
    // system (19.1 #6) per the handoff doc's own recommendation not to
    // invent a second, unrelated hook for the same number.
    if(s.player.homeLevel>=3 && !s.player.isTeamOwner) actions.push({id:'mentor', icon:'🌟', label:'Mentor'});
    return `${wetSetupChip}${mediaDayChip}<div class="option-grid">
      ${actions.map(a=>`<button class="option-card" data-action="${a.id}" style="cursor:pointer;">${a.icon}<br>${a.label}</button>`).join('')}
    </div>
    <button class="pbtn full" id="btn-advance-day" style="margin-top:12px;">End Day →</button>`;
  },

  wireHubEvents(dayAct){
    const byId = (id)=> document.getElementById(id);
    if(byId('btn-do-practice')) byId('btn-do-practice').onclick = ()=> this.runPractice();
    if(byId('btn-do-qualifying')) byId('btn-do-qualifying').onclick = ()=> this.runQualifying();
    if(byId('btn-do-sprint')) byId('btn-do-sprint').onclick = ()=> this.runSprintQualifying();
    if(byId('btn-do-race')) byId('btn-do-race').onclick = ()=> this.runRace();
    if(byId('btn-owner-autoresolve')) byId('btn-owner-autoresolve').onclick = ()=> this.autoResolveOwnerRaceWeekend(byId('btn-owner-autoresolve').dataset.phase);
    if(byId('btn-owner-set-strategy')) byId('btn-owner-set-strategy').onclick = ()=> this.renderOwnerStrategyModal();
    if(byId('btn-wet-setup-choice')) byId('btn-wet-setup-choice').onclick = ()=>{
      this.state.player._wetSetupChosen = true;
      this.toast('🌧️ Wet Setup locked in for this weekend.');
      this.saveState();
      this.renderHub();
    };
    if(byId('btn-weekend-media-day')) byId('btn-weekend-media-day').onclick = ()=> this.renderWeekendMediaDayModal();
    if(byId('btn-advance-day')) byId('btn-advance-day').onclick = ()=> this.advanceDay();
    if(byId('btn-season-wrap')) byId('btn-season-wrap').onclick = ()=> this.handleSeasonEnd();
    if(byId('btn-open-stats')) byId('btn-open-stats').onclick = ()=> this.renderCareerStatsModal();
    if(byId('btn-open-journal')) byId('btn-open-journal').onclick = ()=> this.renderJournalModal();
    if(byId('btn-open-museum')) byId('btn-open-museum').onclick = ()=> this.renderMuseumModal();
    if(byId('btn-open-save')) byId('btn-open-save').onclick = ()=> this.renderSaveMenuModal();
    if(byId('btn-open-help')) byId('btn-open-help').onclick = ()=> this.renderHelpModal();
    if(byId('btn-view-calendar')) byId('btn-view-calendar').onclick = ()=> this.renderSeasonCalendarModal();

    document.querySelectorAll('[data-action]').forEach(btn=>{
      btn.onclick = ()=> this.openActionModal(btn.dataset.action);
    });

    const pod = byId('pod-tap');
    if(pod) pod.onclick = ()=> this.petDriver();
    const profileBtn = byId('pod-profile-btn');
    if(profileBtn) profileBtn.onclick = (e)=>{ e.stopPropagation(); this.renderProfileModal(); };
  },

  petDriver(){
    const p = this.state.player;
    p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood + 2);
    this.toast(`${p.name} feels appreciated! 💛`);
    this.saveState();
    this.renderHub();
  },

  handleNav(nav){
    if(nav==='home') this.renderHub();
    else if(nav==='race') this.renderRaceCenterScreen();
    else if(nav==='training') this.openActionModal('training');
    else if(nav==='team') this.showFirstTimeExplainer('seenDevSlotsExplainer', '🔧', 'Car Development', "Each season you get a limited number of dev slots — spend them on upgrades wisely. Higher Engineering facility levels mean more slots, and they reset fresh every new season.", ()=> this.state.player.isTeamOwner ? this.renderOwnerHQScreen() : this.renderTeamScreen());
    else if(nav==='social') this.renderRelationshipsModal();
    else if(nav==='career') this.renderCareerStatsModal();
  },

  advanceDay(){
    const s = this.state;
    s.player.attributes.lifestyle.energy = clamp(s.player.attributes.lifestyle.energy + 8);
    s.player.attributes.lifestyle.stress = clamp(s.player.attributes.lifestyle.stress - 3);

    // Celebrity encounters are rolled separately from RANDOM_EVENTS (own
    // gating by fanPopularity, own two-choice payoff) and take priority on
    // the days they fire, so the "what do I do with this photo op" choice
    // isn't buried under a same-day toast for something else. Team
    // Ownership Mode (feature idea #13): skipped entirely when silent --
    // there's no player to answer either modal, and both would otherwise
    // silently strand a rolled celebrity/controversy with its choice never
    // made (showFirstTimeExplainer/renderControversyModal's flag-setting
    // happens before the modal opens, but the modal itself would never
    // resolve since openModal() no-ops while silent).
    const celebRolled = this._ownerSilent ? null : this.maybeTriggerCelebrityEncounter();
    // Controversy events (distinct from renderMediaModal's regular press
    // questions, see CONTROVERSY_EVENTS/data.js): a standalone flashpoint
    // moment, rare and mutually exclusive with a celebrity encounter on the
    // same day (only one "big" modal moment per day-advance, same
    // reasoning as celebRolled suppressing the plain RANDOM_EVENTS roll
    // below) so the player is never stacked with two must-answer modals at
    // once.
    const controversyRolled = (!celebRolled && !this._ownerSilent) ? this.maybeTriggerControversyEvent() : null;

    if(!celebRolled && !controversyRolled && Math.random() < 0.3){
      const ev = pick(RANDOM_EVENTS);
      const text = ev.text(s.player.name);
      ev.effect(s);
      this.toast(text);
      this.pushNews(text);
    }

    s.dayIndex = (s.dayIndex+1) % 7;
    if(s.dayIndex===0){
      s.week++;
      this.decayRelationships();
    }
    checkScoutingInterest(s);
    // Feature idea #21 -- driver market news ticker: surfaces OTHER
    // drivers' contract-rumor flavor as an occasional news item,
    // independent of the player's own checkScoutingInterest() roll above.
    // Low weekly chance, and specifically about the player's own rival
    // (when one exists) so it reads as relevant paddock chatter rather
    // than random noise about an unnamed AI driver.
    this.maybeRollDriverMarketRumor();
    this.saveState();
    this.renderHub();
    if(celebRolled) this.showFirstTimeExplainer('seenCelebrityExplainer', '🌟', 'Celebrity Encounter', "As fame grows, you'll cross paths with celebrities. Handle it well and fan popularity goes up, though there's a small chance of a tabloid rumor too.", ()=> this.renderCelebrityEncounterModal(celebRolled));
    else if(controversyRolled) this.renderControversyModal(controversyRolled);
  },

  /* Feature idea #21 -- driver market news ticker (rival-focused variant).
     A small, independent, low-probability roll for flavor-only contract
     rumor news about the player's own rival (getRival(), app_race.js) --
     purely a news-feed item via the same pushNews()/newsFeed pipeline
     everything else uses, no mechanical effect and no interaction with
     the real checkScoutingInterest()/processGridRetirements() systems. */
  maybeRollDriverMarketRumor(){
    const s = this.state;
    if(Math.random() > 0.04) return; // rare -- occasional paddock chatter, not a weekly fixture
    const rival = this.getRival ? this.getRival() : null;
    if(!rival) return;
    const team = TEAMS.find(t=>t.id===rival.teamId);
    const rumors = [
      `is reportedly happy at ${team?team.name:'their current team'} and unlikely to move any time soon`,
      `has been the subject of quiet contract extension talks with ${team?team.name:'their team'}`,
      `is being linked with a rival team by paddock insiders, though nothing appears imminent`,
      `'s management has been spotted talking with more than one team principal this week`,
    ];
    this.pushNews(`📰 Driver market: ${rival.name} ${pick(rumors)}.`);
  },

  /* Same shape as maybeTriggerCelebrityEncounter above: returns the rolled
     controversy object if one fires this day, otherwise null. Deliberately
     rare (2% per day, roughly half as common as a celebrity encounter) so
     it reads as an occasional real flashpoint, not a recurring event type
     competing with the regular press-conference flow. */
  maybeTriggerControversyEvent(){
    if(Math.random() > 0.02) return null;
    return pickControversyEvent();
  },

  renderControversyModal(event){
    const s = this.state; const p = s.player;
    this.openModal(`
      ${this.modalHeader(event.headline)}
      <div class="pixel-panel">
        <div style="font-weight:700;">${event.setup(p)}</div>
      </div>
      <div class="section-sub" style="margin:8px 0;">How do you respond?</div>
      <div class="stack-8">
        ${event.options.map((o,i)=>`<button class="pbtn full" data-controversy-opt="${i}">${o.label}</button>`).join('')}
      </div>
    `);
    // Must-resolve, same reasoning as the celebrity encounter modal right
    // above -- advanceDay's own state (dayIndex/week) has already moved
    // forward by the time this opens.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.querySelectorAll('[data-controversy-opt]').forEach(btn=>{
      btn.onclick = ()=>{
        const o = event.options[parseInt(btn.dataset.controversyOpt,10)];
        if(o.fanPopularity) p.fanPopularity = clamp(p.fanPopularity + o.fanPopularity, 0, 999);
        if(o.mediaReputation) p.mediaReputation = clamp(p.mediaReputation + o.mediaReputation, 0, 100);
        this.toast(o.result);
        this.pushNews(`📰 ${event.headline}: ${p.name} responds — "${o.label}"`);
        p.journal.unshift({season:s.season, week:s.week, title:event.headline, text:o.result, icon:'📰'});
        this.closeModal();
        this.saveState();
        this.rerenderCurrentScreen();
      };
    });
  },

  /* Returns the rolled celebrity object if an encounter fires this day,
     otherwise null. Kept separate from the modal renderer so advanceDay can
     decide whether to suppress the normal RANDOM_EVENTS roll on the same
     day without rendering anything yet (the hub re-render needs to happen
     first, then the modal opens on top of it). */
  maybeTriggerCelebrityEncounter(){
    const s = this.state; const p = s.player;
    const pool = eligibleCelebrities(p.fanPopularity, p);
    if(!pool.length) return null;
    // Base 4% per day, only among eligible-rarity celebrities -- deliberately
    // rare so it stays a moment, not a routine.
    if(Math.random() > 0.04) return null;
    return pick(pool);
  },

  renderCelebrityEncounterModal(celeb){
    const s = this.state; const p = s.player;
    this.openModal(`
      ${this.modalHeader('Celebrity Encounter')}
      <div class="pixel-panel" style="text-align:center;">
        <div style="font-size:32px;">${celeb.icon}</div>
        <div style="font-weight:800; font-size:14px; margin-top:4px;">${celeb.name}</div>
        <span class="chip ${CELEBRITY_RARITY_COLOR[celeb.rarity]}" style="margin-top:6px;">${celeb.rarity} · ${celeb.type}</span>
        <div class="section-sub" style="margin-top:8px;">${celeb.bio}</div>
      </div>
      <div class="section-sub" style="margin:10px 0;">You run into ${celeb.name} at an event. Photos are already being taken.</div>
      <div class="stack-8">
        <button class="pbtn full gold" id="btn-celeb-embrace">📸 Lean into it</button>
        <button class="pbtn full" id="btn-celeb-lowkey">🙂 Keep it low-key</button>
      </div>
    `);
    // No close button -- this is a quick, always-resolves-positively-or-
    // neutrally choice (matching the podium interview / quiz pattern for
    // "must-answer, no dead-end" modals), and by this point in advanceDay
    // the day has already advanced, so a dismiss-without-choosing path
    // would strand the player exactly like those other cases.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.getElementById('btn-celeb-embrace').onclick = ()=>{
      const [lo,hi] = celeb.fanGain;
      const gain = randInt(lo, hi);
      p.fanPopularity = clamp(p.fanPopularity + gain, 0, 999);
      const rumorHits = Math.random() < celeb.rumorChance;
      if(rumorHits){
        p.attributes.lifestyle.stress = clamp(p.attributes.lifestyle.stress + 8);
        this.toast(`📸 +${gain} Fan Popularity — but tabloids are already spinning a rumor about you two.`);
        this.pushNews(`📰 Rumors swirl after ${p.name} was seen with ${celeb.name}.`);
        p.journal.unshift({season:s.season, week:s.week, title:'Tabloid Rumor', text:`Photos with ${celeb.name} sparked tabloid speculation.`, icon:'📰'});
      } else {
        this.toast(`📸 +${gain} Fan Popularity from being seen with ${celeb.name}!`);
        this.pushNews(`📸 ${p.name} was spotted with ${celeb.type.toLowerCase()} ${celeb.name}.`);
      }
      p.journal.unshift({season:s.season, week:s.week, title:'Celebrity Encounter', text:`Ran into ${celeb.name} (${celeb.type}) and leaned into the publicity.`, icon:celeb.icon});
      this.closeModal();
      this.saveState();
      this.rerenderCurrentScreen();
    };
    document.getElementById('btn-celeb-lowkey').onclick = ()=>{
      const gain = Math.round(celeb.fanGain[0]*0.3);
      p.fanPopularity = clamp(p.fanPopularity + gain, 0, 999);
      this.toast(`🙂 You kept it low-key. +${gain} Fan Popularity, no rumor risk.`);
      p.journal.unshift({season:s.season, week:s.week, title:'Celebrity Encounter', text:`Ran into ${celeb.name} (${celeb.type}) but kept the moment low-key.`, icon:celeb.icon});
      this.closeModal();
      this.saveState();
      this.rerenderCurrentScreen();
    };
  },

  /* Weekly relationship decay: friendship/spark drift down slowly if the
     player never interacts with someone, modeling neglect. This is what
     makes "Talk"/"Flirt" have an ongoing cost of NOT doing them, not just a
     one-way ratchet upward — relationships now require some maintenance.
     A dating relationship whose spark decays below a low threshold has a
     real (not certain) chance of ending in a breakup each week it stays
     there, surfaced as news so it isn't a silent, confusing disappearance. */
  decayRelationships(){
    const s = this.state; const p = s.player;
    (s.npcRoster||[]).forEach(n=>{
      n.relationship.friendship = clamp(n.relationship.friendship - 1, 0, 100);
      if(n.romance && n.romance.status!=='none'){
        n.romance.spark = clamp(n.romance.spark - 2, 0, 100);
        if(n.romance.status==='dating' && n.romance.spark < 25 && Math.random() < 0.25){
          n.romance.status = 'none';
          this.toast(`💔 You and ${n.name} have broken up.`);
          this.pushNews(`💔 ${p.name} and ${n.name} have called it off.`);
        }
      }
    });
    if(s.metPartner && s.metPartner.romance){
      s.metPartner.romance.spark = clamp(s.metPartner.romance.spark - 2, 0, 100);
      if(s.metPartner.romance.status==='dating' && s.metPartner.romance.spark < 25 && Math.random() < 0.25){
        this.toast(`💔 You and ${s.metPartner.name} have broken up.`);
        this.pushNews(`💔 ${p.name} and ${s.metPartner.name} have called it off.`);
        s.metPartner = null;
      }
    }
    (s.grid||[]).forEach(d=>{
      if(d.romance && d.romance.status!=='none'){
        d.romance.spark = clamp(d.romance.spark - 2, 0, 100);
        if(d.romance.status==='dating' && d.romance.spark < 25 && Math.random() < 0.25){
          d.romance.status = 'none';
          this.toast(`💔 You and ${d.name} have broken up.`);
          this.pushNews(`💔 ${p.name} and ${d.name} have called it off.`);
        }
      }
    });
  },

});



/* ============================================================

Object.assign(App, {

  renderRaceCenterScreen(){
    this.currentScreen = 'race';
    const s = this.state;
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }
    const track = TRACKS.find(t=>t.id===round.trackId);
    this.updateStatusStrip();
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.nav==='race'));

    const band = tempBand(round.trackTemp);
    const isRain = round.weather==='rain';
    const weatherLine = isRain
      ? `🌧️ Rain expected · ${round.trackTemp}°C`

    const conditionsNote = isRain
      ? 'Wet-weather skill matters more this weekend — check your driver\'s wetSkill and consider a cautious approach.'
      : band.label==='Hot'
      ? 'Hot track — tyres wear faster and reliability risk is higher. Tyre management and Save Tires strategy help more than usual.'
      : band.label==='Cold'

    this.root.innerHTML = `
      <div class="pod-wrap" style="margin-bottom:6px; position:relative;">

        </div>
      </div>
      <div class="pixel-panel">
        <div class="panel-title">${track.country} <span class="tag">Round ${round.round}/${s.calendar.rounds.length}</span></div>
        <div style="font-weight:800; margin-bottom:4px;">${track.name}</div>
        <div class="section-sub" style="margin-bottom:0;">${track.character}</div>
        <div class="section-sub" style="margin:4px 0 0;">Familiarity: ${Math.round(this.trackFamiliarity(track.id))}%</div>
        ${isHomeTrack(s, track.id) ? `<div class="chip mint" style="margin-top:8px; display:inline-block;">🏠 Home Track — you know this place. Small pace bonus this weekend.</div>` : ''}
        <div class="chip ${this.overtakeTier(track.overtakeDiff).chip}" style="margin-top:8px;">${this.overtakeTier(track.overtakeDiff).icon} Overtaking: ${this.overtakeTier(track.overtakeDiff).label} (${track.overtakeDiff}/10)</div>
        <div class="section-sub" style="margin:4px 0 0;">${this.overtakeTier(track.overtakeDiff).note}</div>

      ${(()=>{

        const cr = this.getConstructorRival();
