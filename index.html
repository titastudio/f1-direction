      this.finishExecuteRace(ctx, null);
    }
  },

  /* ---------------- TEAM ORDERS MODAL (feature idea #7, extended by #8) ----------------
     mode:'holdForTeammate' (original): Complying yields the position back
     to the teammate via applyTeamOrdersSwap -- costs the position, gains
     team trust. Refusing keeps the position but costs morale.
     mode:'letLeaderThrough' (feature idea #8's mirror case): the teammate
     is trailing but faster; the team asks them to hold station rather than
     pass the struggling player ahead. Complying means NO swap happens at
     all (the position simply stays as-is -- the ask IS "don't take it"),
     and gains team trust exactly like the original case. Refusing means
     the teammate takes the position anyway (the SAME applyTeamOrdersSwap()
     call the original case's comply branch uses), costing morale the same
     way the original case's refuse branch does -- so either mode ends up
     calling applyTeamOrdersSwap() on exactly one of its two branches,
     never both, and never on the same branch twice. */
  renderTeamOrdersModal(moment, ctx){
    const s = this.state; const p = s.player;
    const isMirror = moment.mode==='letLeaderThrough';
    const radioLine = isMirror
      ? `"${p.name}, ${moment.teammateName} has the pace to pass right now, but we'd like them to hold station behind you. Are you good with us asking that?"`
      : `"${p.name}, we need you to hold position and let ${moment.teammateName} through. Can you do that for us?"`;
    const contextLine = isMirror
      ? `${moment.teammateName} is running P${moment.teammatePos}, right behind you in P${moment.playerPos}. The team wants to protect YOUR result this time.`
      : `You're currently running P${moment.playerPos}, right behind ${moment.teammateName} in P${moment.teammatePos}. The team wants to protect that result.`;
    this.openModal(`
      ${this.modalHeader('Team Radio')}
      <div class="pixel-panel">
        <div style="font-weight:800;">${radioLine}</div>
      </div>
      <div class="section-sub" style="margin:8px 0;">${contextLine}</div>
      <div class="stack-8">
        <button class="pbtn full gold" id="btn-orders-comply">${isMirror ? '🤝 Agree — ask them to hold station' : '🤝 Comply — let them through'}</button>
        <button class="pbtn full" id="btn-orders-refuse">${isMirror ? '🚫 Decline — let them race for it' : '🚫 Refuse — hold your position'}</button>
      </div>
    `);
    // Must-resolve: the race has already been fully simulated by this point
    // (results array exists), same "state already moved forward" reasoning
    // as every other must-resolve modal in this file.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.getElementById('btn-orders-comply').onclick = ()=>{
      // holdForTeammate: comply swaps (player yields to teammate).
      // letLeaderThrough: comply does NOT swap (teammate holds station,
      // position stays exactly as-is) -- see comment block above.
      if(!isMirror) this.applyTeamOrdersSwap(ctx.results, moment.teammateId);
      this.adjustTeamMorale(p.teamId, 6);
      const teammate = s.grid.find(d=>d.id===moment.teammateId);
      if(teammate) teammate.respect = clamp((teammate.respect||50) + 8, 0, 100);
      this.toast(isMirror ? `🤝 ${moment.teammateName} holds station behind you. The team appreciates it.` : `🤝 You let ${moment.teammateName} through. The team appreciates it.`);
      p.journal.unshift({season:s.season, week:s.week, title:'Team Orders', text: isMirror ? `Asked ${moment.teammateName} to hold station behind you at ${ctx.track.name}, and they agreed.` : `Complied with team orders at ${ctx.track.name}, yielding position to ${moment.teammateName}.`, icon:'🤝'});
      this.closeModal();
      this.finishExecuteRace(ctx, { complied:true, teammateName: moment.teammateName });
    };
    document.getElementById('btn-orders-refuse').onclick = ()=>{
      // holdForTeammate: refuse does NOT swap (player keeps their spot).
      // letLeaderThrough: refuse DOES swap (teammate takes the position
      // they had the pace for anyway) -- the inverse of the comply branch
      // above, so exactly one branch per mode ever calls the swap.
      if(isMirror) this.applyTeamOrdersSwap(ctx.results, moment.teammateId);
      this.adjustTeamMorale(p.teamId, -8);
      this.toast(isMirror ? `🚫 ${moment.teammateName} races past you. The team isn't thrilled, but that's racing.` : `🚫 You held your position. The team isn't thrilled, but it's your result.`);
      p.journal.unshift({season:s.season, week:s.week, title:'Team Orders Defied', text: isMirror ? `Declined to have ${moment.teammateName} hold station at ${ctx.track.name} -- they raced past instead.` : `Refused a team order to yield position to ${moment.teammateName} at ${ctx.track.name}.`, icon:'🚫'});
      this.closeModal();
      this.finishExecuteRace(ctx, { complied:false, teammateName: moment.teammateName });
    };
  },

  finishExecuteRace(ctx, teamOrdersOutcome){
    const s = this.state; const p = s.player;
    const { track, weather, trackTemp, qualy, results, playerHadMechanicalDNF, safetyCarEvent, weatherShiftEvent, pitStopEvent, approach, homeTrackBonusAppliedThisRace, constructorGapBeforeRace } = ctx;
    const round = this.getCurrentRound();
    // Feature idea #7 -- Wet Setup is a one-race trade-off; clear it now
    // that this race has resolved so it doesn't silently carry into next
    // weekend's paceBonus calculation.
    if(p._wetSetupChosen) p._wetSetupChosen = false;
    const fastestLapDriverId = rollFastestLap(results, [...s.grid, p]);
    if(fastestLapDriverId){
      const flDrv = fastestLapDriverId==='player' ? p : s.grid.find(d=>d.id===fastestLapDriverId);
      if(flDrv) flDrv.careerStats.fastestLaps = (flDrv.careerStats.fastestLaps||0) + 1;
    }
    // Feature idea #4 -- Track records board: tracks the fastest lap ever
    // recorded (across the whole save, any driver) at each circuit, using
    // the SAME presentational plausibleLapTime() formula the qualifying
    // result modal already uses (19.9) -- this is not a new lap-time model,
    // just recording the smallest value that formula has ever produced for
    // this track's race-winner position, since a fastest-lap roll always
    // implies a plausible time close to the front of the field. Small,
    // additive, Museum-only display; never read by any mechanical system.
    if(fastestLapDriverId){
      const flDrv = fastestLapDriverId==='player' ? p : s.grid.find(d=>d.id===fastestLapDriverId);
      if(flDrv){
        if(!s.trackRecords) s.trackRecords = {};
        const flResult = results.find(r=>r.driverId===fastestLapDriverId);
        const posForLapTime = (flResult && !flResult.dnf && flResult.position) ? flResult.position : 1;
        const lapTimeText = plausibleLapTime(track, posForLapTime, results.length);
        const existing = s.trackRecords[track.id];
        // plausibleLapTime returns a formatted string ("1:23.456" or
        // "23.456s") -- parse back to seconds ONLY for comparison, keep the
        // formatted string for display, same "derived/presentational, not a
        // literal sim value" spirit as the function itself.
        const parseSecs = (txt)=>{
          const m = txt.match(/^(?:(\d+):)?(\d+\.\d+)s?$/);
          if(!m) return Infinity;
          return (m[1]?parseInt(m[1],10)*60:0) + parseFloat(m[2]);
        };
        const newSecs = parseSecs(lapTimeText);
        if(!existing || newSecs < parseSecs(existing.lapTimeText)){
          s.trackRecords[track.id] = { driverName: flDrv.name, lapTimeText, season: s.season, isPlayer: fastestLapDriverId==='player' };
        }
      }
    }

    /* Feature idea #2 -- personal best alongside the all-time record. Shown
       underneath the existing per-track record entry in the Museum (see
       renderMuseumModal(), app_screens.js). Reuses plausibleLapTime() with
       the player's OWN finishing position this race (not tied to whether
       they set the fastest lap -- every finish produces a plausible time),
       tracked in p.playerTrackBests, same parse-back-to-seconds-for-
       comparison approach as s.trackRecords above. Purely a Museum display
       value, never read by any mechanical system. */
    {
      const ownResult = results.find(r=>r.driverId==='player');
      if(ownResult && !ownResult.dnf && ownResult.position){
        const ownLapTimeText = plausibleLapTime(track, ownResult.position, results.length);
        const parseSecs = (txt)=>{
          const m = txt.match(/^(?:(\d+):)?(\d+\.\d+)s?$/);
          if(!m) return Infinity;
          return (m[1]?parseInt(m[1],10)*60:0) + parseFloat(m[2]);
        };
        if(!p.playerTrackBests) p.playerTrackBests = {};
        const existingBest = p.playerTrackBests[track.id];
        if(!existingBest || parseSecs(ownLapTimeText) < parseSecs(existingBest.lapTimeText)){
          p.playerTrackBests[track.id] = { lapTimeText: ownLapTimeText, season: s.season };
        }
      }
    }

    const playerResult = results.find(r=>r.driverId==='player');
    const teammateEntry = s.grid.find(d=>d.teamId===p.teamId);
    // Multi-weekend mechanical-failure consequence chain (engine.js): a DNF
    // THIS race elevates next weekend's own failChance a little unless
    // addressed. Set AFTER decayMechanicalRisk() already ran above (so this
    // race's own risk roll used last weekend's decayed value, not this
    // one), and only for a genuine mechanical DNF (captured before the
    // safety car could mutate a finisher into an unrelated DNF).
    if(playerHadMechanicalDNF) applyMechanicalRiskAfterDNF(p);

    // apply points & career stats to everyone
    results.forEach(r=>{
      const isPlayer = r.driverId==='player';
      const drv = isPlayer ? p : s.grid.find(d=>d.id===r.driverId);
      if(!drv) return;
      drv.careerStats.starts++;
      if(r.dnf){ drv.careerStats.dnfs++; return; }
      const pts = pointsForPosition(r.position);
      drv.careerStats.points += pts;
      s.standings[r.driverId] = (s.standings[r.driverId]||0) + pts;
      // Constructors' Championship (constructorsStandings(), app_hub.js):
      // tracked SEPARATELY from s.standings (which is keyed by driver id
      // and follows whichever team that driver is CURRENTLY on) because a
      // mid-season team switch must not retroactively move points to the
      // new team -- points stay with the team that actually earned them,
      // same as real F1. Recorded against drv.teamId AT THE MOMENT these
      // points are scored, not looked up later from a driver's current
      // team, so a later switch can never rewrite history here.
      if(!s.constructorPoints) s.constructorPoints = {};
      s.constructorPoints[drv.teamId] = (s.constructorPoints[drv.teamId]||0) + pts;
      if(r.position===1){ drv.careerStats.wins++; if(isPlayer) s.seasonStats.wins++; if(weather==='rain' && isPlayer) drv.careerStats.wetWins++; }
      if(r.position<=3){ drv.careerStats.podiums++; if(isPlayer) s.seasonStats.podiums++; }
      if(isPlayer) s.seasonStats.points += pts;
    });

    // Constructor rivalry post-race follow-up (Pass 23 REMAINING BACKLOG
    // item, closed Pass 24; edge case closed Pass 25) -- read the SAME
    // getConstructorRival() gap again now that this race's points are
    // actually scored, and compare against the pre-race snapshot captured
    // in executeRace() to describe how the race actually swung the fight.
    // Two branches:
    //   1. Same closest rival before and after -- describe the swing
    //      directly (the original Pass 24 behavior, unchanged).
    //   2. The closest rival CHANGED (a real possibility in a tight
    //      midfield, previously left silently blank) -- that change is
    //      itself the headline. getConstructorRival() always returns
    //      whichever team is closest at the moment it's called, so simply
    //      calling it again after scoring and comparing team identity
    //      (not just the gap number) tells us definitively whether a
    //      changeover happened, and to/from which teams -- no new
    //      tracking, just reading the same function's output twice more
    //      carefully than before.
    let constructorSwingLine = '';
    if(constructorGapBeforeRace && Math.abs(constructorGapBeforeRace.gap) <= 15){
      const afterGap = this.getConstructorRival();
      if(afterGap && afterGap.team.id === constructorGapBeforeRace.team.id){
        const swing = constructorGapBeforeRace.gap - afterGap.gap; // positive = gap closed/reversed in the player's favor
        if(swing !== 0){
          const verb = swing > 0 ? 'closed the gap to' : 'lost ground to';
          const swingAbs = Math.abs(swing);
          const newStanding = afterGap.gap > 0 ? `now trail by ${afterGap.gap} point${afterGap.gap===1?'':'s'}` : afterGap.gap < 0 ? `now lead by ${-afterGap.gap} point${-afterGap.gap===1?'':'s'}` : 'are now dead level';
          constructorSwingLine = `🏆 Constructors' battle: this race ${verb} ${afterGap.team.name} by ${swingAbs} point${swingAbs===1?'':'s'} — you ${newStanding}.`;
        }
      } else if(afterGap && afterGap.team.id !== constructorGapBeforeRace.team.id && Math.abs(afterGap.gap) <= 15){
        // The closest rival changed AND the new one is still genuinely
        // close (same <=15 threshold) -- a real, headline-worthy
        // changeover, not just noise from a distant team's points
        // shuffling around. Framed as "new closest rival" rather than a
        // numeric swing, since a swing number across two different teams'
        // gaps wouldn't mean anything (closing 3 points on Team X isn't
        // comparable to opening 8 on Team Y -- they're different races).
        const newStanding = afterGap.gap > 0 ? `trail by ${afterGap.gap} point${afterGap.gap===1?'':'s'}` : afterGap.gap < 0 ? `lead by ${-afterGap.gap} point${-afterGap.gap===1?'':'s'}` : 'are dead level';
        constructorSwingLine = `🏆 Constructors' battle: the standings reshuffled — ${afterGap.team.name} is now your closest rival (was ${constructorGapBeforeRace.team.name}). You ${newStanding} with them.`;
      }
      // A third, deliberately silent case remains: the closest rival
      // changed to a team that's now MORE than 15 points away. That's a
      // genuine "no longer a real fight" outcome, not a headline -- correctly
      // producing no chip, same as a race that simply didn't move the
      // needle at all.
    }

    if(playerResult && !playerResult.dnf && teammateEntry){
      const tmResult = results.find(r=>r.driverId===teammateEntry.id);
      if(tmResult){
        const playerAhead = tmResult.dnf || playerResult.position < tmResult.position;
        if(playerAhead) s.seasonStats.beatTeammate = true;
        // Teammate relationship arc / season-long head-to-head storyline:
        // beatTeammate was previously just a one-way "did it ever happen"
        // flag (still used as-is for the existing season objective/contract
        // clause/Team Player award checks above -- untouched). This adds a
        // real running tally on the TEAMMATE driver object itself
        // (teammateTally, same shape as headToHead used for rivals in
        // updateRivalry()) so a genuine season-long narrative ("you lead
        // 8-3 against your teammate this year") is possible, not just a
        // boolean. Reset each season in handleSeasonEnd() below, since a
        // teammate arc is inherently a THIS-season story -- a new season
        // (possibly a new teammate after grid churn) starts the count over.
        if(!teammateEntry.teammateTally) teammateEntry.teammateTally = { wins:0, losses:0 };
        if(playerAhead) teammateEntry.teammateTally.wins++;
        else if(playerResult.position > tmResult.position) teammateEntry.teammateTally.losses++;
      }
    }

    this.checkSponsorTierUnlocks();

    // money & fans
    const pos = playerResult.dnf ? null : playerResult.position;
    let moneyGain = 2 + (this.getTeam(p.teamId).tier===1?3:this.getTeam(p.teamId).tier===2?1.5:0.6);
    let fanGain = 15;
    if(pos){
      moneyGain += pointsForPosition(pos)*0.3;
      fanGain += pointsForPosition(pos)*8;
      if(pos===1){ fanGain+=150; moneyGain+=4; }
      else if(pos<=3){ fanGain+=60; moneyGain+=2; }
    } else { fanGain -= 15; }
    // Fastest lap: small standalone bonus on top of the position-based one
    // above, since real fastest laps pay out regardless of finishing spot.
    const playerHasFastestLap = fastestLapDriverId==='player';
    if(playerHasFastestLap){ moneyGain += 1; fanGain += 20; }
    p.money = Math.round((p.money + moneyGain)*10)/10;
    const cosmeticBonuses = this.getCosmeticBonuses();
    if(cosmeticBonuses.fanPopularity) fanGain += cosmeticBonuses.fanPopularity;
    p.fanPopularity = Math.max(0, p.fanPopularity + fanGain);
    if(cosmeticBonuses.mediaReputation) p.mediaReputation = clamp(p.mediaReputation + cosmeticBonuses.mediaReputation * 0.3, 0, 100);

    // mood/confidence feedback
    if(pos && pos<=3){ p.attributes.mental.confidence = clamp(p.attributes.mental.confidence+6); p.attributes.lifestyle.mood=clamp(p.attributes.lifestyle.mood+10); }
    else if(playerResult.dnf){ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence-5); p.attributes.lifestyle.mood=clamp(p.attributes.lifestyle.mood-8); p.attributes.lifestyle.stress=clamp(p.attributes.lifestyle.stress+10); }
    else if(pos && pos<=10){ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence+2); }
    else { p.attributes.mental.confidence=clamp(p.attributes.mental.confidence-2); p.attributes.lifestyle.stress=clamp(p.attributes.lifestyle.stress+5); }
    p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy-30);

    this.applyRomancePartnerPerk();

    this.checkTraitEvolution();
    this.checkMilestones(pos, playerResult.dnf, track);
    this.checkNewArchetypes();
    this.checkMultiSeasonCallbacks();

    const newStyle = recordStyleProgress(p, approach);
    if(newStyle){
      this.toast(`✨ You've developed a signature style: ${newStyle}!`);
      this.pushNews(`✨ ${p.name} is earning a reputation as a ${newStyle} driver.`);
    }
    this.updateRivalry(results, pos);
    const sponsorIncome = this.checkSponsorObjectives(pos, playerResult.dnf, approach);

    // team chemistry responds to results
    if(!playerResult.dnf && pos<=3) this.adjustTeamMorale(p.teamId, 4);
    else if(playerResult.dnf) this.adjustTeamMorale(p.teamId, -3);
    else if(pos && pos<=10) this.adjustTeamMorale(p.teamId, 1);
    // Leadership: a driver who leads well lifts the garage's mood a little
    // every single race regardless of result, on top of the result-based
    // swings above -- small (max +0.5 at 99 leadership), but this was
    // previously a mental stat with zero effect anywhere in the game.
    let leadershipBoost = (p.attributes.mental.leadership/99) * 0.5;
    // Leader (TRAIT_POOL positive, data.js): earned by sustained high
    // leadership backed by real tenure at the current team (see
    // checkTraitEvolution()) -- a senior figure in the garage, not just a
    // high stat number. Scales the same leadership morale bump above
    // rather than adding a separate mechanic, since the trait is really
    // just "this driver's leadership has become a genuine team asset."
    if(p.traits.includes('Leader')) leadershipBoost *= 1.4;
    if(leadershipBoost>0) this.adjustTeamMorale(p.teamId, leadershipBoost);

    const completedRoundIndex = s.calendar.currentRound; // capture BEFORE increment -- this is the round that just finished
    // Feature idea #1 -- weather radar "track is rubbering in" flavor text.
    // Tracks a small per-track consecutive-dry-weekend counter so the radar
    // strip (app_hub.js renderRadarTrendStrip()) can layer on a flavor line
    // the next time this track comes back around dry. Minimal, single-field
    // state (not derivable from anything already persisted, since a given
    // track only appears once per season and there's no other per-track
    // weather history recorded anywhere) -- reset to 0 the moment a wet
    // weekend breaks the streak, incremented on every dry one.
    if(!s.trackDryStreak) s.trackDryStreak = {};
    s.trackDryStreak[track.id] = weather==='rain' ? 0 : (s.trackDryStreak[track.id]||0) + 1;
    round.completed = true;
    // Feature idea #19 -- Weekend Media Day is once-per-race-weekend; clear
    // the flag now that this weekend's race has concluded so the chip can
    // appear again on next race week's Thursday.
    if(p._weekendMediaDayDoneThisWeekend) p._weekendMediaDayDoneThisWeekend = false;
    s.calendar.currentRound++;
    s.lastQualyResults = null;
    if(!s.cosmetics) s.cosmetics = this.initialCosmeticsState();
    s.cosmetics.totalRoundsCompletedThisSeason = s.calendar.currentRound;
    this.checkCosmeticUnlocks();

    // 19.1 #7: one-time mid-season AI development bump, guarded so it can
    // only ever fire once per season regardless of how many times this
    // point is reached (mirrors s.lastWrappedSeason's idempotency pattern).
    // Deliberately does NOT touch team.devSlotsUsed -- that's the player's
    // own separate manual-purchase budget.
    if(!s.calendar.midSeasonDevApplied && completedRoundIndex === s.calendar.midSeasonDevRoundIndex){
      applyMidSeasonDevelopment(s, getDifficultySettings(s));
      s.calendar.midSeasonDevApplied = true;
      this.toast('🔧 Mid-season upgrades have shaken up the competitive order!');
    }

    const headline = this.generateRaceHeadline(pos, playerResult.dnf, track);
    p.journal.unshift({season:s.season, week:s.week, title:headline.title, text:headline.body, icon:'🏁'});
    this.pushNews(`🏁 ${track.name}: ${p.name} finishes ${playerResult.dnf?'DNF':'P'+pos}.`);
    s.lastRaceHeadline = { track: track.name, position: pos, dnf: playerResult.dnf };

    const playerQualy = qualy.find(q=>q.driverId==='player');
    this.openModal(this.renderRaceResultHtml(results, pos, playerResult.dnf, headline, moneyGain, fanGain, sponsorIncome, playerQualy, track, safetyCarEvent, weatherShiftEvent, playerHasFastestLap, playerHadMechanicalDNF, pitStopEvent, teamOrdersOutcome, homeTrackBonusAppliedThisRace, constructorSwingLine));
    // No X close button here -- this MUST resolve via Continue. The X button
    // previously just removed the modal from the DOM (closeModal(), no
    // re-render) while round.completed/s.calendar.currentRound had ALREADY
    // been advanced above (lines ~519-524) regardless of which button the
    // player clicked. That left s.dayIndex stuck on the old day while the
    // calendar had silently moved to the NEXT round, and the stale hub
    // underneath (never re-rendered) still showed the old track's race
    // button -- clicking it then raced the wrong (next) track under the old
    // track's banner. Same must-answer pattern as the podium interview /
    // quiz / celebrity encounter modals elsewhere in this file.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    const onCloseRace = ()=>{
      this.closeModal();
      this.saveState();
      const advance = ()=>{
        if(s.calendar.currentRound >= s.calendar.rounds.length){
          this.handleSeasonEnd();
        } else {
          // Tell the player plainly that the race weekend is over and free
          // days are starting -- without this, the hub's "This Week" panel
          // switching straight to the NEXT round's track name (even though
          // it's really just the following Monday) previously read like the
          // game had skipped ahead to another race weekend.
          const nextRound = s.calendar.rounds[s.calendar.currentRound];
          const nextTrack = nextRound ? TRACKS.find(t=>t.id===nextRound.trackId) : null;
          this.advanceDay();
          if(nextTrack) this.toast(`📅 Race weekend's over — free days ahead before ${nextTrack.name}.`);
        }
      };
      // Sponsor renewal negotiation (feature idea #3): checked right after
      // the podium interview (if any) and before the day actually advances
      // -- same "resolve every must-answer moment this race triggered,
      // then proceed" ordering as the podium interview itself uses. Chained
      // rather than opened independently so it can never race the hub's own
      // re-render (this is the exact same reasoning the must-resolve-modal
      // ARCHITECTURE note gives for every other race-triggered modal here).
      const afterPodium = ()=>{
        if(s.pendingSponsorRenewals && s.pendingSponsorRenewals.length){
          // Team Ownership Mode: auto-pick "Lock In" (guaranteed, zero-risk)
          // for every queued renewal rather than opening a modal no one can
          // answer -- same reasoning as the team-orders auto-comply default
          // above (favor the safe, positive-or-neutral choice by default).
          if(this._ownerSilent){
            (s.pendingSponsorRenewals||[]).slice().forEach(name=>{
              const sp = p.sponsors.find(x=>x.name===name);
              if(sp) sp.permanent = true;
            });
            s.pendingSponsorRenewals = [];
            advance();
          } else {
            this.renderSponsorRenewalModal(advance);
          }
        } else {
          advance();
        }
      };
      // Podium interview: a short, race-result-triggered variant of the
      // Media modal, gated to top-3 finishes only. Reuses the same
      // choice/effect/memory pattern as renderMediaModal -- no new state.
      // Team Ownership Mode: skipped entirely when silent -- there's no
      // player to interview, and the modal would never be answered.
      if(pos && pos<=3 && !playerResult.dnf && !this._ownerSilent){
        this.renderPodiumInterviewModal(pos, track, afterPodium);
      } else {
        afterPodium();
      }
    };
    if(this._ownerSilent){ onCloseRace(); return; }
    document.getElementById('btn-close-race').onclick = onCloseRace;
  },

  renderPodiumInterviewModal(pos, track, onDone){
    const s = this.state; const p = s.player;
    const journalist = s.npcRoster.find(n=>n.role==='Journalist');
    const podiumWord = pos===1 ? 'the win' : pos===2 ? 'second place' : 'third place';
    const options = pos===1 ? [
      {label:'Dedicate it to the team', effect:()=>{ this.adjustTeamMorale(p.teamId, 5); }, result:'The garage loves hearing that.', memory:`Dedicated the win at ${track.name} to the team`},
      {label:'Soak in the moment', effect:()=>{ p.fanPopularity=clamp(p.fanPopularity+5,0,999); }, result:'Fans eat this up.', memory:`Savored the win at ${track.name} in the press`},
      {label:'Stay businesslike', effect:()=>{ journalist.relationship.trust=clamp(journalist.relationship.trust+2); }, result:'Professional, if a little flat.', memory:`Kept a businesslike tone after winning at ${track.name}`},
    ] : [
      {label:'Praise the team\'s effort', effect:()=>{ this.adjustTeamMorale(p.teamId, 3); }, result:'The garage appreciates the shoutout.', memory:`Praised the team after the podium at ${track.name}`},
      {label:'Say you were chasing more', effect:()=>{ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence+3); }, result:'Hungry, ambitious answer.', memory:`Said they were chasing more than ${podiumWord} at ${track.name}`},
      {label:'Thank the fans', effect:()=>{ p.fanPopularity=clamp(p.fanPopularity+4,0,999); }, result:'Popularity +4!', memory:`Thanked the fans for the podium at ${track.name}`},
    ];
    this.openModal(`
      ${this.modalHeader('Podium Interview')}
      <div class="section-sub" style="margin-bottom:8px;">${journalist.name} · ${journalist.role} · trackside</div>
      <div class="pixel-panel"><div style="font-weight:800;">"Congratulations on ${podiumWord} at ${track.name} — what's going through your mind right now?"</div></div>
      <div class="stack-8">
        ${options.map((o,i)=>`<button class="pbtn full" data-podium-opt="${i}">${o.label}</button>`).join('')}
      </div>
    `);
    // No close button here, matching the quiz mini-game pattern in this same
    // file: the round is already marked completed and the calendar has
    // already advanced by the time this modal opens, so a dismiss-without-
    // choosing path would strand the player on a closed modal with nothing
    // left to click (the exact "stall" bug class documented for
    // renderRaceStrategyPrompt/quiz modals). Answering is quick and always
    // has a positive-or-neutral effect, so this isn't a hardship.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.querySelectorAll('[data-podium-opt]').forEach(btn=>{
      btn.onclick = ()=>{
        const o = options[parseInt(btn.dataset.podiumOpt)];
        o.effect();
        journalist.relationship.memories.unshift({text:o.memory, season:s.season, week:s.week});
        if(journalist.relationship.memories.length>10) journalist.relationship.memories.pop();
        this.toast(o.result);
        this.closeModal();
        this.saveState();
        onDone();
      };
    });
  },

  generateRaceHeadline(pos, dnf, track){
    const p = this.state.player;
    if(dnf) return {title:`HEARTBREAK FOR ${p.name.toUpperCase()}`, body:`A race-ending incident at ${track.name} denies a shot at points.`};
    if(pos===1) return {title:`${p.name.toUpperCase()} WINS AT ${track.name.toUpperCase()}!`, body:`A commanding drive takes the chequered flag first.`};
    if(pos<=3) return {title:`PODIUM FOR ${p.name.toUpperCase()}`, body:`A strong weekend converts into a podium at ${track.name}.`};
    if(pos<=10) return {title:`POINTS SECURED AT ${track.name.toUpperCase()}`, body:`A solid drive nets valuable championship points.`};
    return {title:`QUIET WEEKEND FOR ${p.name.toUpperCase()}`, body:`A tough race leaves ${p.name} outside the points at ${track.name}.`};
  },

  renderRaceResultHtml(results, pos, dnf, headline, moneyGain, fanGain, sponsorIncome, playerQualy, track, safetyCarEvent, weatherShiftEvent, playerHasFastestLap, mechanicalDNF, pitStopEvent, teamOrdersOutcome, homeTrackBonusAppliedThisRace, constructorSwingLine){
    const top10 = results.slice(0,10).map(r=>{
      const isPlayer = r.driverId==='player';
      const drv = isPlayer ? this.state.player : this.state.grid.find(d=>d.id===r.driverId);
      return `<div class="row-item"><span class="rname">${r.dnf?'DNF':'P'+r.position} ${drv.name}${isPlayer?' (you)':''}</span><span class="rmeta">${r.dnf?'':pointsForPosition(r.position)+' pts'}</span></div>`;
    }).join('');
    this.checkHomeEvolution();
    const engineer = this.state.npcRoster.find(n=>n.role==='Race Engineer');
    const category = dnf ? 'dnf' : pos===1 ? 'win' : pos<=3 ? 'podium' : pos<=10 ? 'points' : 'poor';
    // Rivalry-specific radio chatter: if the current rival finished close by
    // (adjacent on track, same window as updateRivalry's rivalry-building
    // check), swap in a rival-flavored line instead of the generic bank.
    // Falls back to radioLine() untouched whenever there's no rival nearby.
    let radio = null;
    const rival = this.getRival();
    if(rival && !dnf && pos!==null){
      const rivalResult = results.find(r=>r.driverId===rival.id);
      if(rivalResult && !rivalResult.dnf){
        const gap = Math.abs(pos - rivalResult.position);
        if(gap<=2){
          if(pos < rivalResult.position){
            radio = rivalRadioLine((rivalResult.position-pos)>=5 ? 'wonOverRivalBig' : 'beatRival', rival.name);
          } else if(pos > rivalResult.position){
            radio = rivalRadioLine('lostToRival', rival.name);
          }
        }
      }
    }
    let usedGenericFallback = false;
    if(!radio){ radio = radioLine(engineer.personality, category); usedGenericFallback = true; }
    // 19.13d -- stat-attributed radio line: when the player's own drive
    // shows a clear stat signature, name it specifically instead of falling
    // through to the generic personality-bank line. Checked only as a
    // fallback AFTER the rival-specific check above (rivalry chatter is
    // more specific/personal and should win when both could apply) --
    // this only overrides the GENERIC radioLine() pick, never a rival line.
    if(usedGenericFallback && playerQualy && !dnf && pos!==null){
      const startPos = playerQualy.position;
      const delta = startPos - pos;
      const player = this.state.player;
      const overtaking = player.attributes.driving.overtaking||50;
      const defending = player.attributes.driving.defending||50;
      if(delta>=6 && overtaking>=75){
        radio = `That overtaking was something else out there — gained ${delta} places today.`;
      } else if(delta<=0 && startPos<=6 && defending>=75 && pos<=6){
        radio = `Textbook defending all race. Nobody was getting past you.`;
      }
    }
    // Grid-penalty callout: same startPenalty formula already used inside
    // simulateRace (track.overtakeDiff*0.35 per grid slot), surfaced here as
    // plain language. Purely presentational -- no new math.
    let gridNote = '';
    if(playerQualy && track && !dnf && pos!==null){
      const startPos = playerQualy.position;
      const delta = startPos - pos;
      const estCost = Math.round(startPos * track.overtakeDiff * 0.35);
      if(delta>0) gridNote = `<div class="section-sub" style="margin:6px 0 0;">Started P${startPos}, gained ${delta} place${delta===1?'':'s'} — nice recovery drive.</div>`;
      else if(delta<0) gridNote = `<div class="section-sub" style="margin:6px 0 0;">Started P${startPos}, lost ${Math.abs(delta)} place${Math.abs(delta)===1?'':'s'} on race day.</div>`;
      else if(startPos>3) gridNote = `<div class="section-sub" style="margin:6px 0 0;">Started P${startPos} and held station — the grid penalty here cost roughly ${estCost} tenths of pace off the line.</div>`;
    }
    // Feature idea #22 -- full race radio/commentary log. The radio line
    // settled above (rival-specific, generic personality-bank, or
    // stat-attributed) was previously shown once in this result modal and
    // then lost forever the moment the modal closed. Persisting it turns
    // that ephemeral flavor line into a permanent, reviewable history --
    // reusing the exact SAME radio value already computed above, no
    // second radio-line system. Capped at a reasonable length so a long
    // career's save file doesn't grow unbounded.
    if(!this.state.player.radioLog) this.state.player.radioLog = [];
    this.state.player.radioLog.unshift({
      season: this.state.season, week: this.state.week, track: track ? track.name : null,
      text: radio, category, position: pos, dnf,
    });
    if(this.state.player.radioLog.length>200) this.state.player.radioLog.pop();
    return `
      ${this.modalHeader('Race Result')}
      ${safetyCarEvent ? `<div class="chip red" style="margin-bottom:8px; display:block;">🚨 Safety Car — the field bunched up${safetyCarEvent.caughtOutDriverId==='player' ? ', and you were caught out by the chaos' : ''}.</div>` : ''}
      ${weatherShiftEvent ? `<div class="chip blue" style="margin-bottom:8px; display:block;">🌦️ ${weatherShiftEvent.isMicroclimate ? 'This track\'s notoriously changeable weather struck again — c' : 'C'}onditions shifted mid-race — ${weatherShiftEvent.playerWetSkill>weatherShiftEvent.fieldAvgWetSkill ? 'you adapted better than most.' : weatherShiftEvent.playerWetSkill<weatherShiftEvent.fieldAvgWetSkill ? 'the change caught you out a little.' : 'it evened out for everyone.'}</div>` : ''}
      ${pitStopEvent ? `<div class="chip ${pitStopEvent.worked?'mint':'red'}" style="margin-bottom:8px; display:block;">${pitStopEvent.call==='undercut'?'⏪':'⏩'} ${pitStopEvent.call==='undercut'?'Undercut':'Overcut'} call ${pitStopEvent.worked?'paid off':'didn\'t pay off'} — ${pitStopEvent.worked?`gained ${pitStopEvent.delta} place${Math.abs(pitStopEvent.delta)===1?'':'s'}`:`lost ${Math.abs(pitStopEvent.delta)} place${Math.abs(pitStopEvent.delta)===1?'':'s'}`} on the timing.</div>` : ''}
      ${teamOrdersOutcome ? `<div class="chip ${teamOrdersOutcome.complied?'mint':'gold'}" style="margin-bottom:8px; display:block;">📻 Team Orders — ${teamOrdersOutcome.complied ? `you let ${teamOrdersOutcome.teammateName} through.` : `you held position over ${teamOrdersOutcome.teammateName}.`}</div>` : ''}
      ${playerHasFastestLap ? `<div class="chip gold" style="margin-bottom:8px; display:block;">⏱️ Fastest Lap! +$1M, +20 fans.</div>` : ''}
      ${homeTrackBonusAppliedThisRace ? `<div class="chip mint" style="margin-bottom:8px; display:block;">🏠 Home Track boost — the crowd's energy gave you a small race-day pace bonus. A fan-favorite drive.</div>` : ''}
      ${constructorSwingLine ? `<div class="chip gold" style="margin-bottom:8px; display:block;">${constructorSwingLine}</div>` : ''}
      ${mechanicalDNF ? `<div class="chip red" style="margin-bottom:8px; display:block;">🔧 That failure leaves the car a little fragile — reliability risk is elevated next weekend unless it's addressed at Team &amp; Car.</div>` : ''}
      <div class="headline-card">
        <div class="kicker">RACE REPORT</div>
        <h3>${headline.title}</h3>
        <p>${headline.body}</p>
      </div>
      <div class="pixel-panel" style="border-left:3px solid var(--candy-blue);">
        <div class="section-sub" style="margin:0 0 4px;">📻 ${engineer.name}</div>
        <div style="font-weight:700; font-style:italic;">"${radio}"</div>
        ${gridNote}
      </div>
      <div class="section-title" style="font-size:10px;">Top 10</div>
      ${top10}
      <div class="pixel-panel" style="margin-top:10px;">
        <div class="flex-between"><span class="section-sub" style="margin:0;">Race Earnings</span><span style="font-family:var(--font-pixel); font-size:10px; color:#2a8a5c;">+$${moneyGain.toFixed(1)}M</span></div>
        ${sponsorIncome>0 ? `<div class="flex-between" style="margin-top:6px;"><span class="section-sub" style="margin:0;">Sponsor Income</span><span style="font-family:var(--font-pixel); font-size:10px; color:#2a8a5c;">+$${sponsorIncome.toFixed(1)}M</span></div>` : ''}
        <div class="flex-between" style="margin-top:6px;"><span class="section-sub" style="margin:0;">Fans</span><span style="font-family:var(--font-pixel); font-size:10px; color:var(--candy-blue);">+${fanGain}</span></div>
      </div>
      <button class="pbtn full gold" id="btn-close-race" style="margin-top:12px;">Continue</button>
    `;
  },

  updateRivalry(results, playerPos){
    const s = this.state; const p = s.player;
    if(!playerPos) return; // DNF builds no rivalry this round
    const idx = results.findIndex(r=>r.driverId==='player');
    const nearby = [results[idx-1], results[idx+1]].filter(Boolean).map(r=>r.driverId);
    nearby.forEach(id=>{
      if(id==='player') return;
      const drv = s.grid.find(d=>d.id===id);
      if(!drv) return;
      // Respect (previously write-only -- every rival/teammate dialogue
      // choice moved it, nothing read it back): a mutually respectful
      // relationship builds rivalry more slowly race to race -- healthy
      // competition, not open hostility. Low respect does the opposite,
      // letting the SAME on-track closeness escalate faster. Scaled around
      // the 50 baseline so an untouched relationship (respect never moved)
      // behaves exactly as before -- +6 at 50, ranging roughly +4..+8.
      const respectMult = 1 - ((drv.respect||50)-50)/125; // 0 respect -> 1.4x, 100 respect -> 0.6x
      drv.rivalryLevel = clamp((drv.rivalryLevel||0) + 6*respectMult, 0, 100);
      // Head-to-head record: who finished ahead this race, tracked per rival
      // so the Rival Profile can show a genuine "you lead 7-3" style record.
      if(!drv.headToHead) drv.headToHead = { wins:0, losses:0 };
      const rivalPos = results.find(r=>r.driverId===id)?.position;
      if(rivalPos){
        if(playerPos < rivalPos) drv.headToHead.wins++;
        else if(playerPos > rivalPos) drv.headToHead.losses++;
      }
    });
    // slow decay for everyone else so rivalries fade if you stop racing them closely
    s.grid.forEach(d=>{ if(!nearby.includes(d.id)) d.rivalryLevel = clamp((d.rivalryLevel||0) - 1, 0, 100); });

    const prevRivalId = s.rivalId;
    const top = [...s.grid].sort((a,b)=>(b.rivalryLevel||0)-(a.rivalryLevel||0))[0];
    if(top && top.rivalryLevel>=20 && top.id!==prevRivalId){
      s.rivalId = top.id;
      if(top.id!==prevRivalId){
        if(!top.rivalryOrigin) top.rivalryOrigin = rollRivalryOrigin(top.headToHead);
        this.toast(`⚔️ ${top.name} is becoming your rival!`);
        this.pushNews(`⚔️ A rivalry is forming: ${p.name} vs ${top.name}.`);
      }
    }
  },

  getRival(){
    const s = this.state;
    if(!s.rivalId) return null;
    return s.grid.find(d=>d.id===s.rivalId) || null;
  },

  checkNewArchetypes(){
    const p = this.state.player;
    const earnedIds = checkReputationArchetypes(p);
    earnedIds.forEach(id=>{
      if(!p.reputationArchetypes.includes(id)){
        p.reputationArchetypes.push(id);
        const arch = REPUTATION_ARCHETYPES.find(a=>a.id===id);
        this.toast(`${arch.icon} New reputation: ${arch.name}!`);
        this.pushNews(`${arch.icon} The paddock is calling ${p.name} "${arch.name}".`);
        p.journal.unshift({season:this.state.season, week:this.state.week, title:'New Reputation', text:`Earned the reputation: ${arch.name}.`, icon:arch.icon});
      }
    });
  },

  checkTraitEvolution(){
    const p = this.state.player; const s = this.state;
    if(p.careerStats.dnfs>=3 && !p.traits.includes('Nervous Under Pressure')){
      p.traits.push('Nervous Under Pressure');
    }
    if(p.age>=28 && p.careerStats.starts>=60 && !p.traits.includes('Composed Veteran')){
      p.traits.push('Composed Veteran');
      p.traits = p.traits.filter(t=>t!=='Nervous Under Pressure');
    }
    if(p.fanPopularity>=80 && !p.traits.includes('Fan Favorite')) p.traits.push('Fan Favorite');
    // Ice Cold: sustained high focus with a genuinely clean reliability
    // record -- a driver who both concentrates well AND rarely DNFs, not
    // just one or the other (either alone is already covered by focus/
    // discipline's own direct pace effects; the trait rewards having both).
    if(p.attributes.mental.focus>=80 && p.careerStats.starts>=15 && p.careerStats.dnfs===0 && !p.traits.includes('Ice Cold')){
      p.traits.push('Ice Cold');
    }
    // Late Braker: elite braking stat backed up by real results (podiums),
    // so the trait reflects the stat actually translating to outcomes, not
    // just a high number in isolation.
    if(p.attributes.driving.braking>=85 && p.careerStats.podiums>=3 && !p.traits.includes('Late Braker')){
      p.traits.push('Late Braker');
    }
    // Workhorse: a long, durable career measured in race starts -- the
    // trait a grinder earns for showing up and finishing races, regardless
    // of how many they've won.
    if(p.careerStats.starts>=80 && !p.traits.includes('Workhorse')){
      p.traits.push('Workhorse');
    }
    // Hot Head: a boiling rivalry (rivalryLevel>=80, the top of the scale
    // fed by confrontational media/rival dialogue choices) paired with high
    // stress -- the negative-trait mirror of Ice Cold, earned by letting a
    // rivalry get personal rather than staying composed under it. Gated on
    // respect staying low (<40): a fierce rivalry with real mutual respect
    // reads as hard-fought competition, not a Hot Head -- the same rivalry
    // intensity with respect already worn down by hostile choices is what
    // actually earns the trait.
    const rival = this.getRival && this.getRival();
    if(rival && (rival.rivalryLevel||0)>=80 && p.attributes.lifestyle.stress>=70 && (rival.respect||50)<40 && !p.traits.includes('Hot Head')){
      p.traits.push('Hot Head');
    }
    // Lucky: a real career sample (starts>=25) with a DNF rate well under
    // what the player's own team reliability alone would predict -- reuses
    // the exact same reliabilityGap shape simulateRace's own failChance
    // formula is built on (engine.js), so "lucky" means genuinely
    // outperforming your own car's odds, not just a low DNF count on a
    // already-reliable car.
    const team = this.getTeam ? this.getTeam(p.teamId) : null;
    if(team && p.careerStats.starts>=25){
      const dnfRate = p.careerStats.dnfs / p.careerStats.starts;
      const expectedReliabilityGap = Math.max(0, 100 - team.reliability*10) / 1000; // same 0-1ish scale as failChance's own gap term
      if(dnfRate < expectedReliabilityGap*0.5 && !p.traits.includes('Lucky')) p.traits.push('Lucky');
      // Fragile: the mirror case -- a DNF rate notably worse than the same
      // team-reliability prediction, despite a real sample size. Distinct
      // from Nervous Under Pressure (raw DNF count) by being about RATE
      // relative to the car's own odds, not an absolute count threshold.
      if(dnfRate > expectedReliabilityGap*2 && !p.traits.includes('Fragile')) p.traits.push('Fragile');
    }
    // Leader: sustained high leadership stat AND real tenure at the current
    // team (joinedTeamOnSeason, set in app_core.js/app_screens.js) -- a
    // driver who's actually been around long enough to be a senior voice
    // in the garage, not just someone with a high leadership number on day one.
    const tenureSeasons = (s.season||0) - (p.joinedTeamOnSeason||s.season||0);
    if(p.attributes.mental.leadership>=75 && tenureSeasons>=2 && !p.traits.includes('Leader')){
      p.traits.push('Leader');
    }
    // Bad Starter: qualifying pace lagging well behind race pace over a
    // real sample -- a driver who consistently races better than they
    // start, mirroring Late Braker's own "stat backed by a real sample"
    // shape above rather than a single snapshot comparison.
    if(p.careerStats.starts>=20 && (p.attributes.driving.racePace - p.attributes.driving.qualifyingPace)>=18 && !p.traits.includes('Bad Starter')){
      p.traits.push('Bad Starter');
    }
    // Overconfident: high self-belief that isn't backed up by points
    // actually scored per start -- the trait fires when confidence has
    // clearly outpaced real output, using only already-tracked fields
    // (no new recency tracker) so it stays consistent with every other
    // trigger here.
    if(p.careerStats.starts>=20){
      const pointsPerStart = p.careerStats.points / p.careerStats.starts;
      if(p.attributes.mental.confidence>=80 && pointsPerStart<4 && !p.traits.includes('Overconfident')){
        p.traits.push('Overconfident');
      }
    }
  },

  checkMilestones(pos, dnf, track){
    const p = this.state.player;
    const fire = (key, text)=>{
      if(!p.milestones.includes(key)){
        p.milestones.push(key);
        this.toast('🎉 '+text);
        this.pushNews('🎉 '+text);
      }
    };
    if(!dnf && pos<=3) fire('first_podium', `${p.name} scores their first career podium!`);
    if(!dnf && pos===1) fire('first_win', `${p.name} wins their first career race!`);
    if(p.careerStats.starts>=50) fire('50_starts', `${p.name} completes 50 career race starts.`);
    if(p.careerStats.starts>=100) fire('100_starts', `${p.name} completes 100 career race starts.`);
    if(p.careerStats.wins>=10) fire('10_wins', `${p.name} reaches 10 career race wins!`);
    if(p.careerStats.poles>=5) fire('5_poles', `${p.name} claims their 5th career pole position.`);
    if(p.careerStats.points>=100) fire('100_points', `${p.name} passes 100 career championship points.`);
    if(p.careerStats.points>=250) fire('250_points', `${p.name} passes 250 career championship points.`);
    if(p.careerStats.points>=500) fire('500_points', `${p.name} passes 500 career championship points.`);
    // Fastest Laps and Wet Wins (careerStats.fastestLaps/wetWins) were
    // tracked and shown in Career Stats but never fed a milestone -- same
    // "tracked but write-only" gap as poles/wins had before their own
    // milestones existed above. Same 5-count threshold as poles' own
    // milestone, since fastest laps are earned at a similar rate (roughly
    // one per race weighted by pace, same as pole position).
    if((p.careerStats.fastestLaps||0)>=5) fire('5_fastest_laps', `${p.name} claims their 5th career fastest lap.`);
    if((p.careerStats.wetWins||0)>=3) fire('3_wet_wins', `${p.name} wins their 3rd career race in the rain.`);
  },

  /* ---------------- MULTI-SEASON STORYLINE CALLBACKS ----------------
     Milestones/journal entries were previously all one-off -- nothing ever
     resurfaced a past event 2-3 seasons later. This reuses EXISTING state
     (history[], the isProtegeGraduate flag already set by
     makeGraduatedProtegeDriver(), and rivalryLevel already tracked by
     updateRivalry()) rather than adding new persistent state, following the
     same fire-once-via-p.milestones pattern checkMilestones() uses above so
     a callback never fires twice. Called once per race, right alongside
     checkMilestones() in executeRace(). */
  checkMultiSeasonCallbacks(){
    const p = this.state.player; const s = this.state;
    const fire = (key, title, text)=>{
      if(!p.milestones.includes(key)){
        p.milestones.push(key);
        this.toast('📖 '+text);
        this.pushNews('📖 '+text);
        p.journal.unshift({season:s.season, week:s.week, title, text, icon:'📖'});
      }
    };

    // Protégé becomes a rival: a graduated protégé (isProtegeGraduate) who's
    // gone on to build real rivalryLevel against the player is the exact
    // "mentored protégé becoming a rival" callback from the backlog --
    // reuses updateRivalry()'s own rivalryLevel scale rather than a new
    // tracker, firing once when it crosses a genuinely-a-rival threshold.
    // Keyed per-driver-id (not a single fixed key) so a player who mentors
    // MULTIPLE protégés over a long career gets this callback again for
    // each one that separately earns it, matching the same per-subject
    // fire-once shape the "old team resents you" callback below already
    // uses -- a fixed global key would have silently gone dead after the
    // first protégé-turned-rival, ignoring any later ones.
    // Bug fix (Pass 23, found via a dedicated regression check): this
    // previously used s.grid.find(...), which only ever returns the FIRST
    // matching driver -- once one protégé-turned-rival qualified, find()
    // kept returning that SAME driver forever, and a second, independently
    // qualifying protégé could never fire its own callback at all, directly
    // contradicting this comment block's own stated intent. filter()+
    // forEach() actually delivers "fires again for each one that
    // separately earns it."
    const protegeRivals = s.grid.filter(d=>d.isProtegeGraduate && (d.rivalryLevel||0)>=45);
    protegeRivals.forEach(protegeRival=>{
      fire(`protege_became_rival_${protegeRival.id}`, 'Full Circle',
        `${protegeRival.name} — the driver you once mentored — is now a genuine rival on track. The student has become the competition.`);
    });

    // Old team resents you: a team the player left (present in history[]
    // with a DIFFERENT teamId than their current one) that's since fallen
    // in the standings gets a one-time bitter callback, 2+ seasons after
    // the player departed -- reuses history[] entirely, no new state.
    const currentTeamId = p.teamId;
    const pastTeams = [...new Set(s.history.map(h=>h.team))].filter(name=>{
      const team = TEAMS.find(t=>t.name===name);
      return team && team.id!==currentTeamId;
    });
    if(pastTeams.length){
      const departureRecord = [...s.history].find(h=>h.team===pastTeams[0]);
      const seasonsSince = departureRecord ? (s.season - departureRecord.season) : 0;
      const formerTeam = TEAMS.find(t=>t.name===pastTeams[0]);
      if(formerTeam && seasonsSince>=2){
        const formerTeamNowStruggling = this.constructorsStandings().findIndex(r=>r.team.id===formerTeam.id) >= 6;
        if(formerTeamNowStruggling){
          fire(`old_team_resents_${formerTeam.id}`, 'A Bitter Reunion',
            `${formerTeam.name}'s form has slipped since you left — paddock whispers say some in the garage still resent how it ended.`);
        }
      }
    }
  },

});




/* ============================================================
   FORMULA ONE DIRECTION — SECONDARY SCREENS
   ============================================================ */

const FACILITY_EFFECTS = {
  gym:'Boosts fitness training gains', simulator:'Boosts driving skill gains',
  engineering:'More car development slots per season', factory:'Cheaper car upgrades',
  media:'Bigger media reputation gains from good press answers', hospitality:'Faster sponsor loyalty pay raises',
};

function generateSeasonObjectives(state){
  const team = TEAMS.find(t=>t.id===state.player.teamId);
  const objectives = [];
  if(team.tier===1) objectives.push({type:'championshipPosition', text:'Finish in the Top 3', target:3, reward:{money:8, rep:6}});
  else if(team.tier===2) objectives.push({type:'standingPosition', text:'Finish in the Top 10', target:10, reward:{money:5, rep:5}});
  else objectives.push({type:'points', text:'Score 20 championship points', target:20, reward:{money:4, rep:4}});
  objectives.push({type:'beatTeammate', text:'Out-score your teammate', target:1, reward:{money:2, rep:3}});
  objectives.push({type:'q3count', text:'Reach the Top 3 in qualifying 3 times', target:3, reward:{money:3, rep:3}});
  // Feature idea #11 -- "chase the record" seasonal objective type: targets
  // beating the current lap record (s.trackRecords, set in
  // finishExecuteRace(), app_race.js) at an upcoming track this season.
  // Reuses generateSeasonObjectives()'s existing {type,text,target,reward}
  // shape exactly -- objectiveProgress()/processSeasonObjectiveRewards()
  // below need only one new `if` branch each, no separate tracking system.
  // Picked from calendar rounds not yet completed at objective-generation
  // time (always true here -- objectives generate either at a fresh
  // career or right at season start, before any round that season has
  // run) so the target is always a genuinely upcoming race, not one
  // already in the books.
  if(state.calendar && state.calendar.rounds && state.calendar.rounds.length){
    const upcoming = state.calendar.rounds.filter(r=>!r.completed);
    if(upcoming.length){
      const targetRound = pick(upcoming);
      const track = TRACKS.find(t=>t.id===targetRound.trackId);
      if(track) objectives.push({type:'chaseRecord', text:`Beat the lap record at ${track.name}`, target:1, reward:{money:5, rep:5}, trackId: track.id});
    }
  }
  return objectives;
}

function homeUpgradeThreshold(level){
  // money thresholds for automatic home tier upgrade (career earnings milestone, not spendable cash)
  return [0, 20, 45, 80, 130, 200][level] ?? 999999;
}

Object.assign(App, {

  moraleDescription(val){
    if(val>=80) return 'Excellent team spirit.';
    if(val>=60) return 'Good working relationship.';
    if(val>=40) return 'Steady but unremarkable.';
    if(val>=20) return 'Tension in the garage.';
    return 'Relationship is strained.';
  },

  objectiveProgress(o){
    const s = this.state; const p = s.player;
    if(o.type==='points') return Math.min(o.target, s.seasonStats.points);
    if(o.type==='standingPosition' || o.type==='championshipPosition'){
      // Live progress toward a position target: being further inside the
      // target band shows more filled progress, so the bar actually moves
      // meaningfully week to week instead of jumping straight from 0 to
      // 100% only once the season is already over.
      const totalDrivers = s.grid.length + 1;
      const current = this.standingPosition(p.id);
      if(current <= o.target) return o.target; // fully met right now
      const worstCase = totalDrivers;
      const progressFrac = clamp(1 - (current-o.target)/(worstCase-o.target), 0, 0.95);
      return Math.round(progressFrac*o.target);
    }
    if(o.type==='beatTeammate') return s.seasonStats.beatTeammate ? 1 : 0;
    if(o.type==='q3count') return Math.min(o.target, s.seasonStats.q3count||0);
    // Feature idea #11 -- "chase the record": met the moment s.trackRecords
    // for the target track shows the player as the record holder (set the
    // SAME finishExecuteRace() write every fastest-lap record already goes
    // through -- no separate comparison logic here, just reading the
    // result of that existing write).
    if(o.type==='chaseRecord'){
      const rec = (s.trackRecords||{})[o.trackId];
      return (rec && rec.isPlayer) ? 1 : 0;
    }
    return 0;
  },

  /* Season wins are tracked live only for the player (seasonStats.wins);
     for AI grid drivers we approximate season wins by comparing their
     career win total against a season-start snapshot, so this stays cheap
     and doesn't require tracking a parallel seasonStats object per AI
     driver just for a standings-screen nice-to-have. */
  seasonWinsForDriver(driverId){
    const s = this.state;
    if(!s.seasonStartCareerWins) return 0;
    const drv = s.grid.find(d=>d.id===driverId);
    if(!drv) return 0;
    const startWins = s.seasonStartCareerWins[driverId] || 0;
    return Math.max(0, (drv.careerStats.wins||0) - startWins);
  },

  /* Dynamic upgrade pricing: base price rises 8% per level already owned
     (buying the next level always costs more than the last, same shape as
     the training-cost curve), and a higher Factory facility level softens
     that climb -- this is what FACILITY_EFFECTS.factory's "Reduces future
     upgrade costs" description promises, now actually wired up instead of
     being flavor text with no mechanical effect. Facility upgrades
     themselves use the same rising-price curve but aren't discounted by
     Factory (that would be circular), so they stay a simple, predictable
     long-term investment.

     Car development now belongs to the TEAM (team.upgrades), not the
     player, and money alone isn't enough to buy a level -- every team
     (including the player's) only gets a limited number of development
     SLOTS per season (team.devSlotsUsed vs devSlotsMax), reset at
     startNextSeason but never un-developing existing levels. This is what
     makes development fair across teams: a rich player can't just outspend
     the system, and a poor AI team isn't just "worse forever" -- everyone
     works from the same seasonal budget, scaled only by facility level. */
  carUpgradeCost(key){
    const s = this.state;
    const team = this.getTeam(s.player.teamId);
    const level = (team.upgrades && team.upgrades[key]) || 0;
    const base = 3 * Math.pow(1.08, level);
    const factoryDiscount = 1 - ((s.facilities.factory||1)-1)*0.06; // up to -24% at Factory Lv.5
    return Math.round(base * Math.max(0.7, factoryDiscount) * 10) / 10;
  },
  facilityUpgradeCost(key){
    const s = this.state;
    const level = s.facilities[key]||0;
    return Math.round(4 * Math.pow(1.15, level) * 10) / 10;
  },

  /* Concrete, level-aware description of each facility's real current
     effect -- shown instead of static flavor text so a player can actually
     see the number their money bought, not just take on faith that
     "Boosts fitness training gains" is doing anything. Every multiplier
     here mirrors the exact formula used at the real call site (doTraining()
     in app_actions.js for gym/simulator, devSlotsMax() above for
     engineering, facilityUpgradeCost() above for factory, the mediaBonus
     calc in renderMediaModal() for media, the loyaltyRatePerSeason calc in
     checkSponsorObjectives() for hospitality) so this can never drift out
     of sync with what's actually applied. */
  facilityEffectText(key){
    const level = this.state.facilities[key]||1;
    const pct = (mult) => Math.round((mult-1)*100);
    switch(key){
      case 'gym': {
        const bonus = 1 + (level-1)*0.15;
        return `Fitness training gains ${level>1?`+${pct(bonus)}% right now`:'boosted per level'} (Lv.${level}).`;
      }
      case 'simulator': {
        const bonus = 1 + (level-1)*0.15;
        return `Driving-skill training gains ${level>1?`+${pct(bonus)}% right now`:'boosted per level'} (Lv.${level}).`;
      }
      case 'engineering': {
        const slots = this.devSlotsMax();
        return `${slots} car development slot(s) this season (base 3, +1/level above Lv.1).`;
      }
      case 'factory': {
        const discount = 1 - (level-1)*0.06;
        return `Car upgrade costs ${level>1?`-${pct(2-discount)}% right now`:'cheaper per level'} (up to -24% at Lv.5).`;
      }
      case 'media': {
        const bonus = 1 + (level-1)*0.15;
        return `Good press answers ${level>1?`give +${pct(bonus)}% more media reputation right now`:'give bigger media reputation gains per level'} (up to +60% at Lv.5).`;
      }
      case 'hospitality': {
        const rate = 0.04 + (level-1)*0.005;
        return `Sponsor loyalty pay raises build ${Math.round(rate*100)}%/season right now (up to +40% cap either way).`;
      }
      default:
        return FACILITY_EFFECTS[key] || '';
    }
  },

  /* Engineering facility raises how many development actions the player's
     team can take in a season -- base 3 slots at Lv.1, +1 slot per
     Engineering level above 1 (so Lv.5 Engineering gives 7 slots/season).
     This is FACILITY_EFFECTS.engineering's "Speeds up car development"
     promise, now an actual mechanical effect instead of flavor text. AI
     teams don't need a UI for this -- their existing end-of-season
     developTeamsForNewSeason() roll already represents a whole season of
     (equivalently slot-limited) work in one step. */
  devSlotsMax(){
    return 3 + ((this.state.facilities.engineering||1)-1);
  },

  /* Chief Engineer's development recommendation -- pure read-only function
     over state that already exists (team.upgrades, team.reliability,
     team.devSlotsUsed, p.money). Makes no mutations, so it can't desync
     from anything and needs no save-migration path. Priority order:
     1. Reliability, if it's badly lagging the grid average AND the team's
        own reliability upgrade level is also low (real DNF risk).
     2. Otherwise, whichever of aero/engine/chassis/suspension has the
        LOWEST upgrade level relative to the other three -- a simple
        "balance the car" heuristic needing no new state.
     3. If out of development slots this season, say so instead of
        recommending a specific upgrade.
     4. If the recommended upgrade is unaffordable right now, say that too. */
  suggestNextDevelopment(){
    const s = this.state; const p = s.player;
    const team = this.getTeam(p.teamId);
    const upgrades = team.upgrades || {aero:1,engine:1,chassis:1,suspension:1,reliability:1};

    if((team.devSlotsUsed||0) >= this.devSlotsMax()){
      return "We're out of development capacity this season — this will have to wait.";
    }

    const gridAvgReliability = TEAMS.reduce((sum,t)=>sum+t.reliability,0) / TEAMS.length;
    const reliabilityLagging = team.reliability < gridAvgReliability - 1.5 && (upgrades.reliability||0) <= 3;
    let recommendKey;
    if(reliabilityLagging){
      recommendKey = 'reliability';
    } else {
      const carKeys = ['aero','engine','chassis','suspension'];
      recommendKey = carKeys.reduce((lowest,k)=> (upgrades[k]||0) < (upgrades[lowest]||0) ? k : lowest, carKeys[0]);
    }

    const labels = {aero:'Aero', engine:'Engine', chassis:'Chassis', suspension:'Suspension', reliability:'Reliability'};
    if(recommendKey==='reliability'){
      return "Reliability is lagging the field — we're leaving points on the table to DNFs. That should be next.";
    }
    const cost = this.carUpgradeCost(recommendKey);
    if(p.money < cost){
      return `${labels[recommendKey]} is what we need next, but we can't afford it yet ($${cost.toFixed(1)}M).`;
    }
    return `Our ${labels[recommendKey].toLowerCase()} program has fallen behind the rest of the car — that's where I'd spend our next development slot.`;
  },

  renderReleaseAiDriverConfirmModal(driverId){
    const s = this.state; const p = s.player;
    const driver = s.grid.find(d=>d.id===driverId);
    if(!driver){ this.renderOwnerHQScreen(); return; }
    const cost = this.releaseAiDriverCost();
    this.openModal(`
      ${this.modalHeader('Release Driver?')}
      <div class="section-sub" style="margin-bottom:14px;">Release ${driver.name} and sign a fresh rookie in their place? This costs $${cost.money.toFixed(1)}M in contract buyout and a real hit to team chemistry (-${cost.moraleHit}) — the rest of the garage notices when a driver gets let go. This can't be undone.</div>

        <button class="pbtn" id="btn-confirm-release-ai" style="flex:1; background:var(--candy-red); color:#fff;" ${p.money<cost.money?'disabled':''}>Release ${driver.name}</button>
      </div>
    `);
    this.wireModalClose();
    document.getElementById('btn-cancel-release-ai').onclick = ()=> this.renderOwnerHQScreen();
    document.getElementById('btn-confirm-release-ai').onclick = ()=>{
      if(p.money<cost.money) return;
      const oldName = driver.name;
      p.money = Math.round((p.money-cost.money)*10)/10;
      this.adjustTeamMorale(p.teamId, -cost.moraleHit);
      // Same rivalry-cleanup + fresh-rookie-replacement shape
      // processGridRetirements() (engine.js) already uses for a departing
      // driver -- reused directly rather than duplicated.
      if(s.rivalId === driver.id) s.rivalId = null;
      // Clear this driver out of any owner strategy call queued for THIS
      // weekend -- their replacement hasn't earned a strategy assignment
      // yet, and the old id would otherwise silently point at nobody.
      if(p._ownerAiStrategy && p._ownerAiStrategy[driver.id]) delete p._ownerAiStrategy[driver.id];
      const freshName = generateFreshDriverName(s, driver.teamId);
      const replacement = makeRivalDriver(freshName, driver.teamId);
      replacement.age = randInt(19, 23); // same "replacements always enter as young rookies" convention as every other roster-replacement path
      const idx = s.grid.findIndex(d=>d.id===driver.id);

      this.toast(`📝 ${oldName} has been released. ${replacement.name} joins as their replacement.`);
      this.pushNews(`📝 ${oldName} released by ${this.getTeam(p.teamId).name}. Rookie ${replacement.name} steps in.`);
      p.journal.unshift({season:s.season, week:s.week, title:'Driver Released', text:`Released ${oldName} from the team and signed ${replacement.name} as a fresh rookie replacement.`, icon:'📝'});
      this.closeModal();
      this.saveState();
      this.renderOwnerHQScreen();
    };
  },

  /* ---------------- CONTRACT RELEASE CLAUSE (feature idea #9) ----------------
     Mid-contract "request a release" action: gives the player agency to
     proactively end their current contract (for a real money + reputation
     cost) instead of only ever reacting to unsolicited scouting offers
     (checkScoutingInterest(), engine.js). Deliberately gated to contracts
     with 2+ years remaining (a final-year contract is already heading to
     open Contract Offers naturally) and to once per contract
     (p.releaseClauseUsedThisContract, reset on every new contract signed --
     see the two rebalanceGridForTeamChange call sites in
     renderScoutingOfferModal()/renderContractOffersModal(), which both
     already reset joinedTeamOnSeason on a genuine switch; this flag follows
     the same reset points). */
  renderReleaseClauseSection(){
    const s = this.state; const p = s.player;
    if(p.contract.years < 2) return '';
    if(p.releaseClauseUsedThisContract) return `<div class="section-sub" style="margin-top:8px; color:var(--ink-soft);">You've already used your release request with this team.</div>`;
    const cost = this.releaseClauseCost();
    return `
      <div class="pixel-panel" style="margin:10px 0 0; border-color:var(--candy-red);">
        <div class="section-sub" style="margin:0 0 6px;">Not happy where you are? You can request an early release from your contract — it costs money and some reputation, but puts you back on the open market immediately.</div>
        <button class="pbtn full" id="btn-request-release" ${p.money<cost.money ? 'disabled':''}>📝 Request Release (-$${cost.money.toFixed(1)}M, -${cost.rep} reputation)</button>
      </div>
    `;
  },
  releaseClauseCost(){
    const p = this.state.player;
    // Scales with remaining contract value -- breaking a longer, richer
    // deal costs more than a short one, same "the bigger the promise, the
    // bigger the exit cost" spirit as a real release clause.
    const money = Math.max(3, Math.round(p.contract.salary * p.contract.years * 0.4 * 10)/10);
    const rep = 8;
    return { money, rep };
  },

     journal entry -- no mechanical effect of any kind, same cost/rep numbers
     either way. reasonText is threaded through into
     renderReleaseClauseConfirmModal() so the confirm screen and the journal
     entry it eventually writes both reflect the chosen reason. */
  RELEASE_CLAUSE_REASONS: [
    { id:'creative', label:'Creative differences', journalText:'wanting creative differences with the team' },
    { id:'title', label:'Chasing a title', journalText:'chasing a genuine title shot elsewhere' },

  renderReleaseClauseConfirmModal(reason){
    const s = this.state; const p = s.player;
    const team = this.getTeam(p.teamId);
    const cost = this.releaseClauseCost();
    this.openModal(`
      ${this.modalHeader('Request Release?')}
      <div class="section-sub" style="margin-bottom:14px;">This ends your contract with ${team.name} immediately, costing $${cost.money.toFixed(1)}M and ${cost.rep} media reputation. You'll need to find a new team via Contract Offers. This can't be undone.</div>

        <button class="pbtn" id="btn-cancel-release" style="flex:1;">Cancel</button>

      p.contract.years = 0;
      p.releaseClauseUsedThisContract = true; // reset to false again on the NEXT contract signed via the same reset points joinedTeamOnSeason already uses
      this.toast(`📝 You've requested a release from ${team.name}. Time to find a new seat.`);
      this.pushNews(`📝 ${p.name} requests an early release from ${team.name}.`);
      const reasonText = reason ? reason.journalText : 'wanting a change';
      p.journal.unshift({season:s.season, week:s.week, title:'Release Requested', text:`Paid $${cost.money.toFixed(1)}M to walk away from ${team.name} early, citing ${reasonText}.`, icon:'📝'});

      this.renderContractOffersModal();
    };

  /* ---------------- CAREER STATS ---------------- */
  renderStatsComparisonSection(){
    const s = this.state; const p = s.player;
    const myTeam = this.getTeam(p.teamId);
    const leaderId = Object.entries(s.standings||{}).sort((a,b)=>b[1]-a[1])[0]?.[0];
    const leader = leaderId==='player' ? null : s.grid.find(d=>d.id===leaderId);

    const gridAvg = (key)=>{
      const vals = s.grid.map(d=>d.attributes.driving[key]);
      return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
    };
    const compareKeys = [
      {k:'racePace', label:'Race Pace'},
      {k:'qualifyingPace', label:'Qualifying Pace'},
      {k:'cornering', label:'Cornering'},
      {k:'consistency', label:'Consistency'},
      {k:'tyreManagement', label:'Tyre Management'},
    ];

    const teamsRankedByStrength = [...TEAMS].sort((a,b)=>b.carStrength-a.carStrength);
    const myTeamRank = teamsRankedByStrength.findIndex(t=>t.id===myTeam.id)+1;

    return `
      <div class="section-title" style="margin-top:14px; font-size:10px;">📊 You vs the Grid</div>
      <div class="pixel-panel" style="margin-bottom:8px;">
        <div class="section-sub" style="margin:0 0 8px;">Your driving attributes compared to the grid average${leader?` and current leader ${leader.name}`:''}.</div>
        ${compareKeys.map(({k,label})=>{
          const mine = p.attributes.driving[k];
          const avg = gridAvg(k);
          const leaderVal = leader ? leader.attributes.driving[k] : null;
          const diff = mine-avg;
          const diffColor = diff>=3 ? 'var(--candy-mint)' : diff<=-3 ? '#e6604c' : 'var(--ink-soft)';
          return `<div style="margin-bottom:8px;">
            <div class="flex-between" style="font-size:11px; margin-bottom:3px;">
              <span style="font-weight:700;">${label}</span>
              <span>You: <b>${mine}</b> · Grid avg: ${avg}${leaderVal!==null?` · Leader: ${leaderVal}`:''} <span style="color:${diffColor};">(${diff>=0?'+':''}${diff})</span></span>
            </div>
            ${this.renderPixelBar(mine,'stat')}
          </div>`;
        }).join('')}
      </div>
      <div class="pixel-panel" style="margin-bottom:0;">
        <div class="section-sub" style="margin:0;">Your team, ${myTeam.name}, ranks <b>#${myTeamRank} of ${TEAMS.length}</b> on car strength (${myTeam.carStrength}). Visit the Team & Car screen's Grid Pecking Order for the full ranking.</div>
      </div>
    `;
  },
