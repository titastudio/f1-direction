<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Formula One Direction — Pocket Racing Life</title>
<style>
/* ============================================================
   FORMULA ONE DIRECTION — PIXEL/TAMAGOTCHI STYLE SHEET
   Palette: LCD mint shell, cream screen, candy accents
   Type: pixel display face for headers/numbers, rounded body face for text
   Signature: circular "pod" screen that always centers the driver sprite
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap');

:root{
  --shell:#bfe3c9;
  --shell-dark:#9fcdae;
  --shell-shadow:#7fb090;
  --screen-bg:#fdf6e8;
  --screen-edge:#3a3a3a;
  --ink:#3a3226;
  --ink-soft:#8a8071;
  --pod-ring:#4a4238;
  --candy-pink:#ff8fab;
  --candy-yellow:#ffd23d;
  --candy-mint:#5ee6b8;
  --candy-blue:#6fb7ff;
  --candy-purple:#b98fff;
  --candy-red:#ff6b6b;
  --pixel-border:#3a3226;

  --font-pixel:'Press Start 2P', monospace;
  --font-body:'Nunito', sans-serif;
}

*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:linear-gradient(180deg,#e7d9b8,#d8c49a);
  color:var(--ink);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  image-rendering:pixelated;
}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--shell-shadow); border-radius:4px;}

/* ============ DEVICE SHELL ============ */
#device{
  width:100%;
  max-width:430px;
  height:100vh;
  height:100dvh;
  margin:0 auto;
  background:var(--shell);
  position:relative;
  display:flex;
  flex-direction:column;
  border-left:6px solid var(--shell-dark);
  border-right:6px solid var(--shell-dark);
  box-shadow:0 0 0 3px var(--pixel-border), 0 10px 40px rgba(0,0,0,0.35);
}
@media (min-width:431px){
  body{ display:flex; align-items:center; justify-content:center; }
  #device{ height:92vh; max-height:900px; border-radius:28px; overflow:hidden; border:6px solid var(--shell-dark); }
}

/* pixel corner studs, purely decorative device detail — kept clear of the
   status strip's text by pinning them to the very top of #device (above
   the strip's own box) rather than overlapping its content area. */
#device::before, #device::after{
  content:'';
  position:absolute;
  top:2px;
  width:6px; height:6px;
  background:var(--shell-shadow);
  box-shadow:2px 0 0 var(--shell-shadow);
  z-index:5;
}
#device::before{ left:6px; }
#device::after{ right:6px; }

/* ============ TOP STATUS STRIP (pixel LCD readout) ============ */
#status-strip{
  background:var(--screen-edge);
  color:#d7f7c8;
  font-family:var(--font-pixel);
  font-size:8.5px;
  padding:8px 20px;
  display:flex;
  align-items:center;
  gap:8px;
  border-bottom:3px solid var(--pixel-border);
  white-space:nowrap;
  flex-shrink:0;
  position:relative;
  z-index:1;
}
#status-strip .stat-row{ display:flex; align-items:center; gap:8px; overflow:hidden; min-width:0; }
#status-strip .stat-chip{ display:flex; align-items:center; gap:3px; flex-shrink:0; }
#status-strip .stat-chip .ic{ font-size:10px; }
#status-strip .spacer{ flex:1; min-width:4px; }
#status-strip .day-chip{ color:var(--candy-yellow); flex-shrink:0; }

/* ============ TICKER ============ */
#ticker{
  background:#2d2d2d;
  color:#9adfc0;
  font-family:var(--font-pixel);
  font-size:7.5px;
  padding:5px 0;
  overflow:hidden;
  white-space:nowrap;
  border-bottom:3px solid var(--pixel-border);
  flex-shrink:0;
}
#ticker-inner{
  display:inline-block;
  padding-left:100%;
  animation:ticker-move 22s linear infinite;
}
@keyframes ticker-move{ from{transform:translateX(0);} to{transform:translateX(-100%);} }
#ticker-inner span{ margin-right:40px; }

/* ============ MAIN SCREEN AREA ============ */
#screen{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  background:var(--screen-bg);
  padding:14px 12px 90px;
  position:relative;
}
#screen::-webkit-scrollbar{width:6px;}

/* ============ SIGNATURE: THE POD ============
   A circular screen-in-screen that always shows the driver.
   Present on the home/hub view, pinned near the top. */
.pod-wrap{
  display:flex;
  justify-content:center;
  margin:6px 0 14px;
}
.pod{
  width:150px; height:150px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ffffff, var(--screen-bg) 60%, #eee0c4 100%);
  border:5px solid var(--pod-ring);
  box-shadow:
    inset 0 0 0 3px #fff,
    inset 0 6px 14px rgba(0,0,0,0.08),
    0 6px 0 var(--shell-shadow),
    0 8px 14px rgba(0,0,0,0.25);
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
}
.pod:active{ transform:translateY(3px); box-shadow: inset 0 0 0 3px #fff, inset 0 6px 14px rgba(0,0,0,0.08), 0 3px 0 var(--shell-shadow); }
/* Smaller pod variant for use inside modals (e.g. Driver Profile) — the
   ring/shadow thicknesses are scaled down to match, so it reads as one
   cohesive bezel instead of two visually separate circles like the
   full-size pod's fixed-pixel rings would at a smaller diameter. */
.pod-sm{
  width:96px; height:96px;
  border-width:3px;
  box-shadow:
    inset 0 0 0 2px #fff,
    inset 0 4px 9px rgba(0,0,0,0.08),
    0 4px 0 var(--shell-shadow),
    0 5px 9px rgba(0,0,0,0.22);
}
.pod-sm .pod-sprite{ font-size:38px; }
.pod-sprite{
  font-size:64px;
  animation:pod-bounce 2.4s ease-in-out infinite;
  filter:drop-shadow(0 4px 2px rgba(0,0,0,0.15));
  user-select:none;
}
@keyframes pod-bounce{
  0%,100%{ transform:translateY(0) scaleX(1); }
  45%{ transform:translateY(-7px) scaleX(1); }
  50%{ transform:translateY(-8px) scaleX(1.03); }
  55%{ transform:translateY(-7px) scaleX(1); }
}
/* Bugfix: this previously sat at bottom-right (bottom:-2px; right:2px),
   almost exactly overlapping #pod-profile-btn (the 🎨 customize button,
   also positioned near the pod's bottom-right corner) -- confirmed via a
   live geometry check: the two elements' bounding boxes were only a few
   pixels apart, both ~32-34px, reading as one messy overlapping cluster
   rather than two distinct controls. Moved to top-right instead, a
   natural "status indicator" spot that's clear of every other pod
   control (profile button stays bottom-right, the optional colorway
   swatch badge stays bottom-left -- see the second .pod-mood-badge use
   in renderHub(), app_hub.js). */
.pod-mood-badge{
  position:absolute;
  top:-2px; right:2px;
  background:var(--candy-yellow);
  border:3px solid var(--pixel-border);
  border-radius:50%;
  width:34px; height:34px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
}
.pod-name-tag{
  text-align:center;
  margin-top:8px;
}
.pod-name-tag .nm{
  font-family:var(--font-pixel);
  font-size:11px;
  color:var(--ink);
}
.pod-name-tag .sub{
  font-size:11px;
  color:var(--ink-soft);
  margin-top:4px;
  font-weight:700;
}

/* editable name pill (used for player AND every NPC) */
.editable-name{
  display:inline-flex;
  align-items:center;
  gap:5px;
  cursor:pointer;
  border-bottom:2px dashed var(--ink-soft);
  padding:1px 2px;
}
.editable-name .pencil{ font-size:11px; opacity:0.6; }
.editable-name:hover{ border-bottom-color:var(--candy-blue); }

/* ============ PIXEL PANELS ============ */
.pixel-panel{
  background:#fff;
  border:3px solid var(--pixel-border);
  border-radius:10px;
  box-shadow:0 4px 0 var(--pixel-border);
  padding:12px;
  margin-bottom:14px;
  position:relative;
}
.panel-title{
  font-family:var(--font-pixel);
  font-size:9px;
  color:var(--ink);
  margin-bottom:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.panel-title .tag{
  font-family:var(--font-body);
  font-weight:800;
  font-size:9.5px;
  background:var(--candy-yellow);
  border:2px solid var(--pixel-border);
  border-radius:6px;
  padding:2px 6px;
}

/* ============ PIXEL BUTTONS ============ */
.pbtn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-family:var(--font-pixel);
  font-size:9.5px;
  color:var(--ink);
  background:#fff;
  border:3px solid var(--pixel-border);
  border-radius:8px;
  padding:11px 12px;
  box-shadow:0 4px 0 var(--pixel-border);
  transition:transform 0.08s, box-shadow 0.08s;
  white-space:nowrap;
}
.pbtn:active{ transform:translateY(4px); box-shadow:0 0 0 var(--pixel-border); }
.pbtn.full{ width:100%; }
.pbtn.gold{ background:var(--candy-yellow); }
.pbtn.pink{ background:var(--candy-pink); color:#5c1730; }
.pbtn.mint{ background:var(--candy-mint); }
.pbtn.blue{ background:var(--candy-blue); color:#0b2c52; }
.pbtn.purple{ background:var(--candy-purple); color:#33115c; }
.pbtn.small{ padding:7px 10px; font-size:8px; box-shadow:0 3px 0 var(--pixel-border); }
.pbtn.small:active{ transform:translateY(3px); box-shadow:0 0 0 var(--pixel-border); }
.pbtn:disabled{ opacity:0.4; pointer-events:none; }
.pbtn-row{ display:flex; gap:8px; flex-wrap:wrap; }

/* ============ PIXEL BARS ============ */
.pixel-bar-row{ margin-bottom:9px; }
.pixel-bar-row .lbl-line{
  display:flex; justify-content:space-between;
  font-size:10.5px; font-weight:700; margin-bottom:4px; color:var(--ink);
}
.pixel-bar-row .lbl-line .v{ font-family:var(--font-pixel); font-size:8px; color:var(--ink-soft); }
.pixel-bar-track{
  height:16px;
  background:#eee0c4;
  border:2px solid var(--pixel-border);
  border-radius:4px;
  overflow:hidden;
  display:flex;
  align-items:stretch;
  padding:2px;
  gap:1px;
  box-sizing:border-box;
}
.pixel-bar-seg{
  flex:1 1 0;
  height:12px;
  background:#e6d8ba;
  border-radius:1px;
}
.pixel-bar-seg.on.energy{ background:var(--candy-blue); }
.pixel-bar-seg.on.mood{ background:var(--candy-yellow); }
.pixel-bar-seg.on.stress{ background:var(--candy-red); }
.pixel-bar-seg.on.stat{ background:var(--candy-mint); }
.pixel-bar-seg.on.confidence{ background:var(--candy-purple); }

/* ============ CHIP / PILL ============ */
.chip{
  display:inline-block;
  font-size:10px;
  font-weight:800;
  padding:4px 9px;
  border-radius:20px;
  background:#f2eadb;
  border:2px solid var(--pixel-border);
  color:var(--ink);
}
.chip.gold{ background:var(--candy-yellow); }
.chip.pink{ background:var(--candy-pink); }
.chip.mint{ background:var(--candy-mint); }
.chip.blue{ background:var(--candy-blue); }
.chip.purple{ background:var(--candy-purple); color:#fff; }
.chip.red{ background:var(--candy-red); color:#fff; }

/* ============ BOTTOM NAV ============ */
#bottom-nav{
  position:absolute;
  bottom:0; left:0; right:0;
  background:var(--screen-edge);
  border-top:3px solid var(--pixel-border);
  display:flex;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  gap:4px;
  z-index:20;
}
.nav-item{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  padding:6px 2px;
  border-radius:8px;
  color:#8fae9a;
  background:transparent;
  border:none;
}
.nav-item .nicon{ font-size:18px; }
.nav-item .nlbl{ font-family:var(--font-pixel); font-size:6.5px; }
.nav-item.active{ background:#3f3f3f; color:var(--candy-yellow); }

/* ============ MODAL ============ */
.modal-overlay{
  position:absolute;
  inset:0;
  background:rgba(20,20,20,0.55);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  z-index:100;
}
.modal{
  background:var(--screen-bg);
  border:3px solid var(--pixel-border);
  border-radius:16px 16px 0 0;
  width:100%;
  max-height:82%;
  display:flex;
  flex-direction:column;
  padding:0;
  box-shadow:0 -4px 0 var(--pixel-border);
  animation:modal-rise 0.22s ease;
  overflow:hidden;
}
@keyframes modal-rise{ from{transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;} }
/* Subtle first-appearance animation for warning-style inline elements (dev
   slots, contract clause warnings) -- gentler/shorter than modal-rise since
   these appear inline within an already-open screen, not as their own
   modal. Gated by a JS-side "have I shown this warning before" flag so it
   only plays once per warning instance, not on every re-render. */
.warn-appear{ animation:warn-fade-in 0.35s ease; }
@keyframes warn-fade-in{ from{opacity:0; transform:translateY(-3px);} to{opacity:1; transform:translateY(0);} }
@media (min-width:431px){
  .modal-overlay{ align-items:center; }
  .modal{ border-radius:16px; max-width:380px; box-shadow:0 6px 0 var(--pixel-border); }
}
.modal-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 16px 12px;
  flex-shrink:0;
  border-bottom:2px solid #eee0c4;
  background:var(--screen-bg);
}
.modal-header h3{ font-family:var(--font-pixel); font-size:11px; }
.modal-body{
  overflow-y:auto;
  padding:14px 16px 16px;
}
.modal-close{
  width:28px; height:28px;
  border:2px solid var(--pixel-border);
  border-radius:6px;
  background:var(--candy-red);
  color:#fff;
  font-size:14px;
  line-height:1;
  box-shadow:0 3px 0 var(--pixel-border);
  flex-shrink:0;
}
.modal-close:active{ transform:translateY(3px); box-shadow:none; }

/* ============ TOAST ============ */
.toast-wrap{
  position:absolute;
  top:70px; left:0; right:0;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  z-index:200; pointer-events:none;
  padding:0 14px;
}
.toast{
  background:#fff;
  border:3px solid var(--pixel-border);
  border-radius:10px;
  box-shadow:0 4px 0 var(--pixel-border);
  padding:9px 14px;
  font-size:12px;
  font-weight:700;
  max-width:100%;
}

/* ============ FORM ELEMENTS ============ */
.field-label{ font-family:var(--font-pixel); font-size:8px; color:var(--ink-soft); margin-bottom:6px; display:block; }
input[type=text]{
  width:100%;
  padding:11px 12px;
  border:3px solid var(--pixel-border);
  border-radius:8px;
  background:#fff;
  font-size:14px;
  font-weight:700;
  color:var(--ink);
}
input[type=text]:focus{ outline:2px solid var(--candy-blue); }
select{
  width:100%;
  padding:11px 12px;
  border:3px solid var(--pixel-border);
  border-radius:8px;
  background:#fff;
  font-size:13px;
  font-weight:700;
}
input[type=range]{
  width:100%; height:10px; border-radius:5px;
  -webkit-appearance:none; appearance:none;
  background:#eee0c4;
  border:2px solid var(--pixel-border);
}
/* Chrome/WebKit position a custom-styled (-webkit-appearance:none) thumb's
   CENTER across the range [thumbRadius, trackWidth-thumbRadius], not across
   the full 0-100% width — the thumb is a physical object inset by its own
   radius, same as any native slider. Our custom visual track/hint-band
   overlay needs to be inset by that same 10px (half the 20px thumb) on each
   side, or the overlay reads as edge-to-edge while the thumb visually stops
   short of it, making the thumb look permanently off-center. */
.setup-track-wrap{ position:relative; padding:0 10px; }
.setup-track-wrap input[type=range]{ position:relative; z-index:2; background:transparent; border-color:transparent; padding:0; }
.setup-track-wrap .setup-track-base{ position:absolute; top:0; left:10px; right:10px; height:10px; border-radius:5px; background:#eee0c4; border:2px solid var(--pixel-border); z-index:0; }
.setup-hint-band{ position:absolute; top:-2px; height:14px; border-radius:5px; pointer-events:none; z-index:1; background:var(--candy-mint); opacity:0.4; }
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none; appearance:none;
  width:20px; height:20px; border-radius:50%;
  background:var(--candy-pink);
  border:3px solid var(--pixel-border);
  cursor:pointer;
}
input[type=range]::-moz-range-thumb{
  width:20px; height:20px; border-radius:50%;
  background:var(--candy-pink); border:3px solid var(--pixel-border); cursor:pointer;
}
.slider-row{ margin-bottom:14px; }
.slider-row .top-line{ display:flex; justify-content:space-between; margin-bottom:6px; font-size:11px; font-weight:700; }
.slider-row .sval{ font-family:var(--font-pixel); font-size:9px; color:var(--candy-blue); }

/* ============ OPTION GRID (creation flow) ============ */
.option-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:8px; }
.option-card{
  padding:10px 8px;
  background:#fff;
  border:3px solid var(--pixel-border);
  border-radius:8px;
  text-align:center;
  font-size:11px;
  font-weight:700;
  box-shadow:0 3px 0 var(--pixel-border);
}
.option-card.selected{ background:var(--candy-yellow); }

/* ============ GENERIC HELPERS ============ */
.section-title{ font-family:var(--font-pixel); font-size:12px; margin-bottom:4px; }
.section-sub{ font-size:11.5px; color:var(--ink-soft); margin-bottom:12px; font-weight:600; }
.flex-between{ display:flex; align-items:center; justify-content:space-between; }
.grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stack-8{ display:flex; flex-direction:column; gap:8px; }
.empty-state{ text-align:center; padding:30px 10px; color:var(--ink-soft); font-size:12px; font-weight:700; }
.empty-state .ic{ font-size:30px; margin-bottom:8px; }
.row-item{
  display:flex; align-items:center; gap:10px;
  padding:9px 4px;
  border-bottom:2px dashed #eee0c4;
  font-size:12px;
}
.row-item:last-child{ border-bottom:none; }
.row-item .rname{ flex:1; font-weight:800; }
.row-item .rmeta{ color:var(--ink-soft); font-size:10.5px; }

/* headline card (newspaper feel, still pixel-bordered) */
.headline-card{
  background:#fff8e6;
  border:3px solid var(--pixel-border);
  border-radius:10px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 4px 0 var(--pixel-border);
}
.headline-card .kicker{ font-family:var(--font-pixel); font-size:7px; color:var(--candy-red); margin-bottom:6px; }
.headline-card h3{ font-family:var(--font-pixel); font-size:12px; line-height:1.5; margin-bottom:6px; }
.headline-card p{ font-size:12px; color:var(--ink); line-height:1.4; }

/* boot / creation screens */
.boot-wrap{
  min-height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:24px; text-align:center; padding:24px;
}
.boot-title{ font-family:var(--font-pixel); font-size:22px; line-height:1.5; }
.boot-title .accent{ color:var(--candy-pink); }
.boot-sprite{ font-size:70px; animation:pod-bounce 2.4s ease-in-out infinite; }
.boot-eyebrow{ font-size:11px; font-weight:800; color:var(--ink-soft); letter-spacing:0.5px; }

.create-wrap{ padding-bottom:20px; }

/* responsive tweaks for very small screens */
@media (max-width:360px){
  .pod{ width:130px; height:130px; }
  .pod-sprite{ font-size:54px; }
  #status-strip{ font-size:7.5px; gap:7px; }
}

</style>
</head>
<body>
  <div id="device">
    <div id="status-strip"></div>
    <div id="ticker"><div id="ticker-inner"></div></div>
    <div id="screen"></div>
    <div id="bottom-nav">
      <button class="nav-item active" data-nav="home"><span class="nicon">🏠</span><span class="nlbl">HOME</span></button>
      <button class="nav-item" data-nav="race"><span class="nicon">🏁</span><span class="nlbl">RACE</span></button>
      <button class="nav-item" data-nav="training"><span class="nicon">💪</span><span class="nlbl">TRAIN</span></button>
      <button class="nav-item" data-nav="team"><span class="nicon">🔧</span><span class="nlbl">TEAM</span></button>
      <button class="nav-item" data-nav="social"><span class="nicon">👥</span><span class="nlbl">SOCIAL</span></button>
      <button class="nav-item" data-nav="career"><span class="nicon">📊</span><span class="nlbl">STATS</span></button>
    </div>
  </div>

<script>/* ============================================================
   FORMULA ONE DIRECTION — DATA LAYER
   ============================================================ */

function clamp(v,min=0,max=100){ return Math.max(min,Math.min(max,v)); }
function rand(min,max){ return Math.random()*(max-min)+min; }
function randInt(min,max){ return Math.floor(rand(min,max+1)); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function uid(prefix='id'){ return prefix+'_'+Math.random().toString(36).slice(2,10); }

/* devTrend shapes each team's season-over-season development personality:
   ambition = average yearly car-strength drift target (can be negative for decline)
   volatility = how much a given season's roll can swing from that target (boom/bust risk)
   reliabilityFocus = how much of their development budget leans into reliability vs pure pace */

/* ---------- Per-team car development state ----------
   Development upgrades (aero/engine/chassis/suspension/reliability, each
   1-10) now belong to the TEAM, not the player -- joining a team means
   inheriting whatever that team has already built (or not built), exactly
   like a real F1 seat change. Seeded once from each team's tier so bigger
   teams start further along, then persists and keeps compounding across
   seasons (development is never wiped -- see startNextSeason's devSlots
   reset, which restores the SEASON'S BUDGET of upgrade actions, not the
   upgrades themselves). buildInitialTeamUpgrades() is deterministic given a
   team's tier so it's safe to call once at TEAMS-definition time. */
function buildInitialTeamUpgrades(tier){
  const base = tier===1 ? 5 : tier===2 ? 3 : 1;
  return { aero:base, engine:base, chassis:base, suspension:base, reliability:base };
}
TEAMS.forEach(t=>{ t.upgrades = buildInitialTeamUpgrades(t.tier); t.devSlotsUsed = 0; });

/* Difficulty gates which starting teams are selectable in character
   creation -- Casual opens everything (lower-stakes, play whoever you
   like), Standard locks only the very top tier (tier 1) until you've
   proven yourself in a career, Realistic locks both tier 1 and tier 2 so
   a Realistic career always starts from the back of the grid and has to
   earn its way up, matching how the difficulty already sharpens every
   other part of the sim (see DIFFICULTY_SETTINGS below). */
function teamUnlockedForDifficulty(team, difficulty){
  if(difficulty==='Casual') return true;
  if(difficulty==='Realistic') return team.tier>=3;
  return team.tier>=2; // Standard
}

/* ---------- FIA regulation eras ----------
   Every few seasons, the FIA introduces a new technical regulation set —
   modeled here as a shift in how much the previous grid order "resets."
   A major reg change (new aero/power-unit rules) shakes up the competitive
   order: strong teams can fall behind if they misread the new rules, and
   weaker teams get a real chance to leapfrog forward. This is layered on
   top of (not a replacement for) each team's own devTrend personality from
   the normal season-to-season development system. Fully deterministic
   schedule (every 3rd year starting year 3) with a bounded random reshuffle
   magnitude — no AI, just a bigger one-time variance roll. */
const FIA_REGULATION_CYCLE_YEARS = 3;

function isRegulationChangeYear(careerYearNum){
  return careerYearNum > 1 && (careerYearNum - 1) % FIA_REGULATION_CYCLE_YEARS === 0;
}

   fresh roll every time the profile is opened would make it feel random
   rather than like an actual origin story. Picked by how the rivalry
   actually formed (head-to-head record at crowning time) so it reads as a
   real callback rather than a disconnected flavor line. */

/* p.traits/p.reputationArchetypes were previously read only for a display
   badge (Career Stats screen) -- this is the first real mechanical hook for
   either: a popularity-flavored reputation (the "Fan Favorite" trait or the
   "People's Champion" archetype, both driven by fanPopularity) lets a driver
   access tier-2 sponsors a little earlier than the strict podium gate alone
   would allow, since a tier-2 popularity-flavored deal (needsPopularity:true
   in SPONSOR_POOL) is fundamentally about audience reach, not race results --
   a driver who's already a crowd favorite is a legitimate fit even without
   a podium yet. Tier-2 deals WITHOUT needsPopularity still require the
   normal podium gate; this only widens the popularity-specific lane.
   mediaReputation gets the same treatment via the "Media Darling" archetype
   (mediaReputation>=80, data.js REPUTATION_ARCHETYPES) -- mediaReputation was
   otherwise write-only outside its one badge check, so this mirrors the
   fanPopularity hook exactly rather than inventing a separate mechanic. */
function sponsorTierUnlocked(tier, careerStats, player){
  if(tier<=1) return true;
  if(tier===2){
    if((careerStats.podiums||0) >= 1) return true;
    if(player && ((player.traits||[]).includes('Fan Favorite') || (player.reputationArchetypes||[]).includes('peopleschamp'))) return true;
    if(player && (player.reputationArchetypes||[]).includes('mediadarling')) return true;
    return false;
  }
  if(tier===3) return (careerStats.wins||0) >= 1;
  if(tier===4) return (careerStats.podiums||0) >= 5;
  return false;
}

/* Per-SPONSOR unlock check, layered on top of sponsorTierUnlocked()'s
   per-TIER check above. Feature idea #15's Circuitworks entry
   (SPONSOR_POOL) sets needsSimRacingRep:true and must ONLY unlock via a
   real sim-racing following (p.simRacingRep>=40, built up through Free
   Time's Sim Racing activity) -- NOT via the normal tier-2 podium/
   popularity gates sponsorTierUnlocked() already grants everyone else,
   which would let it unlock too early for a driver who's never touched
   sim racing at all. Every other sponsor is untouched -- this only adds a
   stricter override for entries that explicitly opt into one. */
function sponsorUnlocked(sponsor, careerStats, player){
  if(sponsor.needsSimRacingRep) return !!(player && (player.simRacingRep||0) >= 40);
  return sponsorTierUnlocked(sponsor.tier, careerStats, player);
}

/* ---------- Performance-clause contracts ----------
   Higher-tier teams (the ones with the most to lose from an underperforming
   driver) sometimes attach a performance clause to a contract offer.
   Checked once per season in handleSeasonEnd(); if unmet, the contract is
   forced to expire early (years set to 0) instead of running its full
   term, triggering the normal contract-offer flow but from a visibly worse
   negotiating position (see handleSeasonEnd's clause-check block).
   Deliberately simple boolean pass/fail per clause, checked against
   season-level stats that already exist (no new state needed beyond the
   clause object itself living on p.contract). */
const CONTRACT_CLAUSES = ['top10points', 'beatTeammate', 'podium'];
function pickContractClause(team, player){
  // Only tier 1-2 teams attach performance clauses -- lower tiers are just
  // happy to have a driver at all, matching the real-world pattern of big
  // teams demanding results and smaller ones being more forgiving.
  if(team.tier>2) return null;
  // A veteran driver negotiates softer terms -- Composed Veteran halves the
  // base clause chance (50% -> 25%) rather than eliminating it outright,
  // since even a respected veteran can still be asked to prove themselves.
  const isVeteran = player && (player.traits||[]).includes('Composed Veteran');
  const clauseChance = isVeteran ? 0.25 : 0.5;
  if(Math.random()>clauseChance) return null; // not every top-tier offer comes with a clause
  return { type: pick(CONTRACT_CLAUSES), met: null }; // met stays null until checked at season end
}
function contractClauseText(clause){
  if(!clause) return null;
  if(clause.type==='top10points') return 'Clause: finish Top 10 in the championship';
  if(clause.type==='beatTeammate') return "Clause: out-score your teammate at least once";
  if(clause.type==='podium') return 'Clause: score at least one podium';
  return null;
}
/* Returns true (met) or false (missed). standing is passed in explicitly
   (rather than reaching into App from here) to keep data.js free of any
   dependency on the App singleton, matching how every other pure-logic
   helper in this file works. Fails safe (assumes met) for an unrecognized
   clause type rather than punishing the player for a clause the game
   doesn't know how to check. */
function checkContractClauseMet(clause, state, standing){
  if(!clause) return true;
  if(clause.type==='top10points') return standing<=10;
  if(clause.type==='beatTeammate') return !!state.seasonStats.beatTeammate;
  if(clause.type==='podium') return (state.seasonStats.podiums||0) >= 1;
  return true;
}

/* Given the current season number, the season the career started in, and how
   many rounds have been completed in total across the whole career, returns
   which cosmetic ids are currently unlocked. Purely a function of career
   progress — same inputs always produce the same unlocked set. */
function computeUnlockedCosmetics(careerStartSeason, currentSeason, totalRoundsCompletedThisSeason){
  const seasonOffset = currentSeason - careerStartSeason;
  return COSMETIC_POOL.filter(c=>{
    if(c.seasonOffset < seasonOffset) return true;
    if(c.seasonOffset > seasonOffset) return false;
    return totalRoundsCompletedThisSeason >= c.unlockRound;
  }).map(c=>c.id);
}

function pickQuizQuestions(theme, count, recentlySeenIds, trackId){
  const themePool = QUIZ_QUESTIONS.filter(q => q.theme===theme || theme==='any');
  // Track-specific questions (q.trackId set) only ever enter the pool when
  // trackId is passed AND matches -- otherwise they're excluded entirely,
  // so a Monaco-specific question can never surface at Monza. General
  // questions (no trackId) are always eligible regardless, giving a mix
  // rather than an all-track-trivia quiz.
  const pool = themePool.filter(q => !q.trackId || q.trackId===trackId);
  const fresh = pool.filter(q => !(recentlySeenIds||[]).includes(q.id));
  const source = fresh.length >= count ? fresh : pool; // fall back to full pool if we've exhausted fresh ones
  const shuffled = [...source].sort(()=>Math.random()-0.5);
  return shuffled.slice(0, count);
}

function randomName(gender){
  const n = pick(NATIONALITIES);
  const firstsM = ['Alex','Sam','Jordan','Riley','Casey','Morgan','Taylor','Drew','Robin','Skyler'];
  const firstsF = ['Ava','Mia','Zoe','Lena','Sofia','Ivy','Nora','Priya','Elena','Chloe'];
  const lasts = ['Reyes','Novak','Hart','Quinn','Ashby','Cole','Marsh','Vance','Ryder','Finch'];
  const firsts = gender==='F' ? firstsF : gender==='M' ? firstsM : pick([...firstsM, ...firstsF]);
  return pick(firsts)+' '+pick(lasts);
}

   FORMULA ONE DIRECTION — ENGINE LAYER
   ============================================================ */

function createDriverAttributes(baseSkill){
  const jitter = ()=> clamp(baseSkill + randInt(-12,12));
  return {
    driving: {
      racePace: jitter(), qualifyingPace: jitter(), cornering: jitter(), braking: jitter(),
      starts: jitter(), overtaking: jitter(), defending: jitter(), wetSkill: jitter(),
      tyreManagement: jitter(), fuelSaving: jitter(), consistency: jitter(), reaction: jitter(),
    },
    mental: { confidence: jitter(), focus: jitter(), pressure: jitter(), leadership: jitter(), discipline: jitter(), adaptability: jitter() },
    lifestyle: { fitness: jitter(), mood: 70, stress: 20, energy: 100 },
  };
}

function overallRating(attrs){
  const d = attrs.driving, m = attrs.mental;
  const driveAvg = Object.values(d).reduce((a,b)=>a+b,0)/Object.keys(d).length;
  const mentAvg = Object.values(m).reduce((a,b)=>a+b,0)/Object.keys(m).length;
  return Math.round(driveAvg*0.7 + mentAvg*0.3);
}

function makeRivalDriver(name, teamId){
  const team = TEAMS.find(t=>t.id===teamId);
  const baseSkill = clamp(50 + (team.carStrength-70)*0.25 + randInt(-8,10));
  // Named team drivers (TEAM_DRIVER_PROFILES, data.js) carry real
  // nationality/age/careerStats instead of a random roll or a zeroed
  // history -- this is what lets the teammate-pick modal show an accurate
  // profile (age/flag/record) BEFORE the driver object even exists, and
  // keeps that same accuracy once the driver is actually generated. A name
  // that doesn't match any profile (fresh rookies, post-retirement
  // replacements) falls back to the original random nationality/age roll
  // and a zeroed careerStats exactly as before -- a genuinely new driver
  // SHOULD start from nothing, same as the player does.
  const profile = (TEAM_DRIVER_PROFILES[teamId]?.drivers || []).find(d=>d.name===name);
  const nation = profile ? profile.nationality : pick(NATIONALITIES);
  const age = profile ? profile.age : randInt(19,36);
  // Only the fields the engine actually reads/writes (starts/wins/podiums/
  // poles/fastestLaps/dnfs/points) go into driver.careerStats itself, same
  // shape every other grid driver already uses -- worldTitles/dns/
  // highestSeasonPoints/highestSeasonYear are display-only extras layered
  // on top (not part of the shape other code expects careerStats to have),
  // so they're kept in a SEPARATE careerLegacy field rather than widening
  // careerStats itself, which several places (e.g. buildHallOfFameEntry(),
  // sponsorTierUnlocked()) iterate/read assuming the original shape.
  const preloaded = profile?.careerStats;
  return {
    id: uid('drv'), name, teamId, age, nationality: nation, flag: FLAG_BY_NATION[nation],
    gender: 'M', // the competitive grid is modeled as all-male, matching RIVAL_DRIVER_NAMES
    drivingStyle: pick(DRIVING_STYLES),
    attributes: createDriverAttributes(baseSkill),
    fanPopularity: randInt(20,60), mediaReputation: randInt(30,70), traits: [],
    careerStats: preloaded
      ? { starts:preloaded.starts||0, wins:preloaded.wins||0, podiums:preloaded.podiums||0, poles:0, fastestLaps:0, dnfs:preloaded.dnfs||0, points:preloaded.points||0 }
      : { starts:0, wins:0, podiums:0, poles:0, fastestLaps:0, dnfs:0, points:0 },
    careerLegacy: preloaded
      ? { worldTitles:preloaded.worldTitles||0, dns:preloaded.dns||0, highestSeasonPoints:preloaded.highestSeasonPoints||0, highestSeasonYear:preloaded.highestSeasonYear||null, rookie:!!preloaded.rookie }
      : null,
    memories: [], rivalryLevel: 0, respect: 50,
    romance: { status:'none', spark:0 },
    headToHead: { wins:0, losses:0 },
  };
}

/* Generates a name for a new AI driver that is guaranteed unique against
   EVERY name currently in use -- the whole grid plus the player -- not just
   one team's own fixed pool. This is the fix for grid duplicate names: each
   team's RIVAL_DRIVER_NAMES pool only has 2 entries and both are normally
   already in use by that team's own two starting drivers, so the old
   per-call-site filters (only excluding the retiring driver's own name, or
   only checking that one team's existing drivers) let duplicates appear
   almost immediately once any retirement/team-switch/legend-driver churn
   happened -- confirmed reproducible from the very first simulated season.
   Preference order: (1) the driver's own team pool, if a name in it isn't
   currently used anywhere: keeps the flavor of "this team has always had
   a Leclerc-and-Bianchi feel" as long as possible; (2) the cross-combined
   fallback pool (484 combinations, see data.js); (3) an extremely unlikely
   last resort of appending a Roman-numeral-style suffix, which only fires
   if literally every combination in both pools is simultaneously in use. */
function generateFreshDriverName(state, teamId){
  const usedNames = new Set(state.grid.map(d=>d.name));
  if(state.player) usedNames.add(state.player.name);
  // Names abandoned at a teammate-pick step (renderTeammatePickModal(),
  // app_core.js -- either at career start or a mid-career team switch) must
  // never resurface, including as a "fresh" replacement for that same team
  // later -- the whole point of the pick is that the other choice is gone
  // for good, not just benched. state.abandonedDriverNames is a flat array
  // (not per-team) since a name is unique across the whole named-roster
  // pool anyway; excluding it everywhere is simpler and no less correct
  // than excluding it only for its original team.
  (state.abandonedDriverNames||[]).forEach(n=> usedNames.add(n));

  const ownPoolCandidates = (RIVAL_DRIVER_NAMES[teamId]||[]).filter(n=>!usedNames.has(n));
  if(ownPoolCandidates.length) return pick(ownPoolCandidates);

  const fallbackCandidates = [];
  for(const first of FALLBACK_FIRST_NAMES){
    for(const last of FALLBACK_LAST_NAMES){
      const candidate = `${first} ${last}`;
      if(!usedNames.has(candidate)) fallbackCandidates.push(candidate);
    }
  }
  if(fallbackCandidates.length) return pick(fallbackCandidates);

  // Last resort -- both pools (2 + up to 484 combinations) are entirely
  // exhausted, which would need an implausibly long, high-churn career.
  let suffix = 2;
  let candidate;
  do { candidate = `${pick(FALLBACK_FIRST_NAMES)} ${pick(FALLBACK_LAST_NAMES)} ${suffix}`; suffix++; } while(usedNames.has(candidate) && suffix < 50);
  return candidate;
}

/* playerTeammateChoice: the name the player picked at the teammate-pick
   step (renderTeammatePickModal(), app_core.js) for their own team. The
   OTHER named driver in that team's TEAM_DRIVER_PROFILES pool is the
   abandoned choice -- deliberately left OUT of the grid entirely (not
   generated, not benched, not available later) and returned as
   `abandonedName` so the caller can record it in state.abandonedDriverNames
   (checked by generateFreshDriverName() below so it can never resurface as
   a "fresh" replacement for that team either). If no explicit choice is
   passed (e.g. any test/dev call site that predates this feature), falls
   back to the original behavior of taking the first listed driver, so nothing
   breaks for callers that haven't been updated. */
function generateGrid(playerTeamId, playerTeammateChoice){
  const grid = [];
  let abandonedName = null;
  for(const team of TEAMS){
    const names = RIVAL_DRIVER_NAMES[team.id];
    if(team.id === playerTeamId){
      // Only generate ONE AI teammate for the player's own team, so the
      // full grid (21 AI + 1 player) totals exactly 22 drivers, matching a
      // real F1 grid.
      const chosen = (playerTeammateChoice && names.includes(playerTeammateChoice)) ? playerTeammateChoice : names[0];
      abandonedName = names.find(n=>n!==chosen) || null;
      grid.push(makeRivalDriver(chosen, team.id));
    } else {
      names.forEach(n=> grid.push(makeRivalDriver(n, team.id)));
    }
  }
  return { grid, abandonedName };
}

/* Keeps the 22-driver grid invariant intact whenever the player signs with
   a different team mid-career (Contract Offers / Scouting). Every team must
   always have exactly 2 race seats total: the player's new team drops from
   2 AI drivers to 1 (the player takes the other seat), and the team the
   player is LEAVING gains a fresh AI driver back up to 2 (their old seat
   needs a new occupant). Without this, switching teams silently grows the
   grid past 22 and leaves the old team a driver short.
   keepDriverId: which of the new team's two EXISTING AI drivers the player
   picked to keep as their teammate (renderTeammatePickModal(), app_core.js
   -- mid-career switch variant). The driver NOT picked is removed from the
   grid entirely -- same hard removal the automatic lowest-points-first drop
   always did before this feature existed (this function's own original
   behavior, still the fallback below), just with an explicit choice of
   which driver now instead of an automatic one. They are NOT reassigned to
   another team or otherwise preserved -- the team the player is LEAVING
   gets a completely separate, freshly-generated rookie for their vacated
   seat, not the dropped driver reappearing there. If keepDriverId isn't
   passed or doesn't match either of the new team's drivers, falls back to
   the original lowest-points-first automatic behavior so nothing breaks for
   any call site that hasn't been updated to the manual-pick flow. */
function rebalanceGridForTeamChange(state, oldTeamId, newTeamId, keepDriverId){
  if(oldTeamId === newTeamId) return;

  // Drop one AI driver from the new team -- either the one NOT chosen to
  // keep (manual pick), or, absent an explicit choice, the one with the
  // fewest championship points so far (original automatic behavior).
  const newTeamDrivers = state.grid.filter(d=>d.teamId===newTeamId);
  if(newTeamDrivers.length >= 2){
    let toRemove;
    if(keepDriverId && newTeamDrivers.some(d=>d.id===keepDriverId)){
      toRemove = newTeamDrivers.find(d=>d.id!==keepDriverId);
    } else {
      toRemove = newTeamDrivers.slice().sort((a,b)=>(state.standings[a.id]||0)-(state.standings[b.id]||0))[0];
    }
    state.grid = state.grid.filter(d=>d.id!==toRemove.id);
    if(state.rivalId === toRemove.id) state.rivalId = null;
  }

  // Give the old team a fresh AI driver back, entering as a young rookie —
  // this is the seat the player just vacated.
  const oldTeamDrivers = state.grid.filter(d=>d.teamId===oldTeamId);
  if(oldTeamDrivers.length < 2){
    const freshName = generateFreshDriverName(state, oldTeamId);
    const replacement = makeRivalDriver(freshName, oldTeamId);
    replacement.age = randInt(19, 23);
    state.grid.push(replacement);
  }
}

function createPlayer(config){
  const baseSkill = 42;
  return {
    id:'player', name: config.name || 'Rookie Driver', gender: config.gender, nationality: config.nationality,
    flag: FLAG_BY_NATION[config.nationality] || '🏁', age:18, teamId: config.teamId,
    attributes: createDriverAttributes(baseSkill), fanPopularity:10, mediaReputation:50, traits:[],
    reputationArchetypes:[], drivingStyle:null, styleProgress:{},
    contract:{ teamId:config.teamId, years:1, salary:1 }, money:5, homeLevel:1,
    careerStats:{ starts:0, wins:0, podiums:0, poles:0, fastestLaps:0, dnfs:0, points:0, wetWins:0 },
    trackFamiliarity:{}, sponsors:[], sponsorHistory:[], milestones:[], journal:[],
    seasonAwardsWon:[], retired:false, difficulty: config.difficulty || 'Standard',
    setupTrainingByTrack:{}, trainingActionsThisWeek:0, trainingWeekTracker:undefined, unlockedSponsorTiers:[1],
    protege: null, // {name, nationality, flag, mentorProgress:0-100, graduated:false} -- see makeProtege()/mentorProtege() below. homeLevel>=3 required to recruit one (19.8's first real mechanical hook for homeLevel).
    joinedTeamOnSeason: null, // 19.1 #13 -- season the player joined their CURRENT team; set to the career's start season right after creation (app_core.js), and reset on any later team switch (see the two rebalanceGridForTeamChange call sites in app_screens.js), which also costs some initial morale
    releaseClauseUsedThisContract: false, // feature idea #9 -- resets to false on every new contract signed (renewal or switch), see renderReleaseClauseConfirmModal()
    simRacingRep: 0, // feature idea #15 -- esports/sim-racing side career reputation, see renderSimRacingModal()
    protegeRoster: [], // feature idea #16 -- driver academy roster (2-3 prospects); p.protege stays the SINGLE active mentee being actively trained, protegeRoster holds the full bench -- see renderMentorModal()
    isTeamOwner: false, // feature idea #13 -- Team Ownership Mode flag, set at character creation (app_core.js startNewCareer()); when true, race weekends auto-resolve and the player's main loop is the Team Ownership screen instead of driving decisions
  };
}

/* Internally `season` stays a real, ever-incrementing number (simplest for
   date-math and save compatibility). Everywhere the PLAYER sees it, we show
   "Year N" relative to when this career started, per product direction —
   real calendar years felt arbitrary and less personal for a life-sim. */
function seasonLabel(state){
  const start = state.careerStartSeason || state.season;
  return `Year ${state.season - start + 1}`;
}
/* For converting a STORED historical season number (e.g. from
   player.journal[i].season or state.history[i].season, recorded at the time
   as a real internal season number) back into the Year N the player would
   recognize, given the state's careerStartSeason. */
function seasonNumToYear(state, seasonNum){
  const start = state.careerStartSeason || state.season;
  return seasonNum - start + 1;
}
/* Standalone equivalent of App.pushNews(), for plain engine.js functions
   that receive `state` as a parameter rather than running with `this` bound
   to App. Keeps the same cap-enforcement guarantee — see App.pushNews() in
   app_core.js for why this must never be bypassed with a raw .unshift(). */
/* Applied only on regulation-change years (see isRegulationChangeYear in
   data.js). A big rules reset gives every team an extra, larger random
   swing on top of their normal seasonal development — some teams read the
   new rules well and leap forward, others misjudge them and fall back.
   Higher-tier (bigger-budget) teams get a slightly better expected outcome
   on average (more resources to interpret new regs correctly) but the
   variance is wide enough that a major upset is genuinely possible, which
   is the whole point of a regulation change in real F1. */
function applyRegulationChange(state){
  TEAMS.forEach(team=>{
    const budgetEdge = (4-team.tier) * 0.8; // tier 1 gets the biggest edge, tier 3 the least
    const swing = rand(-9, 9) + budgetEdge;
    team.carStrength = clamp(Math.round((team.carStrength + swing)*10)/10, 40, 99);
  });
  if(state && state.newsFeed){
    const sorted = [...TEAMS].sort((a,b)=>b.carStrength-a.carStrength);
    pushStateNews(state, `📋 New FIA technical regulations take effect — the competitive order has been shaken up. Early pace suggests ${sorted[0].flag} ${sorted[0].name} have read the rules best.`);
  }
}

/* 19.1 #7 -- Mid-season team development. Picks which round index (0-based)
   triggers a ONE-TIME, scaled-down AI development bump partway through the
   season, so the pecking order isn't fully fixed by developTeamsForNewSeason
   at the season's start -- teams can still shift mid-season, same spirit as
   real F1 upgrade packages arriving at specific races. Deliberately just
   picks the round nearest the midpoint (no randomness) rather than a random
   round, so this is deterministic and easy to reason about; the actual
   development ROLL itself (applyMidSeasonDevelopment below) still has all
   its usual randomness. */
function pickMidSeasonDevRoundIndex(totalRounds){
  return Math.floor(totalRounds/2);
}

/* Applies a scaled-down version of developTeamsForNewSeason's per-team roll
   -- same rubber-band/ambition/volatility shape, just at 40% magnitude since
   this fires ONCE per season on top of (not instead of) the full-strength
   roll that already happens at season boundaries. Does NOT touch
   team.devSlotsUsed (that's the player's own separate manual-purchase
   budget, entirely unrelated to this AI-only mechanism) and is guarded by
   s.calendar.midSeasonDevApplied so it can only ever fire once per season,
   the same idempotency pattern as s.lastWrappedSeason guards
   handleSeasonEnd(). */
function applyMidSeasonDevelopment(state, difficultySettings){
  const diff = difficultySettings || DIFFICULTY_SETTINGS.Standard;
  const strengths = TEAMS.map(t=>t.carStrength);
  const avgStrength = strengths.reduce((a,b)=>a+b,0)/strengths.length;
  TEAMS.forEach(team=>{
    const trend = team.devTrend;
    const gapFromAvg = avgStrength - team.carStrength;
    const rubberBand = clamp(gapFromAvg * 0.025, -0.5, 0.5);
    const seasonRoll = rand(-trend.volatility, trend.volatility);
    let delta = (trend.ambition + rubberBand + seasonRoll) * diff.aiDevMult * 0.4; // 40% magnitude -- this is IN ADDITION TO the full-strength season-boundary roll
    const paceDelta = delta * (1 - trend.reliabilityFocus);
    team.carStrength = clamp(Math.round((team.carStrength + paceDelta)*10)/10, 40, 99);
  });
  if(state && state.newsFeed){
    const sorted = [...TEAMS].sort((a,b)=>b.carStrength-a.carStrength);
    pushStateNews(state, `🔧 Mid-season upgrades shake up the order — ${sorted[0].flag} ${sorted[0].name} currently look sharpest.`);
  }
}

/* ---------- Multi-weekend mechanical-failure consequence chain ----------
   A DNF this weekend leaves the car's reliability margin slightly
   compromised into next weekend unless the player spends a session
   addressing it -- a small, bounded risk multiplier on top of the normal
   reliability-driven failChance in simulateRace(), NOT a separate new dice
   roll. p.mechanicalRiskMult lives directly on the player object (not
   state.teamState, since this is about the PLAYER's current car
   specifically, not a team-wide change TEAMS-sync would need to track) and
   is read via the drv.mechanicalRiskMult check added to simulateRace's own
   failChance formula above -- so a lapsed/forgotten field defaults to
   undefined, which the `|| 1` guard there treats as "no elevated risk",
   exactly like an untouched respect/rivalryLevel value behaves before
   anything has touched it. */
const MECHANICAL_RISK_AFTER_DNF = 1.6; // ~60% higher fail chance next weekend if unaddressed
const MECHANICAL_RISK_DECAY_PER_WEEKEND = 0.25; // fades back toward 1 by this much each weekend it isn't re-triggered
function applyMechanicalRiskAfterDNF(player){
  player.mechanicalRiskMult = MECHANICAL_RISK_AFTER_DNF;
}
function decayMechanicalRisk(player){
  if(!player.mechanicalRiskMult || player.mechanicalRiskMult<=1) { player.mechanicalRiskMult = 1; return; }
  player.mechanicalRiskMult = Math.max(1, player.mechanicalRiskMult - MECHANICAL_RISK_DECAY_PER_WEEKEND);
}
function clearMechanicalRisk(player){
  player.mechanicalRiskMult = 1;
}

/* ---------- Home Tracks ----------
   trackFamiliarity was previously just a hidden input to setupHintConfidence
   (a continuous number feeding the setup-hint band's width) with no
   player-facing concept of its own. This gives familiarity>=85 a genuine
   "Home Track" identity: a labeled badge (renderRaceCenterScreen(),
   app_race.js) plus a small flat pace bonus on top of the existing
   familiarityBonus curve (see driverStrength() above) -- a real mechanical
   payoff for having raced somewhere enough times to call it home, not just
   a narrower setup-hint band. */
const HOME_TRACK_THRESHOLD = 85;
const HOME_TRACK_PACE_BONUS = 1.5;
function isHomeTrack(state, trackId){
  const p = state.player;
  return (p.trackFamiliarity[trackId] || 65) >= HOME_TRACK_THRESHOLD;
}

function pushStateNews(state, text){
  if(!state.newsFeed) state.newsFeed = [];
  state.newsFeed.unshift(text);
  if(state.newsFeed.length > 12) state.newsFeed.length = 12;
}

const DAYS_OF_WEEK = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const RACE_WEEKEND_DAYS = { Friday:'practice', Saturday:'qualifying', Sunday:'race' };

/* Builds one season's calendar: every `permanent` track is always included;
   then a small number of rotating-pool tracks are randomly selected from
   whichever are eligible this career-year (respecting minYearOffset), mimicking
   the real FIA calendar adding/dropping venues year to year. A couple of
   eligible rounds are marked as Sprint weekends (see FIA regs section) —
   sprint-eligible tracks only, capped low so it stays a special occasion
   rather than the norm. careerYearNum defaults to 1 for callers (like the
   very first calendar built before a player exists) that don't have season
   context yet. */
function buildSeasonCalendar(careerYearNum){
  const yearNum = careerYearNum || 1;
  const permanentTracks = TRACKS.filter(t=>t.permanent);
  const rotatingPool = TRACKS.filter(t=>!t.permanent && (!t.minYearOffset || yearNum >= t.minYearOffset));
  const rotatingSlots = Math.min(2, rotatingPool.length);
  const shuffledRotating = [...rotatingPool].sort(()=>Math.random()-0.5).slice(0, rotatingSlots);

  const fullSeason = [...permanentTracks, ...shuffledRotating].sort(()=>Math.random()-0.5);

  const sprintCandidates = fullSeason.filter(t=>t.sprintEligible);
  const sprintCount = Math.min(2, sprintCandidates.length);
  const sprintTrackIds = new Set([...sprintCandidates].sort(()=>Math.random()-0.5).slice(0, sprintCount).map(t=>t.id));

  return fullSeason.map((track,i)=>{
    // Weather and temperature are rolled once per round, at calendar build
    // time — not re-rolled independently for practice vs qualifying vs race
    // — so the whole weekend shares one set of conditions the player can
    // actually plan around (visible on Race Center before Friday even
    // starts, not just revealed after the fact).
    const weather = Math.random() < track.rainChance ? 'rain' : 'clear';
    // Temperature drifts around the track's real-world baseline by up to
    // ±6°C weekend-to-weekend; rain always cools things down a bit.
    let trackTemp = Math.round((track.baseTemp||22) + rand(-6, 6));
    if(weather==='rain') trackTemp -= 4;
    return {
      round: i+1,
      trackId: track.id,
      completed: false,
      isSprint: sprintTrackIds.has(track.id),
      sprintCompleted: false,
      weather,
      trackTemp,
    };
  });
}

function tempBand(trackTemp){
  if(trackTemp===undefined || trackTemp===null) return {label:'Mild', icon:'⛅', tireWearMult:1.0, gripMult:1.0};
  if(trackTemp>=30) return {label:'Hot', icon:'🔥', tireWearMult:1.35, gripMult:0.97};
  if(trackTemp>=24) return {label:'Warm', icon:'☀️', tireWearMult:1.1, gripMult:1.0};
  if(trackTemp>=17) return {label:'Mild', icon:'⛅', tireWearMult:1.0, gripMult:1.0};
  return {label:'Cold', icon:'❄️', tireWearMult:0.85, gripMult:0.95};
}

/* ---------- Forecast-sharpening display helper ----------
   The real round.weather/round.trackTemp are rolled once at calendar-build
   time and never re-rolled (see buildSeasonCalendar) -- that stays exactly
   as-is. This is a second, purely-cosmetic "early guess" shown on the hub
   before the weekend arrives, deliberately noisy early in the week and
   converging to the true number as the round approaches. It's seeded off
   the round number + day index (not Math.random()) so it's stable across
   re-renders instead of flickering every time the hub redraws. */
function seededNoise(seed, spread){
  // simple deterministic hash -> pseudo-random in [-spread, spread]
  let h = seed * 2654435761 % 2147483647;
  if(h < 0) h += 2147483647;
  const frac = (h % 10000) / 10000; // 0..1
  return (frac*2 - 1) * spread;
}
function forecastGuess(round, daysUntil){
  // daysUntil: how many days before this round's race weekend starts (0 = race weekend itself, already exact)
  if(daysUntil<=0) return { temp: round.trackTemp, confidence:100, range:0 };
  const seed = (round.round||1) * 97 + daysUntil;
  // Confidence grows as the weekend approaches: far out it's a wide guess,
  // by the day before it's nearly exact.
  const spread = clamp(daysUntil * 1.6, 1, 9);
  const noisy = Math.round(round.trackTemp + seededNoise(seed, spread));
  const confidence = clamp(100 - daysUntil*14, 20, 95);
  return { temp: noisy, confidence, range: Math.round(spread) };
}

/* ---------- Race weekend simulation (driver-skill weighted) ---------- */
/* cosmeticBonus: a flat pace-equivalent nudge derived from equipped
   helmet/livery/suit/gloves bonuses (confidence/focus/braking flavor items
   only — fanPopularity/mediaReputation cosmetic bonuses are applied directly
   to those stats elsewhere, not through race pace). Kept small on purpose. */
function driverStrength(driver, team, track, weather, moraleBonus, setupBonus, cosmeticBonus, trackTemp){
  const d = driver.attributes.driving, m = driver.attributes.mental, l = driver.attributes.lifestyle;
  let pace = (d.racePace*0.35 + d.cornering*0.2 + d.consistency*0.15 + d.tyreManagement*0.15 + d.braking*0.15);
  pace += (team.carStrength-70)*0.55;
  pace += (m.confidence-50)*0.08 + (m.focus-50)*0.05 - (l.stress-20)*0.08 + (l.fitness-50)*0.05;
  // Mood (baseline 70, unlike the 0/50/20 baselines above) was previously
  // write-only -- every interaction touched it but nothing read it. Weighted
  // between focus and fitness: a real but modest ambient effect, deliberately
  // smaller than confidence/stress since mood is a softer, more diffuse state
  // than acute confidence or stress swings.
  pace += (l.mood-70)*0.045;
  if(weather==='rain'){
    pace += (d.wetSkill-50)*0.35;
    // Rain Master (REPUTATION_ARCHETYPES, data.js -- wetSkill>=85): previously
    // a display-only badge. A driver who's truly mastered wet conditions
    // gets a little more out of that mastery than the base wetSkill
    // weighting alone gives everyone -- small (+2 pace-equivalent), and
    // gated to rain only so it never touches a dry-weather race.
    if((driver.reputationArchetypes||[]).includes('rainmaster')) pace += 2;
  }
  if(trackTemp!==undefined){
    const band = tempBand(trackTemp);
    // Hot track = tyres wear faster, so tyreManagement matters more (good
    // tyre-management drivers gain, poor ones lose more than usual). Cold
    // track = less grip everywhere, a small flat penalty for everyone.
    pace += (d.tyreManagement-50) * (band.tireWearMult-1) * 0.3;
    if(band.gripMult<1){
      // Adaptability: a driver who adapts well to unfamiliar/tricky
      // conditions loses less of the flat cold-track grip penalty than a
      // rigid one does. At 99 adaptability the penalty is cut by ~half; at
      // 0 it's unchanged. This was previously the one mental stat with zero
      // effect anywhere in the sim.
      const adaptRelief = 1 - (m.adaptability/99)*0.5;
      pace -= (1-band.gripMult) * 40 * adaptRelief;
    }
  }
  if(driver.familiarityBonus) pace += driver.familiarityBonus;
  // Home Track (own concept, not just the existing continuous familiarity
  // curve above): crossing the isHomeTrack() threshold (see app_race.js)
  // gives a small flat bonus ON TOP of familiarityBonus's own linear scaling
  // -- a genuine "you know this place" edge distinct from just being a
  // slightly bigger number on the same curve, surfaced as its own labeled
  // concept in the UI (Race Center "🏠 Home Track" badge) rather than a
  // hidden setup-hint input only. Small and flat (not scaling further with
  // familiarity above the threshold) so it reads as a one-time "crossed the
  // line into true home-track knowledge" moment, not a second continuous
  // curve stacked on the first.
  if(driver.isHomeTrackBonus) pace += driver.isHomeTrackBonus;
  if(moraleBonus) pace += moraleBonus;
  if(setupBonus) pace += setupBonus;
  if(cosmeticBonus) pace += cosmeticBonus;
  pace += rand(-6,6);
  return pace;
}

/* Presentational breakdown of the SAME mental/lifestyle terms driverStrength
   applies, in plain "+X / -X" chips for the Race Strategy prompt -- so
   training and interactions feel legible turn-to-turn instead of only
   inferable from source. Deliberately mirrors driverStrength's own weights
   and baselines exactly (0.08/0.05/0.08/0.05/0.045) rather than inventing a
   separate display formula, so this can never drift out of sync with what
   actually happens in the sim -- same reasoning as plausibleLapTime being
   presentational-only while staying consistent with the real math it
   describes. Driving-stat terms (racePace, cornering, etc.) are left out on
   purpose: those are large, mostly-fixed baseline terms a player already
   sees reflected in their stat numbers directly, whereas confidence/focus/
   stress/fitness/mood are the ones that move week-to-week from training and
   interactions -- exactly what this chip is meant to make legible. Returns
   only entries with a non-trivial (>=0.3 pace) effect, so a near-neutral
   stat doesn't clutter the display with a "+0" chip. */
function paceModifierBreakdown(player){
  const m = player.attributes.mental, l = player.attributes.lifestyle;
  const terms = [
    { label:'Confidence', value: (m.confidence-50)*0.08 },
    { label:'Focus', value: (m.focus-50)*0.05 },
    { label:'Stress', value: -(l.stress-20)*0.08 },
    { label:'Fitness', value: (l.fitness-50)*0.05 },
    { label:'Mood', value: (l.mood-70)*0.045 },
  ];
  return terms.filter(t=>Math.abs(t.value)>=0.3).map(t=>({label:t.label, value:Math.round(t.value*10)/10}));
}

/* Converts equipped-cosmetic performance-flavor bonuses (confidence/focus/
   braking) into a single small flat pace nudge, on the same 0.05-0.08 scale
   driverStrength already uses for those stats — so a +2 confidence helmet
   behaves exactly like +2 confidence would, just without touching the
   player's real trained stat (fully reversible by re-equipping). */
function cosmeticPaceBonus(bonuses){
  if(!bonuses) return 0;
  let total = 0;
  if(bonuses.confidence) total += bonuses.confidence * 0.08;
  if(bonuses.focus) total += bonuses.focus * 0.05;
  if(bonuses.braking) total += bonuses.braking * 0.15;
  return total;
}

/* 19.9 -- Lap-time/best-lap layer. This is a DERIVED/PRESENTATIONAL number,
   NOT a literal simulated value -- simulateQualifying has no lap-by-lap
   model to draw a real time from (same reason maybeApplySafetyCar/
   maybeApplyGridPenalty are post-scoring position edits rather than
   mid-race events). Converts a driver's FINISHING POSITION in the
   qualifying order into a lap time plausibly consistent with that
   position: pole sits at track.baseLapTime, and each position back adds a
   small, slightly-increasing gap (the midfield bunches up more than the
   very back, matching how a real grid's time sheet looks) plus a touch of
   jitter so the same position doesn't always show an identical time. This
   is deliberately keyed on POSITION, not on the underlying qualifying
   `score` value, since that score's scale isn't comparable across tracks
   or seasons and was never meant to be read as a time. */
function plausibleLapTime(track, position, totalDrivers){
  const base = track.baseLapTime || 90;
  const n = Math.max(1, totalDrivers||22);
  const posFrac = (position-1) / Math.max(1, n-1); // 0 at pole, 1 at the very back
  // Gap grows a little faster toward the back of the grid than the front,
  // roughly matching how a real qualifying time sheet spreads out -- the
  // top of the grid is tightly bunched, backmarkers trail by more.
  const totalSpread = base * 0.028; // ~2.8% of a lap, e.g. ~2.5s on a 90s lap
  const gap = totalSpread * (posFrac + posFrac*posFrac) / 2;
  const jitter = rand(-0.05, 0.05);
  const seconds = base + gap + jitter;
  const mins = Math.floor(seconds/60);
  const secs = (seconds % 60).toFixed(3).padStart(6,'0');
  return mins>0 ? `${mins}:${secs}` : `${secs}s`;
}

function simulateQualifying(grid, playerDriver, track, weather, playerPaceBonus, trackTemp){
  const all = [...grid, playerDriver];
  const results = all.map(drv=>{
    const t = TEAMS.find(tm=>tm.id===drv.teamId);
    const qp = drv.attributes.driving.qualifyingPace;
    // Reaction: a sharper reaction time helps nail the exact braking/turn-in
    // point on a single hot lap -- small compared to qualifyingPace itself,
    // but a real, previously-unused driving stat now has an effect.
    let score = qp*0.5 + (t.carStrength-70)*0.6 + (drv.attributes.mental.pressure-50)*0.1 + (drv.attributes.driving.reaction-50)*0.08;
    if(weather==='rain') score += (drv.attributes.driving.wetSkill-50)*0.4;
    if(trackTemp!==undefined){
      const band = tempBand(trackTemp);
      if(band.gripMult<1) score -= (1-band.gripMult) * 30; // cold track, less grip on a single hot lap
    }
    if(drv.id==='player' && playerPaceBonus) score += playerPaceBonus*1.4;
    // Qualifying Specialist (REPUTATION_ARCHETYPES, data.js -- qualifyingPace>=88):
    // previously a display-only badge. A driver who's genuinely mastered
    // single-lap pace gets a small direct bonus on top of qualifyingPace's
    // own existing weight, rewarding a real, hard-earned stat threshold
    // rather than double-counting the same number the formula already uses.
    if((drv.reputationArchetypes||[]).includes('qualyspec')) score += 3;
    // Ice King (REPUTATION_ARCHETYPES, data.js -- focus>=85 && confidence>=70):
    // previously a display-only badge. Composure under the pressure of a
    // single hot lap shrinks their share of qualifying's own variance term
    // a little, rather than raising their score outright -- the archetype
    // is about NOT cracking under pressure, so a tighter spread fits better
    // than a flat bonus (same "shrink variance, don't add a flat number"
    // shape as Defending's own effect in simulateRace).
    const iceKingShrink = (drv.reputationArchetypes||[]).includes('iceking') ? 0.7 : 1;
    score += rand(-5,5) * iceKingShrink;
    return { driverId: drv.id, score };
  });
  results.sort((a,b)=>b.score-a.score);
  return results.map((r,i)=>({...r, position:i+1}));
}

/* Tire compound (19.1 #1): a real strategic choice made alongside the
   push/attack/defend/saveTires approach, not just flavor. Soft trades
   reliability margin for outright pace (and degrades faster in the heat);
   Hard trades pace for a meaningfully lower failure chance and better heat
   tolerance; Medium is the existing baseline with zero effect either way,
   so any caller that doesn't specify a compound (or specifies 'medium')
   behaves EXACTLY as before this feature existed -- no silent behavior
   change for old code paths. */
const TIRE_COMPOUNDS = {
  soft:   { paceBonus: [3, 9],  wearMult: 1.35, label: 'Soft' },
  medium: { paceBonus: [0, 0],  wearMult: 1.0,  label: 'Medium' },
  hard:   { paceBonus: [-5, -1], wearMult: 0.7, label: 'Hard' },
};

/* aiStrategyOverrides (Pass 25, Team Ownership Mode full closure): an
   OPTIONAL 11th parameter, a {driverId: {approach, compound}} map. Every
   existing call site that omits it (every one before this pass) behaves
   BYTE-FOR-BYTE identically to before -- an undefined map makes every
   lookup below fall through to the exact same falsy check the code
   already had, so this is purely additive, not a rewrite of the sim's
   player-vs-grid distinction. It generalizes the single
   `drv.id==='player' && playerStrategy` gate (further down) to also match
   an AI driver whose id is a key in this map, using THAT driver's own
   strategy object in place of playerStrategy for their own raceScore
   term -- letting an Owner Mode team principal make a real strategy call
   for either of their two AI drivers without touching driverStrength(),
   the pace/reliability formulas above this point, or any other driver's
   math at all. */
function simulateRace(grid, playerDriver, qualyResults, track, weather, playerStrategy, difficulty, playerMorale, playerPaceBonus, trackTemp, aiStrategyOverrides){
  const diff = difficulty || DIFFICULTY_SETTINGS.Standard;
  const all = [...grid, playerDriver];
  const byId = Object.fromEntries(all.map(d=>[d.id,d]));
  const moraleBonus = playerMorale!==undefined ? (playerMorale-65)*0.04 : 0;
  const band = trackTemp!==undefined ? tempBand(trackTemp) : null;
  const compoundKey = (playerStrategy && playerStrategy.compound) || 'medium';
  const compound = TIRE_COMPOUNDS[compoundKey] || TIRE_COMPOUNDS.medium;
  const raceScores = qualyResults.map(q=>{
    const drv = byId[q.driverId];
    const team = TEAMS.find(t=>t.id===drv.teamId);
    let strength = driverStrength(drv, team, track, weather, drv.id==='player' ? moraleBonus : 0, drv.id==='player' ? playerPaceBonus : 0, undefined, trackTemp);
    if(drv.id!=='player') strength *= diff.aiStrength;
    // Overtaking: a strong overtaker claws back some of the grid-position
    // penalty on tracks where passing is possible at all (overtakeDiff<10 --
    // Monaco-style circuits stay almost pure "start position is destiny"
    // regardless of skill, matching real F1). At 99 overtaking on an
    // overtakeDiff 5 track, roughly a third of the penalty is clawed back.
    const overtakeRelief = 1 - (drv.attributes.driving.overtaking/99) * (1 - track.overtakeDiff/10) * 0.6;
    let startPenalty = q.position * (track.overtakeDiff*0.35) * overtakeRelief;
    // Overtake Artist (REPUTATION_ARCHETYPES, data.js -- overtaking>=85):
    // previously a display-only badge. A driver who's genuinely mastered
    // overtaking claws back a little more of the same grid-position
    // penalty overtakeRelief already softens -- small (an extra ~8% off
    // startPenalty), and still zero-effect on Monaco-style circuits since
    // it multiplies the SAME startPenalty term overtakeRelief already
    // zeroes out there.
    if((drv.reputationArchetypes||[]).includes('overtakeartist')) startPenalty *= 0.92;
    // Bad Starter (TRAIT_POOL negative, data.js): a driver whose qualifying
    // pace has been consistently outrun by their race pace -- someone who
    // races better than they start. Mechanically this nudges the same
    // startPenalty term above a little harder, so a poor grid slot costs
    // them slightly more than it would anyone else, matching the flavor of
    // "struggles off the line" rather than just being a cosmetic label.
    if((drv.traits||[]).includes('Bad Starter')) startPenalty *= 1.12;
    let raceScore = strength*10 - startPenalty;
    // Discipline: a disciplined driver pushes the car less erratically,
    // trimming a little off their own mechanical failure chance on top of
    // whatever the car's reliability already gives them.
    let disciplineRelief = 1 - (drv.attributes.mental.discipline/99)*0.25;
    // Ice Cold / Hot Head traits (TRAIT_POOL in data.js): previously
    // unreachable dead content -- checkTraitEvolution() now actually awards
    // them. Ice Cold (composed under focus, zero-DNF record so far) shaves
    // a little more off the same mechanical-failure chance discipline
    // already reduces -- a cool head making fewer costly mistakes. Hot Head
    // (deep in a personal rivalry, high stress) nudges it the other way --
    // a rattled driver is a little more error-prone, not just unlucky.
    if((drv.traits||[]).includes('Ice Cold')) disciplineRelief *= 0.92;
    if((drv.traits||[]).includes('Hot Head')) disciplineRelief *= 1.08;
    // Lucky / Fragile (TRAIT_POOL, data.js): the same discipline-adjacent
    // slot as Ice Cold/Hot Head above, but earned by RESULTS (a run of
    // races finished against the odds, or a run of DNFs despite decent
    // discipline) rather than by a mental stat -- see checkTraitEvolution()
    // for the exact trigger. Deliberately smaller than Ice Cold/Hot Head's
    // swing so it reads as "a bit of luck either way" rather than a bigger
    // mechanical effect than the stat-driven traits above it.
    if((drv.traits||[]).includes('Lucky')) disciplineRelief *= 0.95;
    if((drv.traits||[]).includes('Fragile')) disciplineRelief *= 1.06;
    // veteran archetype (REPUTATION_ARCHETYPES, data.js -- age>=30 &&
    // starts>=60): previously a display-only badge, DISTINCT from the
    // separate Composed Veteran TRAIT (age>=28 && starts>=60, TRAIT_POOL)
    // which already affects contract-clause odds. A driver with this many
    // real seasons behind them makes fewer costly mechanical mistakes,
    // same discipline-adjacent slot as Ice Cold/Lucky above but its own
    // distinct, smaller trigger and effect so the two systems don't just
    // duplicate each other under different names.
    if((drv.reputationArchetypes||[]).includes('veteran')) disciplineRelief *= 0.96;
    const baseReliability = team.reliability*10 + (drv.id==='player' ? diff.reliabilityBonus : 0);
    // A hot track wears equipment faster (higher failChance); a cold one is
    // gentler on the car. saveTires strategy still helps on top of this.
    // A player's tire compound choice also scales this: Soft wears ~35%
    // faster (higher DNF risk), Hard ~30% slower (lower DNF risk).
    let tireWearMult = band ? band.tireWearMult : 1;
    // Pass 25: an AI driver with an owner-assigned strategy override gets
    // the SAME compound-wear treatment the player already gets, using
    // their OWN compound choice, not the player's -- deliberately
    // separate from the `drv.id==='player'` branch just below so the two
    // can never cross-apply each other's compound.
    const ownStrategy = drv.id==='player' ? playerStrategy : (aiStrategyOverrides && aiStrategyOverrides[drv.id]);
    const ownCompoundKey = (ownStrategy && ownStrategy.compound) || 'medium';
    const ownCompound = drv.id==='player' ? compound : (TIRE_COMPOUNDS[ownCompoundKey] || TIRE_COMPOUNDS.medium);
    if(drv.id==='player') tireWearMult *= compound.wearMult;
    else if(ownStrategy) tireWearMult *= ownCompound.wearMult;
    // Tyre Whisperer archetype (REPUTATION_ARCHETYPES in data.js,
    // tyreManagement>=85): previously a display-only badge. A driver who's
    // genuinely mastered tyre management runs a little cooler on tyre-wear
    // risk specifically -- separate from disciplineRelief below, which
    // covers general mechanical failure, not tyre wear. Small (-10%) and
    // capped so it never fully cancels heat/compound risk.
    if((drv.reputationArchetypes||[]).includes('tyrewhisperer')) tireWearMult *= 0.9;
    // Driving Style (previously 100% cosmetic -- earned via recordStyleProgress()
    // in engine.js after 5+ uses of the matching approach, shown only as a
    // display chip). Tyre Saver style now trims a little more off tire wear
    // specifically when actually playing to that identity (saveTires
    // approach) -- the SAME slot Tyre Whisperer uses above, so the two
    // stack rather than compete. Aggressive/Defensive get their matching
    // pace-variance hook further down, right where push/attack/defend's own
    // approach bonus already lives, rather than duplicating logic here.
    if(drv.id==='player' && drv.drivingStyle==='Tyre Saver' && playerStrategy && playerStrategy.approach==='saveTires') tireWearMult *= 0.93;
    // Pass 25: same Tyre Saver style bonus, generalized to an AI driver
    // with an owner-assigned strategy override -- an AI driver CAN have
    // earned a driving style too (recordStyleProgress() isn't
    // player-exclusive), so this honors it exactly the same way.
    else if(drv.id!=='player' && drv.drivingStyle==='Tyre Saver' && ownStrategy && ownStrategy.approach==='saveTires') tireWearMult *= 0.93;
    // Reliability gap from 100 is raised to a difficulty-scaled exponent
    // (>1 at Realistic, <1 at Casual) before scaling -- this widens the risk
    // gap between a strong car (safely near-0% regardless of difficulty) and
    // a weak one (meaningfully riskier at Realistic than the old flat-linear
    // formula gave it) rather than punishing every tier by the same fixed
    // ratio. Driver discipline and track heat still apply on top either way.
    const reliabilityGap = Math.max(0, 100 - baseReliability);
    // Multi-weekend mechanical-failure consequence chain: mirrors the
    // familiarityBonus pattern just above (a transient field set directly
    // on the player object by executeRace() right before this call, read
    // here without changing simulateRace's own signature). A DNF last
    // weekend raises p.mechanicalRiskMult for THIS weekend unless the
    // player addressed it (see the Chief Engineer/Team screen "Address
    // Reliability Concern" hook in app_actions.js/app_screens.js) --
    // small, capped, decays back to 1 (no lingering effect) once addressed
    // or after one clean weekend. AI drivers never carry this field, so it
    // only ever affects the player, same as familiarityBonus.
    const riskMult = (drv.id==='player' && drv.mechanicalRiskMult) ? drv.mechanicalRiskMult : 1;
    const failChance = clamp(Math.pow(reliabilityGap, diff.dnfExponent) * diff.dnfMult * tireWearMult * disciplineRelief * riskMult, 0.001, diff.dnfCap);
    const dnf = Math.random() < failChance;
    // Defending: a strong defender is more consistent under pressure from
    // cars around them -- shrinks (doesn't eliminate) their share of the
    // race's random variance, so bad luck costs them a little less than it
    // would a poor defender, without ever making the outcome deterministic.
    // This is the sim's one variance term now, replacing the old flat
    // rand(-8,8) that used to apply equally regardless of skill.
    const defenseShrink = 1 - (drv.attributes.driving.defending/99)*0.3;
    // Overconfident (TRAIT_POOL negative, data.js): earned by a driver whose
    // confidence has outpaced their actual recent results (see
    // checkTraitEvolution()). Widens their own share of the race's random
    // variance a little on top of whatever defenseShrink above already
    // gives them -- an overconfident driver is a bit more erratic race to
    // race, not uniformly worse, so this affects spread rather than adding
    // a flat penalty.
    const overconfidentWiden = (drv.traits||[]).includes('Overconfident') ? 1.15 : 1;
    // Wonderkid (REPUTATION_ARCHETYPES, data.js -- age<=21 && podiums>=2):
    // previously a display-only badge. A young breakout talent who's
    // already proven themselves handles race-day pressure better than
    // their limited experience alone would suggest -- same "shrink your
    // own share of variance" shape as defenseShrink/Ice King above, not a
    // flat pace bonus, so the archetype reads as composure beyond their
    // years rather than just being faster.
    const wonderkidShrink = (drv.reputationArchetypes||[]).includes('wonderkid') ? 0.88 : 1;
    raceScore += rand(-8,8) * defenseShrink * overconfidentWiden * wonderkidShrink;
    if(drv.id==='player' && playerStrategy){
      const tireMult = drv.id==='player' ? diff.tireForgiveness : 1;
      if(playerStrategy.approach==='push') raceScore += rand(-4,10);
      if(playerStrategy.approach==='saveTires') raceScore += rand(2,6)*tireMult;
      if(playerStrategy.approach==='defend') raceScore += rand(0,4);
      if(playerStrategy.approach==='attack') raceScore += rand(-6,14);
      // Driving Style (continued from tireWearMult above): Aggressive style
      // adds a small extra bonus specifically on push/attack -- the same
      // approaches that earned the style in the first place -- and
      // Defensive does the same for defend. Zero effect on any other
      // approach or for a driver who hasn't earned a style yet, so this
      // never touches AI drivers (drv.id==='player' gate above already
      // covers that) or a player still building toward their first style.
      if(drv.drivingStyle==='Aggressive' && (playerStrategy.approach==='push' || playerStrategy.approach==='attack')) raceScore += rand(1,4);
      if(drv.drivingStyle==='Defensive' && playerStrategy.approach==='defend') raceScore += rand(1,4);
      // Tire compound pace effect -- applied on top of the approach's own
      // effect, same additive shape, zero effect at 'medium' (the default).
      raceScore += rand(compound.paceBonus[0], compound.paceBonus[1]);
    } else if(drv.id!=='player' && ownStrategy){
      // Pass 25 -- Team Ownership Mode full closure: the EXACT SAME
      // approach/compound math the player's own branch above uses,
      // applied to an AI driver with an owner-assigned strategy override
      // (aiStrategyOverrides), using THAT driver's own ownStrategy/
      // ownCompound rather than playerStrategy/compound. diff.tireForgiveness
      // is deliberately NOT applied here (tireMult stays 1, matching what
      // the player branch's own `drv.id==='player' ? diff.tireForgiveness : 1`
      // ternary would already evaluate to for a non-player id) -- that
      // difficulty-scaled forgiveness is specifically a player-experience
      // knob, not something that should make an AI driver's own strategy
      // call artificially safer than any other AI driver's un-chosen one.
      if(ownStrategy.approach==='push') raceScore += rand(-4,10);
      if(ownStrategy.approach==='saveTires') raceScore += rand(2,6);
      if(ownStrategy.approach==='defend') raceScore += rand(0,4);
      if(ownStrategy.approach==='attack') raceScore += rand(-6,14);
