/* Internally `season` stays a real, ever-incrementing number (simplest for
   date-math and save compatibility). Everywhere the PLAYER sees it, we show
   "Year N" relative to when this career started, per product direction —
   real calendar years felt arbitrary and less personal for a life-sim. */
function seasonLabel(state){
  const start = state.careerStartSeason || state.season;
  return `Year ${state.season - start + 1}`;
}
/* For converting a STORED historical season number (e.g. from
   player.journal[i].season or state.history[i].season, recorded at the time
   as a real internal season number) back into the Year N the player would
   recognize, given the state's careerStartSeason. */
function seasonNumToYear(state, seasonNum){
  const start = state.careerStartSeason || state.season;
  return seasonNum - start + 1;
}
/* Standalone equivalent of App.pushNews(), for plain engine.js functions
   that receive `state` as a parameter rather than running with `this` bound
   to App. Keeps the same cap-enforcement guarantee — see App.pushNews() in
   app_core.js for why this must never be bypassed with a raw .unshift(). */
/* Applied only on regulation-change years (see isRegulationChangeYear in
   data.js). A big rules reset gives every team an extra, larger random
   swing on top of their normal seasonal development — some teams read the
   new rules well and leap forward, others misjudge them and fall back.
   Higher-tier (bigger-budget) teams get a slightly better expected outcome
   on average (more resources to interpret new regs correctly) but the
   variance is wide enough that a major upset is genuinely possible, which
   is the whole point of a regulation change in real F1. */
function applyRegulationChange(state){
  TEAMS.forEach(team=>{
    const budgetEdge = (4-team.tier) * 0.8; // tier 1 gets the biggest edge, tier 3 the least
    const swing = rand(-9, 9) + budgetEdge;
    team.carStrength = clamp(Math.round((team.carStrength + swing)*10)/10, 40, 99);
  });
  if(state && state.newsFeed){
    const sorted = [...TEAMS].sort((a,b)=>b.carStrength-a.carStrength);
    pushStateNews(state, `📋 New FIA technical regulations take effect — the competitive order has been shaken up. Early pace suggests ${sorted[0].flag} ${sorted[0].name} have read the rules best.`);
  }
}

/* 19.1 #7 -- Mid-season team development. Picks which round index (0-based)
   triggers a ONE-TIME, scaled-down AI development bump partway through the
   season, so the pecking order isn't fully fixed by developTeamsForNewSeason
   at the season's start -- teams can still shift mid-season, same spirit as
   real F1 upgrade packages arriving at specific races. Deliberately just
   picks the round nearest the midpoint (no randomness) rather than a random
   round, so this is deterministic and easy to reason about; the actual
   development ROLL itself (applyMidSeasonDevelopment below) still has all
   its usual randomness. */
function pickMidSeasonDevRoundIndex(totalRounds){
  return Math.floor(totalRounds/2);
}

/* Applies a scaled-down version of developTeamsForNewSeason's per-team roll
   -- same rubber-band/ambition/volatility shape, just at 40% magnitude since
   this fires ONCE per season on top of (not instead of) the full-strength
   roll that already happens at season boundaries. Does NOT touch
   team.devSlotsUsed (that's the player's own separate manual-purchase
   budget, entirely unrelated to this AI-only mechanism) and is guarded by
   s.calendar.midSeasonDevApplied so it can only ever fire once per season,
   the same idempotency pattern as s.lastWrappedSeason guards
   handleSeasonEnd(). */
function applyMidSeasonDevelopment(state, difficultySettings){
  const diff = difficultySettings || DIFFICULTY_SETTINGS.Standard;
  const strengths = TEAMS.map(t=>t.carStrength);
  const avgStrength = strengths.reduce((a,b)=>a+b,0)/strengths.length;
  TEAMS.forEach(team=>{
    const trend = team.devTrend;
    const gapFromAvg = avgStrength - team.carStrength;
    const rubberBand = clamp(gapFromAvg * 0.025, -0.5, 0.5);
    const seasonRoll = rand(-trend.volatility, trend.volatility);
    let delta = (trend.ambition + rubberBand + seasonRoll) * diff.aiDevMult * 0.4; // 40% magnitude -- this is IN ADDITION TO the full-strength season-boundary roll
    const paceDelta = delta * (1 - trend.reliabilityFocus);
    team.carStrength = clamp(Math.round((team.carStrength + paceDelta)*10)/10, 40, 99);
  });
  if(state && state.newsFeed){
    const sorted = [...TEAMS].sort((a,b)=>b.carStrength-a.carStrength);
    pushStateNews(state, `🔧 Mid-season upgrades shake up the order — ${sorted[0].flag} ${sorted[0].name} currently look sharpest.`);
  }
}

function pushStateNews(state, text){
  if(!state.newsFeed) state.newsFeed = [];
  state.newsFeed.unshift(text);
  if(state.newsFeed.length > 12) state.newsFeed.length = 12;
}

const DAYS_OF_WEEK = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const RACE_WEEKEND_DAYS = { Friday:'practice', Saturday:'qualifying', Sunday:'race' };

/* Builds one season's calendar: every `permanent` track is always included;
   then a small number of rotating-pool tracks are randomly selected from
   whichever are eligible this career-year (respecting minYearOffset), mimicking
   the real FIA calendar adding/dropping venues year to year. A couple of
   eligible rounds are marked as Sprint weekends (see FIA regs section) —
   sprint-eligible tracks only, capped low so it stays a special occasion
   rather than the norm. careerYearNum defaults to 1 for callers (like the
   very first calendar built before a player exists) that don't have season
   context yet. */
function buildSeasonCalendar(careerYearNum){
  const yearNum = careerYearNum || 1;
  const permanentTracks = TRACKS.filter(t=>t.permanent);
  const rotatingPool = TRACKS.filter(t=>!t.permanent && (!t.minYearOffset || yearNum >= t.minYearOffset));
  const rotatingSlots = Math.min(2, rotatingPool.length);
  const shuffledRotating = [...rotatingPool].sort(()=>Math.random()-0.5).slice(0, rotatingSlots);

  const fullSeason = [...permanentTracks, ...shuffledRotating].sort(()=>Math.random()-0.5);

  const sprintCandidates = fullSeason.filter(t=>t.sprintEligible);
  const sprintCount = Math.min(2, sprintCandidates.length);
  const sprintTrackIds = new Set([...sprintCandidates].sort(()=>Math.random()-0.5).slice(0, sprintCount).map(t=>t.id));

  return fullSeason.map((track,i)=>{
    // Weather and temperature are rolled once per round, at calendar build
    // time — not re-rolled independently for practice vs qualifying vs race
    // — so the whole weekend shares one set of conditions the player can
    // actually plan around (visible on Race Center before Friday even
    // starts, not just revealed after the fact).
    const weather = Math.random() < track.rainChance ? 'rain' : 'clear';
    // Temperature drifts around the track's real-world baseline by up to
    // ±6°C weekend-to-weekend; rain always cools things down a bit.
    let trackTemp = Math.round((track.baseTemp||22) + rand(-6, 6));
    if(weather==='rain') trackTemp -= 4;
    return {
      round: i+1,
      trackId: track.id,
      completed: false,
      isSprint: sprintTrackIds.has(track.id),
      sprintCompleted: false,
      weather,
      trackTemp,
    };
  });
}

function tempBand(trackTemp){
  if(trackTemp===undefined || trackTemp===null) return {label:'Mild', icon:'⛅', tireWearMult:1.0, gripMult:1.0};
  if(trackTemp>=30) return {label:'Hot', icon:'🔥', tireWearMult:1.35, gripMult:0.97};
  if(trackTemp>=24) return {label:'Warm', icon:'☀️', tireWearMult:1.1, gripMult:1.0};
  if(trackTemp>=17) return {label:'Mild', icon:'⛅', tireWearMult:1.0, gripMult:1.0};
  return {label:'Cold', icon:'❄️', tireWearMult:0.85, gripMult:0.95};
}

/* ---------- Forecast-sharpening display helper ----------
   The real round.weather/round.trackTemp are rolled once at calendar-build
   time and never re-rolled (see buildSeasonCalendar) -- that stays exactly
   as-is. This is a second, purely-cosmetic "early guess" shown on the hub
   before the weekend arrives, deliberately noisy early in the week and
   converging to the true number as the round approaches. It's seeded off
   the round number + day index (not Math.random()) so it's stable across
   re-renders instead of flickering every time the hub redraws. */
function seededNoise(seed, spread){
  // simple deterministic hash -> pseudo-random in [-spread, spread]
  let h = seed * 2654435761 % 2147483647;
  if(h < 0) h += 2147483647;
  const frac = (h % 10000) / 10000; // 0..1
  return (frac*2 - 1) * spread;
}
function forecastGuess(round, daysUntil){
  // daysUntil: how many days before this round's race weekend starts (0 = race weekend itself, already exact)
  if(daysUntil<=0) return { temp: round.trackTemp, confidence:100, range:0 };
  const seed = (round.round||1) * 97 + daysUntil;
  // Confidence grows as the weekend approaches: far out it's a wide guess,
  // by the day before it's nearly exact.
  const spread = clamp(daysUntil * 1.6, 1, 9);
  const noisy = Math.round(round.trackTemp + seededNoise(seed, spread));
  const confidence = clamp(100 - daysUntil*14, 20, 95);
  return { temp: noisy, confidence, range: Math.round(spread) };
}

/* ---------- Race weekend simulation (driver-skill weighted) ---------- */
/* cosmeticBonus: a flat pace-equivalent nudge derived from equipped
   helmet/livery/suit/gloves bonuses (confidence/focus/braking flavor items
   only — fanPopularity/mediaReputation cosmetic bonuses are applied directly
   to those stats elsewhere, not through race pace). Kept small on purpose. */
function driverStrength(driver, team, track, weather, moraleBonus, setupBonus, cosmeticBonus, trackTemp){
  const d = driver.attributes.driving, m = driver.attributes.mental, l = driver.attributes.lifestyle;
  let pace = (d.racePace*0.35 + d.cornering*0.2 + d.consistency*0.15 + d.tyreManagement*0.15 + d.braking*0.15);
  pace += (team.carStrength-70)*0.55;
  pace += (m.confidence-50)*0.08 + (m.focus-50)*0.05 - (l.stress-20)*0.08 + (l.fitness-50)*0.05;
  // Mood (baseline 70, unlike the 0/50/20 baselines above) was previously
  // write-only -- every interaction touched it but nothing read it. Weighted
  // between focus and fitness: a real but modest ambient effect, deliberately
  // smaller than confidence/stress since mood is a softer, more diffuse state
  // than acute confidence or stress swings.
  pace += (l.mood-70)*0.045;
  if(weather==='rain'){
    pace += (d.wetSkill-50)*0.35;
    // Rain Master (REPUTATION_ARCHETYPES, data.js -- wetSkill>=85): previously
    // a display-only badge. A driver who's truly mastered wet conditions
    // gets a little more out of that mastery than the base wetSkill
    // weighting alone gives everyone -- small (+2 pace-equivalent), and
    // gated to rain only so it never touches a dry-weather race.
    if((driver.reputationArchetypes||[]).includes('rainmaster')) pace += 2;
  }
  if(trackTemp!==undefined){
    const band = tempBand(trackTemp);
    // Hot track = tyres wear faster, so tyreManagement matters more (good
    // tyre-management drivers gain, poor ones lose more than usual). Cold
    // track = less grip everywhere, a small flat penalty for everyone.
    pace += (d.tyreManagement-50) * (band.tireWearMult-1) * 0.3;
    if(band.gripMult<1){
      // Adaptability: a driver who adapts well to unfamiliar/tricky
      // conditions loses less of the flat cold-track grip penalty than a
      // rigid one does. At 99 adaptability the penalty is cut by ~half; at
      // 0 it's unchanged. This was previously the one mental stat with zero
      // effect anywhere in the sim.
      const adaptRelief = 1 - (m.adaptability/99)*0.5;
      pace -= (1-band.gripMult) * 40 * adaptRelief;
    }
  }
  if(driver.familiarityBonus) pace += driver.familiarityBonus;
  if(moraleBonus) pace += moraleBonus;
  if(setupBonus) pace += setupBonus;
  if(cosmeticBonus) pace += cosmeticBonus;
  pace += rand(-6,6);
  return pace;
}

/* Presentational breakdown of the SAME mental/lifestyle terms driverStrength
   applies, in plain "+X / -X" chips for the Race Strategy prompt -- so
   training and interactions feel legible turn-to-turn instead of only
   inferable from source. Deliberately mirrors driverStrength's own weights
   and baselines exactly (0.08/0.05/0.08/0.05/0.045) rather than inventing a
   separate display formula, so this can never drift out of sync with what
   actually happens in the sim -- same reasoning as plausibleLapTime being
   presentational-only while staying consistent with the real math it
   describes. Driving-stat terms (racePace, cornering, etc.) are left out on
   purpose: those are large, mostly-fixed baseline terms a player already
   sees reflected in their stat numbers directly, whereas confidence/focus/
   stress/fitness/mood are the ones that move week-to-week from training and
   interactions -- exactly what this chip is meant to make legible. Returns
   only entries with a non-trivial (>=0.3 pace) effect, so a near-neutral
   stat doesn't clutter the display with a "+0" chip. */
function paceModifierBreakdown(player){
  const m = player.attributes.mental, l = player.attributes.lifestyle;
  const terms = [
    { label:'Confidence', value: (m.confidence-50)*0.08 },
    { label:'Focus', value: (m.focus-50)*0.05 },
    { label:'Stress', value: -(l.stress-20)*0.08 },
    { label:'Fitness', value: (l.fitness-50)*0.05 },
    { label:'Mood', value: (l.mood-70)*0.045 },
  ];
  return terms.filter(t=>Math.abs(t.value)>=0.3).map(t=>({label:t.label, value:Math.round(t.value*10)/10}));
}

/* Converts equipped-cosmetic performance-flavor bonuses (confidence/focus/
   braking) into a single small flat pace nudge, on the same 0.05-0.08 scale
   driverStrength already uses for those stats — so a +2 confidence helmet
   behaves exactly like +2 confidence would, just without touching the
   player's real trained stat (fully reversible by re-equipping). */
function cosmeticPaceBonus(bonuses){
  if(!bonuses) return 0;
  let total = 0;
  if(bonuses.confidence) total += bonuses.confidence * 0.08;
  if(bonuses.focus) total += bonuses.focus * 0.05;
  if(bonuses.braking) total += bonuses.braking * 0.15;
  return total;
}

/* 19.9 -- Lap-time/best-lap layer. This is a DERIVED/PRESENTATIONAL number,
   NOT a literal simulated value -- simulateQualifying has no lap-by-lap
   model to draw a real time from (same reason maybeApplySafetyCar/
   maybeApplyGridPenalty are post-scoring position edits rather than
   mid-race events). Converts a driver's FINISHING POSITION in the
   qualifying order into a lap time plausibly consistent with that
   position: pole sits at track.baseLapTime, and each position back adds a
   small, slightly-increasing gap (the midfield bunches up more than the
   very back, matching how a real grid's time sheet looks) plus a touch of
   jitter so the same position doesn't always show an identical time. This
   is deliberately keyed on POSITION, not on the underlying qualifying
   `score` value, since that score's scale isn't comparable across tracks
   or seasons and was never meant to be read as a time. */
function plausibleLapTime(track, position, totalDrivers){
  const base = track.baseLapTime || 90;
  const n = Math.max(1, totalDrivers||22);
  const posFrac = (position-1) / Math.max(1, n-1); // 0 at pole, 1 at the very back
  // Gap grows a little faster toward the back of the grid than the front,
  // roughly matching how a real qualifying time sheet spreads out -- the
  // top of the grid is tightly bunched, backmarkers trail by more.
  const totalSpread = base * 0.028; // ~2.8% of a lap, e.g. ~2.5s on a 90s lap
  const gap = totalSpread * (posFrac + posFrac*posFrac) / 2;
  const jitter = rand(-0.05, 0.05);
  const seconds = base + gap + jitter;
  const mins = Math.floor(seconds/60);
  const secs = (seconds % 60).toFixed(3).padStart(6,'0');
  return mins>0 ? `${mins}:${secs}` : `${secs}s`;
}

function simulateQualifying(grid, playerDriver, track, weather, playerPaceBonus, trackTemp){
  const all = [...grid, playerDriver];
  const results = all.map(drv=>{
    const t = TEAMS.find(tm=>tm.id===drv.teamId);
    const qp = drv.attributes.driving.qualifyingPace;
    // Reaction: a sharper reaction time helps nail the exact braking/turn-in
    // point on a single hot lap -- small compared to qualifyingPace itself,
    // but a real, previously-unused driving stat now has an effect.
    let score = qp*0.5 + (t.carStrength-70)*0.6 + (drv.attributes.mental.pressure-50)*0.1 + (drv.attributes.driving.reaction-50)*0.08;
    if(weather==='rain') score += (drv.attributes.driving.wetSkill-50)*0.4;
    if(trackTemp!==undefined){
      const band = tempBand(trackTemp);
      if(band.gripMult<1) score -= (1-band.gripMult) * 30; // cold track, less grip on a single hot lap
    }
    if(drv.id==='player' && playerPaceBonus) score += playerPaceBonus*1.4;
    // Qualifying Specialist (REPUTATION_ARCHETYPES, data.js -- qualifyingPace>=88):
    // previously a display-only badge. A driver who's genuinely mastered
    // single-lap pace gets a small direct bonus on top of qualifyingPace's
    // own existing weight, rewarding a real, hard-earned stat threshold
    // rather than double-counting the same number the formula already uses.
    if((drv.reputationArchetypes||[]).includes('qualyspec')) score += 3;
    // Ice King (REPUTATION_ARCHETYPES, data.js -- focus>=85 && confidence>=70):
    // previously a display-only badge. Composure under the pressure of a
    // single hot lap shrinks their share of qualifying's own variance term
    // a little, rather than raising their score outright -- the archetype
    // is about NOT cracking under pressure, so a tighter spread fits better
    // than a flat bonus (same "shrink variance, don't add a flat number"
    // shape as Defending's own effect in simulateRace).
    const iceKingShrink = (drv.reputationArchetypes||[]).includes('iceking') ? 0.7 : 1;
    score += rand(-5,5) * iceKingShrink;
    return { driverId: drv.id, score };
  });
  results.sort((a,b)=>b.score-a.score);
  return results.map((r,i)=>({...r, position:i+1}));
}

/* Tire compound (19.1 #1): a real strategic choice made alongside the
   push/attack/defend/saveTires approach, not just flavor. Soft trades
   reliability margin for outright pace (and degrades faster in the heat);
   Hard trades pace for a meaningfully lower failure chance and better heat
   tolerance; Medium is the existing baseline with zero effect either way,
   so any caller that doesn't specify a compound (or specifies 'medium')
   behaves EXACTLY as before this feature existed -- no silent behavior
   change for old code paths. */
const TIRE_COMPOUNDS = {
  soft:   { paceBonus: [3, 9],  wearMult: 1.35, label: 'Soft' },
  medium: { paceBonus: [0, 0],  wearMult: 1.0,  label: 'Medium' },
  hard:   { paceBonus: [-5, -1], wearMult: 0.7, label: 'Hard' },
};

function simulateRace(grid, playerDriver, qualyResults, track, weather, playerStrategy, difficulty, playerMorale, playerPaceBonus, trackTemp){
  const diff = difficulty || DIFFICULTY_SETTINGS.Standard;
  const all = [...grid, playerDriver];
  const byId = Object.fromEntries(all.map(d=>[d.id,d]));
  const moraleBonus = playerMorale!==undefined ? (playerMorale-65)*0.04 : 0;
  const band = trackTemp!==undefined ? tempBand(trackTemp) : null;
  const compoundKey = (playerStrategy && playerStrategy.compound) || 'medium';
  const compound = TIRE_COMPOUNDS[compoundKey] || TIRE_COMPOUNDS.medium;
  const raceScores = qualyResults.map(q=>{
    const drv = byId[q.driverId];
    const team = TEAMS.find(t=>t.id===drv.teamId);
    let strength = driverStrength(drv, team, track, weather, drv.id==='player' ? moraleBonus : 0, drv.id==='player' ? playerPaceBonus : 0, undefined, trackTemp);
    if(drv.id!=='player') strength *= diff.aiStrength;
    // Overtaking: a strong overtaker claws back some of the grid-position
    // penalty on tracks where passing is possible at all (overtakeDiff<10 --
    // Monaco-style circuits stay almost pure "start position is destiny"
    // regardless of skill, matching real F1). At 99 overtaking on an
    // overtakeDiff 5 track, roughly a third of the penalty is clawed back.
    const overtakeRelief = 1 - (drv.attributes.driving.overtaking/99) * (1 - track.overtakeDiff/10) * 0.6;
    let startPenalty = q.position * (track.overtakeDiff*0.35) * overtakeRelief;
    // Overtake Artist (REPUTATION_ARCHETYPES, data.js -- overtaking>=85):
    // previously a display-only badge. A driver who's genuinely mastered
    // overtaking claws back a little more of the same grid-position
    // penalty overtakeRelief already softens -- small (an extra ~8% off
    // startPenalty), and still zero-effect on Monaco-style circuits since
    // it multiplies the SAME startPenalty term overtakeRelief already
    // zeroes out there.
    if((drv.reputationArchetypes||[]).includes('overtakeartist')) startPenalty *= 0.92;
    // Bad Starter (TRAIT_POOL negative, data.js): a driver whose qualifying
    // pace has been consistently outrun by their race pace -- someone who
    // races better than they start. Mechanically this nudges the same
    // startPenalty term above a little harder, so a poor grid slot costs
    // them slightly more than it would anyone else, matching the flavor of
    // "struggles off the line" rather than just being a cosmetic label.
    if((drv.traits||[]).includes('Bad Starter')) startPenalty *= 1.12;
    let raceScore = strength*10 - startPenalty;
    // Discipline: a disciplined driver pushes the car less erratically,
    // trimming a little off their own mechanical failure chance on top of
    // whatever the car's reliability already gives them.
    let disciplineRelief = 1 - (drv.attributes.mental.discipline/99)*0.25;
    // Ice Cold / Hot Head traits (TRAIT_POOL in data.js): previously
    // unreachable dead content -- checkTraitEvolution() now actually awards
    // them. Ice Cold (composed under focus, zero-DNF record so far) shaves
    // a little more off the same mechanical-failure chance discipline
    // already reduces -- a cool head making fewer costly mistakes. Hot Head
    // (deep in a personal rivalry, high stress) nudges it the other way --
    // a rattled driver is a little more error-prone, not just unlucky.
    if((drv.traits||[]).includes('Ice Cold')) disciplineRelief *= 0.92;
    if((drv.traits||[]).includes('Hot Head')) disciplineRelief *= 1.08;
    // Lucky / Fragile (TRAIT_POOL, data.js): the same discipline-adjacent
    // slot as Ice Cold/Hot Head above, but earned by RESULTS (a run of
    // races finished against the odds, or a run of DNFs despite decent
    // discipline) rather than by a mental stat -- see checkTraitEvolution()
    // for the exact trigger. Deliberately smaller than Ice Cold/Hot Head's
    // swing so it reads as "a bit of luck either way" rather than a bigger
    // mechanical effect than the stat-driven traits above it.
    if((drv.traits||[]).includes('Lucky')) disciplineRelief *= 0.95;
    if((drv.traits||[]).includes('Fragile')) disciplineRelief *= 1.06;
    // veteran archetype (REPUTATION_ARCHETYPES, data.js -- age>=30 &&
    // starts>=60): previously a display-only badge, DISTINCT from the
    // separate Composed Veteran TRAIT (age>=28 && starts>=60, TRAIT_POOL)
    // which already affects contract-clause odds. A driver with this many
    // real seasons behind them makes fewer costly mechanical mistakes,
    // same discipline-adjacent slot as Ice Cold/Lucky above but its own
    // distinct, smaller trigger and effect so the two systems don't just
    // duplicate each other under different names.
    if((drv.reputationArchetypes||[]).includes('veteran')) disciplineRelief *= 0.96;
    const baseReliability = team.reliability*10 + (drv.id==='player' ? diff.reliabilityBonus : 0);
    // A hot track wears equipment faster (higher failChance); a cold one is
    // gentler on the car. saveTires strategy still helps on top of this.
    // A player's tire compound choice also scales this: Soft wears ~35%
    // faster (higher DNF risk), Hard ~30% slower (lower DNF risk).
    let tireWearMult = band ? band.tireWearMult : 1;
    if(drv.id==='player') tireWearMult *= compound.wearMult;
    // Tyre Whisperer archetype (REPUTATION_ARCHETYPES in data.js,
    // tyreManagement>=85): previously a display-only badge. A driver who's
    // genuinely mastered tyre management runs a little cooler on tyre-wear
    // risk specifically -- separate from disciplineRelief below, which
    // covers general mechanical failure, not tyre wear. Small (-10%) and
    // capped so it never fully cancels heat/compound risk.
    if((drv.reputationArchetypes||[]).includes('tyrewhisperer')) tireWearMult *= 0.9;
    // Driving Style (previously 100% cosmetic -- earned via recordStyleProgress()
    // in engine.js after 5+ uses of the matching approach, shown only as a
    // display chip). Tyre Saver style now trims a little more off tire wear
    // specifically when actually playing to that identity (saveTires
    // approach) -- the SAME slot Tyre Whisperer uses above, so the two
    // stack rather than compete. Aggressive/Defensive get their matching
    // pace-variance hook further down, right where push/attack/defend's own
    // approach bonus already lives, rather than duplicating logic here.
    if(drv.id==='player' && drv.drivingStyle==='Tyre Saver' && playerStrategy && playerStrategy.approach==='saveTires') tireWearMult *= 0.93;
    // Reliability gap from 100 is raised to a difficulty-scaled exponent
    // (>1 at Realistic, <1 at Casual) before scaling -- this widens the risk
    // gap between a strong car (safely near-0% regardless of difficulty) and
    // a weak one (meaningfully riskier at Realistic than the old flat-linear
    // formula gave it) rather than punishing every tier by the same fixed
    // ratio. Driver discipline and track heat still apply on top either way.
    const reliabilityGap = Math.max(0, 100 - baseReliability);
    const failChance = clamp(Math.pow(reliabilityGap, diff.dnfExponent) * diff.dnfMult * tireWearMult * disciplineRelief, 0.001, diff.dnfCap);
    const dnf = Math.random() < failChance;
    // Defending: a strong defender is more consistent under pressure from
    // cars around them -- shrinks (doesn't eliminate) their share of the
    // race's random variance, so bad luck costs them a little less than it
    // would a poor defender, without ever making the outcome deterministic.
    // This is the sim's one variance term now, replacing the old flat
    // rand(-8,8) that used to apply equally regardless of skill.
    const defenseShrink = 1 - (drv.attributes.driving.defending/99)*0.3;
    // Overconfident (TRAIT_POOL negative, data.js): earned by a driver whose
    // confidence has outpaced their actual recent results (see
    // checkTraitEvolution()). Widens their own share of the race's random
    // variance a little on top of whatever defenseShrink above already
    // gives them -- an overconfident driver is a bit more erratic race to
    // race, not uniformly worse, so this affects spread rather than adding
    // a flat penalty.
    const overconfidentWiden = (drv.traits||[]).includes('Overconfident') ? 1.15 : 1;
    // Wonderkid (REPUTATION_ARCHETYPES, data.js -- age<=21 && podiums>=2):
    // previously a display-only badge. A young breakout talent who's
    // already proven themselves handles race-day pressure better than
    // their limited experience alone would suggest -- same "shrink your
    // own share of variance" shape as defenseShrink/Ice King above, not a
    // flat pace bonus, so the archetype reads as composure beyond their
    // years rather than just being faster.
    const wonderkidShrink = (drv.reputationArchetypes||[]).includes('wonderkid') ? 0.88 : 1;
    raceScore += rand(-8,8) * defenseShrink * overconfidentWiden * wonderkidShrink;
    if(drv.id==='player' && playerStrategy){
      const tireMult = drv.id==='player' ? diff.tireForgiveness : 1;
      if(playerStrategy.approach==='push') raceScore += rand(-4,10);
      if(playerStrategy.approach==='saveTires') raceScore += rand(2,6)*tireMult;
      if(playerStrategy.approach==='defend') raceScore += rand(0,4);
      if(playerStrategy.approach==='attack') raceScore += rand(-6,14);
      // Driving Style (continued from tireWearMult above): Aggressive style
      // adds a small extra bonus specifically on push/attack -- the same
      // approaches that earned the style in the first place -- and
      // Defensive does the same for defend. Zero effect on any other
      // approach or for a driver who hasn't earned a style yet, so this
      // never touches AI drivers (drv.id==='player' gate above already
      // covers that) or a player still building toward their first style.
      if(drv.drivingStyle==='Aggressive' && (playerStrategy.approach==='push' || playerStrategy.approach==='attack')) raceScore += rand(1,4);
      if(drv.drivingStyle==='Defensive' && playerStrategy.approach==='defend') raceScore += rand(1,4);
      // Tire compound pace effect -- applied on top of the approach's own
      // effect, same additive shape, zero effect at 'medium' (the default).
      raceScore += rand(compound.paceBonus[0], compound.paceBonus[1]);
    }
    return { driverId: drv.id, raceScore: dnf ? -9999 : raceScore, dnf };
  });
  raceScores.sort((a,b)=>b.raceScore-a.raceScore);
  return raceScores.map((r,i)=>({...r, position: r.dnf? null : i+1, finishOrder:i+1}));
}

/* Fastest lap: picks one non-DNF finisher per race, weighted by racePace +
   consistency (the same two stats simulateRace's own pace formula leans on
   most heavily -- see the `pace` line in driverStrength above), plus a small
   bonus for finishing further up the order (leaders push harder on a clean
   track, backmarkers are more likely lapped/blocked). Deliberately NOT just
   "whoever's raceScore was highest" -- that would make fastest lap a near-
   duplicate of the win, when in reality it's semi-independent (strategy,
   fuel load, and traffic all move it around race to race). Called once per
   race, right after simulateRace(), rather than folded into simulateRace
   itself, so it stays a separate additive feature with its own call site
   and doesn't change simulateRace's existing tested output shape at all. */
function rollFastestLap(results, allDrivers){
  const byId = Object.fromEntries(allDrivers.map(d=>[d.id,d]));
  const finishers = results.filter(r=>!r.dnf);
  if(!finishers.length) return null;
  const weighted = finishers.map(r=>{
    const drv = byId[r.driverId];
    const d = drv.attributes.driving;
    const paceWeight = d.racePace*0.6 + d.consistency*0.4;
    const positionBonus = Math.max(0, 15 - r.position); // leaders get a modest boost, not a lock
    return { driverId: r.driverId, weight: Math.max(1, paceWeight + positionBonus) };
  });
  const totalWeight = weighted.reduce((sum,w)=>sum+w.weight, 0);
  let roll = Math.random() * totalWeight;
  for(const w of weighted){
    roll -= w.weight;
    if(roll<=0) return w.driverId;
  }
  return weighted[weighted.length-1].driverId;
}

const DIFFICULTY_SETTINGS = {
  Casual:     { setupWindow:1.4, tireForgiveness:1.3, reliabilityBonus:8,  sponsorGoalMult:0.75, aiStrength:0.9,  aiDevMult:0.7,  dnfExponent:0.85, dnfMult:0.003,   dnfCap:0.22 },
  Standard:   { setupWindow:1.0, tireForgiveness:1.0, reliabilityBonus:0,  sponsorGoalMult:1.0,  aiStrength:1.0,  aiDevMult:1.0,  dnfExponent:1.0,  dnfMult:0.0009,  dnfCap:0.28 },
  Realistic:  { setupWindow:0.7, tireForgiveness:0.75,reliabilityBonus:-6, sponsorGoalMult:1.3,  aiStrength:1.12, aiDevMult:1.35, dnfExponent:1.35, dnfMult:0.00035, dnfCap:0.35 },
};

/* ---------- Car setup: hidden ideal + gradual hint reveal ----------
   The "true" ideal setup for a race weekend blends the track's own idealSetup
   with a small nudge from the player's own driving attributes (a cornering-
   heavy driver leans slightly toward more downforce; a braking/consistency-
   heavy driver leans slightly toward a more neutral balance; a fuel-saving/
   race-pace driver leans slightly toward taller gearing). This nudge is capped
   small (±8) so track character always dominates — it's flavor, not a
   difficulty-defining mechanic.
   Everything here is a fixed formula over existing stats — no randomness,
   no AI, fully deterministic and reproducible from the save file alone. */
function personalSetupNudge(driver){
  const d = driver.attributes.driving;
  const downforceNudge = clamp(((d.cornering-50) - (d.racePace-50)) * 0.16, -8, 8);
  const balanceNudge = clamp(((d.braking-50) - (d.consistency-50)) * 0.12, -6, 6);
  const gearNudge = clamp(((d.starts-50) - (d.fuelSaving-50)) * 0.14, -8, 8);
  return { downforce: downforceNudge, balance: balanceNudge, gearRatio: gearNudge };
}

function trueIdealSetup(track, player){
  const base = track.idealSetup;
  const nudge = personalSetupNudge(player);
  return {
    downforce: clamp(Math.round(base.downforce + nudge.downforce), 0, 100),
    balance: clamp(Math.round(base.balance + nudge.balance), 0, 100),
    gearRatio: clamp(Math.round(base.gearRatio + nudge.gearRatio), 0, 100),
  };
}

/* Hint confidence grows with: track familiarity (Practice sessions at THIS
   track feed knowledge of the track-side component) and simulator/driving
   training sessions logged AT THIS SPECIFIC TRACK (feeds knowledge of the
   player's own tendency component, for this circuit). Returns 0-100. At low
   confidence the hint UI shows a wide fuzzy band around the true value; at
   high confidence it narrows down to a tight, near-exact recommendation.
   This makes the hint feel like it's "revealing little by little", exactly
   as requested, without ever being handed to the player for free.
   Training confidence is intentionally PER-TRACK (p.setupTrainingByTrack),
   not a global lifetime count -- a global count meant training once, at
   any track, permanently maxed the confidence floor on every future track
   including ones never visited, removing any reason to keep training once
   that lifetime count was maxed early in a career. */
function setupHintConfidence(state, trackId){
  const p = state.player;
  const familiarity = p.trackFamiliarity[trackId] || 65; // 65-100
  const familiarityConfidence = clamp((familiarity-65)/35 * 60, 0, 60); // up to 60 pts from track knowledge
  const trainingSessions = (p.setupTrainingByTrack && p.setupTrainingByTrack[trackId]) || 0;
  const trainingConfidence = clamp(trainingSessions * 6, 0, 40); // up to 40 pts from driver-tendency knowledge AT THIS TRACK
  return clamp(Math.round(familiarityConfidence + trainingConfidence), 0, 100);
}

/* Turns a confidence 0-100 into a fuzzy band [min,max] around the true value.
   100 confidence = ±2 (essentially exact), 0 confidence = ±35 (barely a clue). */
function setupHintBand(trueVal, confidence){
  const spread = Math.round(35 - (confidence/100)*33);
  return { min: clamp(trueVal-spread, 0, 100), max: clamp(trueVal+spread, 0, 100), spread };
}

/* Small, real performance effect for how close currentSetup is to the true
   ideal — feeds into driverStrength() as setupBonus. Realistic difficulty
   narrows the forgiving window (setupWindow < 1), so mismatched setups are
   punished harder, exactly matching the DIFFICULTY_SETTINGS.setupWindow field
   that previously existed but was unused. */
function setupMatchBonus(currentSetup, ideal, setupWindow){
  const window = setupWindow || 1.0;
  const dDown = Math.abs(currentSetup.downforce - ideal.downforce);
  const dBal = Math.abs(currentSetup.balance - ideal.balance);
  const dGear = Math.abs(currentSetup.gearRatio - ideal.gearRatio);
  const avgOff = (dDown + dBal*1.2 + dGear) / 3.2; // balance mismatch hurts slightly more
  const tolerance = 18 * window; // Casual: ~25 tolerance, Realistic: ~12.6
  const normalized = clamp(1 - avgOff/(tolerance*2.4), -1, 1);
  return normalized * 3.2; // ±3.2 pace units — noticeable but never race-defining
}

/* ---------- Season-end AI team development ----------
   Every team (including the player's, on top of whatever the player manually
   bought) drifts carStrength/reliability at season end. Each team has its own
   ambition/volatility/reliabilityFocus (devTrend in data.js) so progression is
   not uniform: some teams climb steadily, some boom-or-bust, some slowly fade.
   A mild rubber-band nudges lower-tier teams' ambition up slightly and
   high-tier teams' ambition down slightly, so the grid doesn't diverge forever
   while still allowing a genuine title-fight upset over a multi-season save.
   Fully deterministic formula + bounded randomness per team — no AI involved. */
function developTeamsForNewSeason(state, difficultySettings){
  const diff = difficultySettings || DIFFICULTY_SETTINGS.Standard;
  const strengths = TEAMS.map(t=>t.carStrength);
  const avgStrength = strengths.reduce((a,b)=>a+b,0)/strengths.length;

  TEAMS.forEach(team=>{
    const trend = team.devTrend || {ambition:0.5, volatility:1.5, reliabilityFocus:0.3};
    // rubber-band: teams below average get a small ambition boost, teams above get a small penalty
    const gapFromAvg = avgStrength - team.carStrength;
    const rubberBand = clamp(gapFromAvg * 0.025, -0.5, 0.5);
    const seasonRoll = rand(-trend.volatility, trend.volatility);
    let delta = (trend.ambition + rubberBand + seasonRoll) * diff.aiDevMult;

    // split the season's development budget between pace and reliability
    const paceDelta = delta * (1 - trend.reliabilityFocus);
    const reliabilityDelta = delta * trend.reliabilityFocus * 0.6;

    team.carStrength = clamp(Math.round((team.carStrength + paceDelta)*10)/10, 40, 99);
    team.reliability = clamp(Math.round((team.reliability + reliabilityDelta)*10)/10, 3, 10);
  });

  if(state && state.newsFeed){
    const sorted = [...TEAMS].sort((a,b)=>b.carStrength-a.carStrength);
    const topTeam = sorted[0];
    pushStateNews(state, `🏗️ Off-season development complete. ${topTeam.flag} ${topTeam.name} enters the new season with the strongest car on the grid.`);
  }
}

/* ---------- AI grid driver skill drift (anti-overpower dynamic rivals) ----------
   Previously every AI grid driver's skill attributes were rolled ONCE at
   creation (createDriverAttributes(), called from makeRivalDriver() above)
   and never touched again except the one-off mentoring bonus for a
   graduated protégé -- meaning whoever happened to roll high stayed on top
   of the standings indefinitely, and the points leader used for
   enforcePlayerSkillCap() (app_core.js) never meaningfully changed identity
   over a career. This gives every surviving AI driver a small, age-biased
   season-over-season drift: young drivers (under ~26) trend up toward
   their prime, drivers past ~30 trend down as they age out, and the
   in-between years are a small, roughly neutral random walk -- the same
   "bounded randomness, no player skill required" shape as
   developTeamsForNewSeason's own car-strength drift above, just applied to
   individual driver skill instead of team performance. Called from
   handleSeasonEnd() (app_screens.js) right after the age++ loop, BEFORE
   processGridRetirements() runs, so a driver's final season already
   reflects their age-appropriate trajectory. Legend drivers (isLegend) are
   exempt -- they're meant to represent a retired player at a fixed,
   already-earned skill level, not keep developing. */
function developGridDriversForNewSeason(state){
  state.grid.forEach(driver=>{
    if(driver.isLegend) return;
    const age = driver.age||25;
    // Peak years roughly 26-30 (matches retirementChanceForAge's own curve
    // starting to bite at 34+): younger drivers trend up toward it, older
    // drivers trend down away from it, prime-age drivers get a small
    // roughly-neutral wobble either way.
    let bias;
    if(age < 24) bias = 1.2;
    else if(age < 26) bias = 0.6;
    else if(age <= 30) bias = 0;
    else if(age <= 34) bias = -0.6;
    else bias = -1.4;
    ['driving','mental'].forEach(group=>{
      Object.keys(driver.attributes[group]).forEach(stat=>{
        const delta = bias + rand(-1.5, 1.5);
        driver.attributes[group][stat] = clamp(Math.round(driver.attributes[group][stat] + delta), 20, 99);
      });
    });
  });
}

function getDifficultySettings(state){
  return DIFFICULTY_SETTINGS[state.player.difficulty] || DIFFICULTY_SETTINGS.Standard;
}

const RIVALRY_LEVELS = [
  {min:0,  name:'Unfamiliar'},
  {min:20, name:'Competitive'},
  {min:45, name:'Rival'},
  {min:70, name:'Arch Rival'},
  {min:90, name:'Legendary Rival'},
];
function rivalryLevelName(val){
  let name = RIVALRY_LEVELS[0].name;
  for(const lvl of RIVALRY_LEVELS){ if(val>=lvl.min) name = lvl.name; }
  return name;
}

/* Driving style progress: each strategy choice nudges the player toward a signature style.
   Once one style reaches a threshold of uses, it becomes the player's official Driving Style. */
const STYLE_FOR_APPROACH = { push:'Aggressive', attack:'Aggressive', defend:'Defensive', saveTires:'Tyre Saver' };
function recordStyleProgress(player, approach){
  const style = STYLE_FOR_APPROACH[approach];
  if(!style) return null;
  player.styleProgress[style] = (player.styleProgress[style]||0) + 1;
  if(!player.drivingStyle && player.styleProgress[style] >= 5){
    player.drivingStyle = style;
    return style;
  }
  // style can shift if another style pulls far enough ahead
  if(player.drivingStyle && player.styleProgress[style] >= (player.styleProgress[player.drivingStyle]||0) + 6){
    player.drivingStyle = style;
    return style;
  }
  return null;
}

const POINTS_TABLE = [25,18,15,12,10,8,6,4,2,1];
function pointsForPosition(pos){ return (!pos || pos>10) ? 0 : POINTS_TABLE[pos-1]; }
const SPRINT_POINTS_TABLE = [8,7,6,5,4,3,2,1];
function sprintPointsForPosition(pos){ return (!pos || pos>8) ? 0 : SPRINT_POINTS_TABLE[pos-1]; }

function checkReputationArchetypes(driver){
  const earned = [];
  for(const arch of REPUTATION_ARCHETYPES){
    try{ if(arch.test(driver)) earned.push(arch.id); }catch(e){}
  }
  return earned;
}

/* ---------- Career legacy (retirement -> next career) ----------
   Fully deterministic: picking a perk applies a fixed, known bonus. No RNG,
   no AI — the player always knows exactly what they're choosing. */
const LEGACY_PERKS = [
  {id:'prodigy', name:'Family Name Recognition', icon:'📰', desc:'Start your next driver with +20 Fan Popularity and +10 Media Reputation.',
   apply:(cfg)=>{ cfg.legacyBonus = {...(cfg.legacyBonus||{}), fanPopularity:20, mediaReputation:10}; }},
  {id:'wealth', name:'Family Fortune', icon:'💰', desc:'Start your next driver with $15M banked instead of $5M.',
   apply:(cfg)=>{ cfg.legacyBonus = {...(cfg.legacyBonus||{}), money:15}; }},
  {id:'academy', name:'Old Racing Contacts', icon:'🤝', desc:'Start your next driver with a Tier 2 team offer available from lap one, even as a nobody.',
   apply:(cfg)=>{ cfg.legacyBonus = {...(cfg.legacyBonus||{}), tierBoost:true}; }},
  {id:'coaching', name:'Inherited Coaching', icon:'🎓', desc:'Start your next driver with +6 to every driving attribute.',
   apply:(cfg)=>{ cfg.legacyBonus = {...(cfg.legacyBonus||{}), drivingBoost:6}; }},
];

/* ---------- Mentor / protégé system (19.1 #6, homeLevel's first real
   mechanical hook per 19.8) ----------
   A protégé is NOT a grid driver and never touches state.grid while being
   mentored -- it's a lightweight object living only on p.protege. This is
   deliberate: any path that puts a NAMED driver onto the grid must go
   through the same replace-not-append discipline as makeLegendDriver()/
   rebalanceGridForTeamChange() or it can silently push the grid past its
   fixed 22-driver invariant (that exact bug has happened twice before in
   this project's history). Making the protégé graduate ONLY at the moment
   an existing AI driver retires -- taking that exact slot via
   state.grid[idx]=... instead of a freshly generated rookie -- means grid
   size arithmetic never changes: it's still one retirement, one
   replacement, every time. */
function makeProtege(playerNationality){
  const nation = pick(NATIONALITIES);
  const firstNames = FALLBACK_FIRST_NAMES, lastNames = FALLBACK_LAST_NAMES;
  return {
    name: `${pick(firstNames)} ${pick(lastNames)}`,
    nationality: nation, flag: FLAG_BY_NATION[nation],
    mentorProgress: 0, // 0-100, graduates at 100
    graduated: false,
  };
}

/* Builds the actual grid driver from a graduated protégé -- same shape as
   makeRivalDriver() but skill is nudged up by how much mentoring it
   received (a well-mentored protégé debuts more competitive than a totally
   fresh rookie would), capped so it's still a rookie, not a superstar. */
function makeGraduatedProtegeDriver(protege, teamId){
  const driver = makeRivalDriver(protege.name, teamId);
  driver.nationality = protege.nationality;
  driver.flag = protege.flag;
  driver.age = randInt(19, 22);
  const mentorBonus = Math.round((protege.mentorProgress/100) * 8); // up to +8 baseSkill-equivalent
  Object.keys(driver.attributes.driving).forEach(k=>{ driver.attributes.driving[k] = clamp(driver.attributes.driving[k] + mentorBonus, 0, 99); });
  driver.isProtegeGraduate = true; // flavor flag only, no mechanical effect elsewhere -- lets UI/news call this out specifically
  return driver;
}

/* Carries a slice of the retiring driver's identity into the new save as a
   legendary AI grid entry, so their old career remains present in the world
   (a rival to race against, not an unbeatable wall — capped baseSkill so it
   stays fair at any difficulty). */
function makeLegendDriver(retiredPlayer, teamId){
  const team = TEAMS.find(t=>t.id===teamId) || pick(TEAMS.filter(t=>t.tier<=2)) || TEAMS[0];
  const legendSkill = clamp(overallRating(retiredPlayer.attributes) - 8, 55, 90);
  const legend = makeRivalDriver(`${retiredPlayer.name} (Legend)`, team.id);
  legend.attributes = createDriverAttributes(legendSkill);
  legend.isLegend = true;
  legend.age = clamp(retiredPlayer.age - 14, 24, 34); // returns as if entering their prime years, not their retirement age
  legend.careerStats = {...retiredPlayer.careerStats};
  return legend;
}

/* ---------- Grid driver aging & retirement ----------
   Every AI driver on the grid ages each season alongside the player. Once a
   driver crosses a soft retirement age, a small per-season retirement chance
   kicks in and grows with age — nobody is guaranteed to retire at a fixed
   age (avoids every driver retiring in lockstep), but by the late 30s it
   becomes very likely. A retiring driver is replaced by a freshly generated
   rookie at the same team, keeping grid size constant. Rivalry with the
   player is intentionally NOT carried over to the replacement — a new driver
   is a new relationship, not a reskin of the old rival. Deterministic
   formula + a single random roll per driver per season; no AI involved. */
function retirementChanceForAge(age){
  if(age < 34) return 0;
  if(age < 37) return 0.08;
  if(age < 40) return 0.22;
  if(age < 43) return 0.45;
  return 0.75;
}

function processGridRetirements(state){
  const retirees = [];
  // A graduated, un-placed protégé takes priority over a fresh rookie for
  // the FIRST retirement slot that opens this season -- at most one
  // graduation per season, same one-at-a-time cadence as a normal
  // retirement, so this never creates a burst that could be confused with
  // multiple simultaneous grid changes.
  let protegeToPlaceThisSeason = (state.player.protege && state.player.protege.graduated) ? state.player.protege : null;
  state.grid.forEach((driver, idx)=>{
    if(driver.isLegend) return; // legacy legend drivers are exempt from random retirement churn
    const chance = retirementChanceForAge(driver.age);
    if(chance > 0 && Math.random() < chance){
      retirees.push({ name: driver.name, teamId: driver.teamId });
      let replacement;
      if(protegeToPlaceThisSeason){
        replacement = makeGraduatedProtegeDriver(protegeToPlaceThisSeason, driver.teamId);
        pushStateNews(state, `🌟 ${protegeToPlaceThisSeason.name}, ${state.player.name}'s protégé, joins ${TEAMS.find(t=>t.id===driver.teamId)?.name || 'the grid'} as a full-time driver!`);
        state.player.protege = null; // fully consumed -- placed on the grid, no longer tracked as a protégé
        protegeToPlaceThisSeason = null;
      } else {
        const freshName = generateFreshDriverName(state, driver.teamId);
        replacement = makeRivalDriver(freshName, driver.teamId);
        replacement.age = randInt(19, 23); // replacements always enter as young rookies
      }
      state.grid[idx] = replacement;
      if(state.rivalId === driver.id) state.rivalId = null; // rivalry ends when a rival retires
    }
  });
  if(retirees.length && state.newsFeed){
    retirees.forEach(r=>{
      const team = TEAMS.find(t=>t.id===r.teamId);
      pushStateNews(state, `🏁 ${r.name} announces retirement from ${team ? team.name : 'the grid'} at the end of the season.`);
    });
  }
  return retirees;
}

/* ---------- Team staff (npcRoster) aging & retirement ----------
   Every non-Team-Principal staff member (Chief Engineer, Race Engineer,
   Doctor, Journalist, Best Friend, Streamer Pal) has an implicit career
   length: after a set number of seasons in the role, they have a chance to
   move on, replaced by a new person with a freshly rolled personality. The
   Team Principal is explicitly exempt from this per-season churn — they only
   change once state.careerRetirementCount (a running tally of every grid
   driver retirement seen so far, across the whole career) crosses a
   multiple of 10, modeling a much rarer front-office shake-up rather than
   ordinary staff turnover. Relationship progress with a departing staff
   member is intentionally reset for their replacement — a new person hasn't
   earned that trust yet. */
function processStaffTurnover(state, retireeCountThisSeason){
  const changes = [];
  if(!state.npcRoster) return changes;
  state.npcRoster.forEach((npc, idx)=>{
    if(npc.role === 'Team Principal') return; // handled separately below
    npc.tenureSeasons = (npc.tenureSeasons||0) + 1;
    const baseChance = clamp((npc.tenureSeasons - 4) * 0.06, 0, 0.35);
    if(baseChance > 0 && Math.random() < baseChance){
      const oldName = npc.name;
      const engineerPersonality = pick(ENGINEER_PERSONALITIES);
      const gender = pick(['M','F']);
      const wasWellLiked = npc.relationship.friendship >= 65;
      state.npcRoster[idx] = {
        id: uid('npc'), role: npc.role, name: randomName(gender), gender,
        relationship: { friendship:35, trust:35, affection: npc.role==='Best Friend'?40:15, respect:35, compatibility:randInt(30,70), memories:[] },
        personality: npc.role==='Race Engineer' ? engineerPersonality : pick(['Calm','Energetic','Strict','Funny']),
        tenureSeasons: 0,
        romance: { status:'none', spark:0 },
      };
      changes.push({ role: npc.role, oldName, newName: state.npcRoster[idx].name });
      // Losing a well-liked engineer/principal dents team chemistry a little;
      // other departing roles (Doctor/Journalist/Best Friend/Streamer Pal)
      // don't affect car-side team morale.
      if(wasWellLiked && (npc.role==='Chief Engineer' || npc.role==='Race Engineer') && state.player){
        state.teamMorale = state.teamMorale || {};
        const teamId = state.player.teamId;
        state.teamMorale[teamId] = clamp((state.teamMorale[teamId]||65) - 5, 0, 100);
      }
    }
  });

  state.careerRetirementCount = (state.careerRetirementCount||0) + retireeCountThisSeason;
  const priorMilestone = Math.floor(((state.careerRetirementCount - retireeCountThisSeason)) / 10);
  const newMilestone = Math.floor(state.careerRetirementCount / 10);
  // Team Principal respect (previously write-only -- "Discuss season
  // expectations" moved it, nothing read it back): a Team Principal you've
  // built real respect with is a little more secure in the job even when
  // the milestone hits (small chance they survive it); one you've shown
  // little respect can go early, before the milestone, on a small
  // independent roll. Kept low-probability and separate from the milestone
  // logic itself so the 10-retirement cadence is still the main driver of
  // Team Principal turnover -- respect nudges timing, doesn't replace it.
  const tpIdx = state.npcRoster ? state.npcRoster.findIndex(n=>n.role==='Team Principal') : -1;
  const tpRespect = tpIdx>=0 ? (state.npcRoster[tpIdx].relationship.respect||50) : 50;
  const milestoneHit = newMilestone > priorMilestone;
  const survivesOnRespect = milestoneHit && tpRespect>=75 && Math.random()<0.4;
  const earlyDepartureOnDisrespect = !milestoneHit && tpRespect<25 && Math.random()<0.03;
  if((milestoneHit && !survivesOnRespect) || earlyDepartureOnDisrespect){
    if(tpIdx >= 0){
      const oldName = state.npcRoster[tpIdx].name;
      const gender = pick(['M','F']);
      state.npcRoster[tpIdx] = {
        id: uid('npc'), role:'Team Principal', name: randomName(gender), gender,
        relationship: { friendship:35, trust:35, affection:15, respect:35, compatibility:randInt(30,70), memories:[] },
        personality: pick(['Calm','Energetic','Strict','Funny']),
        tenureSeasons: 0,
        romance: { status:'none', spark:0 },
      };
      changes.push({ role:'Team Principal', oldName, newName: state.npcRoster[tpIdx].name });
    }
  }

  if(changes.length && state.newsFeed){
    changes.forEach(c=>{
      pushStateNews(state, `👋 ${c.oldName} steps down as ${c.role}. ${c.newName} takes over the role.`);
    });
  }
  return changes;
}

/* ---------- Dynamic scouting interest (mid-contract team interest) ----------
   Separate from the end-of-contract renewal flow: other teams can express
   interest in the player DURING an active contract, based on a mix of
   current standing, team morale, and reputation — modeling how real paddock
   interest works. Smaller/lower-tier teams reach out to a player having a
   rough season (a lifeline, "we believe in your potential"); bigger/higher-
   tier teams reach out to a player performing well or with strong morale.
   This never forces anything — it's a proactive one-off notification the
   player can act on via a dedicated "Talk Contract" flow, or ignore, and
   their current contract is untouched unless they choose to switch. Fully
   deterministic given the state + a single random roll for scoring/chance —
   no AI/LLM involved. */
function checkScoutingInterest(state){
  const s = state; const p = s.player;
  if(!p || p.retired) return null;
  if(s.scoutingOffer) return null; // don't stack multiple pending offers
  if(p.contract.years <= 1) return null; // let the normal renewal flow handle expiring contracts

  const standing = Object.entries(s.standings||{}).sort((a,b)=>b[1]-a[1]).findIndex(([id])=>id==='player');
  const playerStanding = standing===-1 ? 12 : standing+1;
  const currentTeam = TEAMS.find(t=>t.id===p.teamId);
  const morale = (s.teamMorale && s.teamMorale[p.teamId]) || 65;

  // Base weekly chance is small; it scales up if the player's situation is
  // notable in either direction (very strong or, for the lifeline case,
  // notably struggling relative to their team's own tier expectations).
  let baseChance = 0.015;
  let interestedTiers = [];

  if(playerStanding <= 6 || p.fanPopularity >= 65){
    // Strong performer or fan-favorite: bigger/equal teams take notice.
    baseChance = 0.03;
    interestedTiers = [1, 2].filter(t=>t <= currentTeam.tier); // equal-or-better tier
  } else if(playerStanding >= 16 && currentTeam.tier <= 2){
    // Struggling at a mid/top team: a smaller team sees an opportunity to
    // pick up undervalued talent at a discount — the "lifeline" case.
    baseChance = 0.025;
    interestedTiers = [3];
  } else if(morale >= 85){
    // Great team chemistry can itself draw attention (paddock notices happy,
    // settled drivers performing to potential).
    baseChance = 0.02;
    interestedTiers = [Math.max(1, currentTeam.tier-1)];
  }

  if(!interestedTiers.length) return null;
  if(Math.random() > baseChance) return null;

  const candidateTeams = TEAMS.filter(t=>t.id!==currentTeam.id && interestedTiers.includes(t.tier));
  if(!candidateTeams.length) return null;
  const suitor = pick(candidateTeams);

  const offer = {
    teamId: suitor.id,
    years: randInt(1,3),
    salary: Math.max(1, Math.round(suitor.carStrength/10) + randInt(-1,1)),
    reason: playerStanding<=6 ? 'performance' : playerStanding>=16 ? 'potential' : 'morale',
  };
  s.scoutingOffer = offer;
  const reasonText = offer.reason==='performance' ? `after watching ${p.name}'s recent results`
    : offer.reason==='potential' ? `and believe ${p.name} is undervalued at their current team`
    : `impressed by ${p.name}'s form and happy environment this season`;
  pushStateNews(s, `📞 ${suitor.flag} ${suitor.name} have quietly reached out ${reasonText}.`);
  return offer;
}

/* ---------- Save / Load ---------- */
// Renamed from the pre-rename 'apexpal_save_v1' to match the shipped game
// name. OLD_SAVE_KEY is read once by loadGame() as a migration fallback --
// if a player's browser still only has data under the old key (any save
// made before this rename), it's copied over to the new key and returned
// normally, so no existing save is lost. New saves are always written
// under SAVE_KEY only; the old key is never written to again.
const SAVE_KEY = 'formulaonedirection_save_v1';
const OLD_SAVE_KEY = 'apexpal_save_v1';
function saveGame(state){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); return true; }
  catch(e){ console.error('Save failed', e); return false; }
}
function loadGame(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(raw) return JSON.parse(raw);
    // Migration fallback: an old save under the pre-rename key, never yet
    // moved over. Copy it forward once so it isn't stranded.
    const oldRaw = localStorage.getItem(OLD_SAVE_KEY);
    if(oldRaw){
      localStorage.setItem(SAVE_KEY, oldRaw);
      return JSON.parse(oldRaw);
    }
    return null;
  }
  catch(e){ console.error('Load failed', e); return null; }
}
function deleteSave(){ localStorage.removeItem(SAVE_KEY); localStorage.removeItem(OLD_SAVE_KEY); }

/* ---------- Legacy storage (survives deleteSave, one pending record) ----------
   Written when a retiring player picks a legacy perk; consumed the next time
   startNewCareer() runs. Deliberately separate from SAVE_KEY so retiring and
   starting fresh doesn't fight with the normal save/delete lifecycle. */
const LEGACY_KEY = 'apexpal_legacy_v1';
function savePendingLegacy(record){
  try{ localStorage.setItem(LEGACY_KEY, JSON.stringify(record)); return true; }
  catch(e){ console.error('Legacy save failed', e); return false; }
}
function loadPendingLegacy(){
  try{ const raw = localStorage.getItem(LEGACY_KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
function clearPendingLegacy(){ localStorage.removeItem(LEGACY_KEY); }

/* ---------- Multi-career Hall of Fame (survives deleteSave, one array) ----------
   Currently p.careerStats/seasonAwardsWon only ever describe the ACTIVE
   career -- nothing about a retired driver persisted past deleteSave()
   except the single pendingLegacy record (which itself gets consumed and
   cleared on the next career start). This is a separate, append-only
   record of every retired career's headline numbers, isolated from
   SAVE_KEY/LEGACY_KEY so it survives new careers, deleted saves, and
   legacy-perk consumption indefinitely. A corrupt or missing HOF array
   must never be able to break an active career, hence the same defensive
   try/catch pattern as the save/legacy functions above, and every read
   site treats a failure as "no history yet" rather than propagating. */
const HOF_KEY = 'apexpal_hof_v1';
function loadHallOfFame(){
  try{ const raw = localStorage.getItem(HOF_KEY); const parsed = raw ? JSON.parse(raw) : []; return Array.isArray(parsed) ? parsed : []; }
  catch(e){ return []; }
}
function appendToHallOfFame(entry){
  try{
    const list = loadHallOfFame();
    list.unshift(entry);
    if(list.length>50) list.length = 50; // generous cap, avoids unbounded localStorage growth over many careers
    localStorage.setItem(HOF_KEY, JSON.stringify(list));
    return true;
  }catch(e){ console.error('Hall of Fame save failed', e); return false; }
}
/* Deletes a single Hall of Fame entry by its position in the array
   returned by loadHallOfFame() (there's no separate unique id on these
   compact summary records -- index is a stable-enough handle since the
   Museum modal re-renders the whole list fresh after every mutation, so
   there's never a stale index lying around in the UI). Same
   read-modify-write + defensive try/catch pattern as appendToHallOfFame. */
function removeFromHallOfFame(index){
  try{
    const list = loadHallOfFame();
    if(index<0 || index>=list.length) return false;
    list.splice(index, 1);
    localStorage.setItem(HOF_KEY, JSON.stringify(list));
    return true;
  }catch(e){ console.error('Hall of Fame delete failed', e); return false; }
}
/* Builds the compact summary record written at retirement -- deliberately
   just headline numbers (not the full player object like the legacy
   snapshot uses) since this needs to stay small across potentially many
   retired careers, and the retrospective/legacy systems already cover the
   detailed view of the MOST RECENT retirement. */
function buildHallOfFameEntry(state){
  const p = state.player;
  const bestSeason = [...state.history].sort((a,b)=>a.standing-b.standing)[0];
  const teamsRaced = [...new Set(state.history.map(h=>h.team))];
  return {
    name: p.name, flag: p.flag, nationality: p.nationality,
    seasons: state.history.length,
    wins: p.careerStats.wins, podiums: p.careerStats.podiums, poles: p.careerStats.poles,
    points: p.careerStats.points, starts: p.careerStats.starts,
    awardsCount: p.seasonAwardsWon.length,
    bestStanding: bestSeason ? bestSeason.standing : null,
    teamsRaced,
    retiredSeason: state.season,
  };
}




/* ============================================================
   FORMULA ONE DIRECTION — APP CORE
   Boot, character creation, and the universal editable-name system
   ============================================================ */

const App = {
  state: null,
  currentScreen: 'boot',
  activeModal: null,
  createConfig: { gender:'M', nationality: NATIONALITIES[2], teamId:'nova', difficulty:'Standard', name:'' },

  init(){
    this.root = document.getElementById('screen');
    this.wireGlobalNav();
    this.renderBoot();
  },

  wireGlobalNav(){
    document.querySelectorAll('#bottom-nav [data-nav]').forEach(btn=>{
      btn.onclick = ()=> this.handleNav(btn.dataset.nav);
    });
  },

  toast(msg){
    let wrap = document.querySelector('.toast-wrap');
    if(!wrap){ wrap = document.createElement('div'); wrap.className='toast-wrap'; document.getElementById('device').appendChild(wrap); }
    const t = document.createElement('div'); t.className='toast'; t.textContent = msg;
    wrap.appendChild(t);
    setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 3200);
  },

  /* ---------------- BOOT ---------------- */
  renderBoot(){
    document.getElementById('status-strip').style.display = 'none';
    document.getElementById('ticker').style.display = 'none';
    document.getElementById('bottom-nav').style.display = 'none';
    const hasSave = !!loadGame();
    this.root.innerHTML = `
      <div class="boot-wrap">
        <div class="boot-sprite">🏎️</div>
        <div>
          <div class="boot-eyebrow">A Pocket Racing Life</div>
          <div class="boot-title">FORMULA<br>ONE <span class="accent">DIRECTION</span></div>
        </div>
        <div class="stack-8" style="width:100%; max-width:260px;">
          <button class="pbtn full gold" id="btn-new-game">New Career</button>
          ${hasSave ? `<button class="pbtn full mint" id="btn-continue">Continue</button>` : ''}
          <button class="pbtn full" id="btn-import-save" style="font-size:8px;">📋 Restore from Exported Save</button>
        </div>
      </div>
    `;
    document.getElementById('btn-new-game').onclick = ()=>{
      // createConfig is a singleton on App, never reset on its own -- without
      // this, starting a second career in the same browser session (e.g.
      // after retiring) would silently pre-fill the name/gender/nationality/
      // team/difficulty fields from the PREVIOUS driver instead of a clean
      // slate, since renderCreateCharacter() just reads whatever's already
      // sitting in this.createConfig.
      this.createConfig = { gender:'M', nationality: NATIONALITIES[2], teamId:'nova', difficulty:'Standard', name:'' };
      this.renderCreateCharacter();
    };
    if(hasSave) document.getElementById('btn-continue').onclick = ()=> this.continueGame();
    document.getElementById('btn-import-save').onclick = ()=> this.renderImportModal();
  },

  renderImportModal(){
    this.openModal(`
      ${this.modalHeader('Restore Save')}
      <div class="section-sub" style="margin-bottom:10px;">Paste your exported save text below.</div>
      <textarea id="import-text" placeholder="Paste save data here..." style="width:100%; height:120px; font-size:9px; font-family:var(--font-mono,monospace); border:2px solid var(--pixel-border); border-radius:8px; padding:8px;"></textarea>
      <button class="pbtn full gold" id="btn-do-import" style="margin-top:10px;">Restore Career</button>
    `);
    this.wireModalClose();
    document.getElementById('btn-do-import').onclick = ()=>{
      const raw = document.getElementById('import-text').value.trim();
      if(!raw){ this.toast('Paste your save data first.'); return; }
      try{
        const parsed = JSON.parse(raw);
        if(!parsed.player || !parsed.grid){ throw new Error('missing fields'); }
        this.state = parsed;
        this.syncTeamsFromState();
        if(!this.state.cosmetics) this.state.cosmetics = this.initialCosmeticsState();
        if(!this.state.player.setupTrainingByTrack) this.state.player.setupTrainingByTrack = {};
        if(this.state.player.trainingActionsThisWeek===undefined) this.state.player.trainingActionsThisWeek = 0;
        if(this.state.player.protege===undefined) this.state.player.protege = null;
        if(this.state.player.joinedTeamOnSeason===undefined) this.state.player.joinedTeamOnSeason = this.state.careerStartSeason || this.state.season;
        if(this.state.calendar && this.state.calendar.midSeasonDevRoundIndex===undefined){
          this.state.calendar.midSeasonDevRoundIndex = pickMidSeasonDevRoundIndex(this.state.calendar.rounds.length);
          this.state.calendar.midSeasonDevApplied = false;
        }
        if(!this.state.prevTeamStrength) this.state.prevTeamStrength = Object.fromEntries(TEAMS.map(t=>[t.id, t.carStrength]));
        if(this.state.careerRetirementCount===undefined) this.state.careerRetirementCount = 0;
        if(!this.state.careerStartSeason) this.state.careerStartSeason = this.state.season;
        (this.state.npcRoster||[]).forEach(n=>{
          if(n.tenureSeasons===undefined) n.tenureSeasons = 0;
          if(!n.gender) n.gender = pick(['M','F']);
          if(!n.romance) n.romance = { status:'none', spark:0 };
        });
        (this.state.grid||[]).forEach(d=>{
          if(!d.gender) d.gender = 'M';
          if(!d.romance) d.romance = { status:'none', spark:0 };
        });
        if(this.state.metPartner===undefined) this.state.metPartner = null;
        if(this.state.pendingRomanceCandidates===undefined) this.state.pendingRomanceCandidates = null;
    if(this.state.scoutingOffer===undefined) this.state.scoutingOffer = null;
    if(!this.state.player.unlockedSponsorTiers) this.state.player.unlockedSponsorTiers = [1];
    if(!this.state.seasonStartCareerWins) this.state.seasonStartCareerWins = Object.fromEntries(this.state.grid.map(d=>[d.id, d.careerStats.wins||0]));
    (this.state.calendar.rounds||[]).forEach(r=>{
      if(r.isSprint===undefined) r.isSprint = false;
      if(r.sprintCompleted===undefined) r.sprintCompleted = false;
    });
        saveGame(this.state);
        this.closeModal();
        this.showChrome();
        this.currentScreen = 'hub';
        this.renderHub();
        this.toast('Career restored!');
      }catch(e){
        this.toast('That save data looks invalid.');
      }
    };
  },

  continueGame(){
    const loaded = loadGame();
    if(!loaded){ this.toast('No save found.'); return; }
    this.state = loaded;
    this.syncTeamsFromState();
    // Backward compatibility: saves from before certain features existed
    // won't have these fields — initialize them defensively so old saves
    // keep working rather than crashing.
    if(!this.state.cosmetics) this.state.cosmetics = this.initialCosmeticsState();
    if(!this.state.player.setupTrainingByTrack) this.state.player.setupTrainingByTrack = {};
    if(this.state.player.trainingActionsThisWeek===undefined) this.state.player.trainingActionsThisWeek = 0;
    if(this.state.player.protege===undefined) this.state.player.protege = null;
    if(this.state.player.joinedTeamOnSeason===undefined) this.state.player.joinedTeamOnSeason = this.state.careerStartSeason || this.state.season;
    if(this.state.calendar && this.state.calendar.midSeasonDevRoundIndex===undefined){
      this.state.calendar.midSeasonDevRoundIndex = pickMidSeasonDevRoundIndex(this.state.calendar.rounds.length);
      this.state.calendar.midSeasonDevApplied = false;
    }
    if(!this.state.prevTeamStrength) this.state.prevTeamStrength = Object.fromEntries(TEAMS.map(t=>[t.id, t.carStrength]));

  /* ---------------- SKILL CAP (anti-overpower) ----------------
     Every driving/mental stat-changing action in the game (training,
     dialogue effects, race-day feedback, mentoring) routes through
     saveState() before persisting -- see ARCHITECTURE in the handoff doc.
     Rather than threading a cap through 20+ scattered write sites (every
     `p.attributes.X.Y = clamp(...)` call across app_actions.js/app_race.js),
     this enforces the cap ONCE, centrally, right here, so no future stat
     effect can silently bypass it by forgetting to call a helper.

     The cap itself: each of the player's driving/mental stats is capped at
     the CURRENT grid leader's same stat + SKILL_CAP_MARGIN. "Leader" means
     the AI driver on top of the points standings -- re-evaluated every
     single call, so the cap tracks whoever is actually leading right now,
     not a fixed reference driver. If the player themselves is the points
     leader, the cap instead uses the best AI driver's stat (the grid's
     runner-up by points), so leading the championship doesn't remove the
     ceiling entirely -- it just means the player is competing against the
     next-best AI driver instead of themselves.

     Deliberately per-stat (not "average" or "overall rating"): a leader
     who's elite at braking but mediocre at wet skill produces a cap that's
     high on braking and low on wet skill for the player too, so the cap
     reflects a real competitive ceiling stat-by-stat rather than a single
     flattened number. Lifestyle stats (fitness/mood/stress/energy) are
     deliberately NOT capped here -- they're not competitive "skill" in the
     same sense and already have their own bounded ranges. */
  enforcePlayerSkillCap(){
    const s = this.state; const p = s.player;
    if(!p || !s.grid || !s.grid.length) return;
    const SKILL_CAP_MARGIN = 8;
    const sortedByPoints = [...s.grid].sort((a,b)=>(s.standings?.[b.id]||0)-(s.standings?.[a.id]||0));
    const playerPoints = s.standings?.['player']||0;
    const aiLeaderPoints = s.standings?.[sortedByPoints[0]?.id]||0;
    // If the player is actually ahead of every AI driver on points, the
    // "leader" for cap purposes is the best AI driver instead (still
    // sortedByPoints[0] -- there's no separate driver to fall back to,
    // the grid's own #1 AI driver IS the right reference either way).
    const referenceDriver = sortedByPoints[0];
    if(!referenceDriver) return;
    ['driving','mental'].forEach(group=>{
      Object.keys(p.attributes[group]).forEach(stat=>{
        const cap = (referenceDriver.attributes[group][stat]||0) + SKILL_CAP_MARGIN;
        if(p.attributes[group][stat] > cap) p.attributes[group][stat] = cap;
      });
    });
  },

  /* Read-only check used by the Training modal to flag a stat that's
     already at (or within 2 of) its skill-cap ceiling, BEFORE the player
     spends energy/money on a session that can't meaningfully move it.
     Mirrors enforcePlayerSkillCap()'s exact reference-driver logic so the
     two never drift out of sync with each other. */
  isNearSkillCap(group, stat){
    const s = this.state; const p = s.player;
    if(!p || !s.grid || !s.grid.length) return false;
    const SKILL_CAP_MARGIN = 8;
    const sortedByPoints = [...s.grid].sort((a,b)=>(s.standings?.[b.id]||0)-(s.standings?.[a.id]||0));
    const referenceDriver = sortedByPoints[0];
    if(!referenceDriver) return false;
    const cap = (referenceDriver.attributes[group][stat]||0) + SKILL_CAP_MARGIN;
    return p.attributes[group][stat] >= cap - 2;
  },

  /* ---------------- TEAMS persistence ----------------
     TEAMS (data.js) is a plain in-memory JS constant -- it is NOT part of
     App.state and is NOT written to localStorage on its own. Before this
     pair of helpers existed, every mutation to team.carStrength/reliability/
     upgrades/devSlotsUsed (from AI seasonal development, player car
     upgrades, or regulation changes) was silently lost on every page
     reload, since a fresh page load re-runs data.js from scratch and
     resets every team back to its hardcoded starting numbers. This was a
     real, pre-existing bug independent of the per-team development rework
     -- it just became far more consequential once development stopped
     being a purely cosmetic display number.

     Fix: snapshot the mutable per-team fields into s.teamState right before
     every save, and restore TEAMS from that snapshot right after every
     load. Deliberately narrow (only the fields that actually change at
     runtime) so this stays cheap and easy to extend later. */
  syncTeamsToState(){
    if(!this.state) return;
    this.state.teamState = Object.fromEntries(TEAMS.map(t=>[t.id, {
      carStrength: t.carStrength,
      reliability: t.reliability,
      upgrades: {...(t.upgrades||buildInitialTeamUpgrades(t.tier))},
      devSlotsUsed: t.devSlotsUsed||0,
    }]));
  },
  syncTeamsFromState(){
    if(!this.state || !this.state.teamState) return;
    TEAMS.forEach(t=>{
      const saved = this.state.teamState[t.id];
      if(!saved) return;
      t.carStrength = saved.carStrength;
      t.reliability = saved.reliability;
      t.upgrades = {...(saved.upgrades||buildInitialTeamUpgrades(t.tier))};
      t.devSlotsUsed = saved.devSlotsUsed||0;
    });
  },

  adjustTeamMorale(teamId, delta){
    if(!this.state.teamMorale) this.state.teamMorale = Object.fromEntries(TEAMS.map(t=>[t.id, 65]));
    // Team culture (data.js TEAMS[].culture, e.g. "Emotional, fast, high
    // pressure" vs "Traditional, patient, loyal") was previously flavor
    // text only -- displayed on the Team & Car screen, never touching
    // morale mechanics despite reading like it should. TEAMS[].devTrend.
    // volatility is the numeric value that same culture text is actually
    // describing (it already drives how wildly a team's car development
    // swings season to season) -- reusing it here for morale swings too
    // means a "high pressure"/"volatile" team's morale genuinely swings
    // harder on the same events a "patient, loyal" team shrugs off, without
    // inventing a second parallel culture field to keep in sync.
    const team = TEAMS.find(t=>t.id===teamId);
    const volatility = (team && team.devTrend && team.devTrend.volatility) || 1.5;
    const cultureMult = clamp(volatility/1.5, 0.7, 1.5); // 1.5 is the roster's rough average volatility
    this.state.teamMorale[teamId] = clamp((this.state.teamMorale[teamId]||65) + delta*cultureMult, 0, 100);
  },
  getTeamMorale(teamId){
    if(!this.state.teamMorale) this.state.teamMorale = Object.fromEntries(TEAMS.map(t=>[t.id, 65]));
    return this.state.teamMorale[teamId] ?? 65;
  },

  /* ================================================================
     UNIVERSAL EDITABLE NAME SYSTEM
     Works for the player, grid rivals, and every NPC. Renders a
     dashed-underline name that opens a rename modal when tapped.
     ================================================================ */
  editableName(id, kind, currentName){

        e.stopPropagation();
        this.openRenameModal(el.dataset.renameId, el.dataset.renameKind);
      };
    });

  openRenameModal(id, kind){
    const current = this.getEntityName(id, kind);
    this.openModal(`
      ${this.modalHeader('Rename')}
      <label class="field-label">New name</label>
      <input type="text" id="rename-input" value="${current}" maxlength="24" style="margin-bottom:14px;" />
      <button class="pbtn full gold" id="btn-save-rename">Save Name</button>
    `);

    input.focus();
    input.select();

  },

  getEntityName(id, kind){
    if(kind==='player') return this.state.player.name;
    if(kind==='driver') return (this.state.grid.find(d=>d.id===id)||{}).name || '';
    if(kind==='npc') return (this.state.npcRoster.find(n=>n.id===id)||{}).name || '';
    return '';
  },
  setEntityName(id, kind, val){
    if(kind==='player') this.state.player.name = val;
    else if(kind==='driver'){ const d = this.state.grid.find(d=>d.id===id); if(d) d.name = val; }
    else if(kind==='npc'){ const n = this.state.npcRoster.find(n=>n.id===id); if(n) n.name = val; }
  },

  /* Centralized news-feed writer. ALWAYS use this instead of calling
     state.newsFeed.unshift() directly — a bug where most call sites forgot
     to cap the list let it grow unbounded over a long career, which made the
     ticker (fixed-duration scroll) cram more and more text into the same
     time window and become unreadably fast. This helper is the single
     enforcement point so that can't regress again. */
  pushNews(text){
    const s = this.state;
    if(!s.newsFeed) s.newsFeed = [];
    s.newsFeed.unshift(text);
    if(s.newsFeed.length > 12) s.newsFeed.length = 12;
  },

  rerenderCurrentScreen(){
    if(this.currentScreen==='hub') this.renderHub();
    else if(this.currentScreen==='race') this.renderRaceCenterScreen();
    else if(this.currentScreen==='team') this.renderTeamScreen();
    else this.renderHub();
  },
};
