        const aheadText = cr.gap > 0 ? `trail ${cr.team.name} by ${cr.gap} point${cr.gap===1?'':'s'}` : cr.gap < 0 ? `lead ${cr.team.name} by ${-cr.gap} point${-cr.gap===1?'':'s'}` : `are tied with ${cr.team.name}`;
        return `<div class="chip gold" style="margin:-2px 0 8px; display:block; text-align:center;">🏆 Constructors' battle: you ${aheadText} this weekend.</div>`;
      })()}

      <div class="pixel-panel" style="border-left:3px solid ${isRain?'var(--candy-blue)':band.label==='Hot'?'var(--candy-red)':band.label==='Cold'?'var(--candy-blue)':'var(--candy-mint)'};">
        <div class="panel-title">Weekend Forecast</div>
        <div style="font-weight:800; font-size:13px;">${weatherLine}</div>
        ${conditionsNote ? `<div class="section-sub" style="margin:4px 0 0;">${conditionsNote}</div>` : ''}
        ${track.microclimate ? `<div class="chip blue" style="margin-top:6px;">🌦️ Changeable microclimate — this track has a higher chance of conditions shifting mid-race.</div>` : ''}
      </div>
      <div class="pixel-panel">
        <div class="panel-title">Car Setup</div>
        ${this.renderSetupSliders()}
      </div>
      <button class="pbtn full mint" id="btn-simulator-preview" style="margin-bottom:8px;" ${this.state.player.attributes.lifestyle.energy<10?'disabled':''}>🖥️ Simulator: Preview This Weekend (-10 energy)</button>
      <button class="pbtn full gold" id="btn-go-hub">Return to Hub</button>
    `;
    document.getElementById('btn-go-hub').onclick = ()=> this.renderHub();
    document.getElementById('btn-simulator-preview').onclick = ()=> this.renderSimulatorPreviewModal(track, round);
    this.wireSetupSliders();
  },

  /* ---------------- SIMULATOR "WHAT-IF" MODE (feature idea #10) ----------------
     UI-only preview: spend energy to see a hypothetical qualifying/race
     outcome at CURRENT stats before committing to anything. No new sim
     math -- reuses driverStrength()/simulateQualifying() exactly as the
     real qualifying/race flow already does, just run silently against a
     throwaway snapshot of the grid+player and thrown away afterward. The
     REAL qualifying/race later still rolls its own independent RNG, so this
     is a genuine "rough idea", not a guarantee -- same "presentational,
     doesn't touch the real sim" spirit as plausibleLapTime()/
     paceModifierBreakdown(). */
  renderSimulatorPreviewModal(track, round, fromPractice){
    const s = this.state; const p = s.player;
    const cost = 10;
    if(p.attributes.lifestyle.energy < cost){ this.toast('Too tired for a simulator session.'); return; }
    p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy - cost);
    // Run a throwaway qualifying simulation using the SAME inputs the real
    // qualifying flow will use (setup match, cosmetic bonus, current
    // familiarity) but WITHOUT the mini-game bonus (that hasn't happened
    // yet) and without mutating any real state -- p.familiarityBonus/
    // isHomeTrackBonus are read the same way resolveQualifying() sets them,
    // just computed locally here and not persisted.
    const familiarityBonus = ((p.trackFamiliarity[track.id]||65) - 65) * 0.15;
    const isHomeTrackBonus = isHomeTrack(s, track.id) ? HOME_TRACK_PACE_BONUS : 0;
    const previewPlayer = JSON.parse(JSON.stringify(p));
    previewPlayer.familiarityBonus = familiarityBonus;
    previewPlayer.isHomeTrackBonus = isHomeTrackBonus;
    const ideal = trueIdealSetup(track, p);
    const setupBonus = setupMatchBonus(s.currentSetup, ideal, getDifficultySettings(s).setupWindow);
    const paceBonus = setupBonus + cosmeticPaceBonus(this.getCosmeticBonuses());
    const previewResults = simulateQualifying(s.grid, previewPlayer, track, round.weather, paceBonus, round.trackTemp);
    const previewPos = previewResults.find(r=>r.driverId==='player').position;
    // Feature idea #13 -- extend the qualifying-only preview to also
    // preview a full race outcome. Reuses the EXACT same throwaway,
    // non-persisting simulateRace() call approach the qualifying preview
    // above already uses -- same previewPlayer snapshot, same paceBonus,
    // fed through the just-computed previewResults as the starting grid
    // (a genuine qualifying-to-race chain, same as the real weekend flow),
    // with a generic 'push'/'medium' strategy assumption since there's no
    // real strategy prompt at preview time. Thrown away immediately after
    // -- doesn't touch s.lastQualyResults or anything else the real
    // weekend reads.
    const previewRaceResults = simulateRace(s.grid, previewPlayer, previewResults, track, round.weather, {approach:'push', compound:'medium'}, getDifficultySettings(s), this.getTeamMorale(p.teamId), paceBonus, round.trackTemp);
    const previewRacePlayerResult = previewRaceResults.find(r=>r.driverId==='player');
    const previewRacePos = previewRacePlayerResult && !previewRacePlayerResult.dnf ? previewRacePlayerResult.position : null;
    this.toast(`🖥️ Simulator session complete.`);
    this.openModal(`
      ${this.modalHeader('Simulator Preview')}
      <div class="section-sub" style="margin:0 0 10px;">A rough look at how this weekend might go at your CURRENT stats and setup — not a guarantee. The real sessions will roll their own outcomes.</div>
      <div class="pixel-panel" style="text-align:center;">
        <div class="section-sub" style="margin-bottom:2px;">Projected qualifying</div>
        <div style="font-family:var(--font-pixel); font-size:28px; color:${previewPos<=3?'var(--candy-yellow)':'var(--ink)'};">~P${previewPos}</div>
      </div>
      <div class="pixel-panel" style="text-align:center; margin-top:8px;">
        <div class="section-sub" style="margin-bottom:2px;">Projected race (assuming a Push strategy)</div>
        <div style="font-family:var(--font-pixel); font-size:28px; color:${previewRacePos && previewRacePos<=3?'var(--candy-yellow)':'var(--ink)'};">${previewRacePos ? '~P'+previewRacePos : '~DNF'}</div>
      </div>
      <div class="section-sub" style="margin-top:8px;">${setupBonus>0.5 ? 'Your current setup looks like a good match for this track.' : setupBonus<-0.5 ? 'Your current setup looks off for this track — consider adjusting before qualifying.' : 'Your current setup looks roughly neutral for this track.'}</div>
      <button class="pbtn full gold" id="btn-sim-preview-done" style="margin-top:12px;">Got it</button>
    `);
    this.wireModalClose();
    document.getElementById('btn-sim-preview-done').onclick = ()=>{
      this.closeModal();
      this.saveState();
      // Feature idea #16 -- when this preview was launched for free from
      // the Qualifying Simulation practice program (fromPractice=true),
      // "Got it" should finish that same day-advance the practice quiz
      // would otherwise have gone straight to, not detour to Race Center.
      if(fromPractice) this.advanceDay();
      else this.renderRaceCenterScreen();
    };
    this.saveState();
  },

  trackFamiliarity(trackId){
    return this.state.player.trackFamiliarity[trackId] || 65;
  },

  /* Presentational only -- surfaces the existing overtakeDiff number (already
     used in the startPenalty formula inside simulateRace) as plain-language
     tiers. No new math, no sim changes. */
  overtakeTier(diff){
    if(diff>=8) return {label:'Very Difficult', icon:'🔒', chip:'red', note:'Grid position matters a lot here — a strong qualifying lap is worth extra this weekend.'};
    if(diff>=6) return {label:'Difficult', icon:'🚧', chip:'pink', note:'Hard to pass — track position earned in qualifying tends to stick.'};
    if(diff>=4) return {label:'Moderate', icon:'⚖️', chip:'gold', note:'Overtaking is possible with a pace advantage, but not easy.'};
    return {label:'Easy', icon:'🏎️', chip:'mint', note:'A fast car can move through the field — grid position matters less here.'};
  },

  renderSetupSliders(){
    const s = this.state; const cs = s.currentSetup;
    const round = this.getCurrentRound();
    const track = round ? TRACKS.find(t=>t.id===round.trackId) : null;
    if(!track){
      return `
        <div class="slider-row"><div class="top-line"><label>Downforce</label><span class="sval" id="val-downforce">${cs.downforce}</span></div><div class="setup-track-wrap"><div class="setup-track-base"></div><input type="range" min="0" max="100" value="${cs.downforce}" id="slide-downforce"></div></div>
        <div class="slider-row"><div class="top-line"><label>Balance</label><span class="sval" id="val-balance">${cs.balance}</span></div><div class="setup-track-wrap"><div class="setup-track-base"></div><input type="range" min="0" max="100" value="${cs.balance}" id="slide-balance"></div></div>
        <div class="slider-row" style="margin-bottom:0;"><div class="top-line"><label>Gear Ratio</label><span class="sval" id="val-gearRatio">${cs.gearRatio}</span></div><div class="setup-track-wrap"><div class="setup-track-base"></div><input type="range" min="0" max="100" value="${cs.gearRatio}" id="slide-gearRatio"></div></div>
      `;
    }
    const confidence = setupHintConfidence(s, track.id);
    const keys = [{k:'downforce', label:'Downforce'}, {k:'balance', label:'Balance'}, {k:'gearRatio', label:'Gear Ratio'}];
    // Chief Engineer high-trust setup reveal: a high-trust Chief Engineer
    // occasionally reveals the TRACK-side ideal setup outright for this
    // specific race weekend, replacing the usual fuzzy hint band entirely.
    // Gated on trust>=85 (a genuinely earned relationship, not a stat grind)
    // and rolled ONCE per round (cached on the round object itself, same
    // "roll once, stable for the life of the thing it describes" pattern as
    // rollRivalryOrigin()) rather than re-rolling on every render, so it
    // doesn't flicker in and out as the player opens/closes the screen.
    // Still only reveals the TRACK-side base ideal (same thing
    // estimatedIdealForDisplay's band is centered on) -- the small personal
    // driving-attribute nudge trueIdealSetup() layers on top stays hidden,
    // so there's always a sliver of genuine discovery left even on a reveal
    // weekend, exactly like high setup confidence already works.
    const engineer = s.npcRoster.find(n=>n.role==='Chief Engineer');
    const trustEligible = engineer && (engineer.relationship.trust||0) >= 85;
    if(trustEligible && round && round.chiefEngineerRevealRolled === undefined){
      round.chiefEngineerRevealRolled = Math.random() < 0.25; // ~25% of eligible weekends
    }
    const revealActive = trustEligible && round && round.chiefEngineerRevealRolled === true;
    const hintLine = revealActive
      ? `<div class="section-sub" style="margin:0 0 10px;">🌟 ${engineer.name} pulls you aside: "I've cracked this one — here's exactly what the car wants this weekend."</div>`
      : confidence<=0
      ? `<div class="section-sub" style="margin:0 0 10px;">🔍 Your crew hasn't gathered enough data yet — run Practice and Simulator Training to get setup hints.</div>`
      : confidence<15
      ? `<div class="section-sub" style="margin:0 0 10px;">🔍 Setup confidence: <b>${confidence}%</b> — still early, but your crew is starting to build a picture. Keep practicing here and training in the simulator.</div>`
      : `<div class="section-sub" style="margin:0 0 10px;">🔍 Setup confidence: <b>${confidence}%</b> — the shaded band below shows your crew's best guess at the ideal range. It narrows as you practice here and train in the simulator.</div>`;
    return `
      ${hintLine}
      ${keys.map(({k,label})=>{
        const exact = revealActive ? track.idealSetup[k] : null;
        const ideal = (!revealActive && confidence>0) ? this.estimatedIdealForDisplay(track, k, confidence) : null;
        return `
        <div class="slider-row">
          <div class="top-line"><label>${label}</label><span class="sval" id="val-${k}">${cs[k]}</span></div>
          <div class="setup-track-wrap">
            <div class="setup-track-base"></div>
            ${exact!==null ? `<div class="setup-hint-band" style="left:${Math.max(0,exact-2)}%; width:4%; background:var(--candy-mint);"></div>` : ''}
            ${ideal ? `<div class="setup-hint-band" style="left:${ideal.min}%; width:${ideal.max-ideal.min}%;"></div>` : ''}
            <input type="range" min="0" max="100" value="${cs[k]}" id="slide-${k}">
          </div>
          ${exact!==null ? `<div class="section-sub" style="margin:2px 0 0; font-size:9px; color:#2a8a5c;">🌟 Crew knows exactly: aim for ${exact}</div>` : ideal ? `<div class="section-sub" style="margin:2px 0 0; font-size:9px;">Crew hint: aim roughly ${ideal.min}–${ideal.max}</div>` : ''}
        </div>`;
      }).join('')}
    `;
  },
  estimatedIdealForDisplay(track, key, confidence){
    // shows the hint band centered on the TRACK-side ideal only (never the exact
    // true value, which also includes the hidden personal nudge) so there's
    // always a little discovery left even at high confidence.
    const base = track.idealSetup[key];
    return setupHintBand(base, confidence);
  },
  wireSetupSliders(){
    ['downforce','balance','gearRatio'].forEach(key=>{
      const slider = document.getElementById('slide-'+key);
      if(!slider) return;
      slider.oninput = (e)=>{
        this.state.currentSetup[key] = +e.target.value;
        document.getElementById('val-'+key).textContent = e.target.value;
      };
    });
  },

  /* 19.13a+b -- track-weighted quiz theme selection. Wet weather always
     forces 'tires' (directly relevant knowledge for the actual conditions
     the player is about to race in) -- everything else is a track-character
     weighting, not a hard override, so there's real variance rather than a
     second layer of rigid rules. */
  pickPracticeQuizTheme(track, weather){
    if(weather==='rain') return 'tires';
    // A track where overtaking is hard (high overtakeDiff) rewards nailing
    // the setup more heavily, since track position is destiny there --
    // weight toward 'setup' 70/30 instead of the flat 100% 'setup' before.
    return Math.random() < (0.5 + track.overtakeDiff*0.02) ? 'setup' : 'tires';
  },
  pickQualifyingQuizTheme(track, weather){
    if(weather==='rain') return 'tires';
    // A track where overtaking is hard makes qualifying position matter
    // more (rules/strategy knowledge about why grid slot matters), a track
    // where passing is easy leans toward the pure strategy-call framing.
    return Math.random() < (0.3 + track.overtakeDiff*0.04) ? 'rules' : 'strategy';
  },

  /* ---------------- PRACTICE (mini-game: Setup Briefing) ----------------
     Feature idea #6 -- practice program choices. Extends the previous
     always-automatic quiz-theme roll (pickPracticeQuizTheme) into a real
     up-front choice: the player picks which of 3 practice focuses to run,
     trading a little familiarity-gain speed against a small qualifying-
     relevant stat nudge. The chosen focus DIRECTLY sets the quiz theme
     (replacing the old track-weighted random roll for this session only --
     pickPracticeQuizTheme's own weighting stays intact and unused here,
     kept for qualifying's own theme picker, which is untouched) so the
     quiz questions the player sees actually match what they said they'd
     focus on. */
  runPractice(){
    const s = this.state; const p = s.player;
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }
    const track = TRACKS.find(t=>t.id===round.trackId);
    this.renderPracticeProgramModal(track, round);
  },

  PRACTICE_PROGRAMS: [
    { id:'setup', label:'Setup Focus', icon:'🔧', theme:'setup', familiarityMult:1.0, statBonus:null, desc:'Standard familiarity gain. No extra stat nudge.' },
    { id:'tire', label:'Tire Focus', icon:'🛞', theme:'tires', familiarityMult:0.8, statBonus:{group:'driving', stat:'tyreManagement', amount:1}, desc:'Slightly slower familiarity gain, but a small permanent Tyre Management nudge.' },
    { id:'traffic', label:'Traffic Focus', icon:'🚦', theme:'strategy', familiarityMult:0.8, statBonus:{group:'driving', stat:'overtaking', amount:1}, desc:'Slightly slower familiarity gain, but a small permanent Overtaking nudge.' },
    // Feature idea #16 -- a 4th "Qualifying Simulation" program, specifically
    // prepping for Saturday and tying practice programs together with the
    // Simulator what-if mode (feature idea #13, renderSimulatorPreviewModal
    // above) into one coherent pre-race prep loop: same reduced
    // familiarityMult trade-off shape as Tire/Traffic Focus (a genuine
    // trade, not a strictly-better 4th option), no stat nudge, but flags
    // isQualSim so runPracticeQuiz's onComplete can offer a free Simulator
    // preview session immediately afterward instead of the player needing
    // to separately spend energy finding it.
    { id:'qualsim', label:'Qualifying Simulation', icon:'🖥️', theme:'strategy', familiarityMult:0.8, statBonus:null, isQualSim:true, desc:'Slightly slower familiarity gain, but offers a free Simulator preview session right after.' },
  ],

  renderPracticeProgramModal(track, round){
    const programs = this.PRACTICE_PROGRAMS;
    this.openModal(`
      ${this.modalHeader('Practice Program')}
      <div class="section-sub" style="margin:0 0 10px;">${track.name} — Free Practice${round.weather==='rain' ? ' (Wet)' : ''}. Pick a focus for today's session.</div>
      <div class="stack-8">
        ${programs.map(pr=>`<button class="pbtn full" style="justify-content:flex-start; text-align:left; height:auto; padding:12px;" data-program="${pr.id}">
          <span>${pr.icon} <b>${pr.label}</b><br><span style="font-size:9px; color:var(--ink-soft);">${pr.desc}</span></span>
        </button>`).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-program]').forEach(btn=>{
      btn.onclick = ()=>{
        const program = programs.find(pr=>pr.id===btn.dataset.program);
        this.closeModal();
        this.runPracticeQuiz(track, round, program);
      };
    });
  },

  runPracticeQuiz(track, round, program){
    const s = this.state; const p = s.player;
    // Wet weather still always forces 'tires' regardless of chosen program --
    // directly relevant knowledge for the actual conditions about to be
    // raced in overrides a player's stated focus, same override reasoning
    // pickPracticeQuizTheme's own comment already gives.
    const theme = round.weather==='rain' ? 'tires' : program.theme;
    this.startQuizMiniGame({
      title: 'Setup Briefing',
      subtitle: `${track.name} — Free Practice (${program.label})${round.weather==='rain' ? ' (Wet)' : ''}`,
      theme,
      questionCount: 3,
      trackId: track.id,
      onComplete: (scorePct)=>{
        // Familiarity gain: a base amount everyone gets for showing up, plus
        // a bonus for a strong mini-game showing — so practice always helps
        // a little, but doing well at reading the track/setup helps more.
        // program.familiarityMult trades some of this away for a stat nudge
        // (see PRACTICE_PROGRAMS above).
        const baseGain = 6;
        const bonusGain = Math.round(scorePct * 4); // up to +4 more on a perfect score
        const totalGain = Math.round((baseGain + bonusGain) * program.familiarityMult);
        const wasHomeTrackBefore = isHomeTrack(s, track.id);
        p.trackFamiliarity[track.id] = clamp((p.trackFamiliarity[track.id]||65) + totalGain, 65, 100);
        let statLine = '';
        if(program.statBonus && scorePct>=0.6){
          const {group, stat, amount} = program.statBonus;
          p.attributes[group][stat] = clamp(p.attributes[group][stat] + amount);
          statLine = ` +${amount} ${stat}.`;
        }
        const line = scorePct>=0.99 ? 'Perfect read on the track — your engineers are thrilled.'
          : scorePct>=0.6 ? 'Solid session — good data collected.'
          : 'A quieter session, but every lap teaches you something.';
        this.toast(`🏎️ Practice complete (${program.label}). ${line}${statLine}`);
        this.pushNews(`🏎️ ${p.name} completes Free Practice at ${track.name}.`);
        // Feature idea #5 -- Home Track testimonial: a one-off journal entry
        // the FIRST time familiarity crosses the Home Track threshold (85,
        // isHomeTrack()/HOME_TRACK_THRESHOLD, engine.js) at this specific
        // track. Parallel to checkMilestones()'s fire-once-via-p.milestones
        // pattern (app_race.js), keyed per-track so every track a player
        // eventually calls home gets its own one-time moment rather than a
        // single global flag going dead after the first one.
        if(!wasHomeTrackBefore && isHomeTrack(s, track.id)){
          const key = `home_track_${track.id}`;
          if(!p.milestones.includes(key)){
            p.milestones.push(key);
            const text = `${p.name} has raced ${track.name} so many times it finally feels like home. "I know every kerb, every braking point here," ${p.name} tells the team. "This is a Home Track now."`;
            p.journal.unshift({season:s.season, week:s.week, title:'This Feels Like Home', text, icon:'🏠'});
            this.toast(`🏠 ${track.name} is now a Home Track!`);
            this.pushNews(`🏠 ${p.name} calls ${track.name} a true Home Track after years of racing there.`);
          }
        }
        this.saveState();
        // Feature idea #16 -- Qualifying Simulation program offers a free
        // Simulator preview session immediately after (renderSimulatorPreviewModal,
        // reuses the SAME preview function feature idea #13 extended --
        // no separate preview logic here), skipping its usual energy cost
        // since the player already paid the practice program's own
        // familiarityMult trade-off for this. Only offered when there's
        // enough energy left for it to actually run at all.
        if(program.isQualSim && p.attributes.lifestyle.energy >= 0){
          const priorEnergy = p.attributes.lifestyle.energy;
          p.attributes.lifestyle.energy = clamp(priorEnergy + 10); // temporarily refund the preview's normal cost so this specific session is free, exactly once
          this.renderSimulatorPreviewModal(track, round, true);
          return;
        }
        this.advanceDay();
      },
    });
  },

  /* ---------------- QUALIFYING (mini-game: Strategy Call) ---------------- */
  runQualifying(){
    const s = this.state; const p = s.player;
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }
    const track = TRACKS.find(t=>t.id===round.trackId);
    const theme = this.pickQualifyingQuizTheme(track, round.weather);
    this.startQuizMiniGame({
      title: 'Strategy Call',
      subtitle: `${track.name} — Qualifying${round.weather==='rain' ? ' (Wet)' : ''}`,
      theme,
      questionCount: 3,
      trackId: track.id,
      onComplete: (scorePct)=> this.resolveQualifying(track, scorePct),
    });
  },

  /* 19.1 #8 -- Engine/gearbox grid penalty tied to team reliability.
     Deliberately the same safe pattern as maybeApplySafetyCar (app_race.js):
     a POST-SCORING position demotion on the ALREADY-FINAL, already-sorted
     qualifying results array, never touching simulateQualifying's scoring
     logic. This sidesteps the qualifying->race handoff risk entirely --
     s.lastQualyResults still has the exact same shape (same length, same
     driverId set, positions still 1..N) by the time resolveQualifying
     hands off to the race weekend, so nothing downstream needs to change. */
  maybeApplyGridPenalty(results){
    const s = this.state; const p = s.player;
    const team = this.getTeam(p.teamId);
    // Lower reliability = higher chance of a grid penalty this qualifying --
    // scaled the same direction as the DNF-risk formula (engine.js) so a
    // weak car is meaningfully more exposed to BOTH risks, not just one.
    const reliabilityGap = Math.max(0, 10 - team.reliability); // 0 (best) to ~6 (worst)
    const penaltyChance = clamp(reliabilityGap * 0.015, 0, 0.09); // up to 9% at the weakest reliability
    if(Math.random() > penaltyChance) return null;
    const playerResult = results.find(r=>r.driverId==='player');
    if(!playerResult || playerResult.dnf) return null; // no such thing as a qualifying DNF here, but stay defensive
    const dropPositions = randInt(3, 5);
    const oldPos = playerResult.position;
    const newPos = Math.min(results.length, oldPos + dropPositions);
    if(newPos === oldPos) return null;
    // Shift everyone who was between oldPos+1 and newPos UP by one to fill
    // the gap, then place the player at newPos -- a straightforward
    // insertion-move, not a full reshuffle, so only the directly-affected
    // drivers' positions change.
    results.forEach(r=>{
      if(r.driverId==='player') return;
      if(r.position > oldPos && r.position <= newPos) r.position -= 1;
    });
    playerResult.position = newPos;
    results.sort((a,b)=> (a.dnf?999:a.position) - (b.dnf?999:b.position));
    return { oldPos, newPos, dropPositions: newPos-oldPos };
  },

  /* Qualifying "moment" to match the race's safety car / weather shift --
     a small-chance red-flag / track-limits-deletion event, gated to Q3 (the
     top-10 shootout, same cosmetic Q1/Q2/Q3 framing already used elsewhere
     in this file) since that's the natural place for a single deleted lap
     to actually matter dramatically. Same safe post-scoring pattern as
     maybeApplyGridPenalty right above: mutates the ALREADY-FINAL, already-
     sorted qualifying results array in place, never changes array length or
     the driverId set, so resolveQualifying's own handoff to the race
     weekend needs zero changes downstream. Only ever touches a driver who
     was inside the top 10 (Q3) at the time this rolls -- never the player
     unless the player is genuinely in Q3 themselves, no special targeting
     either way, same "no favoritism" spirit as maybeApplySafetyCar. */
  maybeApplyQualifyingRedFlag(results){
    if(Math.random() > 0.05) return null; // ~5% of qualifying sessions
    const q3 = results.filter(r=>!r.dnf && r.position<=10);
    if(q3.length < 4) return null; // not worth it with a near-empty top 10
    const victim = pick(q3);
    const oldPos = victim.position;
    // A deleted lap time drops the victim to the back of Q3 (P10), or if
    // they were already P10, one further -- either way it's a meaningful
    // but bounded loss, not a Q1-style elimination all the way to the back
    // of the whole field.
    const newPos = Math.min(results.length, Math.max(oldPos+1, 10));
    if(newPos === oldPos) return null;
    results.forEach(r=>{
      if(r.driverId===victim.driverId) return;
      if(r.position > oldPos && r.position <= newPos) r.position -= 1;
    });
    victim.position = newPos;
    results.sort((a,b)=> (a.dnf?999:a.position) - (b.dnf?999:b.position));
    return { driverId: victim.driverId, oldPos, newPos, isPlayer: victim.driverId==='player' };
  },

  resolveQualifying(track, scorePct){
    const s = this.state; const p = s.player;
    const round = this.getCurrentRound();
    const weather = round.weather;
    const trackTemp = round.trackTemp;
    p.familiarityBonus = ((p.trackFamiliarity[track.id]||65) - 65) * 0.15;
    p.isHomeTrackBonus = isHomeTrack(s, track.id) ? HOME_TRACK_PACE_BONUS : 0;
    const ideal = trueIdealSetup(track, p);
    const setupBonus = setupMatchBonus(s.currentSetup, ideal, getDifficultySettings(s).setupWindow);
    // Mini-game bonus: up to ±1.6 pace units depending on quiz performance —
    // a real but modest slice of the outcome, same order of magnitude as the
    // setup-match bonus, so stats/setup/familiarity still carry most of the
    // result while a good "Strategy Call" session genuinely helps.
    const miniGameBonus = (scorePct - 0.5) * 3.2;
    const paceBonus = setupBonus + cosmeticPaceBonus(this.getCosmeticBonuses()) + miniGameBonus;
    const results = simulateQualifying(s.grid, p, track, weather, paceBonus, trackTemp);
    const redFlagEvent = this.maybeApplyQualifyingRedFlag(results);
    const gridPenalty = this.maybeApplyGridPenalty(results);
    s.lastQualyResults = results;
    s.lastWeather = weather;
    const playerResult = results.find(r=>r.driverId==='player');
    const gridPos = playerResult.position;
    if(gridPos===1) p.careerStats.poles++;
    if(gridPos<=3) s.seasonStats.q3count = (s.seasonStats.q3count||0)+1;

    // 19.13c -- Q1/Q2/Q3 elimination framing, purely cosmetic labeling of
    // the position band (real F1 format: Q3 is the top-10 shootout, Q2 is
    // P11-15, Q1 is everyone eliminated at P16+). Doesn't change
    // simulateQualifying's actual scoring at all -- this is describing the
    // SAME position the player already qualified in, just with the
    // familiar three-segment framing instead of a flat "you qualified P__".
    const qSegment = gridPos<=10 ? {label:'Q3', icon:'🟢', note:'Through to the final shootout.'}
      : gridPos<=15 ? {label:'Q2', icon:'🟡', note:'Eliminated in Q2.'}
      : {label:'Q1', icon:'🔴', note:'Eliminated in Q1.'};

    const top5 = results.slice(0,5).map(r=>{
      const drv = r.driverId==='player' ? p : s.grid.find(d=>d.id===r.driverId);
      const lapTime = plausibleLapTime(track, r.position, results.length);
      return `<div class="row-item"><span class="rname">P${r.position} ${drv.name}${r.driverId==='player'?' (you)':''}</span><span class="rmeta">${lapTime}</span></div>`;
    }).join('');

    this.openModal(`
      ${this.modalHeader('Qualifying Result')}
      ${redFlagEvent ? `<div class="chip red" style="margin-bottom:8px; display:block;">🚩 Red Flag in Q3 — ${redFlagEvent.isPlayer ? `your final lap was deleted for a track-limits breach, dropping you from P${redFlagEvent.oldPos} to P${redFlagEvent.newPos}.` : `a track-limits deletion shuffled the top 10.`}</div>` : ''}
      ${gridPenalty ? `<div class="chip red" style="margin-bottom:8px; display:block;">🔧 Gearbox penalty — dropped from P${gridPenalty.oldPos} to P${gridPenalty.newPos} on the grid.</div>` : ''}
      <div class="pixel-panel" style="text-align:center;">
        <div class="section-sub" style="margin-bottom:2px;">You qualified</div>
        <div style="font-family:var(--font-pixel); font-size:34px; color:${gridPos<=3?'var(--candy-yellow)':'var(--ink)'};">P${gridPos}</div>
        <div class="chip ${qSegment.label==='Q3'?'mint':qSegment.label==='Q2'?'gold':'red'}" style="margin-top:6px; display:inline-block;">${qSegment.icon} ${qSegment.label} — ${qSegment.note}</div>
      </div>
      <div class="section-title" style="font-size:10px;">Top 5</div>
      ${top5}
      <button class="pbtn full gold" id="btn-close-quali" style="margin-top:12px;">Continue</button>
    `);
    // No X close button -- same reasoning as the race result modal: results
    // are already committed to state before this modal opens, so a bypass
    // path that skips advanceDay() would desync dayIndex from the calendar.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    const onCloseQuali = ()=>{
      this.closeModal();
      this.pushNews(`⏱️ Qualifying at ${track.name}: ${p.name} starts P${gridPos}.`);
      this.saveState();
      this.advanceDay();
    };
    if(this._ownerSilent){ onCloseQuali(); return; }
    document.getElementById('btn-close-quali').onclick = onCloseQuali;
  },

  /* ---------------- SHARED QUIZ MINI-GAME ENGINE ----------------
     Deliberately multiple-choice with no timer/reflex component, per product
     direction ("not using accuracy mechanic, otherwise it will be hard for
     user to do accuracy"). Tracks recently-seen question ids on
     state.player.recentQuizIds (a short rolling window) so players see
     variety over a career without ever fully running out of questions —
     the pool is reused, just not back-to-back. */
  startQuizMiniGame({title, subtitle, theme, questionCount, trackId, onComplete}){
    const s = this.state; const p = s.player;
    // Team Ownership Mode (feature idea #13): a race weekend auto-resolving
    // has no player to answer quiz questions, so skip the mini-game UI
    // entirely and call back with a neutral 0.5 score (same "not a
    // guarantee, just a rough middling result" spirit as every other
    // mini-game bonus formula already treats a 0.5 score as neutral --
    // e.g. resolveQualifying's `(scorePct - 0.5) * 3.2` miniGameBonus is
    // exactly 0 at 0.5).
    if(this._ownerSilent){ onComplete(0.5); return; }
    if(!p.recentQuizIds) p.recentQuizIds = [];
    const questions = pickQuizQuestions(theme, questionCount, p.recentQuizIds, trackId);
    p.recentQuizIds = [...p.recentQuizIds, ...questions.map(q=>q.id)].slice(-14); // keep a rolling window

    this._quizState = { questions, index:0, correctCount:0, title, subtitle, onComplete, answered:false };
    this.renderQuizQuestion();
  },

  renderQuizQuestion(){
    const qs = this._quizState;
    const q = qs.questions[qs.index];
    this.openModal(`
      ${this.modalHeader(qs.title)}
      <div class="section-sub" style="margin:0 0 10px;">${qs.subtitle} · Question ${qs.index+1}/${qs.questions.length}</div>
      <div class="pixel-panel">
        <div style="font-weight:700; margin-bottom:2px;">${q.q}</div>
      </div>
      <div class="stack-8" id="quiz-options">
        ${q.options.map((opt,i)=>`<button class="pbtn full" data-opt="${i}" style="justify-content:flex-start; text-align:left;">${opt}</button>`).join('')}
      </div>
    `);
    // No close button on quiz questions, and background-tap-to-dismiss is
    // disabled too — a mini-game shouldn't be skippable, since that would
    // let players dodge poor answers. The flow proceeds automatically once
    // all questions are answered.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.querySelectorAll('#quiz-options [data-opt]').forEach(btn=>{
      btn.onclick = ()=> this.answerQuizQuestion(parseInt(btn.dataset.opt,10));
    });
  },

  answerQuizQuestion(choiceIdx){
    const qs = this._quizState;
    // Re-entry guard: a fast double-click/double-tap on a quiz option fires
    // this handler twice before the 550ms setTimeout below has a chance to
    // advance the question or finish the quiz -- confirmed reproducible
    // (both calls capture the same qs object, both schedule their own
    // timeout, and the SECOND timeout to fire can end up calling
    // finishQuizMiniGame() a second time after the first one has already
    // set this._quizState to null, throwing on qs.questions.length inside
    // it). qs.answered is set the instant the FIRST click is processed and
    // checked here before anything else runs, so a second rapid click on
    // the same question is a silent no-op instead of double-advancing.
    if(!qs || qs.answered) return;
    qs.answered = true;
    const q = qs.questions[qs.index];
    const correct = choiceIdx === q.correct;
    if(correct) qs.correctCount++;

    // Brief, low-key feedback (no failure state, no penalty beyond the score
    // itself — keeps the mini-game low-pressure) then advance.
    const options = document.querySelectorAll('#quiz-options [data-opt]');
    options.forEach(btn=>{
      btn.style.pointerEvents = 'none';
      const idx = parseInt(btn.dataset.opt,10);
      if(idx===q.correct) btn.style.background = 'var(--candy-mint)';
      else if(idx===choiceIdx) btn.style.background = '#ffd7d7';
    });
    this.toast(correct ? '✅ Correct!' : '➡️ Noted — moving on.');

    setTimeout(()=>{
      // Defensive: if the quiz was somehow already torn down (shouldn't
      // happen given the re-entry guard above, but cheap insurance against
      // any future call path), bail out instead of throwing.
      if(!this._quizState) return;
      qs.index++;
      qs.answered = false;
      if(qs.index < qs.questions.length){
        this.renderQuizQuestion();
      }else{
        this.finishQuizMiniGame();
      }
    }, 550);
  },

  finishQuizMiniGame(){
    const qs = this._quizState;
    if(!qs) return; // already finished/torn down -- nothing to do
    const scorePct = qs.questions.length ? qs.correctCount / qs.questions.length : 0.5;
    this.closeModal();
    const cb = qs.onComplete;
    this._quizState = null;
    cb(scorePct);
  },

  /* ---------------- SPRINT (Sprint Weekend only) ----------------
     A shortened Saturday race: uses the same simulateRace() engine (with a
     dampened result-spread since sprints are short and less eventful) but
     awards only sprint points (top 8, 8-1) and — critically — its finishing
     order becomes Sunday's starting grid instead of a separate qualifying
     session, matching the real F1 Sprint format. */
  runSprintQualifying(){
    const s = this.state; const p = s.player;
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }
    const track = TRACKS.find(t=>t.id===round.trackId);
    this.startQuizMiniGame({
      title: 'Sprint Qualifying',
      subtitle: `${track.name} — one quick lap sets the sprint grid`,
      theme: 'strategy',
      questionCount: 2,
      trackId: track.id,
      onComplete: (scorePct)=> this.resolveSprintQualifying(track, round, scorePct),
    });
  },

  resolveSprintQualifying(track, round, scorePct){
    const s = this.state; const p = s.player;
    const weather = round.weather;
    const trackTemp = round.trackTemp;
    p.familiarityBonus = ((p.trackFamiliarity[track.id]||65) - 65) * 0.15;
    p.isHomeTrackBonus = isHomeTrack(s, track.id) ? HOME_TRACK_PACE_BONUS : 0;
    const ideal = trueIdealSetup(track, p);
    const setupBonus = setupMatchBonus(s.currentSetup, ideal, getDifficultySettings(s).setupWindow);
    const miniGameBonus = (scorePct - 0.5) * 3.2;
    const paceBonus = setupBonus + cosmeticPaceBonus(this.getCosmeticBonuses()) + miniGameBonus;
    const qualy = simulateQualifying(s.grid, p, track, weather, paceBonus, trackTemp);
    // Sprint Qualifying sets round.sprintQualyResults (the sprint race's own
    // grid) -- deliberately kept separate from s.lastQualyResults, which is
    // reserved for the MAIN Saturday/Sunday qualifying->race handoff. This
    // is also why sprint qualifying does NOT increment p.careerStats.poles
    // or s.seasonStats.q3count -- those are specifically about the
    // championship-race qualifying session, not the sprint's own.
    round.sprintQualyResults = qualy;
    const playerResult = qualy.find(r=>r.driverId==='player');
    const gridPos = playerResult.position;

    const top5 = qualy.slice(0,5).map(r=>{
      const drv = r.driverId==='player' ? p : s.grid.find(d=>d.id===r.driverId);
      const lapTime = plausibleLapTime(track, r.position, qualy.length);
      return `<div class="row-item"><span class="rname">P${r.position} ${drv.name}${r.driverId==='player'?' (you)':''}</span><span class="rmeta">${lapTime}</span></div>`;
    }).join('');

    this.openModal(`
      ${this.modalHeader('Sprint Qualifying')}
      <div class="pixel-panel" style="text-align:center;">
        <div class="section-sub" style="margin-bottom:2px;">Sprint grid position</div>
        <div style="font-family:var(--font-pixel); font-size:34px; color:${gridPos<=3?'var(--candy-yellow)':'var(--ink)'};">P${gridPos}</div>
      </div>
      <div class="section-title" style="font-size:10px;">Top 5</div>
      ${top5}
      <button class="pbtn full gold" id="btn-close-sprint-quali" style="margin-top:12px;">Continue to Sprint</button>
    `);
    // No X close button -- round.sprintQualyResults is already committed
    // before this modal opens, same reasoning as every other result modal.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    if(this._ownerSilent){ this.resolveSprintRace(track, round, 'push'); return; }
    document.getElementById('btn-close-sprint-quali').onclick = ()=>{
      this.closeModal();
      this.renderSprintStrategyPrompt(track, round);
    };
  },

  /* Sprint strategy prompt -- deliberately just 2 options (not the main
     race's 4 + tire compound + formation lap), keeping the sprint feeling
     like the shorter, lower-stakes session it represents rather than a
     second full race weekend bolted on. */
  renderSprintStrategyPrompt(track, round){
    const engineer = this.state.npcRoster.find(n=>n.role==='Race Engineer');
    const line = radioLine(engineer.personality, 'push');
    this.openModal(`
      ${this.modalHeader('Sprint Strategy')}
      <div class="pixel-panel" style="border-left:3px solid var(--candy-blue);">
        <div class="section-sub" style="margin:0 0 4px;">📻 ${engineer.name} (Race Engineer)</div>
        <div style="font-weight:700; font-style:italic;">"${line}"</div>
      </div>
      <div class="section-sub" style="margin-bottom:8px;">Short sprint, no time to overthink it. Pick your approach.</div>
      <div class="stack-8">
        <button class="pbtn full" data-sprint-strat="push">🔥 Push — go for the sprint win</button>
        <button class="pbtn full" data-sprint-strat="saveTires">🛞 Save Tires — protect Sunday's grid slot</button>
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-sprint-strat]').forEach(btn=>{
      btn.onclick = ()=>{
        this.closeModal();
        this.resolveSprintRace(track, round, btn.dataset.sprintStrat);
      };
    });
  },

  resolveSprintRace(track, round, approach){
    const s = this.state; const p = s.player;
    const weather = round.weather;
    const trackTemp = round.trackTemp;
    const qualy = round.sprintQualyResults;
    // Home Track bonus (Pass 23, feature idea #14) -- made explicit here
    // too, same reasoning as executeRace(): sprint qualifying already sets
    // p.isHomeTrackBonus on the same player object driverStrength() reads,
    // so this was already applying correctly as a side effect, just never
    // set explicitly on this exact line and never disclosed. Backlog item
    // closed (Pass 23 REMAINING BACKLOG note): sprint races now get the
    // same explicit set + disclosed chip treatment the main race got.
    p.isHomeTrackBonus = isHomeTrack(s, track.id) ? HOME_TRACK_PACE_BONUS : 0;
    const homeTrackBonusAppliedThisSprint = p.isHomeTrackBonus > 0;
    // Team Ownership Mode full closure (Pass 25) -- same owner-assigned AI
    // strategy override executeRace() reads, applied here too so a sprint
    // weekend's Saturday sprint honors the SAME weekend-long strategy call
    // as Sunday's main race. Deliberately NOT cleared here (only
    // executeRace() clears it) -- a sprint weekend has sprint-qualy ->
    // sprint-race -> main-qualy -> main-race all in one weekend, and the
    // owner's one strategy choice should hold across all of it, not get
    // silently consumed after just the sprint.
    const aiStrategyOverrides = p._ownerAiStrategy || undefined;
    const results = simulateRace(s.grid, p, qualy, track, weather, {approach: approach||'push'}, getDifficultySettings(s), this.getTeamMorale(p.teamId), 0, trackTemp, aiStrategyOverrides);
    // Multi-weekend mechanical-failure consequence chain (engine.js): a
    // sprint DNF is a real mechanical failure too -- previously only the
    // main Sunday race could set/read this, so a Saturday sprint DNF
    // silently had no consequence chain at all even though it uses the
    // exact same simulateRace() failChance roll. Deliberately does NOT
    // call decayMechanicalRisk() here first (unlike executeRace()) -- the
    // sprint and the main race are the same race weekend, not two separate
    // ones, so there's no "time passing" for risk to decay between a
    // Saturday sprint and Sunday's race; only executeRace()'s own call
    // represents an actual weekend-to-weekend gap.
    const playerHadSprintMechanicalDNF = (results.find(r=>r.driverId==='player')||{}).dnf === true;
    if(playerHadSprintMechanicalDNF) applyMechanicalRiskAfterDNF(p);

    // Sprint points only (no career-stat wins/podiums/starts credit — a
    // sprint is its own mini-event, distinct from the championship race).
    results.forEach(r=>{
      const pts = sprintPointsForPosition(r.dnf ? null : r.position);
      if(pts){
        s.standings[r.driverId] = (s.standings[r.driverId]||0) + pts;
        // Constructors' Championship -- same per-team, scored-at-the-moment
        // tracking as the main race (see executeRace()'s own comment on
        // s.constructorPoints for why this can't just be derived from
        // s.standings + current teamId).
        const drv = r.driverId==='player' ? p : s.grid.find(d=>d.id===r.driverId);
        if(drv){
          if(!s.constructorPoints) s.constructorPoints = {};
          s.constructorPoints[drv.teamId] = (s.constructorPoints[drv.teamId]||0) + pts;
        }
      }
    });

    const playerResult = results.find(r=>r.driverId==='player');
    const sprintPos = playerResult.dnf ? null : playerResult.position;
    const sprintPts = sprintPointsForPosition(sprintPos);

    // Sunday's grid is set directly from the sprint finishing order.
    s.lastQualyResults = results.map((r,i)=>({driverId:r.driverId, position:i+1, score:0}));
    s.lastWeather = weather;
    round.sprintCompleted = true;

    // Sprint-specific flavor: distinct headline wording from the main race's
    // generateRaceHeadline (which always says "RACE REPORT"/mentions
    // championship stakes), so a sprint doesn't read like a smaller version
    // of Sunday's race but its own kind of event.
    const sprintHeadline = sprintPos===1 ? `${p.name} takes the Sprint win at ${track.name}!`
      : sprintPos && sprintPos<=3 ? `${p.name} lands on the Sprint podium at ${track.name}.`
      : sprintPos ? `${p.name} finishes the Sprint P${sprintPos} at ${track.name}.`
      : `A tough Sprint for ${p.name} at ${track.name} — DNF.`;

    const top5 = results.slice(0,5).map(r=>{
      const drv = r.driverId==='player' ? p : s.grid.find(d=>d.id===r.driverId);
      const lapTime = plausibleLapTime(track, r.position||results.length, results.length);
      return `<div class="row-item"><span class="rname">${r.dnf?'DNF':'P'+r.position} ${drv.name}${r.driverId==='player'?' (you)':''}</span><span class="rmeta">${r.dnf?'':lapTime}</span></div>`;
    }).join('');

    this.openModal(`
      ${this.modalHeader('Sprint Result')}
      ${playerHadSprintMechanicalDNF ? `<div class="chip red" style="margin-bottom:8px; display:block;">🔧 That failure leaves the car a little fragile — reliability risk is elevated for Sunday's race unless it's addressed at Team &amp; Car.</div>` : ''}
      ${homeTrackBonusAppliedThisSprint ? `<div class="chip mint" style="margin-bottom:8px; display:block;">🏠 Home Track boost — the crowd's energy gave you a small race-day pace bonus for the Sprint too.</div>` : ''}
      <div class="pixel-panel" style="text-align:center;">
        <div class="section-sub" style="margin-bottom:2px;">Sprint finish</div>
        <div style="font-family:var(--font-pixel); font-size:34px; color:${sprintPos && sprintPos<=3?'var(--candy-yellow)':'var(--ink)'};">${sprintPos?'P'+sprintPos:'DNF'}</div>
        ${sprintPts?`<div class="section-sub">+${sprintPts} championship points</div>`:''}
      </div>
      <div class="section-sub" style="margin:8px 0 4px;">${sprintHeadline} This sets your starting grid for Sunday's race.</div>
      <div class="section-title" style="font-size:10px;">Top 5</div>
      ${top5}
      <button class="pbtn full gold" id="btn-close-sprint" style="margin-top:12px;">Continue</button>
    `);
    // No X close button -- same reasoning as the race/qualifying result
    // modals: round.sprintCompleted and standings points are already
    // committed before this modal opens.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    const onCloseSprint = ()=>{
      this.closeModal();
      this.pushNews(`🏃 ${sprintHeadline}`);
      this.saveState();
      this.advanceDay();
    };
    if(this._ownerSilent){ onCloseSprint(); return; }
    document.getElementById('btn-close-sprint').onclick = onCloseSprint;
  },

  /* ---------------- RACE ---------------- */
  /* Race Engineer advice: picks a short, situationally-aware line based on
     actual conditions (hot/cold/rain) and the player's grid position on a
     track where passing is hard -- reusing overtakeTier() (same helper the
     Race Center screen already uses for its overtake-difficulty chip) so
     "tough to pass here" is judged consistently everywhere in the game.
     Pure content/logic, no new state, no sim changes -- the conditions and
     grid position it reads are already computed elsewhere in this flow. */
  raceEngineerAdvice(round, track){
    const s = this.state;
    const band = tempBand(round.trackTemp);
    const isRain = round.weather==='rain';
    const qualy = s.lastQualyResults;
    const playerQ = qualy ? qualy.find(q=>q.driverId==='player') : null;
    const gridPos = playerQ ? playerQ.position : null;
    if(isRain) return "Rain out there — Save Tires might be the smarter call today.";
    if(band.label==='Hot') return "Hot one today — tyres will go off fast, Save Tires is worth considering.";
    if(gridPos!==null && gridPos>=12 && this.overtakeTier(track.overtakeDiff).label!=='Easy'){
      return `You're starting P${gridPos} on a track where passing is tough — Defend could protect what we've got, or Attack if you want to gamble on it.`;
    }
    if(gridPos!==null && gridPos<=4){
      return `Good grid slot, P${gridPos}. Push hard and control this from the front.`;
    }
    return null; // no situational advice -- fall back to the normal radio-personality line
  },

  /* ---------------- TEAM OWNERSHIP MODE -- STRATEGY CALLS (Pass 25, full closure) ----------------
     Lets the owner make a REAL approach+compound strategy call for each of
     their two AI drivers before race day, instead of both always silently
     defaulting to 'saveTires'/'medium' (autoResolveOwnerRaceWeekend()'s old
     hardcoded executeRace('saveTires','medium',0,'none') call). Stored as
     p._ownerAiStrategy = {[driverId]: {approach, compound}}, read by
     executeRace()/resolveSprintRace() as simulateRace()'s new OPTIONAL
     aiStrategyOverrides parameter (engine.js) -- see that function's own
     comment for exactly how it's applied without touching any other
     driver's math. Cleared after the main race resolves each weekend
     (executeRace()), so it's a genuine weekly decision, not a
     set-once-forget-it toggle. The player's own driver (which still
     technically races every Owner Mode weekend, auto-resolved -- see
     renderOwnerHQScreen()'s Race Seats panel) is NOT included here: this
     screen is specifically about calling strategy for the team's AI
     seats, matching a real team principal's actual job. */
  renderOwnerStrategyModal(){
    const s = this.state; const p = s.player;
    const teamDrivers = s.grid.filter(d=>d.teamId===p.teamId);
    if(!p._ownerAiStrategy) p._ownerAiStrategy = {};
    const approachOptions = [
      {id:'push', icon:'🔥', label:'Push'},

      {id:'defend', icon:'🛡️', label:'Defend'},

    ];
    const compoundOptions = [
      {id:'soft', icon:'🔴', label:'Soft'},
      {id:'medium', icon:'🟡', label:'Medium'},
      {id:'hard', icon:'⚪', label:'Hard'},
    ];
    this.openModal(`
      ${this.modalHeader('Set Race Strategy')}
      <div class="section-sub" style="margin-bottom:10px;">Call a real strategy for each of your AI drivers this weekend — it's applied exactly like a player's own choice would be.</div>
      ${teamDrivers.map(d=>{
        const current = p._ownerAiStrategy[d.id] || {approach:'saveTires', compound:'medium'};
        return `
        <div class="pixel-panel" style="margin-bottom:10px;">
          <div style="font-weight:800; margin-bottom:6px;">${d.flag} ${d.name}</div>
          <div class="section-sub" style="margin-bottom:4px;">Approach</div>
          <div class="pbtn-row" style="margin-bottom:8px; flex-wrap:wrap;">
            ${approachOptions.map(a=>`<button class="pbtn small ${current.approach===a.id?'gold':''}" data-owner-approach="${d.id}:${a.id}" style="flex:1 1 45%;">${a.icon} ${a.label}</button>`).join('')}
          </div>
          <div class="section-sub" style="margin-bottom:4px;">Tire Compound</div>
          <div class="pbtn-row">
            ${compoundOptions.map(c=>`<button class="pbtn small ${current.compound===c.id?'gold':''}" data-owner-compound="${d.id}:${c.id}" style="flex:1;">${c.icon} ${c.label}</button>`).join('')}
          </div>
        </div>`;
      }).join('')}
      ${!teamDrivers.length ? `<div class="empty-state"><div class="ic">🏎️</div>No AI drivers to call strategy for yet.</div>` : ''}
      <button class="pbtn full gold" id="btn-owner-strategy-done" style="margin-top:4px;">Confirm Strategy</button>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-owner-approach]').forEach(btn=>{
      btn.onclick = ()=>{

        if(!p._ownerAiStrategy[driverId]) p._ownerAiStrategy[driverId] = {approach:'saveTires', compound:'medium'};
        p._ownerAiStrategy[driverId].approach = approach;
        this.renderOwnerStrategyModal();

    document.querySelectorAll('[data-owner-compound]').forEach(btn=>{
      btn.onclick = ()=>{
        const [driverId, compound] = btn.dataset.ownerCompound.split(':');

        p._ownerAiStrategy[driverId].compound = compound;
        this.renderOwnerStrategyModal();
      };
    });
    document.getElementById('btn-owner-strategy-done').onclick = ()=>{
      this.toast('📋 Strategy locked in for this weekend.');
      this.closeModal();
      this.saveState();
      this.renderHub();
    };
  },

  /* 19.1 #4 -- Formation-lap reaction-time mini-moment. Reuses the SAME
     modal-lifecycle idea as startQuizMiniGame (no close button, must
     resolve) but is its own single-step interaction rather than routed
     through the quiz question bank, since "tap when the light goes out" has
     nothing in common with a multiple-choice question. Scaled by the
     reaction stat: a sharper reaction gets a WIDER green-light window (more
     forgiving), so this rewards a real stat rather than pure human reflexes
     alone -- a natural tie-in to reaction's existing (if narrow) qualifying
     effect. Produces a small additive pace bonus/penalty fed into
     executeRace exactly the same way setup/cosmetic pace bonuses already
     are -- no new mechanism, no risk to the qualifying->race handoff. */
  renderFormationLapMoment(approach, compound, pitCall){
    const p = this.state.player;
    this.openModal(`
      ${this.modalHeader('Formation Lap')}
      <div class="section-sub" style="margin-bottom:14px;">Lights out in a moment — tap the second they go dark.</div>
      <div id="formation-light-box" style="background:#c33; border:3px solid var(--pixel-border); border-radius:10px; padding:36px; text-align:center; font-family:var(--font-pixel); font-size:14px; color:#fff;">🔴 🔴 🔴 🔴 🔴</div>
      <button class="pbtn full gold" id="btn-formation-tap" style="margin-top:14px;">Wait for it...</button>
    `);
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;

    const reaction = p.attributes.driving.reaction||50;
    // Higher reaction = wider (more forgiving) window to tap within, and a
    // shorter minimum wait so a sharp driver isn't just sitting there.
    const windowMs = Math.round(500 + (reaction/99)*400); // 500-900ms window
    const delayMs = randInt(1200, 2600);
    let lightsOutAt = null;
    let resolved = false;

    const tapBtn = document.getElementById('btn-formation-tap');
    const box = document.getElementById('formation-light-box');

    const finish = (outcome)=>{
      if(resolved) return;
      resolved = true;
      tapBtn.disabled = true;
      let paceDelta = 0;
      let msg = '';
      if(outcome==='perfect'){ paceDelta = rand(2,5); msg = '🟢 Perfect launch! A great start.'; }
      else if(outcome==='early'){ paceDelta = rand(-6,-3); msg = '⚠️ Jumped the start — a shaky launch.'; }
      else if(outcome==='late'){ paceDelta = rand(-3,-1); msg = '🐌 Slow reaction off the line.'; }
      else { paceDelta = 0; msg = '➡️ An average getaway.'; }
      this.toast(msg);
      this.executeRace(approach, compound, paceDelta, pitCall);
    };

    // Button stays clickable THE WHOLE TIME -- a tap before lightsOutAt is
    // set must correctly register as a false start. Disabling the button
    // until lights-out (an earlier version of this code did that) makes a
    // real click incapable of ever reaching the 'early' branch, silently
    // turning "jump the start" into unreachable dead code.
    tapBtn.onclick = ()=>{
      if(resolved) return;
      if(lightsOutAt===null){ finish('early'); return; }
      const elapsed = Date.now() - lightsOutAt;
      finish(elapsed <= windowMs ? 'perfect' : 'late');
    };

    setTimeout(()=>{
      if(resolved) return;
      lightsOutAt = Date.now();
      box.textContent = '🟢 GO!';
      box.style.background = '#2a8a5c';
      tapBtn.textContent = 'TAP NOW!';
      setTimeout(()=>{ if(!resolved) finish('late'); }, windowMs);
    }, delayMs);
  },

  /* 19.1 #2 -- Safety car / red flag event. Deliberately the cheapest safe
     scope per the backlog's own risk note: simulateRace() has no lap loop
     (single score-and-sort), so this is a POST-SCORING presentational
     compression, not a simulated mid-race event. Reads the already-final,
     already-sorted `results` array (mutates it in place) and returns either
     null (no event) or a small flag object the result modal can use to show
     a "🚨 Safety Car" banner. Never changes array length, never touches an
     existing DNF, never changes which driverIds are present -- every
     downstream consumer (points award, career stats, standings, headline
     generation) is completely unaware this ran and needs no changes. This
     is why the risk note's suggested "dedicated qualifying->race continuity
     regression pass" isn't a new mechanism here -- the existing
     22-driver-grid-invariant tests already cover the shape this must
     preserve, and the new safety_car test below adds shape-preservation
     checks specific to this function. */
  maybeApplySafetyCar(results, qualy){
    if(Math.random() > 0.06) return null; // ~6% of races
    const finishers = results.filter(r=>!r.dnf).sort((a,b)=>a.position-b.position);
    if(finishers.length < 4) return null; // not worth it with a near-empty field
    // Bunch-up: swap a few adjacent finishers within the TOP HALF of the
    // field (where a safety car bunching the pack up plausibly shuffles
    // things) -- a fixed number of adjacent-pair swaps, not a full reshuffle,
    // so it reads as "a shake-up", not "the whole result was randomized".
    const swapZoneEnd = Math.max(2, Math.floor(finishers.length/2));
    const swapCount = Math.min(3, Math.floor(swapZoneEnd/2));
    for(let i=0;i<swapCount;i++){
      const idx = randInt(0, swapZoneEnd-2);
      const a = finishers[idx], b = finishers[idx+1];
      const tmp = a.position; a.position = b.position; b.position = tmp;
      const tmpOrder = a.finishOrder; a.finishOrder = b.finishOrder; b.finishOrder = tmpOrder;
    }
    finishers.sort((a,b)=>a.position-b.position);
    // Small chance one already-poorly-placed finisher (bottom third, never
    // the player unless the player is genuinely back there too -- no special
    // protection or targeting either way) gets caught out and converted to a
    // DNF. This does NOT remove them from the array or change its length --
    // dnf:true + raceScore:-9999 is the exact same sentinel shape a normal
    // mechanical failure already produces, so every consumer treats it
    // identically to any other DNF.
    let caughtOutDriverId = null;
    if(Math.random() < 0.25){
      const backThird = finishers.slice(Math.floor(finishers.length*0.66));
      if(backThird.length){
        const victim = pick(backThird);
        victim.dnf = true;
        victim.raceScore = -9999;
        victim.position = null;
        caughtOutDriverId = victim.driverId;
        // Re-number the remaining finishers' positions to close the gap,
        // same as any other DNF already does implicitly via the sort+index
        // in simulateRace() -- redo that here since we're past that point.
        const remaining = results.filter(r=>!r.dnf).sort((a,b)=>a.raceScore-b.raceScore).reverse();
        remaining.forEach((r,i)=>{ r.position = i+1; });
      }
    }
    return { occurred: true, caughtOutDriverId };
  },

  /* 19.13e -- rare late-race weather-shift event. Deliberately does NOT
     mutate round.weather (per the backlog's own constraint) -- that field
     is read elsewhere (forecast chip, next-visit history) and retroactively
     changing it after the race already ran would be confusing/inconsistent
     with what the player saw all week. Instead this is a one-time score
     adjustment on the ALREADY-FINAL results, same safe post-scoring pattern
     as maybeApplySafetyCar/maybeApplyGridPenalty: never changes array
     length, never changes the driverId set, only nudges raceScore-derived
     positions for drivers whose wetSkill was notably above or below the
     field average (representing who adapted well vs poorly to conditions
     that shifted partway through a race that started dry or light rain).

     Feature idea #14 -- regional/street circuit weather microclimates.
     Tracks flagged `microclimate:true` (data.js TRACKS, e.g. Spa's
     "Elevation & Weather" character, Silverstone's famously changeable
     British weather) get a genuinely distinct, higher probability of THIS
     SAME event firing than the generic 5% every other track uses --
     reusing the exact event/math above rather than inventing a second
     parallel weather system, but giving those specific circuits a real,
     track-identity-driven mid-race probability distinct from the flat
     baseline every other track shares. */
  maybeApplyWeatherShift(results, weather, track){
    if(weather==='rain') return null; // a shift TO rain is the interesting case -- already-wet races don't get this event
    const fireChance = (track && track.microclimate) ? 0.16 : 0.05; // microclimate tracks: ~16% vs the generic ~5%
    if(Math.random() > fireChance) return null;
    const finishers = results.filter(r=>!r.dnf);
    if(finishers.length < 6) return null;
    const s = this.state;
    const wetSkillById = {};
    finishers.forEach(r=>{
      const drv = r.driverId==='player' ? s.player : s.grid.find(d=>d.id===r.driverId);
      wetSkillById[r.driverId] = drv ? (drv.attributes.driving.wetSkill||50) : 50;
    });
    const avgWetSkill = Object.values(wetSkillById).reduce((a,b)=>a+b,0) / Object.values(wetSkillById).length;
    // Re-rank finishers by a ONE-TIME blended score: their existing race
    // finish order still dominates (weight 0.8), with a wetSkill-vs-average
    // nudge layered on top (weight 0.2) -- a strong wet driver can gain a
    // few places, a weak one can lose a few, but nobody teleports from
    // P20 to P1 off this alone.
    const withBlend = finishers.map(r=>({
      r, blend: (finishers.length - r.position) * 0.8 + ((wetSkillById[r.driverId]-avgWetSkill)/50) * finishers.length * 0.2,
    }));
    withBlend.sort((a,b)=>b.blend-a.blend);
    withBlend.forEach((item,i)=>{ item.r.position = i+1; });
    results.sort((a,b)=>(a.dnf?999:a.position)-(b.dnf?999:b.position));
    const playerAfter = results.find(r=>r.driverId==='player');
    return { occurred: true, playerWetSkill: wetSkillById['player'], fieldAvgWetSkill: Math.round(avgWetSkill), playerNewPosition: playerAfter ? playerAfter.position : null, isMicroclimate: !!(track && track.microclimate) };
  },

  /* ---------------- PIT-STOP STRATEGY (undercut/overcut) ----------------
     Weekend-long tire/fuel strategy previously collapsed into ONE choice
     (approach + compound, both picked before the race even starts). This
     adds a mid-race pit-timing decision on top -- undercut (pit early,
     trading track position now for fresher tires later) or overcut (stay
     out, trading fresher tires for track position) -- resolved the exact
     same post-scoring way the safety car and grid penalty events already
     are: read the ALREADY-FINAL, already-sorted `results` array, nudge the
     player's own position by a small bounded amount depending on which way
     the gamble paid off, never touch array length or the driverId set, so
     every downstream consumer (points, career stats, standings) needs zero
     changes. This does NOT touch simulateRace's own math at all -- it's a
     presentational compression of "how did that pit call play out",
     exactly like the maybeApply* functions above frame their own events. */
  maybeApplyPitStopStrategy(results, pitCall){
    if(!pitCall || pitCall==='none') return null;
    const playerResult = results.find(r=>r.driverId==='player');
    if(!playerResult || playerResult.dnf) return null;
    const finishers = results.filter(r=>!r.dnf).sort((a,b)=>a.position-b.position);
    const idx = finishers.findIndex(r=>r.driverId==='player');
    if(idx===-1) return null;
    // Undercut: fresher tires pay off IF the gamble works -- a genuine coin
    // flip (55/45 in the player's favor, rewarding the bolder call slightly
    // more often than not) between gaining a few places or losing a couple
    // if the field reacts and the fresher tires don't materialize the
    // advantage in time. Overcut is the safer, lower-variance version --
    // smaller swings either way, biased toward a small gain since staying
    // out on track position is the more conservative, more reliable play.
    const isUndercut = pitCall==='undercut';
    const worked = Math.random() < (isUndercut ? 0.55 : 0.6);
    const magnitude = isUndercut ? randInt(2,4) : randInt(1,2);
    const delta = worked ? magnitude : -magnitude;
    const oldPos = playerResult.position;
    let newPos = clamp(oldPos - delta, 1, finishers.length);
    if(newPos === oldPos) return null;
    // Same insertion-move shift as maybeApplyGridPenalty -- only the
    // directly-affected drivers between old and new position shift by one.
    if(newPos < oldPos){
      finishers.forEach(r=>{ if(r.driverId==='player') return; if(r.position>=newPos && r.position<oldPos) r.position += 1; });
    } else {
      finishers.forEach(r=>{ if(r.driverId==='player') return; if(r.position>oldPos && r.position<=newPos) r.position -= 1; });
    }
    playerResult.position = newPos;
    results.sort((a,b)=>(a.dnf?999:a.position)-(b.dnf?999:b.position));
    return { call: pitCall, worked, oldPos, newPos, delta: oldPos-newPos };
  },

  /* ---------------- TEAM ORDERS (feature idea #7) ----------------
     A rare mid-race prompt: the team asks the player to hold position for
     the teammate. Deliberately gated tight (both must be finishing adjacent
     positions, teammate ahead, low chance) so it reads as an occasional
     genuine dilemma, not a recurring nuisance. Resolved BEFORE the results
     array is finalized/scored (unlike the safety car / weather-shift /
     pit-stop events, which are all post-scoring position edits on an
     ALREADY-FINAL array) because this needs the player's CHOICE to decide
     whether a swap happens at all -- so this returns a pending prompt
     object for executeRace() to show a modal for, and the actual position
     swap (if the player complies) is applied via a small helper the modal's
     button handler calls, using the same insertion-move position-shift
     pattern maybeApplyGridPenalty/maybeApplyPitStopStrategy already use. */
  maybeDetectTeamOrdersMoment(results){
    if(Math.random() > 0.05) return null; // ~5% of races -- a genuine rarity, not a recurring event
    const playerResult = results.find(r=>r.driverId==='player');
    if(!playerResult || playerResult.dnf) return null;
    const s = this.state; const p = s.player;
    const teammateEntry = s.grid.find(d=>d.teamId===p.teamId);
    if(!teammateEntry) return null;
    const tmResult = results.find(r=>r.driverId===teammateEntry.id);
    if(!tmResult || tmResult.dnf) return null;
    // Original case: teammate immediately ahead of the player -- the team
    // asks the PLAYER (trailing) to hold position so the teammate keeps
    // their spot.
    if(tmResult.position === playerResult.position - 1 && playerResult.position >= 2){
      return { mode:'holdForTeammate', teammateId: teammateEntry.id, teammateName: teammateEntry.name, playerPos: playerResult.position, teammatePos: tmResult.position };
    }
    // Feature idea #8 -- the mirror case: the PLAYER is immediately ahead of
    // the teammate (the player is the "struggling leader" here -- ahead on
    // track but on older tires/a tougher strategy) and the team asks the
    // TRAILING driver (the teammate, who has the pace to pass) to instead
    // hold station behind the player for a joint strategy reason. Same
    // adjacency gate and rarity as the original case, roles reversed:
    // complying means the position stays exactly as it is (no swap at all
    // -- the ask IS "don't take the position you could take"), refusing
    // means the teammate takes the position anyway (an insertion-move swap,
    // same applyTeamOrdersSwap() call the original case uses).
    if(tmResult.position === playerResult.position + 1 && playerResult.position >= 1){
      return { mode:'letLeaderThrough', teammateId: teammateEntry.id, teammateName: teammateEntry.name, playerPos: playerResult.position, teammatePos: tmResult.position };
    }
    return null;
  },
  applyTeamOrdersSwap(results, teammateId){
    const playerResult = results.find(r=>r.driverId==='player');
    const tmResult = results.find(r=>r.driverId===teammateId);
    if(!playerResult || !tmResult) return;
    const tmp = playerResult.position; playerResult.position = tmResult.position; tmResult.position = tmp;
    const tmpOrder = playerResult.finishOrder; playerResult.finishOrder = tmResult.finishOrder; tmResult.finishOrder = tmpOrder;
    results.sort((a,b)=>(a.dnf?999:a.position)-(b.dnf?999:b.position));
  },

  /* ---------------- TEAM OWNERSHIP MODE AUTO-RESOLVE (feature idea #13) ----------------
     Drives the EXACT SAME functions the normal player flow uses
     (runPractice/runQualifying/runSprintQualifying/executeRace and their
     resolve* callees) with this._ownerSilent set, which the openModal/
     closeModal/startQuizMiniGame patches above turn into no-ops/instant-
     neutral-resolves instead of real player interaction. Always resets
     _ownerSilent in a finally-equivalent (explicit reset at the end of
     every branch) so a thrown error can't leave the flag stuck on and
     silently swallow every future modal in the session. */
  autoResolveOwnerRaceWeekend(phase){
    const round = this.getCurrentRound();
    if(!round) return;
    this._ownerSilent = true;
    try{
      if(phase==='practice'){
        const track = TRACKS.find(t=>t.id===round.trackId);
        this.runPracticeQuiz(track, round, this.PRACTICE_PROGRAMS[0]);
      } else if(phase==='qualifying' && round.isSprint){
        if(!round.sprintCompleted) this.runSprintQualifying();
      } else if(phase==='qualifying'){
        this.runQualifying();
      } else if(phase==='race'){
        this.executeRace('saveTires', 'medium', 0, 'none');
      }
    } finally {
      this._ownerSilent = false;
    }
    this.toast(`🏗️ ${phase==='race'?'Race':phase==='qualifying'?'Qualifying':'Practice'} session resolved.`);
    // If that race weekend was the season's last round, handleSeasonEnd()
    // already ran (fully applying aging/retirements/awards/history) but its
    // own Season Wrap modal was suppressed while silent (openModal() no-ops
    // during _ownerSilent) -- re-show it for REAL here so the player still
    // gets the normal must-resolve continue/contract-offers/retirement
    // flow, instead of being stranded on a hub that thinks the season is
    // over with nothing clickable. s._lastSeasonWrapData is always set by
    // the same handleSeasonEnd() call that would have opened this modal.
    if(this.state.lastWrappedSeason === this.state.season && this.state._lastSeasonWrapData){
      this.renderSeasonWrapModal(this.state._lastSeasonWrapData);
    } else {
      this.renderHub();
    }
  },

  runRace(){
    this.renderRaceStrategyPrompt();
  },

  executeRace(approach, compound, formationPaceBonus, pitCall){
    const s = this.state; const p = s.player;
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }
    const track = TRACKS.find(t=>t.id===round.trackId);
    const weather = round.weather;
    const trackTemp = round.trackTemp;
    // Feature idea #14 -- Home Track race-day bonus, made explicit here
    // instead of relying on it merely surviving as a leftover from
    // resolveQualifying()/resolveSprintQualifying() setting p.isHomeTrackBonus
    // earlier the same weekend (driverStrength(), engine.js, reads
    // driver.isHomeTrackBonus directly off whatever's passed in -- it was
    // already being applied at race time as an accidental side effect of
    // object identity, just never set HERE explicitly and never disclosed
    // to the player as a race-day effect). Setting it explicitly on this
    // exact line makes the race day bonus correct and self-contained
    // regardless of what happened earlier in the weekend, and this._homeTrackBonusThisRace
    // is used below to show a disclosed fan-favorite flavor line when it applies.
    p.isHomeTrackBonus = isHomeTrack(s, track.id) ? HOME_TRACK_PACE_BONUS : 0;
    const homeTrackBonusAppliedThisRace = p.isHomeTrackBonus > 0;
    // Constructor rivalry post-race follow-up (Pass 23 REMAINING BACKLOG
    // item, closed this pass): snapshot the gap BEFORE this race's points
    // are scored, so finishExecuteRace() can show how the race actually
    // swung it -- reuses the SAME getConstructorRival() function the
    // pre-race flavor chip already calls, just captured at two different
    // points in time rather than any new comparison logic.
    const constructorGapBeforeRace = this.getConstructorRival();
    const ideal = trueIdealSetup(track, p);
    const setupBonus = setupMatchBonus(s.currentSetup, ideal, getDifficultySettings(s).setupWindow);
    // Feature idea #7 -- "Wet Setup" prep choice trade-off. Set by
    // renderWetSetupPromptModal() on the Thursday eve of a forecasted-wet
    // race weekend (app_hub.js renderTodayActions()). Reuses the EXACT same
    // setupMatchBonus() pace-unit scale everything else on this line uses --
    // not a second setup system, just one more signed term added into the
    // same paceBonus total. A small dry-conditions penalty trades for a
    // slightly larger wet-conditions bonus if it actually rains, and clears
    // itself the moment this race resolves either way.
    const wetSetupTerm = p._wetSetupChosen ? (weather==='rain' ? 2.4 : -1.4) : 0;
    const paceBonus = setupBonus + cosmeticPaceBonus(this.getCosmeticBonuses()) + (formationPaceBonus||0) + wetSetupTerm;
    const qualy = s.lastQualyResults || simulateQualifying(s.grid, p, track, weather, paceBonus, trackTemp);
    // Multi-weekend mechanical-failure consequence chain (engine.js): fade
    // last weekend's elevated risk a little before THIS weekend's roll,
    // unless the player already fully addressed it (Team screen "Address
    // Reliability Concern" action clears it to 1 outright -- see
    // renderTeamScreen()). Reading p.mechanicalRiskMult happens inside
    // simulateRace() itself; this only decays the carried-over value.
    decayMechanicalRisk(p);
    // Team Ownership Mode full closure (Pass 25): if the owner set a
    // strategy call for either of their two AI drivers this weekend
    // (renderOwnerStrategyModal(), below), pass it through as
    // simulateRace()'s new OPTIONAL 11th argument -- every other call
    // site in the codebase omits this argument entirely and is completely
    // unaffected (see simulateRace()'s own comment, engine.js). Cleared
    // the moment this race resolves, same one-race-weekend lifecycle as
    // p._wetSetupChosen above.
    const aiStrategyOverrides = p._ownerAiStrategy || undefined;
    const results = simulateRace(s.grid, p, qualy, track, weather, {approach, compound: compound||'medium'}, getDifficultySettings(s), this.getTeamMorale(p.teamId), paceBonus, trackTemp, aiStrategyOverrides);
    if(p._ownerAiStrategy) p._ownerAiStrategy = null;
    // Captured BEFORE maybeApplySafetyCar can mutate a finisher into a DNF --
    // the mechanical-risk consequence chain should only respond to a real
    // reliability-driven failure from simulateRace's own failChance roll,
    // not a safety-car-caused one (a different kind of DNF entirely, see
    // maybeApplySafetyCar's own comment below).
    const playerHadMechanicalDNF = (results.find(r=>r.driverId==='player')||{}).dnf === true;
    const safetyCarEvent = this.maybeApplySafetyCar(results, qualy);
    const weatherShiftEvent = this.maybeApplyWeatherShift(results, weather, track);
    const pitStopEvent = this.maybeApplyPitStopStrategy(results, pitCall);
    const ctx = { track, weather, trackTemp, qualy, results, playerHadMechanicalDNF, safetyCarEvent, weatherShiftEvent, pitStopEvent, approach, homeTrackBonusAppliedThisRace, constructorGapBeforeRace };
    // Team orders (feature idea #7): checked here, AFTER every other
    // post-scoring position event has already settled the results array but
    // BEFORE fastest-lap/points/career-stats are attributed to it -- a swap
    // (if the player complies) must happen before anything reads final
    // position, same reasoning maybeApplyGridPenalty/maybeApplyPitStopStrategy
    // give for operating on the array in place. Unlike those, this needs the
    // player's own choice, so it pauses here with a modal instead of
    // resolving automatically; finishExecuteRace() (below) carries the rest
    // of the scoring/UI logic forward once resolved either way.
    const teamOrdersMoment = this.maybeDetectTeamOrdersMoment(results);
    if(teamOrdersMoment && this._ownerSilent){
      // Team Ownership Mode (feature idea #13): no player to answer the
      // team-radio prompt, so default to complying -- the same choice a
      // sensible team principal would make most of the time, and the one
      // with a purely positive/neutral effect (morale up, no downside)
      // rather than picking the confrontational refuse branch by default.
      // Feature idea #8's mirror case (mode:'letLeaderThrough') has NO
      // swap on comply (see renderTeamOrdersModal below) -- only the
      // original case (mode:'holdForTeammate') swaps here.
      if(teamOrdersMoment.mode==='holdForTeammate') this.applyTeamOrdersSwap(ctx.results, teamOrdersMoment.teammateId);
      this.adjustTeamMorale(p.teamId, 6);
      const teammate = s.grid.find(d=>d.id===teamOrdersMoment.teammateId);
      if(teammate) teammate.respect = clamp((teammate.respect||50) + 8, 0, 100);
      this.finishExecuteRace(ctx, { complied:true, teammateName: teamOrdersMoment.teammateName });
    } else if(teamOrdersMoment){
      this.renderTeamOrdersModal(teamOrdersMoment, ctx);
    } else {
