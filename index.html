            return `<div class="option-card ${cfg.teamId===t.id?'selected':''}" data-val="${t.id}" ${locked?'style="opacity:0.5; cursor:not-allowed;" data-locked="1"':''}>${t.flag} ${t.name}<br><span style="${locked?'color:var(--candy-red); font-weight:800;':'color:var(--ink-soft);'} font-size:9px;">${locked?'🔒 LOCKED — this difficulty':'Car '+t.carStrength}</span></div>`;
          }).join('')}
        </div>

        <label class="field-label">Career Mode</label>
        <div class="section-sub" style="margin:0 0 8px;">Team Ownership: instead of driving, manage the team from the pit wall — race weekends resolve automatically while you focus on development budget, morale, and contracts for two AI drivers.</div>
        <div class="option-grid" id="grid-ownermode" style="margin-bottom:20px;">
          <div class="option-card ${!cfg.ownerMode?'selected':''}" data-val="driver">🏎️ Driver</div>
          <div class="option-card ${cfg.ownerMode?'selected':''}" data-val="owner">🏗️ Team Owner</div>
        </div>

        <div class="section-sub" style="text-align:center; margin-bottom:8px;">Starting team: <b>${TEAMS.find(t=>t.id===cfg.teamId).flag} ${TEAMS.find(t=>t.id===cfg.teamId).name}</b></div>
        <button class="pbtn full gold" id="btn-start-career">Choose Teammate & Start Career</button>
        <button class="pbtn full" id="btn-back-title" style="margin-top:10px;">Back</button>
      </div>
    `;
    document.getElementById('inp-name').oninput = (e)=> cfg.name = e.target.value;
    document.getElementById('sel-nationality').onchange = (e)=> cfg.nationality = e.target.value;
    this.wireOptionGrid('grid-gender', v=> cfg.gender=v);
    this.wireOptionGrid('grid-team', v=>{
      // Changing team invalidates any previous teammate pick -- it belonged
      // to a different team's driver pool and must never carry over.
      cfg.teamId=v;
      cfg.teammateChoice=null;
    }, true);
    this.wireOptionGrid('grid-diff', v=>{
      cfg.difficulty=v;
      // Changing difficulty can lock the currently-selected team -- if so,
      // fall back to the first team that's actually unlocked at the new
      // difficulty rather than silently starting the career with a locked
      // team through a stale selection.
      const currentTeam = TEAMS.find(t=>t.id===cfg.teamId);
      if(!teamUnlockedForDifficulty(currentTeam, cfg.difficulty)){
        cfg.teamId = TEAMS.find(t=>teamUnlockedForDifficulty(t, cfg.difficulty)).id;
        cfg.teammateChoice = null;
      }
      this.renderCreateCharacter();
    });
    this.wireOptionGrid('grid-ownermode', v=>{ cfg.ownerMode = (v==='owner'); });
    document.getElementById('btn-start-career').onclick = ()=>{
      if(!cfg.name || !cfg.name.trim()){ this.toast('Please enter a driver name.'); return; }
      // Team Ownership Mode bugfix (Pass 25): "Choose Your Teammate" ("pick
      // who partners YOU") is entirely driver-framed and doesn't apply to
      // an owner at all -- the owner isn't racing, so there's no personal
      // seat to have a teammate FOR. Previously this modal showed
      // unconditionally regardless of cfg.ownerMode, forcing an owner
      // through a "pick your teammate" flow with no teammate of their own.
      // generateGrid() (engine.js) already handles teammateChoice:null
      // correctly (falls back to the team's first named driver), so
      // skipping the picker for owner mode needs no change on the grid-
      // generation side at all -- purely a UX fix at the entry point.
      if(cfg.ownerMode){
        cfg.teammateChoice = null;
        this.startNewCareer();
        return;
      }
      this.renderTeammatePickModal({
        teamId: cfg.teamId,
        mode: 'newCareer',
        onPick: (chosenName)=>{
          cfg.teammateChoice = chosenName;
          this.closeModal();
          this.startNewCareer();
        },
      });
    };
    document.getElementById('btn-back-title').onclick = ()=> this.renderBoot();
  },

  /* ---------------- JUNIOR SERIES PROLOGUE (feature idea #12) ----------------
     A short 3-race "junior series" run right after career state is created
     but BEFORE the hub is ever shown, replacing the flat baseSkill:42 every
     new career previously used for EVERY player regardless of how this
     prologue goes. Deliberately runs AFTER startNewCareer() (not before)
     because it reuses the existing quiz mini-game engine
     (startQuizMiniGame(), app_race.js), which reads/writes
     App.state.player.recentQuizIds -- that object doesn't exist yet during
     character creation, and duplicating a state-free quiz variant just for
     this one prologue would be a second parallel system for no real
     benefit. Instead, the aggregate 3-round score is applied as a bounded
     retroactive nudge directly to the freshly-created player's
     driving/mental attributes (same clamp(...,0,99) shape
     createDriverAttributes() itself already produces), respecting the
     skill-cap-eligible 0-99 range every other stat write already respects. */
  runJuniorSeriesPrologue(){
    this._prologueState = { round: 0, totalRounds: 3, correctTotal: 0, questionTotal: 0 };
    this.renderJuniorSeriesIntro();
  },
  /* Feature idea #10 -- seed the player's very first grid rival from one of
     the prologue's quiz-flavor "opponents", giving the origin story a tie
     back to the prologue instead of a cold-start rivalry (updateRivalry(),
     app_race.js, would otherwise only build one up organically race by
     race with no starting narrative). One flavor name per prologue round --
     purely a name/origin-text pool, not a new driver-generation system. */
  JUNIOR_SERIES_OPPONENTS: [
    'Theo Marchetti', 'Ines Kovac', 'Rafael Duarte',
  ],
  renderJuniorSeriesIntro(){
    this.root.innerHTML = `
      <div class="create-wrap" style="text-align:center;">
        <div class="boot-eyebrow">Before the Big Leagues</div>
        <div class="section-title" style="font-size:16px; margin:8px 0 14px;">Junior Series Prologue</div>
        <div class="section-sub" style="margin-bottom:18px;">Three short junior-series races before your F1 career truly begins. How you do here shapes the driver you start as — a strong showing debuts with sharper fundamentals.</div>
        <button class="pbtn full gold" id="btn-prologue-start">🏁 Start Junior Series</button>
        <button class="pbtn full" id="btn-prologue-skip" style="margin-top:10px;">Skip Prologue</button>
      </div>
    `;
    document.getElementById('btn-prologue-start').onclick = ()=> this.runJuniorSeriesRound();
    document.getElementById('btn-prologue-skip').onclick = ()=> this.finishJuniorSeriesPrologue(true);
  },
  runJuniorSeriesRound(){
    const ps = this._prologueState;
    const rounds = ['Junior Series Round 1', 'Junior Series Round 2', 'Junior Series Finale'];
    const themes = ['setup','tires','strategy'];
    const opponent = this.JUNIOR_SERIES_OPPONENTS[ps.round % this.JUNIOR_SERIES_OPPONENTS.length];
    this.startQuizMiniGame({
      title: rounds[ps.round],
      subtitle: `Head-to-head with ${opponent} before F1`,
      theme: themes[ps.round % themes.length],
      questionCount: 3,
      trackId: null,
      onComplete: (scorePct)=>{
        ps.correctTotal += Math.round(scorePct*3);
        ps.questionTotal += 3;
        // Track how the player did specifically against the LAST round's
        // opponent -- the finale opponent becomes the seeded rival below,
        // so only that round's own performance matters for the origin text.
        ps.lastOpponent = opponent;
        ps.lastOpponentScorePct = scorePct;
        ps.round++;
        if(ps.round < ps.totalRounds){
          this.runJuniorSeriesRound();
        } else {
          this.finishJuniorSeriesPrologue(false);
        }
      },
    });
  },
  finishJuniorSeriesPrologue(skipped){
    const s = this.state; const p = s.player;
    const ps = this._prologueState;
    const overallPct = skipped ? 0.5 : (ps.questionTotal ? ps.correctTotal/ps.questionTotal : 0.5);
    // Bounded -6..+8 baseSkill-equivalent adjustment applied directly to
    // every driving/mental stat, same clamp(...,0,99) range every other
    // stat write already respects -- a perfect prologue is a genuine but
    // modest edge, a poor one a genuine but modest deficit, never enough on
    // its own to trivialize or ruin the opening seasons. Skipping the
    // prologue entirely applies no adjustment (0.5 = the midpoint, +/-0).
    // Deliberately asymmetric (a worse floor than ceiling) so a rough
    // prologue stings a little less than a dominant one rewards -- the
    // raw (overallPct-0.5)*2*8 formula would otherwise swing a full -8..+8,
    // clamped here to the asymmetric range the comment always promised.
    const bonus = clamp(Math.round((overallPct - 0.5) * 2 * 8), -6, 8);
    if(bonus !== 0){
      ['driving','mental'].forEach(group=>{
        Object.keys(p.attributes[group]).forEach(stat=>{
          p.attributes[group][stat] = clamp(p.attributes[group][stat] + bonus, 0, 99);
        });
      });
    }
    if(!skipped){
      const line = overallPct>=0.8 ? 'A dominant junior series campaign — the paddock is already talking about you.'
        : overallPct>=0.5 ? 'A solid junior series showing — a promising foundation to build on.'
        : 'A rocky junior series, but everyone has to start somewhere.';
      p.journal.unshift({season:s.season, week:s.week, title:'Junior Series Complete', text:`${Math.round(overallPct*100)}% (${ps.correctTotal}/${ps.questionTotal}) — ${line}`, icon:'🏁'});
      this.toast(`🏁 Junior Series complete: ${Math.round(overallPct*100)}%.`);
      // Feature idea #10 -- seed the player's first rival from the
      // prologue's finale opponent. Picks a real grid driver (not the
      // player's own teammate, so the origin rivalry isn't confused with
      // the separate teammate relationship arc) and renames them to match
      // the finale opponent's flavor name, with a small starting
      // rivalryLevel and a dedicated origin line -- a genuine narrative
      // head start rather than the fully cold-start rivalry
      // updateRivalry() would otherwise build up race by race with no
      // tie-in at all. Only fires when the finale was actually played
      // (ps.lastOpponent set) and there's a non-teammate grid driver to
      // attach it to.
      if(ps.lastOpponent){
        const candidate = s.grid.find(d=>d.teamId!==p.teamId);
        if(candidate){
          candidate.name = ps.lastOpponent;
          const closeFinale = ps.lastOpponentScorePct!==undefined && ps.lastOpponentScorePct < 0.6;
          candidate.rivalryLevel = clamp((candidate.rivalryLevel||0) + (closeFinale ? 26 : 22), 0, 100);
          candidate.rivalryOrigin = closeFinale
            ? `${ps.lastOpponent} narrowly got the better of you in the junior series finale — a rivalry born before F1 even started.`
            : `You and ${ps.lastOpponent} were the two names to watch in the junior series — old habits die hard.`;
          s.rivalId = candidate.id;
          p.journal.unshift({season:s.season, week:s.week, title:'A Familiar Face', text:`${ps.lastOpponent} — your junior series finale opponent — has made the grid too. The rivalry continues in F1.`, icon:'⚔️'});
        }
      }
    }
    this._prologueState = null;
    this.saveState();
    this.showChrome();
    this.renderHub();
  },

  /* ---------------- TEAMMATE PICK ----------------
     Reused in two places: character creation (mode:'newCareer', profile
     data only -- no real driver objects exist yet) and a mid-career team
     switch (mode:'midCareerSwitch', reads the ACTUAL existing grid driver
     objects for the new team, which already have real careerStats/
     relationship history, not just flavor bios). Always exactly 2 choices,
     matching a real F1 team's 2 seats -- one is picked as the player's
     teammate, the other is removed from the grid entirely in BOTH modes
     (newCareer: never generated at all, see generateGrid()'s abandonedName;
     midCareerSwitch: an already-existing driver is dropped from the grid,
     see rebalanceGridForTeamChange()'s keepDriverId -- this is the SAME
     removal the automatic lowest-points-first drop always did before this
     feature existed, just with an explicit choice of which one now instead
     of an automatic one). The team the player is LEAVING gets a DIFFERENT,
     freshly-generated rookie to fill their vacated seat -- that new rookie
     is not the dropped driver reappearing elsewhere, it's a distinct new
     grid entry. */
  renderTeammatePickModal({ teamId, mode, onPick }){
    const team = TEAMS.find(t=>t.id===teamId);
    const profile = TEAM_DRIVER_PROFILES[teamId];
    let candidates;
    if(mode==='midCareerSwitch'){
      // Real existing grid drivers -- show actual current stats, not the
      // static launch-day bio (a driver who's raced a few seasons has a
      // real record by now that's more relevant than their original flavor
      // text).
      candidates = this.state.grid.filter(d=>d.teamId===teamId).map(d=>{
        const titlesText = d.careerLegacy && d.careerLegacy.worldTitles ? ` · ${d.careerLegacy.worldTitles}x Champion` : '';
        return {
          id: d.id, name: d.name, nationality: d.nationality, flag: d.flag, age: d.age,
          bio: (profile?.drivers.find(p=>p.name===d.name)?.bio) || 'A driver on this team.',
          statsLine: `${d.careerStats.wins} win(s) · ${d.careerStats.podiums} podium(s) · ${d.careerStats.points} career points${titlesText}`,
        };
      });
    } else {
      // Character-creation flow: no driver objects exist yet, so read
      // straight off the static profile's preloaded careerStats (data.js)
      // -- this is what makes a 7-time-champion teammate option visibly
      // different from a rookie option BEFORE the player even commits.
      candidates = (profile?.drivers || []).map(d=>{
        const cs = d.careerStats;
        const titlesText = cs && cs.worldTitles ? ` · ${cs.worldTitles}x Champion` : '';
        const statsLine = !cs ? null
          : cs.rookie ? 'Rookie season — no career record yet.'
          : `${cs.wins} win(s) · ${cs.podiums} podium(s) · ${cs.points} career points${titlesText}`;
        return { id: d.name, name: d.name, nationality: d.nationality, flag: FLAG_BY_NATION[d.nationality], age: d.age, bio: d.bio, statsLine };
      });
    }
    this.openModal(`
      ${this.modalHeader('Choose Your Teammate')}
      <div class="section-sub" style="margin:0 0 10px;">${team.flag} <b>${team.name}</b> runs two cars. Pick who partners you — ${mode==='midCareerSwitch' ? 'the other driver leaves the grid for good.' : "the other driver won't appear in this career at all."}</div>
      ${profile?.relationshipNote ? `<div class="pixel-panel" style="border-left:3px solid var(--candy-blue); margin-bottom:12px;"><div class="section-sub" style="margin:0; font-style:italic;">${profile.relationshipNote}</div></div>` : ''}
      <div class="stack-8">
        ${candidates.map(c=>`
          <div class="pixel-panel" style="margin-bottom:0;">
            <div class="flex-between">
              <div style="min-width:0;">
                <div style="font-weight:800; font-size:13px;">${c.flag} ${c.name}</div>
                <div class="section-sub" style="margin:2px 0 0;">${c.nationality} · Age ${c.age}</div>
              </div>
              <button class="pbtn small gold" data-pick-teammate="${c.id}" style="flex-shrink:0;">Pick</button>
            </div>
            <div class="section-sub" style="margin-top:6px;">${c.bio}</div>
            ${c.statsLine ? `<div class="section-sub" style="margin-top:4px; font-size:8px;">${c.statsLine}</div>` : ''}
          </div>
        `).join('')}
      </div>
    `);
    // Must-resolve in the newCareer case (there's no meaningful "cancel" --
    // the player has to pick someone to actually start). In the
    // midCareerSwitch case the caller decides whether to allow a close
    // (see renderScoutingOfferModal/renderContractOffersModal call sites);
    // default to must-resolve here too since a team switch that's already
    // been confirmed shouldn't be abandonable mid-pick either.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.querySelectorAll('[data-pick-teammate]').forEach(btn=>{
      btn.onclick = ()=>{
        const picked = candidates.find(c=>String(c.id)===btn.dataset.pickTeammate);
        onPick(picked.name, picked.id);
      };
    });
  },

  wireOptionGrid(gridId, onSelect, skipLocked){
    const grid = document.getElementById(gridId);
    grid.querySelectorAll('.option-card').forEach(card=>{
      // Bugfix: a locked card previously had NO click handler wired at all
      // (skipLocked's early `return` below skipped it entirely), so
      // clicking it was a completely silent no-op -- no toast, no shake,
      // nothing. Confirmed as a real source of confusion: a player who
      // clicks a greyed-out, small-lock-text team card can easily believe
      // their pick registered (nothing on screen says otherwise) and only
      // discover much later -- e.g. at the Championship Standings screen,
      // seeing an unexpected teammate -- that the default team/teammate
      // was used instead. Now gives an explicit toast explaining WHY the
      // click didn't do anything, rather than staying silent.
      if(skipLocked && card.dataset.locked){
        card.onclick = ()=> this.toast('🔒 Locked at this difficulty — pick a lower difficulty or a different team.');
        return;
      }
      card.onclick = ()=>{
        grid.querySelectorAll('.option-card').forEach(c=>c.classList.remove('selected'));
        card.classList.add('selected');
        onSelect(card.dataset.val);
      };
    });
  },

  startNewCareer(){
    const cfg = this.createConfig;
    if(!cfg.name || !cfg.name.trim()){ this.toast('Please enter a driver name.'); return; }

    // A new career should never inherit a previous career's team
    // development left mutated in memory from the same browser session
    // (TEAMS is a shared, not per-career, in-memory constant) -- reset every
    // team's carStrength/reliability/upgrades/devSlotsUsed back to its
    // data.js starting numbers first.
    TEAMS.forEach(t=>{
      const base = TEAMS_BASE_DEFAULTS[t.id];
      if(base){ t.carStrength = base.carStrength; t.reliability = base.reliability; }
      t.upgrades = buildInitialTeamUpgrades(t.tier);
      t.devSlotsUsed = 0;
    });

    // Apply any pending legacy perk from a previously retired driver.
    const pendingLegacy = loadPendingLegacy();
    if(pendingLegacy){
      const perk = LEGACY_PERKS.find(x=>x.id===pendingLegacy.perkId);
      if(perk) perk.apply(cfg);
    }

    const player = createPlayer(cfg);
    player.joinedTeamOnSeason = 2027; // 19.1 #13 -- matches the hardcoded career-start season below
    // Feature idea #13 -- Team Ownership Mode. Deliberately implemented as a
    // flag on the SAME player object/save shape (not a parallel state tree)
    // rather than a genuinely separate two-AI-seat parallel career path --
    // the latter would need simulateRace()'s player-vs-grid distinction
    // rebuilt from scratch (it currently always treats exactly one entrant
    // as "the player" for morale/pace-bonus/quiz-mini-game purposes), which
    // is real, substantial surgery on the core sim this combined pass
    // doesn't attempt. Instead: the player's own driver still exists (so
    // every existing invariant -- 22-driver grid, standings, save shape --
    // stays intact untouched), but race weekends AUTO-RESOLVE using the
    // exact same simulateQualifying()/simulateRace() calls the normal flow
    // already makes (see autoResolveOwnerRaceWeekend(), app_race.js) with
    // neutral/default choices instead of the player picking strategy, and
    // the player's actual gameplay loop becomes the Team Ownership screen
    // (renderOwnerScreen(), app_screens.js) -- development budget, morale,
    // and contract decisions for the team's two seats.
    player.isTeamOwner = !!cfg.ownerMode;
    const bonus = cfg.legacyBonus;
    if(bonus){
      if(bonus.fanPopularity) player.fanPopularity = clamp(player.fanPopularity + bonus.fanPopularity, 0, 100);
      if(bonus.mediaReputation) player.mediaReputation = clamp(player.mediaReputation + bonus.mediaReputation, 0, 100);
      if(bonus.money) player.money = bonus.money;
      if(bonus.drivingBoost){
        Object.keys(player.attributes.driving).forEach(k=>{
          player.attributes.driving[k] = clamp(player.attributes.driving[k] + bonus.drivingBoost, 0, 99);
        });
      }
    }

    const { grid, abandonedName } = generateGrid(cfg.teamId, cfg.teammateChoice);
    // Add the previous career's driver as a legendary AI rival, if a legacy
    // is pending — this REPLACES an existing AI driver on a strong team
    // other than the player's own (so every team's 2-seat count stays
    // intact) rather than being added as an extra body. The grid must
    // always total exactly 22 drivers (21 AI + player), no exceptions.
    if(pendingLegacy && pendingLegacy.retiredPlayerSnapshot){
      const eligibleTeams = TEAMS.filter(t=>t.id!==cfg.teamId && t.tier<=2);
      const legendTeam = (eligibleTeams.length ? pick(eligibleTeams) : TEAMS.find(t=>t.id!==cfg.teamId)) || TEAMS[0];
      const slotIdx = grid.findIndex(d=>d.teamId===legendTeam.id);
      if(slotIdx!==-1) grid[slotIdx] = makeLegendDriver(pendingLegacy.retiredPlayerSnapshot, legendTeam.id);
    }
    clearPendingLegacy();

    const season = 2027;
    this.state = {
      player, grid, season,
      careerStartSeason: season,
      calendar: (()=>{ const rounds = buildSeasonCalendar(1); return { rounds, currentRound: 0, midSeasonDevRoundIndex: pickMidSeasonDevRoundIndex(rounds.length), midSeasonDevApplied: false }; })(),
      dayIndex: 0, week: 1,
      standings: {},
      constructorPoints: {}, // Constructors' Championship, see constructorsStandings() (app_hub.js) -- reset every season alongside standings, see handleSeasonEnd() (app_screens.js)
      newsFeed: [
        `📰 ${player.name} joins ${TEAMS.find(t=>t.id===player.teamId).name} as a rookie driver.`,
        ...(pendingLegacy ? [`🌟 The paddock remembers ${pendingLegacy.retiredPlayerSnapshot.name}'s legacy — and a new legend joins the grid.`] : []),
      ],
      seasonStats: { wins:0, podiums:0, points:0, beatTeammate:false, q3count:0 },
      seasonObjectives: null, // set below once TEAMS lookup is available
      npcRoster: this.generateNpcRoster(),
      history: [],
      retiredFlag:false,
      rivalId: null,
      // carUpgrades below is legacy/unused as of the per-team development
      // rework -- development levels now live on each TEAMS entry
      // (team.upgrades, seeded by buildInitialTeamUpgrades in data.js) so a
      // team switch inherits that team's real progress. Kept here only so
      // old save files still parse the same shape; nothing reads it anymore.
      carUpgrades: { aero:1, engine:1, chassis:1, suspension:1, reliability:1 },
      facilities: { gym:1, simulator:1, engineering:1, factory:1, media:1, hospitality:1 },
      currentSetup: { downforce:50, balance:50, gearRatio:50 },
      tutorialSeen: false,
      teamMorale: Object.fromEntries(TEAMS.map(t=>[t.id, 65])),
      cosmetics: this.initialCosmeticsState(),
      careerRetirementCount: 0,
      metPartner: null,
      pendingRomanceCandidates: null,
      scoutingOffer: null,
      seasonStartCareerWins: Object.fromEntries(grid.map(d=>[d.id, 0])),
      lastRaceHeadline: null,
      // Names permanently removed from this career's named-driver pool by
      // a teammate pick (see generateGrid()'s abandonedName, engine.js) --
      // checked by generateFreshDriverName() so an abandoned choice can
      // never resurface later as a "fresh" replacement driver either.
      abandonedDriverNames: abandonedName ? [abandonedName] : [],
    };
    this.state.seasonObjectives = generateSeasonObjectives(this.state);
    if(bonus && bonus.tierBoost){
      this.state.pendingTierOffer = true; // surfaced on Home/contract flow as an early opportunity
    }
    this.saveState();
    // Junior series prologue (feature idea #12): runs once, right here,
    // BEFORE the hub/chrome is ever shown for a brand-new career -- state
    // now exists (startQuizMiniGame needs App.state.player.recentQuizIds),
    // but the player hasn't seen the hub yet, so this reads as a natural
    // "before your F1 career begins" opening beat rather than an
    // interruption of anything already in progress. showChrome() is
    // deliberately deferred until finishJuniorSeriesPrologue() calls
    // renderHub(), matching how the boot/character-creation screens (which
    // this prologue's own screens are styled like) also keep chrome hidden
    // until the hub is genuinely ready.
    this.runJuniorSeriesPrologue();
  },

  initialCosmeticsState(){
    return {
      careerStartSeason: 2027,
      equipped: { helmet:'helmet_default', livery:'livery_default', suit:'suit_default', gloves:'gloves_default' },
      totalRoundsCompletedThisSeason: 0,
    };
  },

  generateNpcRoster(){
    // 8th fixed role added alongside the original 7 (REMAINING BACKLOG --
    // none of the 7 negotiate on the player's behalf). Manager/Agent slots
    // in with the same relationship shape as every other role; its own
    // talk-line hooks (contract pushback flavor, sponsor-lead chatter) live
    // in getTalkLinesForRole() (app_actions.js).
    const roles = ['Team Principal','Chief Engineer','Race Engineer','Doctor','Journalist','Best Friend','Streamer Pal','Manager'];
    const engineerPersonality = pick(ENGINEER_PERSONALITIES);
    return roles.map(role=>{
      const gender = pick(['M','F']);
      return {
        id: uid('npc'), role, name: randomName(gender), gender,
        relationship: { friendship:40, trust:40, affection: role==='Best Friend'?45:20, respect:40, compatibility:randInt(30,70), memories:[] },
        personality: role==='Race Engineer' ? engineerPersonality : pick(['Calm','Energetic','Strict','Funny']),
        tenureSeasons: 0,
        romance: { status:'none', spark:0 }, // status: 'none'|'flirting'|'dating'|'declined'
      };
    });
  },

  saveState(){
    if(!this.state) return;
    this.enforcePlayerSkillCap();
    this.syncTeamsToState();
    saveGame(this.state);
  },

  /* ---------------- SKILL CAP (anti-overpower) ----------------
     Every driving/mental stat-changing action in the game (training,
     dialogue effects, race-day feedback, mentoring) routes through
     saveState() before persisting -- see ARCHITECTURE in the handoff doc.
     Rather than threading a cap through 20+ scattered write sites (every
     `p.attributes.X.Y = clamp(...)` call across app_actions.js/app_race.js),
     this enforces the cap ONCE, centrally, right here, so no future stat
     effect can silently bypass it by forgetting to call a helper.

     The cap itself: each of the player's driving/mental stats is capped at
     the CURRENT grid leader's same stat + SKILL_CAP_MARGIN. "Leader" means
     the AI driver on top of the points standings -- re-evaluated every
     single call, so the cap tracks whoever is actually leading right now,
     not a fixed reference driver. If the player themselves is the points
     leader, the cap instead uses the best AI driver's stat (the grid's
     runner-up by points), so leading the championship doesn't remove the
     ceiling entirely -- it just means the player is competing against the
     next-best AI driver instead of themselves.

     Deliberately per-stat (not "average" or "overall rating"): a leader
     who's elite at braking but mediocre at wet skill produces a cap that's
     high on braking and low on wet skill for the player too, so the cap
     reflects a real competitive ceiling stat-by-stat rather than a single
     flattened number. Lifestyle stats (fitness/mood/stress/energy) are
     deliberately NOT capped here -- they're not competitive "skill" in the
     same sense and already have their own bounded ranges. */
  enforcePlayerSkillCap(){
    const s = this.state; const p = s.player;
    if(!p || !s.grid || !s.grid.length) return;
    const SKILL_CAP_MARGIN = 8;
    const sortedByPoints = [...s.grid].sort((a,b)=>(s.standings?.[b.id]||0)-(s.standings?.[a.id]||0));
    const playerPoints = s.standings?.['player']||0;
    const aiLeaderPoints = s.standings?.[sortedByPoints[0]?.id]||0;
    // If the player is actually ahead of every AI driver on points, the
    // "leader" for cap purposes is the best AI driver instead (still
    // sortedByPoints[0] -- there's no separate driver to fall back to,
    // the grid's own #1 AI driver IS the right reference either way).
    const referenceDriver = sortedByPoints[0];
    if(!referenceDriver) return;
    ['driving','mental'].forEach(group=>{
      Object.keys(p.attributes[group]).forEach(stat=>{
        const cap = (referenceDriver.attributes[group][stat]||0) + SKILL_CAP_MARGIN;
        if(p.attributes[group][stat] > cap) p.attributes[group][stat] = cap;
      });
    });
  },

  /* Read-only check used by the Training modal to flag a stat that's
     already at (or within 2 of) its skill-cap ceiling, BEFORE the player
     spends energy/money on a session that can't meaningfully move it.
     Mirrors enforcePlayerSkillCap()'s exact reference-driver logic so the
     two never drift out of sync with each other. */
  isNearSkillCap(group, stat){
    const s = this.state; const p = s.player;
    if(!p || !s.grid || !s.grid.length) return false;
    const SKILL_CAP_MARGIN = 8;
    const sortedByPoints = [...s.grid].sort((a,b)=>(s.standings?.[b.id]||0)-(s.standings?.[a.id]||0));
    const referenceDriver = sortedByPoints[0];
    if(!referenceDriver) return false;
    const cap = (referenceDriver.attributes[group][stat]||0) + SKILL_CAP_MARGIN;
    return p.attributes[group][stat] >= cap - 2;
  },

  /* ---------------- TEAMS persistence ----------------
     TEAMS (data.js) is a plain in-memory JS constant -- it is NOT part of
     App.state and is NOT written to localStorage on its own. Before this
     pair of helpers existed, every mutation to team.carStrength/reliability/
     upgrades/devSlotsUsed (from AI seasonal development, player car
     upgrades, or regulation changes) was silently lost on every page
     reload, since a fresh page load re-runs data.js from scratch and
     resets every team back to its hardcoded starting numbers. This was a
     real, pre-existing bug independent of the per-team development rework
     -- it just became far more consequential once development stopped
     being a purely cosmetic display number.

     Fix: snapshot the mutable per-team fields into s.teamState right before
     every save, and restore TEAMS from that snapshot right after every
     load. Deliberately narrow (only the fields that actually change at
     runtime) so this stays cheap and easy to extend later. */
  syncTeamsToState(){
    if(!this.state) return;
    this.state.teamState = Object.fromEntries(TEAMS.map(t=>[t.id, {
      carStrength: t.carStrength,
      reliability: t.reliability,
      upgrades: {...(t.upgrades||buildInitialTeamUpgrades(t.tier))},
      devSlotsUsed: t.devSlotsUsed||0,
    }]));
  },
  syncTeamsFromState(){
    if(!this.state || !this.state.teamState) return;
    TEAMS.forEach(t=>{
      const saved = this.state.teamState[t.id];
      if(!saved) return;
      t.carStrength = saved.carStrength;
      t.reliability = saved.reliability;
      t.upgrades = {...(saved.upgrades||buildInitialTeamUpgrades(t.tier))};
      t.devSlotsUsed = saved.devSlotsUsed||0;
    });
  },

  adjustTeamMorale(teamId, delta){
    if(!this.state.teamMorale) this.state.teamMorale = Object.fromEntries(TEAMS.map(t=>[t.id, 65]));
    // Team culture (data.js TEAMS[].culture, e.g. "Emotional, fast, high
    // pressure" vs "Traditional, patient, loyal") was previously flavor
    // text only -- displayed on the Team & Car screen, never touching
    // morale mechanics despite reading like it should. TEAMS[].devTrend.
    // volatility is the numeric value that same culture text is actually
    // describing (it already drives how wildly a team's car development
    // swings season to season) -- reusing it here for morale swings too
    // means a "high pressure"/"volatile" team's morale genuinely swings
    // harder on the same events a "patient, loyal" team shrugs off, without
    // inventing a second parallel culture field to keep in sync.
    const team = TEAMS.find(t=>t.id===teamId);
    const volatility = (team && team.devTrend && team.devTrend.volatility) || 1.5;
    const cultureMult = clamp(volatility/1.5, 0.7, 1.5); // 1.5 is the roster's rough average volatility
    this.state.teamMorale[teamId] = clamp((this.state.teamMorale[teamId]||65) + delta*cultureMult, 0, 100);
  },
  getTeamMorale(teamId){
    if(!this.state.teamMorale) this.state.teamMorale = Object.fromEntries(TEAMS.map(t=>[t.id, 65]));
    return this.state.teamMorale[teamId] ?? 65;
  },

  /* ================================================================
     UNIVERSAL EDITABLE NAME SYSTEM
     Works for the player, grid rivals, and every NPC. Renders a
     dashed-underline name that opens a rename modal when tapped.
     ================================================================ */
  editableName(id, kind, currentName){
    // kind: 'player' | 'driver' | 'npc'
    return `<span class="editable-name" data-rename-id="${id}" data-rename-kind="${kind}">${currentName}<span class="pencil">✏️</span></span>`;
  },

  wireEditableNames(container){
    (container || document).querySelectorAll('[data-rename-id]').forEach(el=>{
      el.onclick = (e)=>{
        e.stopPropagation();
        this.openRenameModal(el.dataset.renameId, el.dataset.renameKind);
      };
    });
  },

  openRenameModal(id, kind){
    const current = this.getEntityName(id, kind);
    this.openModal(`
      ${this.modalHeader('Rename')}
      <label class="field-label">New name</label>
      <input type="text" id="rename-input" value="${current}" maxlength="24" style="margin-bottom:14px;" />
      <button class="pbtn full gold" id="btn-save-rename">Save Name</button>
    `);
    const input = document.getElementById('rename-input');
    input.focus();
    input.select();
    this.wireModalClose();
    document.getElementById('btn-save-rename').onclick = ()=>{
      const val = input.value.trim();
      if(!val){ this.toast('Name cannot be empty.'); return; }
      this.setEntityName(id, kind, val);
      this.closeModal();
      this.saveState();
      this.rerenderCurrentScreen();
      this.toast('Name updated!');
    };
    input.onkeydown = (e)=>{ if(e.key==='Enter') document.getElementById('btn-save-rename').click(); };
  },

  getEntityName(id, kind){
    if(kind==='player') return this.state.player.name;
    if(kind==='driver') return (this.state.grid.find(d=>d.id===id)||{}).name || '';
    if(kind==='npc') return (this.state.npcRoster.find(n=>n.id===id)||{}).name || '';
    return '';
  },
  setEntityName(id, kind, val){
    if(kind==='player') this.state.player.name = val;
    else if(kind==='driver'){ const d = this.state.grid.find(d=>d.id===id); if(d) d.name = val; }
    else if(kind==='npc'){ const n = this.state.npcRoster.find(n=>n.id===id); if(n) n.name = val; }
  },

  /* Centralized news-feed writer. ALWAYS use this instead of calling
     state.newsFeed.unshift() directly — a bug where most call sites forgot
     to cap the list let it grow unbounded over a long career, which made the
     ticker (fixed-duration scroll) cram more and more text into the same
     time window and become unreadably fast. This helper is the single
     enforcement point so that can't regress again. */
  pushNews(text){
    const s = this.state;
    if(!s.newsFeed) s.newsFeed = [];
    s.newsFeed.unshift(text);
    if(s.newsFeed.length > 12) s.newsFeed.length = 12;
  },

  rerenderCurrentScreen(){
    if(this.currentScreen==='hub') this.renderHub();
    else if(this.currentScreen==='race') this.renderRaceCenterScreen();
    else if(this.currentScreen==='team') { this.state.player.isTeamOwner ? this.renderOwnerHQScreen() : this.renderTeamScreen(); }
    else this.renderHub();
  },
};

if(typeof window !== 'undefined') window.App = App;



/* ============================================================
   FORMULA ONE DIRECTION — MODAL SYSTEM + ACTION MODALS
   ============================================================ */

Object.assign(App, {

  openModal(html){
    // Team Ownership Mode (feature idea #13): autoResolveOwnerRaceWeekend()
    // (app_race.js) sets this._ownerSilent while driving the EXACT SAME
    // resolveQualifying()/executeRace()/etc. functions the normal player
    // flow uses, specifically so it never has to duplicate their scoring
    // logic -- this just skips ever putting the resulting modal on screen
    // (there's no one to click Continue), leaving this.activeModal alone
    // entirely so a real modal already open underneath (if any) is
    // untouched.
    if(this._ownerSilent) return;
    let overlay = document.querySelector('.modal-overlay');
    if(overlay) overlay.remove();
    overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const modalEl = document.createElement('div');
    modalEl.className = 'modal';
    modalEl.innerHTML = html;
    // If a .modal-header exists, keep it fixed and wrap the rest in a scrolling .modal-body
    const header = modalEl.querySelector('.modal-header');
    if(header){
      const bodyWrap = document.createElement('div');
      bodyWrap.className = 'modal-body';
      // move every sibling after the header into the body wrap
      let node = header.nextSibling;
      while(node){
        const next = node.nextSibling;
        bodyWrap.appendChild(node);
        node = next;
      }
      modalEl.appendChild(bodyWrap);
    } else {
      // no header (rare) - wrap everything so padding/scroll still behaves
      const bodyWrap = document.createElement('div');
      bodyWrap.className = 'modal-body';
      while(modalEl.firstChild) bodyWrap.appendChild(modalEl.firstChild);
      modalEl.appendChild(bodyWrap);
    }
    overlay.appendChild(modalEl);
    overlay.onclick = (e)=>{ if(e.target===overlay) this.closeModal(); };
    document.getElementById('device').appendChild(overlay);
    this.activeModal = overlay;
    this.wireEditableNames(overlay);
  },
  closeModal(){
    if(this._ownerSilent) return; // see openModal() -- nothing was ever opened
    if(this.activeModal){ this.activeModal.remove(); this.activeModal=null; }
  },
  modalHeader(title){
    return `<div class="modal-header"><h3>${title}</h3><button class="modal-close" id="modal-close-btn">&times;</button></div>`;
  },
  wireModalClose(){
    const btn = document.getElementById('modal-close-btn');
    if(btn) btn.onclick = ()=> this.closeModal();
  },

  /* ---------------- FIRST-TIME CONTEXTUAL EXPLAINERS (19.11) ----------------
     Shows a small, dismissable info modal the FIRST time a player encounters
     a mechanic that was previously only documented in the Help modal (dev
     slots, romance candidate types, celebrity encounters). Gated by a
     p.seen*Explainer boolean, same pattern as p.tutorialSeen. Call this
     BEFORE rendering the real modal/content the player was trying to open --
     it renders on top and, on dismiss, calls onContinue() to proceed to
     whatever would have shown anyway. If already seen, onContinue() fires
     immediately with no modal at all. */
  showFirstTimeExplainer(flagName, icon, title, text, onContinue){
    const p = this.state.player;
    if(p[flagName]){ onContinue(); return; }
    p[flagName] = true;
    this.saveState();
    this.openModal(`
      ${this.modalHeader(title)}
      <div style="text-align:center; padding:4px 0 8px;">
        <div style="font-size:36px;">${icon}</div>
      </div>
      <div class="section-sub" style="margin-bottom:14px;">${text}</div>
      <button class="pbtn full gold" id="btn-explainer-continue">Got it</button>
    `);
    this.wireModalClose();
    document.getElementById('btn-explainer-continue').onclick = ()=>{
      this.closeModal();
      onContinue();
    };
  },

  openActionModal(action){
    if(action==='training') return this.renderTrainingModal();
    if(action==='lifestyle') return this.renderLifestyleModal();
    if(action==='social') return this.renderRelationshipsModal();
    if(action==='media') return this.renderMediaModal();
    if(action==='sponsors') return this.renderSponsorsModal();
    if(action==='team') return this.state.player.isTeamOwner ? this.renderOwnerHQScreen() : this.renderTeamScreen();
    if(action==='mentor') return this.renderMentorModal();
  },

  /* ---------------- TRAINING ---------------- */
  /* Base training programs. moneyCost is the price at facility level 1 --
     trainingMoneyCost() scales this up as the relevant facility improves
     (better equipment/coaching costs more to run each session), mirroring
     the existing simBonus/gymBonus gain-scaling pattern so facility upgrades
     have a consistent "better AND pricier" feel across the whole training
     system rather than only affecting gains. */
  renderTrainingModal(){
    const p = this.state.player; const s = this.state;
    const WEEKLY_TRAINING_CAP = 3;
    if(p.trainingWeekTracker !== s.week){ p.trainingWeekTracker = s.week; p.trainingActionsThisWeek = 0; }
    const usedThisWeek = p.trainingActionsThisWeek||0;
    const capReached = usedThisWeek >= WEEKLY_TRAINING_CAP;
    const PROGRAMS = [
      {id:'gym', label:'Gym Session', icon:'🏋️', cost:20, moneyCost:0.3, stat:'fitness', group:'lifestyle', facility:'gym'},
      {id:'sim_pace', label:'Sim: Race Pace', icon:'🖥️', cost:18, moneyCost:0.5, stat:'racePace', group:'driving', facility:'simulator'},
      {id:'sim_quali', label:'Sim: Qualifying', icon:'⏱️', cost:18, moneyCost:0.5, stat:'qualifyingPace', group:'driving', facility:'simulator'},
      {id:'sim_wet', label:'Sim: Wet Conditions', icon:'🌧️', cost:20, moneyCost:0.5, stat:'wetSkill', group:'driving', facility:'simulator'},
      {id:'sim_tyre', label:'Sim: Tyre Management', icon:'🛞', cost:18, moneyCost:0.5, stat:'tyreManagement', group:'driving', facility:'simulator'},
      {id:'braking', label:'Braking Drills', icon:'🦿', cost:14, moneyCost:0.3, stat:'braking', group:'driving', facility:'simulator'},
      {id:'cornering', label:'Cornering Study', icon:'📐', cost:14, moneyCost:0.3, stat:'cornering', group:'driving', facility:'simulator'},
      {id:'starts', label:'Start Practice', icon:'🚦', cost:12, moneyCost:0.25, stat:'starts', group:'driving', facility:'simulator'},
      {id:'consistency', label:'Race Craft Drills', icon:'🎯', cost:16, moneyCost:0.4, stat:'consistency', group:'driving', facility:'simulator'},
      {id:'mental', label:'Mental Coaching', icon:'🧠', cost:10, moneyCost:0.2, stat:'focus', group:'mental', facility:'media'},
      {id:'fuel_saving', label:'Fuel Management Drills', icon:'⛽', cost:14, moneyCost:0.35, stat:'fuelSaving', group:'driving', facility:'simulator'},
      {id:'discipline', label:'Race Discipline Review', icon:'📋', cost:12, moneyCost:0.3, stat:'discipline', group:'mental', facility:'media'},
      {id:'leadership', label:'Leadership Workshop', icon:'🤝', cost:12, moneyCost:0.3, stat:'leadership', group:'mental', facility:'media'},
    ];
    this.openModal(`
      ${this.modalHeader('Training')}
      <div class="section-sub" style="margin:0;">Energy: ${Math.round(p.attributes.lifestyle.energy)}/100 · Money: $${p.money.toFixed(1)}M</div>
      <div class="section-sub" style="margin:2px 0 4px;">Better facilities mean stronger gains, but pricier sessions too.</div>
      <div class="chip ${capReached?'red':'blue'}" style="margin-bottom:10px;">📅 Training this week: ${usedThisWeek}/${WEEKLY_TRAINING_CAP}${capReached?' — resets Monday':''}</div>
      <div class="stack-8">
        ${PROGRAMS.map(tp=>{
          const price = this.trainingMoneyCost(tp);
          const canAfford = p.attributes.lifestyle.energy>=tp.cost && p.money>=price && !capReached;
          // Skill cap (anti-overpower): show a driver when this stat is
          // already at or very near the leader-relative ceiling
          // (enforcePlayerSkillCap(), app_core.js) so a session that can't
          // meaningfully help is visible BEFORE spending money on it,
          // rather than only finding out from the toast afterward.
          const nearCap = tp.group!=='lifestyle' && this.isNearSkillCap(tp.group, tp.stat);
          return `
          <button class="pbtn full" data-train="${tp.id}" style="justify-content:flex-start; text-align:left;" ${canAfford?'':'disabled'}>
            ${tp.icon} ${tp.label} <span style="margin-left:auto; font-size:8px; color:${nearCap?'#e6604c':'var(--ink-soft)'};">${nearCap?'near cap · ':''}-${tp.cost} nrg · -$${price.toFixed(1)}M</span>
          </button>
        `;}).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-train]').forEach(btn=>{
      btn.onclick = ()=>{
        const tp = PROGRAMS.find(x=>x.id===btn.dataset.train);
        this.doTraining(tp);
      };
    });
  },

  /* Level 1 = base moneyCost; each facility level above 1 adds 12% to the
     price, same shape as the existing +15%-per-level gain bonuses so cost
     and benefit grow together instead of facilities being a pure discount. */
  trainingMoneyCost(tp){
    const level = this.state.facilities[tp.facility] || 1;
    return Math.round(tp.moneyCost * (1 + (level-1)*0.12) * 100) / 100;
  },

  doTraining(tp){
    const p = this.state.player; const s = this.state;
    const price = this.trainingMoneyCost(tp);
    // Weekly training cap: separate from the energy budget, which alone let
    // a player run 5-8 sessions in a single day and fully recharge within
    // about a day and a half -- no real weekly pacing existed. This tracks
    // against s.week (already incremented once per Mon-wrap in advanceDay())
    // so it resets automatically with no extra bookkeeping needed elsewhere.
    if(p.trainingWeekTracker !== s.week){ p.trainingWeekTracker = s.week; p.trainingActionsThisWeek = 0; }
    const WEEKLY_TRAINING_CAP = 3;
    if((p.trainingActionsThisWeek||0) >= WEEKLY_TRAINING_CAP){ this.toast(`Training cap reached for this week (${WEEKLY_TRAINING_CAP} sessions) — more opens up Monday.`); return; }
    if(p.attributes.lifestyle.energy < tp.cost){ this.toast('Too tired to train!'); return; }
    if(p.money < price){ this.toast('Not enough money for that session.'); return; }
    p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy - tp.cost);
    p.money = Math.round((p.money - price)*10)/10;
    p.trainingActionsThisWeek = (p.trainingActionsThisWeek||0) + 1;
    const target = tp.group==='driving' ? p.attributes.driving : tp.group==='mental' ? p.attributes.mental : p.attributes.lifestyle;
    const before = target[tp.stat];
    const efficiency = clamp(1 - (before-70)/60, 0.25, 1);
    const simBonus = 1 + (this.state.facilities.simulator-1)*0.15;
    const gymBonus = 1 + (this.state.facilities.gym-1)*0.15;
    const bonus = tp.group==='driving' ? simBonus : tp.stat==='fitness' ? gymBonus : 1;
    const gain = Math.max(1, Math.round(2 * efficiency * bonus));
    target[tp.stat] = clamp(before + gain, 0, 99);
    p.attributes.lifestyle.stress = clamp(p.attributes.lifestyle.stress + 3);
    // Simulator-based driving programs also build the crew's read on the
    // player's personal setup tendency (feeds setupHintConfidence) -- kept
    // PER-TRACK (this round's track, if any) rather than a global lifetime
    // count, so training doesn't permanently max out the setup-confidence
    // floor on every track including ones never actually visited.
    if(tp.id.startsWith('sim_')){
      const round = this.getCurrentRound ? this.getCurrentRound() : null;
      if(round){
        if(!p.setupTrainingByTrack) p.setupTrainingByTrack = {};
        p.setupTrainingByTrack[round.trackId] = (p.setupTrainingByTrack[round.trackId]||0) + 1;
      }
    }
    this.saveState(); // enforcePlayerSkillCap() runs inside here -- check the REAL post-cap value before toasting
    const actualGain = target[tp.stat] - before;
    if(actualGain < gain && tp.group!=='lifestyle'){
      this.toast(`${tp.icon} ${tp.label} complete! +${actualGain} (-$${price.toFixed(1)}M) — capped near the grid leader's level. Training this week: ${p.trainingActionsThisWeek}/${WEEKLY_TRAINING_CAP}`);
    } else {
      this.toast(`${tp.icon} ${tp.label} complete! +${gain} (-$${price.toFixed(1)}M) · Training this week: ${p.trainingActionsThisWeek}/${WEEKLY_TRAINING_CAP}`);
    }
    this.rerenderCurrentScreen();
    // First-time explainer (19.11 pattern, extended per the stats-legibility
    // pass): the very first training result is the natural moment a player
    // wonders what a stat number actually does. Points them at the new
    // "What Do My Stats Do?" Help topic rather than repeating a full
    // explanation inline on every single toast. Fires in place of the plain
    // closeModal() ONLY the first time, synchronously (no setTimeout) so it
    // doesn't land as a surprise extra modal a beat after the player has
    // already moved on to something else.
    if(!p.seenStatEffectExplainer){
      this.showFirstTimeExplainer('seenStatEffectExplainer', '📊', 'What Stats Actually Do',
        'Some stats directly boost your speed, like Race Pace. Others are narrower — Adaptability only helps on cold tracks. A few are just cosmetic. Full breakdown: "What Do My Stats Do?" in Help.',
        ()=>{});
    } else {
      this.closeModal();
    }
  },

  /* ---------------- DRIVER ACADEMY (feature idea #16, extends 19.1 #6) ----------------
     p.protege stays exactly what it always was -- the SINGLE actively-
     mentored prospect, a lightweight object never touching state.grid until
     graduation (see processGridRetirements(), engine.js, for why that stays
     the only safe path onto the grid). This adds p.protegeRoster: a small
     bench (up to ACADEMY_MAX_SIZE) of additional prospects recruited at the
     same time, each independently accumulating a small amount of "latent"
     progress even while NOT the active mentee (a slower background trickle,
     representing basic academy training everyone gets) so the bench isn't
     just inert -- but only the ACTIVE p.protege gets full mentoring-session
     gains. The player can switch which roster member is currently active at
     any time (before that one graduates); only ONE can ever graduate at a
     time, matching processGridRetirements()'s existing one-grad-per-season
     cap -- the others stay on the bench, competing for the NEXT seat that
     opens. */
  ACADEMY_MAX_SIZE: 3,
  renderMentorModal(){
    const s = this.state; const p = s.player;
    if(!p.protegeRoster) p.protegeRoster = p.protege ? [p.protege] : [];
    // Backward-compat: an in-progress save from before this feature only
    // ever had p.protege, never protegeRoster -- fold it in as the roster's
    // first (and, until recruiting more, only) member rather than losing
    // that prospect's progress. A legacy protege object also predates
    // _academyId entirely -- assign one now so the roster UI's dataset
    // matching (data-set-active/data-dismiss-protege) has something to key
    // off of.
    if(p.protege && !p.protegeRoster.includes(p.protege)) p.protegeRoster.push(p.protege);
    p.protegeRoster.forEach(pr=>{ if(!pr._academyId) pr._academyId = uid('academy'); });

    if(p.protegeRoster.length===0){
      this.openModal(`
        ${this.modalHeader('Driver Academy')}
        <div class="section-sub" style="margin-bottom:10px;">Your home has room to host young drivers. Mentoring them costs a little time and energy each week, but a well-mentored protégé can graduate onto the grid as a real AI driver when a seat eventually opens up.</div>
        <button class="pbtn full gold" id="btn-recruit-protege">🌟 Recruit a Prospect</button>
      `);
      this.wireModalClose();
      document.getElementById('btn-recruit-protege').onclick = ()=> this.recruitAcademyProspect();
      return;
    }

    const activeId = p.protege ? p.protege._academyId : null;
    const sessionCost = 15;
    const canMentor = p.attributes.lifestyle.energy >= sessionCost;
    const graduatedWaiting = p.protegeRoster.filter(pr=>pr.graduated);
    const training = p.protegeRoster.filter(pr=>!pr.graduated);

    this.openModal(`
      ${this.modalHeader('Driver Academy')}
      ${graduatedWaiting.length ? `
        <div class="section-title" style="font-size:10px;">Ready for a Seat</div>
        ${graduatedWaiting.map(pr=>`
          <div class="pixel-panel" style="margin-bottom:8px;">
            <div style="font-weight:800;">${pr.flag} ${pr.name}</div>
            <div class="section-sub" style="margin-top:4px;">Fully mentored and ready — they'll join the grid as soon as any team seat opens up. Only one prospect can graduate at a time; this one is first in line.</div>
          </div>
        `).join('')}
      ` : ''}
      ${training.length ? `
        <div class="section-title" style="font-size:10px;">In Training</div>
        ${training.map(pr=>{
          const isActive = pr._academyId===activeId;
          return `
          <div class="pixel-panel" style="margin-bottom:8px; ${isActive?'border-color:var(--candy-yellow);':''}">
            <div class="flex-between">
              <div style="font-weight:800;">${pr.flag} ${pr.name} ${isActive?'<span class="chip gold">Active</span>':''}</div>
              ${!isActive?`<button class="pbtn small" data-set-active="${pr._academyId}">Make Active</button>`:''}
            </div>
            ${pr.backstory ? `<div class="section-sub" style="margin-top:2px; font-style:italic;">${pr.backstory}${pr.personality ? ` · ${pr.personality}` : ''}</div>` : ''}
            ${this.renderPixelBar(pr.mentorProgress,'confidence')}
            <div class="section-sub" style="margin-top:4px;">${pr.mentorProgress}/100${isActive?'':' (bench — grows slowly without active sessions)'}</div>
            <button class="pbtn small" data-dismiss-protege="${pr._academyId}" style="margin-top:6px; color:#a33;">Release from Academy</button>
          </div>
        `;}).join('')}
      ` : ''}
      ${p.protegeRoster.length < this.ACADEMY_MAX_SIZE ? `<button class="pbtn full" id="btn-recruit-protege" style="margin-bottom:10px;">🌟 Recruit Another Prospect (${p.protegeRoster.length}/${this.ACADEMY_MAX_SIZE})</button>` : `<div class="section-sub" style="margin-bottom:10px;">Academy roster full (${this.ACADEMY_MAX_SIZE}/${this.ACADEMY_MAX_SIZE}) — release a prospect to make room.</div>`}
      ${activeId ? `<button class="pbtn full gold" id="btn-mentor-session" ${canMentor?'':'disabled'}>🎓 Mentoring Session with ${p.protege.name} (-${sessionCost} energy)</button>${!canMentor?'<div class="section-sub" style="margin-top:6px;">Too tired for a session today — rest up first.</div>':''}` : (training.length ? `<div class="section-sub">Pick an active prospect above to run mentoring sessions.</div>` : '')}
    `);
    this.wireModalClose();
    const sessionBtn = document.getElementById('btn-mentor-session');
    if(sessionBtn) sessionBtn.onclick = ()=> this.mentorProtege();
    const recruitBtn = document.getElementById('btn-recruit-protege');
    if(recruitBtn) recruitBtn.onclick = ()=> this.recruitAcademyProspect();
    document.querySelectorAll('[data-set-active]').forEach(btn=>{
      btn.onclick = ()=>{
        const target = p.protegeRoster.find(pr=>pr._academyId===btn.dataset.setActive);
        if(target){
          p.protege = target;
          this.saveState();
          this.renderMentorModal();
        }
      };
    });
    document.querySelectorAll('[data-dismiss-protege]').forEach(btn=>{
      btn.onclick = ()=>{
        const target = p.protegeRoster.find(pr=>pr._academyId===btn.dataset.dismissProtege);
        if(!target) return;
        this.toast(`Released ${target.name} from the academy.`);
        p.protegeRoster = p.protegeRoster.filter(pr=>pr._academyId!==target._academyId);
        if(p.protege && p.protege._academyId===target._academyId){
          p.protege = p.protegeRoster.find(pr=>!pr.graduated) || null;
        }
        this.saveState();
        this.renderMentorModal();
      };
    });
  },

  /* Feature idea #16 follow-up (Pass 23 REMAINING BACKLOG item, closed
     this pass): each academy prospect now gets a genuine individual arc,
     not just the shared latent-progress trickle + personality Pass 23's
     first pass added. Two pieces:
       1. A one-time BACKSTORY line rolled at recruitment (below), giving
          the player something to read and get attached to immediately,
          before a single mentoring session has happened.
       2. Milestone journal beats at 25/50/75 progress (see mentorProtege()
          below), fired via pr.milestonesSeen so each prospect's own
          progress narrative is distinct and never repeats.
     Both are pure flavor text -- no new mechanical effect on
     mentorProgress itself, same spirit as every other narrative-only
     addition in this pass. */
  ACADEMY_PROSPECT_BACKSTORIES: [
    'came up through local karting, self-funded the whole way',
    'was scouted out of a junior single-seater series after a string of podiums',
    'grew up around the paddock — a parent worked as a mechanic for years',
    'walked away from another academy after a personality clash with their old mentor',
    'is the first in their family to ever sit in a race car',
    'built a reputation on social media long before any team noticed the talent behind it',
  ],
  recruitAcademyProspect(){
    const s = this.state; const p = s.player;
    if(!p.protegeRoster) p.protegeRoster = [];
    if(p.protegeRoster.length >= this.ACADEMY_MAX_SIZE){ this.toast('Academy roster is full.'); return; }
    const newProspect = makeProtege(s);
    newProspect._academyId = uid('academy');
    newProspect.backstory = pick(this.ACADEMY_PROSPECT_BACKSTORIES);
    newProspect.milestonesSeen = [];
    p.protegeRoster.push(newProspect);
    if(!p.protege) p.protege = newProspect; // first recruit (or first after the active one graduated/left) becomes active automatically
    this.toast(`🌟 ${newProspect.name} joins the academy!`);
    p.journal.unshift({season:s.season, week:s.week, title:'New Academy Prospect', text:`Recruited ${newProspect.name} to the driver academy — ${newProspect.backstory}.`, icon:'🌟'});
    this.closeModal();
    this.saveState();
    this.showFirstTimeExplainer('seenMentorExplainer', '🎓', 'Driver Academy',
      "Recruit up to 3 prospects and run sessions with whichever one is Active to build their progress toward 100. A fully mentored prospect waits for a real seat to open up, then graduates onto the grid as an AI driver -- only one can graduate at a time, so the rest stay on the bench for the next opportunity.",
      ()=> this.rerenderCurrentScreen());
  },

  /* Feature idea #15 -- mentoring session flavor variance per prospect
     personality (set on makeProtege(), engine.js). Small, local flavor
     pool -- not routed through radioLine()/RADIO_LINES, since those are
     specifically race-radio-voiced and category-keyed in a way that
     doesn't fit a mentoring debrief line; same 4-key personality shape,
     separate small bank. Falls back to a personality-neutral line for any
     protégé created before this feature existed (backward compat, same
     defensive pattern as other new-field additions in this pass). */
  MENTOR_SESSION_LINES: {
    Calm:["stayed composed and asked good questions.", "took the feedback in stride, nice and steady."],
    Energetic:["was buzzing with questions the whole session!", "couldn't wait to try out what you showed them."],
    Strict:["wanted everything by the book, no shortcuts.", "took detailed notes on every point you made."],
    Funny:["cracked a few jokes but still soaked it all in.", "kept things light while clearly paying attention."],
  },
  mentorSessionFlavor(pr){
    const bank = this.MENTOR_SESSION_LINES[pr.personality] || null;
    if(!bank) return `${pr.name} put in solid work this session.`;
    return `${pr.name} ${pick(bank)}`;
  },
  mentorProtege(){
    const s = this.state; const p = s.player; const pr = p.protege;
    if(!pr || pr.graduated) return;
    const sessionCost = 15;
    if(p.attributes.lifestyle.energy < sessionCost){ this.toast('Too tired for a mentoring session.'); return; }
    p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy - sessionCost);
    const gain = randInt(8, 14);
    pr.mentorProgress = clamp(pr.mentorProgress + gain, 0, 100);
    // Bench prospects (every OTHER non-graduated roster member) get a small
    // trickle of latent progress too -- basic academy training everyone
    // gets regardless of who's actively being mentored this session, just
    // much slower than the active prospect's own gain, so the bench isn't
    // purely inert while waiting their turn.
    if(p.protegeRoster){
      p.protegeRoster.forEach(other=>{
        if(other._academyId===pr._academyId || other.graduated) return;
        other.mentorProgress = clamp(other.mentorProgress + randInt(1,3), 0, 100);
      });
    }
    // A little of the mentoring warmth rubs off on the player too -- keeps
    // this from feeling like a pure investment with zero personal payoff.
    p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood + 3);
    const flavorLine = this.mentorSessionFlavor(pr);
    // Individual academy arc milestone beats (Pass 23 REMAINING BACKLOG
    // closure) -- fires at most once per threshold per prospect, tracked
    // in pr.milestonesSeen so re-crossing (impossible here since progress
    // only goes up, but matches the fire-once pattern used everywhere
    // else in this codebase) can never double-fire. Distinct text per
    // personality so two prospects hitting the same threshold don't read
    // identically.
    if(!pr.milestonesSeen) pr.milestonesSeen = [];
    const MILESTONE_LINES = {
      25: { Calm:'is settling in well, calm and unhurried in every session.', Energetic:'is soaking up every minute of track time, buzzing with enthusiasm.', Strict:'has already memorized the whole training program by heart.', Funny:'has become the life of the garage, even this early on.' },
      50: { Calm:'is halfway there, and it shows in how composed they\'ve become.', Energetic:'is halfway to graduation and still hungry for more.', Strict:'is halfway through the program, disciplined as ever.', Funny:'is halfway there — still cracking jokes, but clearly improving fast.' },
      75: { Calm:'is nearly ready, radiating quiet confidence.', Energetic:'is nearly ready and can barely contain the excitement.', Strict:'is nearly ready, having left nothing to chance.', Funny:'is nearly ready — the jokes haven\'t stopped, but neither has the progress.' },
    };
    [25,50,75].forEach(threshold=>{
      const key = `${pr._academyId}_${threshold}`;
      if(pr.mentorProgress>=threshold && !pr.milestonesSeen.includes(key)){
        pr.milestonesSeen.push(key);
        const bank = MILESTONE_LINES[threshold];
        const line = (bank && bank[pr.personality]) || `has reached ${threshold}% mentorship progress.`;
        p.journal.unshift({season:s.season, week:s.week, title:`${pr.name} — Progress Check`, text:`${pr.name} ${line}`, icon:'📈'});
      }
    });
    if(pr.mentorProgress>=100 && !pr.graduated){
      pr.graduated = true;
      this.toast(`🌟 ${pr.name} is fully mentored and ready for a grid seat!`);
      this.pushNews(`🌟 ${p.name}'s protégé ${pr.name} has completed their mentorship and awaits a grid opportunity.`);
      p.journal.unshift({season:s.season, week:s.week, title:'Protégé Ready', text:`${pr.name} completed their mentorship under ${p.name}'s guidance.`, icon:'🌟'});
      // Auto-advance the active slot to the next non-graduated roster
      // member (if any) so mentoring sessions have somewhere to go without
      // an extra manual click -- same "don't leave the player stalled"
      // spirit as other auto-advance points in this file.
      p.protege = (p.protegeRoster||[]).find(other=>!other.graduated && other._academyId!==pr._academyId) || null;
    } else {
      this.toast(`🎓 ${flavorLine} Progress +${gain} (${pr.mentorProgress}/100).`);
    }
    this.closeModal();
    this.saveState();
    this.rerenderCurrentScreen();
  },

  doLifestyleActivity(a){
    const p = this.state.player;
    if(p.attributes.lifestyle.energy < a.cost){ this.toast('Too tired for that.'); return; }
    p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy - a.cost + (a.energyGain||0));
    p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood + (a.mood||0));
    p.attributes.lifestyle.stress = clamp(p.attributes.lifestyle.stress - (a.stress||0));
    if(a.fitness) p.attributes.lifestyle.fitness = clamp(p.attributes.lifestyle.fitness + a.fitness);
    if(a.focus) p.attributes.mental.focus = clamp(p.attributes.mental.focus + a.focus);
    if(a.fans) p.fanPopularity = clamp(p.fanPopularity + a.fans);
    this.toast(`${a.icon} ${a.label} — nice break!`);
    this.closeModal();
    this.saveState();
    this.rerenderCurrentScreen();
  },

  /* ---------------- SIM RACING SIDE CAREER (feature idea #15) ----------------
     A low-stakes evening Free Time alternative that trains a niche driving
     stat (reaction -- previously the LEAST-touched driving stat outside the
     formation-lap moment, see 19.1#4's own comment) and grows a separate
     "sim reputation" (p.simRacingRep, uncapped, purely additive) distinct
     from the real-world fanPopularity/mediaReputation tracks. At three
     reputation thresholds, a real cross-over sponsor unlocks -- reusing the
     EXISTING sponsor pool/signing flow (SPONSOR_POOL, renderSponsorsModal)
     rather than inventing a second parallel sponsor system, gating one
     tier-appropriate sponsor's eligibility on simRacingRep alongside
     sponsorTierUnlocked()'s existing career-stat checks. */
  doSimRacingActivity(a){
    const p = this.state.player;
    if(p.attributes.lifestyle.energy < a.cost){ this.toast('Too tired for that.'); return; }
    p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy - a.cost + (a.energyGain||0));
    p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood + (a.mood||0));
    p.attributes.lifestyle.stress = clamp(p.attributes.lifestyle.stress - (a.stress||0));
    const reactionGain = randInt(1,2);
    p.attributes.driving.reaction = clamp(p.attributes.driving.reaction + reactionGain);
    const repGain = randInt(3,7);
    if(p.simRacingRep===undefined) p.simRacingRep = 0;
    p.simRacingRep += repGain;
    let unlockLine = '';
    // Fires once per threshold, same fire-once shape as checkMilestones()'s
    // p.milestones array -- reused here rather than a second flag system.
    const thresholds = [ {rep:30, key:'sim_rep_30', text:'Your online results are starting to get noticed.'}, {rep:75, key:'sim_rep_75', text:'A genuine following has built up around your sim races.'}, {rep:150, key:'sim_rep_150', text:'You\'re one of the most-watched sim racers with a real F1 seat.'} ];
    thresholds.forEach(t=>{
      if(p.simRacingRep>=t.rep && !p.milestones.includes(t.key)){
        p.milestones.push(t.key);
        unlockLine = t.text;
        this.pushNews(`🕹️ ${p.name} — ${t.text}`);
      }
    });
    // Feature idea #4 -- fake deterministic-per-seed leaderboard flavor
    // line, layered onto the existing simRacingRep display. No real
    // multiplayer/leaderboard system, no new state beyond simRacingRep
    // itself (already tracked) -- the "rank" is derived fresh each time
    // from the current rep value via a fixed, non-persisted formula, so it
    // moves consistently with rep without needing to be stored anywhere.
    const simRank = Math.max(1, Math.round(500 / (1 + p.simRacingRep)));
    const rankLine = simRank<=10 ? ` You're currently the #${simRank} most-watched sim racer.` : simRank<=50 ? ` You're cracking the sim racing top 50 (#${simRank}).` : '';
    this.toast(`🕹️ Sim Racing — nice session! +${reactionGain} Reaction, +${repGain} Sim Rep (${p.simRacingRep}).${unlockLine?' '+unlockLine:''}${rankLine}`);
    this.closeModal();
    this.saveState();
    this.rerenderCurrentScreen();
  },

  renderRivalProfileModal(rivalId){

    const d = s.grid.find(x=>x.id===rivalId);
    if(!d) return;
    const team = this.getTeam(d.teamId);
    const h2h = d.headToHead || {wins:0, losses:0};
    const myPts = s.standings['player']||0;
    const theirPts = s.standings[d.id]||0;
    const myPos = this.standingPosition('player');
    const theirPos = this.standingPosition(d.id);
    const rivalryLabel = rivalryLevelName(d.rivalryLevel||0);
    const isDating = d.romance && d.romance.status==='dating';

    this.openModal(`
      ${this.modalHeader(d.name)}
      <div class="pixel-panel" style="text-align:center;">
        <div style="font-size:13px; font-weight:800;">${d.flag} ${team.flag} ${team.name}</div>
