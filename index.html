  /* ---------------- CONTRACT OFFERS ---------------- */
  renderScoutingOfferModal(){
    const s = this.state; const p = s.player;
    const offer = s.scoutingOffer;
    if(!offer){ this.toast('That offer is no longer on the table.'); return; }
    const suitor = this.getTeam(offer.teamId);
    const currentTeam = this.getTeam(p.teamId);
    const reasonText = offer.reason==='performance' ? 'They\'ve been impressed by your recent results.'
      : offer.reason==='potential' ? 'They think you\'re being undervalued where you are.'
      : 'They like what they\'ve seen from your form and team chemistry this season.';
    this.openModal(`
      ${this.modalHeader('Contract Interest')}
      <div class="pixel-panel">
        <div style="font-weight:800; font-size:14px;">${suitor.flag} ${suitor.name}</div>
        <div class="section-sub" style="margin:4px 0 0;">${reasonText}</div>
        <div class="section-sub" style="margin-top:8px;">Offer: ${offer.years} year(s) · $${offer.salary}M/season · Car ${suitor.carStrength}</div>
      </div>
      <div class="section-sub" style="margin:10px 0;">Leaving ${currentTeam.name} early ends your current contract immediately. This can't be undone once signed.</div>
      <div class="stack-8">
        <button class="pbtn full gold" id="btn-accept-scouting">Sign with ${suitor.name}</button>
        <button class="pbtn full" id="btn-decline-scouting">Stay with ${currentTeam.name}</button>
      </div>
    `);
    this.wireModalClose();
    document.getElementById('btn-accept-scouting').onclick = ()=>{
      rebalanceGridForTeamChange(s, p.teamId, offer.teamId);
      p.teamId = offer.teamId;
      p.contract = {teamId: offer.teamId, years: offer.years, salary: offer.salary};
      // 19.1 #13 -- Team switch cooldown: a fresh seat costs some initial
      // team chemistry (an adjustment period, not instant rapport), which
      // then recovers naturally through the SAME race-result morale swings
      // every other week already applies (adjustTeamMorale in
      // executeRace()) -- no separate decay/ramp timer needed, the existing
      // system already provides the recovery curve. p.joinedTeamOnSeason is
      // tracked for display/flavor (e.g. "first season with this team") even
      // though the morale hit itself is a one-time event, not something
      // that reads this field again later.
      p.joinedTeamOnSeason = s.season;
      this.adjustTeamMorale(offer.teamId, -12);
      // A mid-season team switch changes what's realistically achievable this
      // season (e.g. a tier-1 team's "Finish in the Top 3" objective is
      // meaningless after dropping to a tier-3 car) -- regenerate objectives
      // for the new team rather than leaving stale ones on the books. This is
      // a full reset, not a progress carry-over: a team switch is already a
      // big enough season-defining event that starting the new objectives
      // fresh is the simpler and more sensible behavior.
      s.seasonObjectives = generateSeasonObjectives(s);
      this.toast(`🤝 You've signed with ${suitor.name}!`);
      this.pushNews(`🤝 ${p.name} leaves ${currentTeam.name} early to join ${suitor.name}.`);
      p.journal.unshift({season:s.season, week:s.week, title:'Mid-Season Switch', text:`Left ${currentTeam.name} early to sign with ${suitor.name} for ${offer.years} year(s) at $${offer.salary}M/season.`, icon:'📝'});
      s.scoutingOffer = null;
      this.closeModal();
      this.saveState();
      this.renderTeamScreen();
    };
    document.getElementById('btn-decline-scouting').onclick = ()=>{
      this.toast(`You turn down ${suitor.name}'s interest — for now.`);
      s.scoutingOffer = null;
      this.closeModal();
      this.saveState();
      this.renderTeamScreen();
    };
  },

  renderContractOffersModal(){
    const s = this.state; const p = s.player;
    const currentTeam = this.getTeam(p.teamId);
    // generate 2-3 offers: current team renewal + 1-2 other teams scaled to reputation
    const standing = this.standingPosition('player');
    let eligibleTiers = standing<=5 ? [1,2] : standing<=14 ? [2,3] : [3];
    if(s.pendingTierOffer){
      // Legacy perk "Old Racing Contacts": widen the eligible tiers once, on the
      // very first contract renewal, regardless of current standing.
      eligibleTiers = [...new Set([...eligibleTiers, Math.max(1, Math.min(...eligibleTiers)-1)])];
      s.pendingTierOffer = false;
      this.pushNews(`🤝 Old contacts open a door — a stronger team takes notice of ${p.name}.`);
    }
    const otherTeams = TEAMS.filter(t=>t.id!==currentTeam.id && eligibleTiers.includes(t.tier)).sort(()=>Math.random()-0.5).slice(0,2);
    // Team morale nudges the CURRENT team's renewal offer specifically -- a
    // happy driver at a happy team gets a small raise offered to stay, a
    // driver at a team with sour chemistry gets a slightly worse renewal.
    // Same shape as the sponsor loyalty multiplier in checkSponsorObjectives
    // (a relationship number scaling a monetary offer). Baseline morale is
    // 65 (see getTeamMorale), so this is ±0.5% salary per morale point away
    // from that baseline, capped at ±15% -- noticeable but never the whole
    // story behind an offer.
    const morale = this.getTeamMorale(currentTeam.id);
    const moraleMult = clamp(1 + (morale-65)*0.005, 0.85, 1.15);
    const renewalSalary = Math.max(1, Math.round((p.contract.salary+randInt(0,2)) * moraleMult * 10)/10);
    const offers = [
      {teamId:currentTeam.id, years:randInt(1,2), salary:renewalSalary, clause:pickContractClause(currentTeam, p)},
      ...otherTeams.map(t=>({teamId:t.id, years:randInt(1,3), salary:Math.max(1, Math.round(t.carStrength/10)), clause:pickContractClause(t, p)})),
    ];
    this.openModal(`
      ${this.modalHeader('Contract Offers')}
      <div class="section-sub">Your contract has expired. Choose where you'll race next season.</div>
      <div class="stack-8">
        ${offers.map((o,i)=>{
          const t = this.getTeam(o.teamId);
          const clauseText = contractClauseText(o.clause);
          return `<button class="pbtn full" style="justify-content:flex-start; text-align:left; height:auto; padding:12px;" data-offer="${i}">
            <span>${t.flag} <b>${t.name}</b><br><span style="font-size:8px; color:var(--ink-soft);">${o.years}yr · $${o.salary}M/season · Car ${t.carStrength}</span>${clauseText?`<br><span style="font-size:8px; color:var(--candy-red);">⚠️ ${clauseText}</span>`:''}</span>
          </button>`;
        }).join('')}
      </div>
    `);
    // No X close button -- p.contract.years is already 0 by the time this
    // modal is reached (that's the trigger condition), so dismissing without
    // picking an offer previously left the player with no valid contract at
    // all, yet still able to freely race race weekends under no team --
    // confirmed reproducible, not just a theoretical gap. Same must-resolve
    // pattern as the season-wrap/race-result modals.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.querySelectorAll('[data-offer]').forEach(btn=>{
      btn.onclick = ()=>{
        const o = offers[parseInt(btn.dataset.offer)];
        const t = this.getTeam(o.teamId);
        const changedTeam = o.teamId !== p.teamId;
        if(changedTeam) rebalanceGridForTeamChange(s, p.teamId, o.teamId);
        p.teamId = o.teamId;
        p.contract = {teamId:o.teamId, years:o.years, salary:o.salary, clause:o.clause};
        // 19.1 #13 -- same team-switch cooldown as the scouting-offer path.
        // A renewal with the SAME team is not a switch, so no penalty there.
        if(changedTeam){
          p.joinedTeamOnSeason = s.season;
          this.adjustTeamMorale(o.teamId, -12);
        }
        const clauseText = contractClauseText(o.clause);
        if(changedTeam){
          this.toast(`🤝 You've signed with ${t.name}!`);
          this.pushNews(`🤝 ${p.name} signs with ${t.name} for ${o.years} year(s).`);
          p.journal.unshift({season:s.season, week:s.week, title:'New Contract', text:`Signed with ${t.name} for ${o.years} year(s) at $${o.salary}M/season.${clauseText?' '+clauseText+'.':''}`, icon:'📝'});
        } else {
          this.toast(`📝 Contract renewed with ${t.name}.`);
          p.journal.unshift({season:s.season, week:s.week, title:'Contract Renewed', text:`Stayed with ${t.name} for ${o.years} more year(s).${clauseText?' '+clauseText+'.':''}`, icon:'📝'});
        }
        this.closeModal();
        this.startNextSeason();
      };
    });
  },

    this.openModal(`

      <div class="stack-8">
        ${LEGACY_PERKS.map(perk=>`
          <button class="pbtn full ${existing && existing.perkId===perk.id ? 'gold' : ''}" style="justify-content:flex-start; text-align:left; height:auto; padding:12px;" data-perk="${perk.id}">
            <span>${perk.icon} <b>${perk.name}</b><br><span style="font-size:9px; color:var(--ink-soft);">${perk.desc}</span></span>
          </button>
        `).join('')}
      </div>
    `);

    document.querySelectorAll('[data-perk]').forEach(btn=>{
      btn.onclick = ()=>{
        const perk = LEGACY_PERKS.find(x=>x.id===btn.dataset.perk);
        savePendingLegacy({
          perkId: perk.id,
          retiredPlayerSnapshot: JSON.parse(JSON.stringify(p)),
        });
        this.toast(`🌟 Legacy set: ${perk.name}`);
        this.closeModal();
        this.renderRetirementScreen();
      };
    });
  },

  startNextSeason(){
    const s = this.state;
    s.season++;
    const careerYearNum = s.season - (s.careerStartSeason||s.season) + 1;
    s.prevTeamStrength = Object.fromEntries(TEAMS.map(t=>[t.id, t.carStrength]));
    // Development itself is NEVER wiped -- last year's upgrade levels persist
    // and keep compounding, matching how a real team doesn't un-develop its
    // car over the winter. Only the SEASON'S BUDGET of dev actions resets,
    // so every team (player included) gets a fresh allotment of upgrade
    // slots to spend through the new season rather than an infinite tap.
    TEAMS.forEach(t=>{ t.devSlotsUsed = 0; });
    developTeamsForNewSeason(s, getDifficultySettings(s));
    if(isRegulationChangeYear(careerYearNum)){
      applyRegulationChange(s);
      this.toast('📋 New FIA regulations have shaken up the grid this year!');
    }
    s.calendar = (()=>{ const rounds = buildSeasonCalendar(careerYearNum); return { rounds, currentRound: 0, midSeasonDevRoundIndex: pickMidSeasonDevRoundIndex(rounds.length), midSeasonDevApplied: false }; })();
    s.lastRaceHeadline = null;
    s.standings = {};
    s.seasonStats = { wins:0, podiums:0, points:0, beatTeammate:false, q3count:0 };
    s.seasonObjectives = generateSeasonObjectives(s);
    s.dayIndex = 0; s.week = 1;
    if(!s.cosmetics) s.cosmetics = this.initialCosmeticsState();
    s.cosmetics.totalRoundsCompletedThisSeason = 0;
    this.checkCosmeticUnlocks();
    s.seasonStartCareerWins = Object.fromEntries(s.grid.map(d=>[d.id, d.careerStats.wins||0]));
    this.pushNews(`📅 ${seasonLabel(s)} begins! The grid resets to zero.`);
    this.toast(`Welcome to ${seasonLabel(s)}.`);
    this.saveState();
    this.renderHub();
  },

});

  {icon:'📊', title:'What Do My Stats Do?', text:'<b>Driving:</b> Race Pace, Cornering, Consistency, Tyre Management, and Braking are your core pace. Qualifying Pace sets single-lap speed. Wet Skill only matters in rain. Overtaking helps you pass. Defending steadies your race-day luck. <b>Mental:</b> Confidence and Focus both add to race pace. Pressure helps in qualifying. Discipline trims failure risk. Adaptability only helps on cold tracks. <b>Lifestyle:</b> Stress hurts pace, while Mood and Fitness help a little. Energy just gates what you can do — it doesn\'t touch pace directly. <b>Reputation:</b> Fan Popularity unlocks celebrities and sponsor goals, and Media Reputation opens tier-2 sponsors early.'},

  {icon:'🏎️', title:'Practice, Qualifying, Race', text:'Practice builds track familiarity and setup hints. Qualifying sets your grid position. Before the race, pick a tire: Soft is fast but wears out, Hard lasts but costs pace. Strategy (Push/Attack/Defend/Save Tires) changes that race\'s risk and reward.'},
