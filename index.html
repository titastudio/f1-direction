/* ============================================================
   FORMULA ONE DIRECTION — MODAL SYSTEM + ACTION MODALS
   ============================================================ */

Object.assign(App, {

  openModal(html){
    let overlay = document.querySelector('.modal-overlay');
    if(overlay) overlay.remove();
    overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const modalEl = document.createElement('div');
    modalEl.className = 'modal';
    modalEl.innerHTML = html;
    // If a .modal-header exists, keep it fixed and wrap the rest in a scrolling .modal-body
    const header = modalEl.querySelector('.modal-header');
    if(header){
      const bodyWrap = document.createElement('div');
      bodyWrap.className = 'modal-body';
      // move every sibling after the header into the body wrap
      let node = header.nextSibling;
      while(node){
        const next = node.nextSibling;
        bodyWrap.appendChild(node);
        node = next;
      }
      modalEl.appendChild(bodyWrap);
    } else {
      // no header (rare) - wrap everything so padding/scroll still behaves
      const bodyWrap = document.createElement('div');
      bodyWrap.className = 'modal-body';
      while(modalEl.firstChild) bodyWrap.appendChild(modalEl.firstChild);
      modalEl.appendChild(bodyWrap);
    }
    overlay.appendChild(modalEl);
    overlay.onclick = (e)=>{ if(e.target===overlay) this.closeModal(); };
    document.getElementById('device').appendChild(overlay);
    this.activeModal = overlay;
    this.wireEditableNames(overlay);
  },
  closeModal(){
    if(this.activeModal){ this.activeModal.remove(); this.activeModal=null; }
  },
  modalHeader(title){
    return `<div class="modal-header"><h3>${title}</h3><button class="modal-close" id="modal-close-btn">&times;</button></div>`;
  },
  wireModalClose(){
    const btn = document.getElementById('modal-close-btn');
    if(btn) btn.onclick = ()=> this.closeModal();
  },

  /* ---------------- FIRST-TIME CONTEXTUAL EXPLAINERS (19.11) ----------------
     Shows a small, dismissable info modal the FIRST time a player encounters
     a mechanic that was previously only documented in the Help modal (dev
     slots, romance candidate types, celebrity encounters). Gated by a
     p.seen*Explainer boolean, same pattern as p.tutorialSeen. Call this
     BEFORE rendering the real modal/content the player was trying to open --
     it renders on top and, on dismiss, calls onContinue() to proceed to
     whatever would have shown anyway. If already seen, onContinue() fires
     immediately with no modal at all. */
  showFirstTimeExplainer(flagName, icon, title, text, onContinue){
    const p = this.state.player;
    if(p[flagName]){ onContinue(); return; }
    p[flagName] = true;
    this.saveState();
    this.openModal(`
      ${this.modalHeader(title)}
      <div style="text-align:center; padding:4px 0 8px;">
        <div style="font-size:36px;">${icon}</div>
      </div>
      <div class="section-sub" style="margin-bottom:14px;">${text}</div>
      <button class="pbtn full gold" id="btn-explainer-continue">Got it</button>
    `);
    this.wireModalClose();
    document.getElementById('btn-explainer-continue').onclick = ()=>{
      this.closeModal();
      onContinue();
    };
  },

  openActionModal(action){
    if(action==='training') return this.renderTrainingModal();
    if(action==='lifestyle') return this.renderLifestyleModal();
    if(action==='social') return this.renderRelationshipsModal();
    if(action==='media') return this.renderMediaModal();
    if(action==='sponsors') return this.renderSponsorsModal();
    if(action==='team') return this.renderTeamScreen();
    if(action==='mentor') return this.renderMentorModal();
  },

  /* ---------------- TRAINING ---------------- */
  /* Base training programs. moneyCost is the price at facility level 1 --
     trainingMoneyCost() scales this up as the relevant facility improves
     (better equipment/coaching costs more to run each session), mirroring
     the existing simBonus/gymBonus gain-scaling pattern so facility upgrades
     have a consistent "better AND pricier" feel across the whole training
     system rather than only affecting gains. */
  renderTrainingModal(){
    const p = this.state.player; const s = this.state;
    const WEEKLY_TRAINING_CAP = 3;
    if(p.trainingWeekTracker !== s.week){ p.trainingWeekTracker = s.week; p.trainingActionsThisWeek = 0; }
    const usedThisWeek = p.trainingActionsThisWeek||0;
    const capReached = usedThisWeek >= WEEKLY_TRAINING_CAP;
    const PROGRAMS = [
      {id:'gym', label:'Gym Session', icon:'🏋️', cost:20, moneyCost:0.3, stat:'fitness', group:'lifestyle', facility:'gym'},
      {id:'sim_pace', label:'Sim: Race Pace', icon:'🖥️', cost:18, moneyCost:0.5, stat:'racePace', group:'driving', facility:'simulator'},
      {id:'sim_quali', label:'Sim: Qualifying', icon:'⏱️', cost:18, moneyCost:0.5, stat:'qualifyingPace', group:'driving', facility:'simulator'},
      {id:'sim_wet', label:'Sim: Wet Conditions', icon:'🌧️', cost:20, moneyCost:0.5, stat:'wetSkill', group:'driving', facility:'simulator'},
      {id:'sim_tyre', label:'Sim: Tyre Management', icon:'🛞', cost:18, moneyCost:0.5, stat:'tyreManagement', group:'driving', facility:'simulator'},
      {id:'braking', label:'Braking Drills', icon:'🦿', cost:14, moneyCost:0.3, stat:'braking', group:'driving', facility:'simulator'},
      {id:'cornering', label:'Cornering Study', icon:'📐', cost:14, moneyCost:0.3, stat:'cornering', group:'driving', facility:'simulator'},
      {id:'starts', label:'Start Practice', icon:'🚦', cost:12, moneyCost:0.25, stat:'starts', group:'driving', facility:'simulator'},
      {id:'consistency', label:'Race Craft Drills', icon:'🎯', cost:16, moneyCost:0.4, stat:'consistency', group:'driving', facility:'simulator'},
      {id:'mental', label:'Mental Coaching', icon:'🧠', cost:10, moneyCost:0.2, stat:'focus', group:'mental', facility:'media'},
      {id:'fuel_saving', label:'Fuel Management Drills', icon:'⛽', cost:14, moneyCost:0.35, stat:'fuelSaving', group:'driving', facility:'simulator'},
      {id:'discipline', label:'Race Discipline Review', icon:'📋', cost:12, moneyCost:0.3, stat:'discipline', group:'mental', facility:'media'},
      {id:'leadership', label:'Leadership Workshop', icon:'🤝', cost:12, moneyCost:0.3, stat:'leadership', group:'mental', facility:'media'},
    ];
    this.openModal(`
      ${this.modalHeader('Training')}
      <div class="section-sub" style="margin:0;">Energy: ${Math.round(p.attributes.lifestyle.energy)}/100 · Money: $${p.money.toFixed(1)}M</div>
      <div class="section-sub" style="margin:2px 0 4px;">Better facilities mean stronger gains, but pricier sessions too.</div>
      <div class="chip ${capReached?'red':'blue'}" style="margin-bottom:10px;">📅 Training this week: ${usedThisWeek}/${WEEKLY_TRAINING_CAP}${capReached?' — resets Monday':''}</div>
      <div class="stack-8">
        ${PROGRAMS.map(tp=>{
          const price = this.trainingMoneyCost(tp);
          const canAfford = p.attributes.lifestyle.energy>=tp.cost && p.money>=price && !capReached;
          // Skill cap (anti-overpower): show a driver when this stat is
          // already at or very near the leader-relative ceiling
          // (enforcePlayerSkillCap(), app_core.js) so a session that can't
          // meaningfully help is visible BEFORE spending money on it,
          // rather than only finding out from the toast afterward.
          const nearCap = tp.group!=='lifestyle' && this.isNearSkillCap(tp.group, tp.stat);
          return `
          <button class="pbtn full" data-train="${tp.id}" style="justify-content:flex-start; text-align:left;" ${canAfford?'':'disabled'}>
            ${tp.icon} ${tp.label} <span style="margin-left:auto; font-size:8px; color:${nearCap?'#e6604c':'var(--ink-soft)'};">${nearCap?'near cap · ':''}-${tp.cost} nrg · -$${price.toFixed(1)}M</span>
          </button>
        `;}).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-train]').forEach(btn=>{
      btn.onclick = ()=>{
        const tp = PROGRAMS.find(x=>x.id===btn.dataset.train);
        this.doTraining(tp);
      };
    });
  },

  /* Level 1 = base moneyCost; each facility level above 1 adds 12% to the
     price, same shape as the existing +15%-per-level gain bonuses so cost
     and benefit grow together instead of facilities being a pure discount. */
  trainingMoneyCost(tp){
    const level = this.state.facilities[tp.facility] || 1;
    return Math.round(tp.moneyCost * (1 + (level-1)*0.12) * 100) / 100;
  },

  doTraining(tp){
    const p = this.state.player; const s = this.state;
    const price = this.trainingMoneyCost(tp);
    // Weekly training cap: separate from the energy budget, which alone let
    // a player run 5-8 sessions in a single day and fully recharge within
    // about a day and a half -- no real weekly pacing existed. This tracks
    // against s.week (already incremented once per Mon-wrap in advanceDay())
    // so it resets automatically with no extra bookkeeping needed elsewhere.
    if(p.trainingWeekTracker !== s.week){ p.trainingWeekTracker = s.week; p.trainingActionsThisWeek = 0; }
    const WEEKLY_TRAINING_CAP = 3;
    if((p.trainingActionsThisWeek||0) >= WEEKLY_TRAINING_CAP){ this.toast(`Training cap reached for this week (${WEEKLY_TRAINING_CAP} sessions) — more opens up Monday.`); return; }
    if(p.attributes.lifestyle.energy < tp.cost){ this.toast('Too tired to train!'); return; }
    if(p.money < price){ this.toast('Not enough money for that session.'); return; }
    p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy - tp.cost);
    p.money = Math.round((p.money - price)*10)/10;
    p.trainingActionsThisWeek = (p.trainingActionsThisWeek||0) + 1;
    const target = tp.group==='driving' ? p.attributes.driving : tp.group==='mental' ? p.attributes.mental : p.attributes.lifestyle;
    const before = target[tp.stat];
    const efficiency = clamp(1 - (before-70)/60, 0.25, 1);
    const simBonus = 1 + (this.state.facilities.simulator-1)*0.15;
    const gymBonus = 1 + (this.state.facilities.gym-1)*0.15;
    const bonus = tp.group==='driving' ? simBonus : tp.stat==='fitness' ? gymBonus : 1;
    const gain = Math.max(1, Math.round(2 * efficiency * bonus));
    target[tp.stat] = clamp(before + gain, 0, 99);
    p.attributes.lifestyle.stress = clamp(p.attributes.lifestyle.stress + 3);
    // Simulator-based driving programs also build the crew's read on the
    // player's personal setup tendency (feeds setupHintConfidence) -- kept
    // PER-TRACK (this round's track, if any) rather than a global lifetime
    // count, so training doesn't permanently max out the setup-confidence
    // floor on every track including ones never actually visited.
    if(tp.id.startsWith('sim_')){
      const round = this.getCurrentRound ? this.getCurrentRound() : null;
      if(round){
        if(!p.setupTrainingByTrack) p.setupTrainingByTrack = {};
        p.setupTrainingByTrack[round.trackId] = (p.setupTrainingByTrack[round.trackId]||0) + 1;
      }
    }
    this.saveState(); // enforcePlayerSkillCap() runs inside here -- check the REAL post-cap value before toasting
    const actualGain = target[tp.stat] - before;
    if(actualGain < gain && tp.group!=='lifestyle'){
      this.toast(`${tp.icon} ${tp.label} complete! +${actualGain} (-$${price.toFixed(1)}M) — capped near the grid leader's level. Training this week: ${p.trainingActionsThisWeek}/${WEEKLY_TRAINING_CAP}`);
    } else {
      this.toast(`${tp.icon} ${tp.label} complete! +${gain} (-$${price.toFixed(1)}M) · Training this week: ${p.trainingActionsThisWeek}/${WEEKLY_TRAINING_CAP}`);
    }
    this.rerenderCurrentScreen();
    // First-time explainer (19.11 pattern, extended per the stats-legibility
    // pass): the very first training result is the natural moment a player
    // wonders what a stat number actually does. Points them at the new
    // "What Do My Stats Do?" Help topic rather than repeating a full
    // explanation inline on every single toast. Fires in place of the plain
    // closeModal() ONLY the first time, synchronously (no setTimeout) so it
    // doesn't land as a surprise extra modal a beat after the player has
    // already moved on to something else.
    if(!p.seenStatEffectExplainer){
      this.showFirstTimeExplainer('seenStatEffectExplainer', '📊', 'What Stats Actually Do',
        'Some stats directly boost your speed, like Race Pace. Others are narrower — Adaptability only helps on cold tracks. A few are just cosmetic. Full breakdown: "What Do My Stats Do?" in Help.',
        ()=>{});
    } else {
      this.closeModal();
    }
  },

  /* ---------------- MENTOR / PROTÉGÉ (19.1 #6, homeLevel's hook per 19.8) ----------------
     p.protege is a lightweight object, NOT a grid driver -- it never touches
     state.grid while being mentored. Graduation (protege.graduated=true at
     100% progress) only actually places a driver on the grid inside
     processGridRetirements() (engine.js), at the exact moment an existing
     AI driver retires and that slot needs filling anyway -- see the
     extensive comment there for why this is the safe way to do it. */
  renderMentorModal(){
    const s = this.state; const p = s.player;
    if(!p.protege){
      this.openModal(`
        ${this.modalHeader('Mentor a Protégé')}
        <div class="section-sub" style="margin-bottom:10px;">Your home has room to host a young driver. Mentoring them costs a little time and energy each week, but a well-mentored protégé can graduate onto the grid as a real AI driver when a seat eventually opens up.</div>
        <button class="pbtn full gold" id="btn-recruit-protege">🌟 Take On a Protégé</button>
      `);
      this.wireModalClose();
      document.getElementById('btn-recruit-protege').onclick = ()=>{
        p.protege = makeProtege(p.nationality);
        this.toast(`🌟 ${p.protege.name} joins you as a protégé!`);
        p.journal.unshift({season:s.season, week:s.week, title:'New Protégé', text:`Took on ${p.protege.name} as a protégé to mentor.`, icon:'🌟'});
        this.closeModal();
        this.saveState();
        this.showFirstTimeExplainer('seenMentorExplainer', '🎓', 'Mentoring a Protégé',
          "Run sessions here to build their progress toward 100. Fully mentored, they wait for a real seat to open up, then graduate onto the grid as an AI driver.",
          ()=> this.rerenderCurrentScreen());
      };
      return;

    }
    const pr = p.protege;
    if(pr.graduated){
      this.openModal(`
        ${this.modalHeader('Mentor a Protégé')}
        <div class="pixel-panel" style="text-align:center;">
          <div style="font-size:28px;">🌟</div>
          <div style="font-weight:800; font-size:14px; margin-top:4px;">${pr.name}</div>
          <div class="section-sub" style="margin-top:6px;">Fully mentored and ready — they'll join the grid as soon as a seat opens up on any team.</div>
        </div>
      `);
      this.wireModalClose();
      return;
    }
    const sessionCost = 15;
    const canMentor = p.attributes.lifestyle.energy >= sessionCost;
    this.openModal(`
      ${this.modalHeader('Mentor a Protégé')}
      <div class="pixel-panel">
        <div style="font-weight:800; font-size:14px;">${pr.flag} ${pr.name}</div>
        <div class="section-sub" style="margin:4px 0 8px;">Progress toward graduating onto the grid</div>
        ${this.renderPixelBar(pr.mentorProgress,'confidence')}
        <div class="section-sub" style="margin-top:4px;">${pr.mentorProgress}/100</div>
      </div>
      <button class="pbtn full gold" id="btn-mentor-session" ${canMentor?'':'disabled'}>🎓 Mentoring Session (-${sessionCost} energy)</button>
      ${!canMentor?'<div class="section-sub" style="margin-top:6px;">Too tired for a session today — rest up first.</div>':''}
    `);
    this.wireModalClose();
    const btn = document.getElementById('btn-mentor-session');
    if(btn) btn.onclick = ()=> this.mentorProtege();
  },

  mentorProtege(){
    const s = this.state; const p = s.player; const pr = p.protege;
    if(!pr || pr.graduated) return;
    const sessionCost = 15;
    if(p.attributes.lifestyle.energy < sessionCost){ this.toast('Too tired for a mentoring session.'); return; }
    p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy - sessionCost);
    const gain = randInt(8, 14);
    pr.mentorProgress = clamp(pr.mentorProgress + gain, 0, 100);
    // A little of the mentoring warmth rubs off on the player too -- keeps
    // this from feeling like a pure investment with zero personal payoff.
    p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood + 3);
    if(pr.mentorProgress>=100 && !pr.graduated){
      pr.graduated = true;
      this.toast(`🌟 ${pr.name} is fully mentored and ready for a grid seat!`);
      this.pushNews(`🌟 ${p.name}'s protégé ${pr.name} has completed their mentorship and awaits a grid opportunity.`);
      p.journal.unshift({season:s.season, week:s.week, title:'Protégé Ready', text:`${pr.name} completed their mentorship under ${p.name}'s guidance.`, icon:'🌟'});
    } else {
      this.toast(`🎓 Good session with ${pr.name}. Progress +${gain} (${pr.mentorProgress}/100).`);
    }
    this.closeModal();
    this.saveState();
    this.rerenderCurrentScreen();
  },

  doLifestyleActivity(a){
    const p = this.state.player;
    if(p.attributes.lifestyle.energy < a.cost){ this.toast('Too tired for that.'); return; }
    p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy - a.cost + (a.energyGain||0));
    p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood + (a.mood||0));
    p.attributes.lifestyle.stress = clamp(p.attributes.lifestyle.stress - (a.stress||0));
    if(a.fitness) p.attributes.lifestyle.fitness = clamp(p.attributes.lifestyle.fitness + a.fitness);
    if(a.focus) p.attributes.mental.focus = clamp(p.attributes.mental.focus + a.focus);
    if(a.fans) p.fanPopularity = clamp(p.fanPopularity + a.fans);
    this.toast(`${a.icon} ${a.label} — nice break!`);
    this.closeModal();
    this.saveState();
    this.rerenderCurrentScreen();
  },

  /* Rivals (grid drivers) store relationship-adjacent data directly on the
     driver object (memories, rivalryLevel, respect) rather than nested under
     a `.relationship` object like NPCs do, since that shape is also read by
     the race/rivalry-tracking code elsewhere. This adapter lets a rival be
     talked to and even romanced through the same interaction patterns as an
     NPC, without reshaping the shared rival data model. */
  renderRivalTalkModal(rivalId){
    const s = this.state; const p = s.player;
    const d = s.grid.find(x=>x.id===rivalId);
    if(!d) return;
    if(!d.romance) d.romance = { status:'none', spark:0 };
    // Wrap the rival's flat fields in a NPC-shaped view so getRomanceLinesFor
    // (which expects n.relationship.friendship/.affection etc.) works
    // unmodified. `romance` and `memories` are shared object references (not
    // copies) so mutations inside getRomanceLinesFor persist correctly onto
    // the real driver; `respectMeter` is a small persisted stand-in for
    // affection so that value isn't silently dropped either.
    if(d.respectMeter===undefined) d.respectMeter = 30;
    const relationshipView = { friendship: d.respect||50, get affection(){ return d.respectMeter; }, set affection(v){ d.respectMeter = v; }, memories: d.memories };
    const npcShim = { ...d, role:'Rival Driver', personality: d.drivingStyle||'Competitive', relationship: relationshipView };

    // Always-available options. "Study their driving style" is a small real
    // benefit (not just flavor) -- a rival-specific analog to a technical
    // briefing, scaled down since it costs no energy/money unlike training.
    const genericLines = [
      {label:'Respectful chat after the race', effect:()=>{ d.respect = clamp((d.respect||50)+5); }, result:`${d.name} appreciates the sportsmanship.`, memory:'Had a respectful post-race chat'},
      {label:'Compare notes on the track', effect:()=>{ p.attributes.mental.focus = clamp(p.attributes.mental.focus+2); d.respect = clamp((d.respect||50)+2); }, result:'A useful, focused exchange.', memory:'Compared notes on the track'},
      {label:`Study ${d.name.split(' ')[0]}'s driving style`, effect:()=>{ p.attributes.mental.adaptability = clamp(p.attributes.mental.adaptability+1); }, result:`You pick up a small habit worth copying. Adaptability +1.`, memory:`Studied ${d.name}'s driving style`},
    ];

    const h2h = d.headToHead || {wins:0, losses:0};
    const isTeammate = d.teamId===p.teamId;
    const isCurrentRival = s.rivalId===d.id;
    const situationalLines = [];

    if(isTeammate){
      situationalLines.push(
        {label:'Push each other to go faster', effect:()=>{ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence+3); this.adjustTeamMorale(p.teamId,2); }, result:'A friendly internal rivalry sharpens you both. Confidence +3.', memory:'Pushed each other to go faster as teammates'},
        {label:'Align on team strategy', effect:()=>{ this.adjustTeamMorale(p.teamId,3); d.respect=clamp((d.respect||50)+3); }, result:'A united garage. Team chemistry improves.', memory:'Aligned on team strategy with teammate'},
      );
    } else if(isCurrentRival || d.rivalryLevel>=50){
      situationalLines.push(
        {label:'Get in their head before the next race', effect:()=>{ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence+2); d.respect=clamp((d.respect||50)-3); }, result:'A little psychological edge, though it costs some goodwill.', memory:`Tried to get in ${d.name}'s head`},
        {label:'Clear the air about the rivalry', effect:()=>{ d.respect=clamp((d.respect||50)+8); p.attributes.lifestyle.stress=clamp(p.attributes.lifestyle.stress-6); }, result:`The tension eases a little. Stress -6.`, memory:`Cleared the air with ${d.name} about their rivalry`},
      );
    } else if(h2h.wins + h2h.losses >= 3){
      // Enough races together to have a real head-to-head story, even
      // without being flagged as THE current rival.
      const leading = h2h.wins > h2h.losses;
      situationalLines.push(
        {label: leading ? 'Needle them about the head-to-head' : 'Ask what they know that you don\'t',
         effect:()=>{ if(leading){ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence+2); d.respect=clamp((d.respect||50)-1); } else { p.attributes.mental.focus=clamp(p.attributes.mental.focus+3); } },
         result: leading ? `A bit of banter about your ${h2h.wins}-${h2h.losses} record.` : `A humbling but useful conversation. Focus +3.`,
         memory: leading ? `Needled ${d.name} about their head-to-head record` : `Asked ${d.name} for advice after a tough head-to-head`},
      );
    }

    const lines = [...genericLines, ...situationalLines, ...this.getRomanceLinesFor(npcShim)];

    this.openModal(`
      ${this.modalHeader('Talk to '+d.name)}
      <div class="section-sub">${TEAMS.find(t=>t.id===d.teamId).name} · ${d.drivingStyle||'Competitive'}${isTeammate?' · Teammate':''}${isCurrentRival?' · Your Rival':''}</div>
      <div class="stack-8">
        ${lines.map((l,i)=>`<button class="pbtn full" data-rline="${i}">${l.label}</button>`).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-rline]').forEach(btn=>{
      btn.onclick = ()=>{
        const l = lines[parseInt(btn.dataset.rline)];
        l.effect();
        d.memories.unshift({text:l.memory||l.label, season:this.state.season, week:this.state.week});
        if(d.memories.length>10) d.memories.pop();
        this.toast(l.result);
        this.saveState();
        this.rerenderCurrentScreen();
        this.renderRelationshipsModal();
      };
    });
  },

  getCurrentPartner(){
    const s = this.state;
    const npcPartner = s.npcRoster.find(n=>n.romance && n.romance.status==='dating');
    if(npcPartner) return npcPartner;
    const rivalPartner = s.grid.find(d=>d.romance && d.romance.status==='dating');
    if(rivalPartner) return rivalPartner;
    if(s.metPartner && s.metPartner.romance && s.metPartner.romance.status==='dating') return s.metPartner;
    return null;
  },

  /* Applies the current partner's passive romanceType perk once per race --
     only s.metPartner-sourced partners carry a romanceType (NPC staff and
     rival-driver romances predate this system and don't have one), so this
     is a no-op for those without changing their existing behavior at all.
     Small, per-race, stacks with everything else already touching that
     stat -- see ROMANCE_TYPES in data.js for the exact amounts. */
  applyRomancePartnerPerk(){
    const s = this.state; const p = s.player;
    const partner = this.getCurrentPartner();
    if(!partner || !partner.romanceType) return;
    const type = romanceTypeInfo(partner.romanceType);
    if(!type || !type.perk) return;
    const {stat, amount} = type.perk;
    if(stat==='fanPopularity') p.fanPopularity = Math.max(0, p.fanPopularity + amount);
    else if(stat==='mediaReputation') p.mediaReputation = clamp(p.mediaReputation + amount, 0, 100);
    else if(stat==='stress') p.attributes.lifestyle.stress = clamp(p.attributes.lifestyle.stress + amount);
    else if(stat==='mood') p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood + amount);
    else if(stat==='energy') p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy + amount);
    else if(stat==='confidence') p.attributes.mental.confidence = clamp(p.attributes.mental.confidence + amount);
  },

  renderPixelBar(val, cls, segs){
    segs = segs || 10;
    const on = Math.round(clamp(val,0,100)/100*segs);
    let html = '<div class="pixel-bar-track">';
    for(let i=0;i<segs;i++){ html += `<div class="pixel-bar-seg ${i<on?'on '+cls:''}"></div>`; }
    html += '</div>';
    return html;
  },

  renderTalkModal(npcId, isMetPartner){
    const s = this.state;
    const n = isMetPartner ? s.metPartner : s.npcRoster.find(x=>x.id===npcId);
    const p = this.state.player;
    const lines = isMetPartner ? this.getRomanceLinesFor(n) : this.getTalkLinesForRole(n);
    this.openModal(`
      ${this.modalHeader('Talk to '+n.name)}
      <div class="section-sub">${n.role} · ${n.personality}</div>
      <div class="stack-8">
        ${lines.map((l,i)=>`<button class="pbtn full" data-line="${i}">${l.label}</button>`).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-line]').forEach(btn=>{
      btn.onclick = ()=>{
        const l = lines[parseInt(btn.dataset.line)];
        l.effect();
        n.relationship.memories.unshift({text:l.memory||l.label, season:this.state.season, week:this.state.week});
        if(n.relationship.memories.length>10) n.relationship.memories.pop();
        this.toast(l.result);
        this.saveState();
        this.rerenderCurrentScreen();
        // Return to a freshly-rendered Relationships modal (rather than just
        // closing) so the friendship/spark bar the player just changed is
        // visibly updated immediately, instead of silently updating in state
        // with no visual confirmation until the modal is reopened manually.
        this.renderRelationshipsModal();
      };
    });
  },

  /* NPC personality (Calm/Energetic/Strict/Funny) was previously only read
     for the Race Engineer's radio lines -- every other role's personality
     was assigned at creation and displayed, but never changed a single
     word of dialogue. This gives each role's two byRole result lines a
     personality-flavored variant, same "small real effect, not a rewrite"
     scope as every other trait/archetype hook fixed so far -- the
     underlying effects (stat/relationship changes) are untouched, only the
     response text now reflects who's actually saying it. */
  npcFlavorLine(personality, calmLine, energeticLine, strictLine, funnyLine){
    if(personality==='Energetic') return energeticLine;
    if(personality==='Strict') return strictLine;
    if(personality==='Funny') return funnyLine;
    return calmLine;
  },

  getTalkLinesForRole(n){
    const p = this.state.player;
    const flavor = (calmLine, energeticLine, strictLine, funnyLine)=> this.npcFlavorLine(n.personality, calmLine, energeticLine, strictLine, funnyLine);
    const generic = [
      {label:'Chat casually', effect:()=>{ n.relationship.friendship = clamp(n.relationship.friendship+5); }, result:'Friendship improves.', memory:'Had a casual chat'},
      {label:'Share good news', effect:()=>{ n.relationship.affection = clamp(n.relationship.affection+4); p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood+3); }, result:'Mood improves for both of you.', memory:'Shared good news'},
    ];
    const byRole = {
      'Team Principal': [
        {label:'Discuss season expectations', effect:()=>{ n.relationship.respect=clamp(n.relationship.respect+4); p.attributes.mental.pressure=clamp(p.attributes.mental.pressure+2); }, result:flavor('A serious, useful conversation.','A fired-up pep talk about the season ahead!','A clipped, businesslike rundown of expectations.','A season pep talk with more jokes than plans, somehow.'), memory:'Discussed season expectations'},
        {label:'Ask about the car budget', effect:()=>{ n.relationship.trust=clamp(n.relationship.trust+3); }, result:flavor(`${n.name} appreciates you taking an interest.`,`${n.name} lights up talking numbers and ambition.`,`${n.name} runs through the figures with precise detail.`,`${n.name} jokes about the budget before actually answering.`), memory:'Asked about the budget'},
      ],
      'Chief Engineer': [
        {label:'Ask what to develop next', effect:()=>{ n.relationship.trust=clamp(n.relationship.trust+4); }, result:this.suggestNextDevelopment(), memory:'Asked what to develop next'},
        {label:'Ask for a technical briefing', effect:()=>{ p.attributes.mental.focus=clamp(p.attributes.mental.focus+2); }, result:flavor('A useful technical briefing. Focus +2.','An enthusiastic, fast-talking briefing. Focus +2.','A precise, no-nonsense briefing. Focus +2.','A briefing full of engineering puns. Focus +2.'), memory:'Got a technical briefing'},
      ],
      'Race Engineer': [
        {label:'Review the last race radio calls', effect:()=>{ n.relationship.friendship=clamp(n.relationship.friendship+4); p.attributes.driving.consistency=clamp(p.attributes.driving.consistency+1); }, result:'A helpful debrief. Consistency +1.', memory:'Reviewed race radio calls'},
        {label:'Build trust before the next race', effect:()=>{ n.relationship.trust=clamp(n.relationship.trust+5); }, result:'Trust builds ahead of the weekend.', memory:'Built trust before the race'},
      ],
      'Doctor': [
        {label:'Get a fitness check-up', effect:()=>{ p.attributes.lifestyle.fitness=clamp(p.attributes.lifestyle.fitness+3); }, result:flavor('A clean bill of health. Fitness +3.','An energetic, encouraging check-up. Fitness +3.','A thorough, by-the-book check-up. Fitness +3.','A check-up with too many bad puns. Fitness +3.'), memory:'Had a fitness check-up'},
        {label:'Talk about managing stress', effect:()=>{ p.attributes.lifestyle.stress=clamp(p.attributes.lifestyle.stress-8); }, result:flavor('Some helpful advice. Stress -8.','An upbeat pep talk about handling pressure. Stress -8.','A structured stress-management plan. Stress -8.','Advice delivered with a joke that actually helps. Stress -8.'), memory:'Talked about managing stress'},
      ],
      'Journalist': [
        {label:'Off-the-record chat', effect:()=>{ n.relationship.trust=clamp(n.relationship.trust+5); }, result:flavor('A relaxed, honest conversation.','A lively, animated conversation.','A careful, precisely-worded exchange.','A conversation that turns into a bit of a roast.'), memory:'Had an off-the-record chat'},
        {label:'Ask what the paddock is saying', effect:()=>{ n.relationship.friendship=clamp(n.relationship.friendship+3); }, result:flavor(`${n.name} shares some paddock gossip with you.`,`${n.name} excitedly spills all the paddock gossip.`,`${n.name} gives a measured, factual paddock rundown.`,`${n.name} shares gossip with way too much commentary.`), memory:'Asked about paddock gossip'},
      ],
      'Best Friend': [
        {label:'Grab a meal together', effect:()=>{ p.attributes.lifestyle.mood=clamp(p.attributes.lifestyle.mood+8); n.relationship.affection=clamp(n.relationship.affection+6); }, result:flavor('A great catch-up. Mood +8.','A loud, laughter-filled catch-up. Mood +8.','A calm, focused catch-up. Mood +8.','A catch-up that\'s basically a comedy show. Mood +8.'), memory:'Grabbed a meal together'},
        {label:'Vent about the season', effect:()=>{ p.attributes.lifestyle.stress=clamp(p.attributes.lifestyle.stress-10); n.relationship.friendship=clamp(n.relationship.friendship+5); }, result:flavor('It feels good to talk it out. Stress -10.','They hype you right back up. Stress -10.','They listen and give you a clear-headed take. Stress -10.','They turn your bad week into a bit. Stress -10.'), memory:'Vented about the season'},
      ],
      'Streamer Pal': [
        {label:'Co-stream together', effect:()=>{ p.fanPopularity=clamp(p.fanPopularity+5,0,999); n.relationship.friendship=clamp(n.relationship.friendship+4); }, result:'Fans loved the crossover! Popularity +5.', memory:'Co-streamed together'},
        {label:'Trade gaming tips', effect:()=>{ p.attributes.lifestyle.mood=clamp(p.attributes.lifestyle.mood+5); }, result:flavor('A fun, relaxed hangout.','A hyped, chaotic hangout.','A surprisingly methodical strategy session.','A hangout that\'s 90% inside jokes.'), memory:'Traded gaming tips'},
      ],
    };
    return [...(byRole[n.role]||[]), ...generic, ...this.getRomanceLinesFor(n)];
  },

  /* ---------------- ROMANCE ----------------
     Heterosexual pairing model per product spec: eligible partners are NPCs/
     rivals of the opposite gender to the player. Kept intentionally light —
     no explicit content, just a rising "spark" meter through Flirt lines
     that eventually can become "dating," with small, tasteful effects
     (mood/stress) once together. Team Principal is included as an eligible
     partner like anyone else; nothing in the brief excluded them.
     A player can only be "dating" one person at a time — flirting with
     someone else while dating is allowed narratively (people are messy) but
     won't start a second relationship; it just risks the current one if
     taken too far (kept simple: it does nothing extra for now, not
     penalized, to avoid overcomplicating this pass). */
  isRomanceEligible(person){
    const p = this.state.player;
    if(!person.gender) return false;
    const wanted = p.gender==='F' ? 'M' : 'F';
    return person.gender === wanted;
  },

  startDatingMilestone(partnerName){
    const p = this.state.player;
    if(!p.milestones.includes('first_romance')){
      p.milestones.push('first_romance');
      this.toast(`🎉 ${p.name} finds love for the first time this career, with ${partnerName}!`);
      this.pushNews(`🎉 ${p.name} finds love for the first time this career, with ${partnerName}!`);
    }
  },

  getRomanceLinesFor(n){
    if(!this.isRomanceEligible(n)) return [];
    if(!n.romance) n.romance = { status:'none', spark:0 };
    const p = this.state.player;
    if(n.romance.status==='dating'){
      return [
        {label:'💞 Spend time together', effect:()=>{
          p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood+10);
          p.attributes.lifestyle.stress = clamp(p.attributes.lifestyle.stress-8);
          n.romance.spark = clamp(n.romance.spark+3, 0, 100);
        }, result:`A lovely time with ${n.name}. Mood +10, Stress -8.`, memory:`Spent quality time with ${n.name}`},
      ];
    }
    if(n.relationship.friendship < 40){
      return []; // not enough of a connection yet to flirt
    }
    return [
      {label:'💬 Flirt a little', effect:()=>{
        n.romance.spark = clamp((n.romance.spark||0) + randInt(6,14), 0, 100);
        n.relationship.affection = clamp(n.relationship.affection + 4);
        if(n.romance.spark >= 70 && !this.getCurrentPartner()){
          n.romance.status = 'dating';
          this.toast(`💞 ${n.name} says yes — you're officially seeing each other!`);
          this.pushNews(`💞 ${p.name} is now dating ${n.name}.`);
          this.startDatingMilestone(n.name);
        }
      }, result: n.romance.spark>=70 ? `Something clicked with ${n.name}!` : `A spark with ${n.name}... (${clamp((n.romance.spark||0),0,100)}/70)`, memory:`Flirted with ${n.name}`},
    ];
  },

  renderNightlifeModal(){
    const s = this.state; const p = s.player;
    const VENUES = [
      {id:'lounge', label:'Paddock Lounge', icon:'🥂', cost:8, mood:8},
      {id:'beach', label:'Beach Party', icon:'🏖️', cost:10, mood:12},
      {id:'gala', label:'Sponsor Gala', icon:'🎩', cost:6, mood:6, fans:2},
      {id:'club', label:'City Nightlife', icon:'🎶', cost:12, mood:10},
    ];
    const hasPartner = this.getCurrentPartner();
    this.openModal(`
      ${this.modalHeader('Go Out')}
      <div class="section-sub" style="margin:0 0 10px;">${hasPartner ? `You're seeing ${hasPartner.name} — a night out is still a nice break, but you're not looking for anyone new.` : 'Pick a spot for the night. You never know who you might meet.'}</div>
      <div class="option-grid">
        ${VENUES.map(v=>`<div class="option-card" data-venue="${v.id}" style="cursor:pointer;">${v.icon}<br>${v.label}</div>`).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-venue]').forEach(el=>{
      el.onclick = ()=>{
        const v = VENUES.find(x=>x.id===el.dataset.venue);
        this.doNightlife(v);
      };
    });
  },

  doNightlife(v){
    const s = this.state; const p = s.player;
    if(p.attributes.lifestyle.energy < v.cost){ this.toast('Too tired for a night out.'); return; }
    p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy - v.cost + 4); // a fun night still nets a little recovery
    p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood + v.mood);
    if(v.fans) p.fanPopularity = clamp(p.fanPopularity + v.fans, 0, 999);

    const hasPartner = this.getCurrentPartner();
    let metSomeone = false;
    if(!hasPartner && Math.random() < 0.35){
      const wanted = p.gender==='F' ? 'M' : 'F';
      // Surface 3 distinct candidates (different romance types + rolled
      // compatibility) instead of one random person, so there's a real
      // choice to make rather than a coin flip. Shuffle the finite
      // ROMANCE_TYPES list and take the first 3 -- bounded and guaranteed
      // to terminate regardless of RNG behavior, unlike a reject-and-retry
      // loop which could in principle spin forever if the RNG ever landed
      // on a degenerate sequence.
      const shuffledTypes = [...ROMANCE_TYPES].sort(()=>Math.random()-0.5).slice(0,3);
      const candidates = shuffledTypes.map(type=>generateRomanceCandidateOfType(type, wanted));
      s.pendingRomanceCandidates = candidates;
      metSomeone = true;
      this.toast(`✨ A few new faces caught your eye at the ${v.label.toLowerCase()}!`);
    } else {
      this.toast(`${v.icon} A fun night at the ${v.label}.`);
    }

    this.closeModal();
    this.saveState();
    this.rerenderCurrentScreen();
    if(metSomeone) this.showFirstTimeExplainer('seenRomanceExplainer', '💕', 'New Faces', "You've caught a few eyes tonight. Pick one to pursue — no drama with the rest.", ()=> this.renderRomanceCandidatesModal());
  },

  /* Presents the 3 rolled candidates side by side (name, type, bio,
     compatibility) and lets the player pick one to pursue -- the other two
     are simply not chosen, no rejection drama needed given the game's
     low-stakes tone. Picking sets s.metPartner (same field the rest of the
     romance flow already reads) and clears the other candidates. */
  renderRomanceCandidatesModal(){
    const s = this.state;
    const candidates = s.pendingRomanceCandidates||[];
    if(!candidates.length) return;
    this.openModal(`
      ${this.modalHeader('New Faces')}
      <div class="section-sub" style="margin:0 0 10px;">You hit it off with a few people tonight. Who do you want to get to know better?</div>
      <div class="stack-8">
        ${candidates.map((c,i)=>{
          const type = romanceTypeInfo(c.romanceType);
          return `
          <div class="pixel-panel" style="margin-bottom:0;">
            <div class="flex-between">
              <div><div style="font-weight:800; font-size:13px;">${c.name}</div><div class="section-sub" style="margin:2px 0 0;">${type.icon} ${type.label} · ${c.compatibility}% compatibility</div></div>
              <button class="pbtn small gold" data-pick-candidate="${i}">Choose</button>
            </div>
            <div class="section-sub" style="margin-top:6px;">${type.bio}</div>
          </div>
        `;}).join('')}
        <button class="pbtn full" id="btn-skip-candidates">👋 Not tonight</button>
      </div>
    `);
    // Override the default close-button behavior (which would otherwise
    // just dismiss the modal and leave s.pendingRomanceCandidates dangling)
    // so dismissing via the X does the same cleanup as "Not tonight".
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.onclick = ()=>{
      s.pendingRomanceCandidates = null;
      this.closeModal();
      this.saveState();
    };
    if(this.activeModal) this.activeModal.onclick = (e)=>{
      if(e.target===this.activeModal){ s.pendingRomanceCandidates = null; this.closeModal(); this.saveState(); }
    };
    document.querySelectorAll('[data-pick-candidate]').forEach(btn=>{
      btn.onclick = ()=>{
        const c = candidates[parseInt(btn.dataset.pickCandidate)];
        s.metPartner = c;
        s.pendingRomanceCandidates = null;
        this.toast(`✨ You exchange numbers with ${c.name}!`);
        this.pushNews(`✨ ${s.player.name} was spotted with a new face, ${c.name}, after a night out.`);
        this.closeModal();
        this.saveState();
        this.renderMetSomeoneModal();
      };
    });
    document.getElementById('btn-skip-candidates').onclick = ()=>{
      s.pendingRomanceCandidates = null;
      this.toast('A nice night out, nothing more.');
      this.closeModal();
      this.saveState();
    };
  },

  renderMetSomeoneModal(){
    const s = this.state; const person = s.metPartner;
    if(!person) return;
    this.openModal(`
      ${this.modalHeader('New Connection')}
      <div class="pixel-panel" style="text-align:center;">
        <div style="font-size:32px;">✨</div>
        <div style="font-weight:800; font-size:14px; margin-top:4px;">${person.name}</div>
        <div class="section-sub">You hit it off right away.</div>
      </div>
      <div class="stack-8">
        <button class="pbtn full gold" id="btn-followup-yes">💬 Ask to see them again</button>
        <button class="pbtn full" id="btn-followup-no">👋 Leave it as a nice memory</button>
      </div>
    `);
    this.wireModalClose();
    document.getElementById('btn-followup-yes').onclick = ()=>{
      person.romance.spark = clamp(person.romance.spark + randInt(20,30), 0, 100);
      if(person.romance.spark >= 70){
        person.romance.status = 'dating';
        this.toast(`💞 You and ${person.name} are officially seeing each other!`);
        this.pushNews(`💞 ${s.player.name} is now dating ${person.name}.`);
        this.startDatingMilestone(person.name);
      } else {
        this.toast(`You exchange numbers with ${person.name}. Keep it going in Relationships → Talk.`);
      }
      this.closeModal();
      this.saveState();
    };
    document.getElementById('btn-followup-no').onclick = ()=>{
      s.metPartner = null;
      this.toast('A nice memory, nothing more.');
      this.closeModal();
      this.saveState();
    };
  },


  /* ---------------- MEDIA ---------------- */
  /* Interview questions are now contextual rather than one fixed pool:
     - Race-result questions only appear right after a race (uses the last
       result if available)
     - Rival-baiting questions only appear if the player has an active rival
     - Sponsor questions only appear if the player has signed sponsors
     - A generic pool always available as a fallback/filler
     This gives genuinely more variety over a career instead of cycling the
     same 4 questions regardless of what's actually happening. */
  renderMediaModal(){
    const s = this.state; const p = s.player;
    const journalist = s.npcRoster.find(n=>n.role==='Journalist');
    const hasHistory = journalist.relationship.memories.length>0;
    const rival = this.getRival ? this.getRival() : null;
    const lastRaceResult = s.lastRaceHeadline || null;

    const pools = [];

    if(lastRaceResult){
      // Tuning pass: the journalist's tone now depends on how well they know
      // the player (journalist.relationship.friendship), not a fixed question.
      // A poor result gets a harsher line from a journalist with low
      // friendship, and a much gentler one from a journalist who's built up
      // real rapport -- same effects/options underneath, just different
      // framing and, at low friendship on a bad result, one extra sharp option.
      const friendship = journalist.relationship.friendship||0;
      const wasPoorResult = lastRaceResult.dnf || (lastRaceResult.position && lastRaceResult.position>10);
      let reflectQ = `How do you reflect on your result at ${lastRaceResult.track}?`;
      if(wasPoorResult && friendship<30) reflectQ = `Some fans are already asking questions after ${lastRaceResult.track} — how do you respond to the criticism?`;
      else if(wasPoorResult && friendship>=70) reflectQ = `Tough weekend at ${lastRaceResult.track} — but you've earned the benefit of the doubt here. What happened?`;
      else if(!wasPoorResult && friendship>=70) reflectQ = `Great to see it pay off at ${lastRaceResult.track} — walk me through it?`;
      const reflectOptions = [
        {label:'Take full responsibility', effect:()=>{ journalist.relationship.trust=clamp(journalist.relationship.trust+4); }, result:'The press respects the accountability.', memory:'Took full responsibility for the last race result'},
        {label:'Focus on the positives', effect:()=>{ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence+3); }, result:'A confident, upbeat spin.', memory:'Focused on the positives from the last race'},
        {label:'Blame the car', effect:()=>{ this.adjustTeamMorale(p.teamId, -5); p.mediaReputation=clamp(p.mediaReputation-2,0,100); }, result:'The garage doesn\'t love hearing this.', memory:'Publicly blamed the car for the result'},
      ];
      if(wasPoorResult && friendship<30){
        reflectOptions.push({label:'Push back on the criticism', effect:()=>{ journalist.relationship.friendship=clamp(journalist.relationship.friendship-3); p.attributes.mental.pressure=clamp(p.attributes.mental.pressure+3); }, result:'Feisty response — not everyone will love it.', memory:'Pushed back hard against media criticism'});
      }
      pools.push({q:reflectQ, options:reflectOptions});
    }

    if(rival){
      pools.push({q:`${rival.name} has been getting the better of some battles lately — your response?`, options:[
        {label:'Respectful praise', effect:()=>{ rival.respect = clamp((rival.respect||50)+5); }, result:`${rival.name} appreciates the respect.`, memory:`Gave respectful praise to ${rival.name} in an interview`},
        {label:'Fire back with confidence', effect:()=>{ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence+4); rival.rivalryLevel=clamp((rival.rivalryLevel||0)+8,0,100); }, result:'Bold words — the rivalry heats up!', memory:`Fired back at ${rival.name} in the press`},
        {label:'Downplay the rivalry', effect:()=>{}, result:'You keep things diplomatic.', memory:'Downplayed the rivalry with the press'},
      ]});
      pools.push({q:`Some fans are calling this the best rivalry on the grid right now. Thoughts on ${rival.name}?`, options:[
        {label:'"They push me to be better"', effect:()=>{ p.fanPopularity=clamp(p.fanPopularity+3,0,999); rival.respect=clamp((rival.respect||50)+3); }, result:'A classy answer fans love.', memory:`Called ${rival.name} a positive influence`},
        {label:'"I want to beat them more than anyone"', effect:()=>{ rival.rivalryLevel=clamp((rival.rivalryLevel||0)+6,0,100); p.mediaReputation=clamp(p.mediaReputation+2,0,100); }, result:'Headlines write themselves.', memory:`Declared wanting to beat ${rival.name} more than anyone`},
      ]});
    }

    if(p.sponsors && p.sponsors.length){
      const sp = pick(p.sponsors);
      pools.push({q:`How's the partnership with ${sp.name} going?`, options:[
        {label:'Glowing praise', effect:()=>{ p.mediaReputation=clamp(p.mediaReputation+3,0,100); }, result:`${sp.name} will be thrilled to hear that.`, memory:`Praised the partnership with ${sp.name}`},
        {label:'Professional but brief', effect:()=>{}, result:'Short, safe, professional.', memory:`Kept comments about ${sp.name} brief`},
      ]});
    }

    // Generic fallback pool — always available
    pools.push({q:'How do you rate your season so far?', options:[
      {label:'Confident answer', effect:()=>{ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence+3); }, result:'Fans love the confidence!', memory:'Gave a confident, upbeat answer'},
      {label:'Humble answer', effect:()=>{ p.mediaReputation=clamp(p.mediaReputation+3,0,100); }, result:'The press appreciates it.', memory:'Stayed humble under questioning'},
      {label:'Credit the team', effect:()=>{ this.adjustTeamMorale(p.teamId, 4); }, result:'Team morale improves.', memory:'Gave the team credit publicly'},
    ]});
    pools.push({q:'Any message for the fans this weekend?', options:[
      {label:'Heartfelt thank-you', effect:()=>{ p.fanPopularity=clamp(p.fanPopularity+4,0,999); }, result:'Popularity +4!', memory:'Thanked the fans warmly'},
      {label:'Promise a big result', effect:()=>{ p.attributes.mental.pressure=clamp(p.attributes.mental.pressure+4); }, result:'Bold words raise the pressure.', memory:'Made a bold public promise'},
      {label:'Keep it brief', effect:()=>{}, result:'Short and professional.', memory:'Kept it short and professional'},
    ]});
    pools.push({q:'What do you make of the rumors linking you to a rival team?', options:[
      {label:'Deny it firmly', effect:()=>{ journalist.relationship.trust = clamp(journalist.relationship.trust+3); }, result:'A firm, clear denial. Trust improves.', memory:'Firmly denied transfer rumors'},
      {label:'Stay coy', effect:()=>{ p.mediaReputation=clamp(p.mediaReputation-2,0,100); }, result:'Speculation grows.', memory:'Stayed coy about their future'},
      {label:'"No comment"', effect:()=>{}, result:'You dodge the question entirely.', memory:'Refused to comment on rumors'},
    ]});
    if(hasHistory){
      pools.push({q:`Last time we spoke you mentioned ${journalist.relationship.memories[0].text.toLowerCase()} — any update?`, options:[
        {label:'Give an honest update', effect:()=>{ journalist.relationship.friendship=clamp(journalist.relationship.friendship+5); }, result:'The journalist appreciates the openness.', memory:'Gave an honest, open update'},
        {label:'Change the subject', effect:()=>{}, result:'You steer the conversation elsewhere.', memory:'Deflected the follow-up question'},
      ]});
    }

    const q = pick(pools);
    this.openModal(`
      ${this.modalHeader('Press Conference')}
      <div class="section-sub" style="margin-bottom:8px;">${journalist.name} · ${journalist.role}${hasHistory ? ' · knows you well' : ''}</div>
      <div class="pixel-panel"><div style="font-weight:800;">"${q.q}"</div></div>
      <div class="stack-8">
        ${q.options.map((o,i)=>`<button class="pbtn full" data-opt="${i}">${o.label}</button>`).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-opt]').forEach(btn=>{
      btn.onclick = ()=>{
        const o = q.options[parseInt(btn.dataset.opt)];
        // Media facility bonus: a higher Media level makes the press team
        // better at spinning good answers into real reputation gains --
        // scales any POSITIVE mediaReputation change from this choice by up
        // to +60% at Lv.5 (negative/neutral outcomes are never touched, so
        // this can only help, never punish a bad answer harder). This is
        // FACILITY_EFFECTS.media's "Boosts media reputation gains" promise,
        // now an actual mechanical effect instead of flavor text.
        const repBefore = p.mediaReputation;
        o.effect();
        const repDelta = p.mediaReputation - repBefore;
        if(repDelta>0){
          const mediaBonus = 1 + (this.state.facilities.media-1)*0.15;
          p.mediaReputation = clamp(repBefore + repDelta*mediaBonus, 0, 100);
        }
        journalist.relationship.memories.unshift({text:o.memory, season:s.season, week:s.week});
        if(journalist.relationship.memories.length>10) journalist.relationship.memories.pop();
        this.toast(o.result);
        this.closeModal();
        this.saveState();
        this.rerenderCurrentScreen();
      };
    });
  },

  checkSponsorTierUnlocks(){
    const s = this.state; const p = s.player;
    if(!p.unlockedSponsorTiers) p.unlockedSponsorTiers = [1];
    [2,3,4].forEach(tier=>{
      if(!p.unlockedSponsorTiers.includes(tier) && sponsorTierUnlocked(tier, p.careerStats, p)){
        p.unlockedSponsorTiers.push(tier);
        const newSponsors = SPONSOR_POOL.filter(sp=>sp.tier===tier);
        this.toast(`🤝 New prestige sponsors are interested in ${p.name}!`);
        this.pushNews(`🤝 ${p.name}'s results have caught the eye of bigger sponsors: ${newSponsors.map(s=>s.name).join(', ')}.`);
      }
    });
  },

  /* ---------------- SPONSORS ----------------
     Sponsors belong to the player object (p.sponsors), not the team --
     they're personal endorsement deals, so they always follow the driver
     through any team change (see rebalanceGridForTeamChange call sites in
     app_screens.js: neither switch path touches p.sponsors). Each deal now
     tracks goalsCompleted (0-10) toward becoming a permanent partner, and
     pay grows with a loyalty raise the longer the deal has run. */
  renderSponsorsModal(){
    const s = this.state; const p = s.player;
    const unlockedPool = SPONSOR_POOL.filter(sp=>sponsorTierUnlocked(sp.tier, p.careerStats, p));
    const available = unlockedPool.filter(sp=>!p.sponsors.find(m=>m.name===sp.name)).slice(0,4);
    const locked = SPONSOR_POOL.filter(sp=>!sponsorTierUnlocked(sp.tier, p.careerStats, p));
    this.openModal(`
      ${this.modalHeader('Sponsors')}
      <div class="section-sub" style="margin:0 0 10px;">Sponsors are personal deals — they stay with you if you switch teams.</div>
      <div class="section-title" style="font-size:10px;">Your Deals</div>
      ${p.sponsors.length===0 ? `<div class="empty-state"><div class="ic">🤝</div>No sponsors yet. Sign one below for extra income and bonus goals.</div>` :
        p.sponsors.map(sp=>{
          const loyaltyPct = Math.round(((sp._loyaltyMult||1)-1)*100);
          const goals = sp.goalsCompleted||0;
          return `
          <div class="pixel-panel" style="margin-bottom:8px;">
            <div class="flex-between">
              <div><div style="font-weight:800;">${sp.name}</div><div class="section-sub" style="margin:2px 0 0;">${sp.type} · +$${(sp.pay*1.2*(sp._loyaltyMult||1)).toFixed(1)}M per race${loyaltyPct>0?` <span style="color:#2a8a5c;">(+${loyaltyPct}% loyalty)</span>`:''}</div></div>
              <span class="chip ${sp.permanent?'mint':'gold'}">${sp.permanent?'🌟 Permanent':`${goals}/10`}</span>
            </div>
            ${sp.permanent
              ? `<div class="section-sub" style="margin-top:6px;">Permanent partner — no goals left, steady bonus pay every race.</div>`
              : `<div class="section-sub" style="margin-top:6px;">🎯 ${this.sponsorGoalText(sp)}</div>${this.renderPixelBar(goals*10,'confidence',5)}${sp.lastGoalSeason?`<div class="section-sub" style="margin-top:4px; font-size:8px;">(last goal: Year ${seasonNumToYear(s,sp.lastGoalSeason)}, Week ${sp.lastGoalWeek})</div>`:''}`}
          </div>
        `;}).join('')}
      <div class="section-title" style="font-size:10px; margin-top:14px;">Available</div>
      <div class="stack-8">
        ${available.map(sp=>`
          <div class="pixel-panel" style="margin-bottom:0;">
            <div class="flex-between">
              <div><div style="font-weight:800;">${sp.name}</div><div class="section-sub" style="margin:2px 0 0;">${sp.type} · ${sp.trait}</div></div>
              <button class="pbtn small gold" data-sign="${sp.name}">Sign (+$${sp.pay.toFixed(1)}M)</button>
            </div>
          </div>
        `).join('')}
        ${available.length===0 ? `<div class="section-sub">No new offers right now — check back after your next race.</div>` : ''}
      </div>
      ${locked.length ? `
        <div class="section-title" style="font-size:10px; margin-top:14px;">🔒 Prestige Partners</div>
        <div class="stack-8">
          ${locked.map(sp=>`
            <div class="pixel-panel" style="margin-bottom:0; opacity:0.55;">
              <div style="font-weight:800;">${sp.name} <span style="font-size:9px; color:var(--ink-soft); font-weight:600;">+$${sp.pay.toFixed(1)}M</span></div>
              <div class="section-sub" style="margin-top:2px;">${sp.type} · 🔒 ${sp.unlockText}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-sign]').forEach(btn=>{
      btn.onclick = ()=>{
        const base = SPONSOR_POOL.find(x=>x.name===btn.dataset.sign);
        const sp = {...base, goalsCompleted:0, permanent:false, signedSeason: s.season};
        p.sponsors.push(sp);
        p.money = Math.round((p.money + sp.pay)*10)/10;
        p.sponsorHistory.push({name:sp.name, season:s.season});
        this.toast(`Signed with ${sp.name}! +$${sp.pay.toFixed(1)}M`);

        p.journal.unshift({season:s.season, week:s.week, title:'New Sponsor', text:`Signed a deal with ${sp.name} (${sp.type}).`, icon:'🤝'});
        this.closeModal();
        this.saveState();
        this.showFirstTimeExplainer('seenSponsorExplainer', '🤝', 'How Sponsor Deals Work',
          "Each sponsor gives you a goal — hit it for a payout and a new one. Hit 10 goals and they become a Permanent partner. Sponsors stay with you even if you switch teams.",
          ()=> this.rerenderCurrentScreen());
      };
    });
  },


  /* Sponsor goals now repeat: each sponsor tracks a running goalsCompleted
     count (0-10). Every time the CURRENT goal is met, goalsCompleted+1 and a
     small bonus pays out, then a fresh goal of the same flavor (same
     brand-personality check) is issued so there's always something active.
     After the 10th goal, the sponsor converts to a permanent partner (see
     checkSponsorObjectives below) and stops needing goals at all. */
  sponsorGoalText(sponsor){
    const goalMult = getDifficultySettings(this.state).sponsorGoalMult;
    const attackTarget = Math.max(1, Math.round(3*goalMult));
    const streakTarget = Math.max(1, Math.round(3*goalMult));
    const topNCutoff = clamp(Math.round(5/goalMult), 1, 10);
    const popTarget = Math.round(50*goalMult);
    if(sponsor.needsClean) return 'Finish a race with zero DNFs this season for a bonus.';
    if(sponsor.needsAggression) return `Record ${attackTarget} Attack-strategy race${attackTarget===1?'':'s'} for a bonus.`;
    if(sponsor.type==='Watchmaker') return `Finish in the points ${streakTarget} race${streakTarget===1?'':'s'} in a row.`;
    if(sponsor.needsPopularity) return `Reach ${popTarget}+ Fan Popularity for a bonus.`;
    return `Finish a race weekend in the Top ${topNCutoff}.`;
  },
  // kept for compatibility with existing sign-up call sites
  pickSponsorObjective(sponsor){ return this.sponsorGoalText(sponsor); },

  /* Called after each race to check + pay out sponsor goals, advance the
     10-goal partnership track, and pay recurring per-race income (including
     a loyalty raise the longer a sponsor has stuck with the driver). */
  checkSponsorObjectives(pos, dnf, approach){
    const s = this.state; const p = s.player;
    let recurringIncome = 0;
    p.sponsors.forEach(sp=>{
      // Loyalty raise: pay scales up the longer this sponsor has stuck with
      // the driver, regardless of team -- base +4% per season signed, and a
      // higher Hospitality facility level accelerates that raise (up to
      // +6%/season at Lv.5), still capped at +40% total so a single sponsor
      // never spirals unbounded. This is FACILITY_EFFECTS.hospitality's
      // "Improves sponsor relationships" promise, now an actual mechanical
      // effect instead of flavor text.
      const seasonsWithSponsor = Math.max(0, (s.season - (sp.signedSeason||s.season)));
      const hospitalityLevel = this.state.facilities.hospitality||1;
      const loyaltyRatePerSeason = 0.04 + (hospitalityLevel-1)*0.005;
      const loyaltyMult = 1 + clamp(seasonsWithSponsor * loyaltyRatePerSeason, 0, 0.4);
      sp._loyaltyMult = Math.round(loyaltyMult*100)/100;
      recurringIncome += sp.pay*1.2*loyaltyMult;

      if(sp.permanent) return; // no goals left to chase -- pure recurring income now

      // sponsorGoalMult (DIFFICULTY_SETTINGS): Casual 0.75x, Standard 1x,
      // Realistic 1.3x -- scales how many attack-races/streak-races are
      // needed and how strict the "finish in the points" cutoff is. This
      // was declared per-difficulty from the start but never actually read
      // anywhere; goals were exactly as hard on Casual as on Realistic.
      const goalMult = getDifficultySettings(s).sponsorGoalMult;
      const attackTarget = Math.max(1, Math.round(3*goalMult));
      const streakTarget = Math.max(1, Math.round(3*goalMult));
      const topNCutoff = clamp(Math.round(5/goalMult), 1, 10); // harder difficulty = smaller (stricter) top-N cutoff
      let done = false;
      if(sp.needsClean){ if(!dnf && p.careerStats.dnfs===0) done = true; }
      else if(sp.needsAggression){ sp._attackCount = (sp._attackCount||0) + (approach==='attack'?1:0); if(sp._attackCount>=attackTarget) done = true; }
      else if(sp.needsPopularity){ if(p.fanPopularity>=50*goalMult) done = true; }
      else if(sp.type==='Watchmaker'){ sp._streak = (!dnf && pos && pos<=10) ? (sp._streak||0)+1 : 0; if(sp._streak>=streakTarget) done = true; }
      else { if(!dnf && pos && pos<=topNCutoff) done = true; }

      if(done){
        sp.goalsCompleted = (sp.goalsCompleted||0) + 1;
        sp._attackCount = 0; sp._streak = 0; // reset per-goal progress counters for the next goal
        sp.lastGoalSeason = s.season; sp.lastGoalWeek = s.week; // for "(last goal: Year N, Week W)" display in the Sponsors modal
        const bonus = Math.round(sp.pay*2*loyaltyMult*10)/10;
        p.money = Math.round((p.money+bonus)*10)/10;
        const flavorLine = sponsorGoalLine(sp.type);
        if(sp.goalsCompleted >= 10){
          sp.permanent = true;
          this.toast(`🌟 ${sp.name} is now a permanent partner! Bonus pay locked in every race.`);
          this.pushNews(`🌟 ${p.name} and ${sp.name} cement a long-term partnership after 10 completed goals together.`);
          p.journal.unshift({season:s.season, week:s.week, title:'Permanent Partner', text:`${sp.name} becomes a permanent sponsor after 10 completed goals -- no more objectives needed, just steady bonus pay.`, icon:'🌟'});
        } else {
          this.toast(`🎯 Sponsor goal complete (${sp.goalsCompleted}/10)! ${sp.name} pays a $${bonus}M bonus.`);
          this.pushNews(`🎯 ${p.name} completes a bonus goal for ${sp.name} (${sp.goalsCompleted}/10 toward a permanent deal).`);
          if(flavorLine) p.journal.unshift({season:s.season, week:s.week, title:`${sp.name} Check-In`, text:`"${flavorLine}"`, icon:'🎯'});
        }
      }
    });
    if(recurringIncome>0){
      p.money = Math.round((p.money+recurringIncome)*10)/10;
    }
    return recurringIncome;
  },

});

Object.assign(App, {

  getTeam(teamId){ return TEAMS.find(t=>t.id===teamId); },
  getCurrentRound(){ return this.state.calendar.rounds[this.state.calendar.currentRound]; },
  getCurrentTrack(){ const r = this.getCurrentRound(); return r ? TRACKS.find(t=>t.id===r.trackId) : null; },
  dayName(){ return DAYS_OF_WEEK[this.state.dayIndex]; },

  moodEmoji(mood){
    if(mood>=80) return '😄';
    if(mood>=60) return '🙂';
    if(mood>=40) return '😐';
    if(mood>=20) return '😕';
    return '😣';
  },

  driverSprite(p){
    return p.gender==='F' ? '👩‍🏎️' : '🧑‍🏎️';
  },

  standingPosition(driverId){
    const s = this.state;
    const ids = [...s.grid.map(d=>d.id), s.player.id];
    const sorted = ids.map(id=>({id, pts: s.standings[id]||0})).sort((a,b)=>b.pts-a.pts);
    return sorted.findIndex(x=>x.id===driverId)+1;
  },

  updateStatusStrip(){
    const s = this.state; const p = s.player;
    document.getElementById('status-strip').innerHTML = `
      <span class="stat-row">
        <span class="stat-chip"><span class="ic">💰</span>$${p.money}M</span>

        <span class="stat-chip"><span class="ic">🏁</span>P${this.standingPosition('player')}</span>

      <span class="day-chip">${this.dayName().slice(0,3).toUpperCase()} · Y${s.season - (s.careerStartSeason||s.season) + 1}</span>

    // is still kept in newsFeed (for Journal-style contexts elsewhere) but a
    // long scrolling list read at a fixed pace becomes unreadable as more
    // accumulates over a career, so we cap what's actually displayed here.
    const recentNews = s.newsFeed.slice(0, 5);
    tickerInner.innerHTML = recentNews.map(i=>`<span>${i}</span>`).join('');
    // Scale scroll duration to content length so reading speed (px/sec)
    // stays roughly constant instead of a fixed 22s having to rush through
    // more text as the list grows toward its cap.
    requestAnimationFrame(()=>{
      const textWidth = tickerInner.scrollWidth;
      const duration = clamp(textWidth / 55, 10, 30); // ~55px/sec reading pace, bounded to a sane range
