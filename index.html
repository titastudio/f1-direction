      <div class="section-sub" style="margin:0;">Energy: ${Math.round(p.attributes.lifestyle.energy)}/100 · Money: $${p.money.toFixed(1)}M</div>
      <div class="section-sub" style="margin:2px 0 10px;">Better facilities mean stronger gains, but pricier sessions too.</div>
      <div class="stack-8">
        ${PROGRAMS.map(tp=>{
          const price = this.trainingMoneyCost(tp);
          const canAfford = p.attributes.lifestyle.energy>=tp.cost && p.money>=price;
          return `
          <button class="pbtn full" data-train="${tp.id}" style="justify-content:flex-start; text-align:left;" ${canAfford?'':'disabled'}>
            ${tp.icon} ${tp.label} <span style="margin-left:auto; font-size:8px; color:var(--ink-soft);">-${tp.cost} nrg · -$${price.toFixed(1)}M</span>
          </button>
        `;}).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-train]').forEach(btn=>{
      btn.onclick = ()=>{
        const tp = PROGRAMS.find(x=>x.id===btn.dataset.train);
        this.doTraining(tp);
      };

  /* Level 1 = base moneyCost; each facility level above 1 adds 12% to the
     price, same shape as the existing +15%-per-level gain bonuses so cost
     and benefit grow together instead of facilities being a pure discount. */
  trainingMoneyCost(tp){
    const level = this.state.facilities[tp.facility] || 1;
    return Math.round(tp.moneyCost * (1 + (level-1)*0.12) * 100) / 100;
  },

  doTraining(tp){
    const p = this.state.player;
    const price = this.trainingMoneyCost(tp);
    if(p.attributes.lifestyle.energy < tp.cost){ this.toast('Too tired to train!'); return; }
    if(p.money < price){ this.toast('Not enough money for that session.'); return; }
    p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy - tp.cost);
    p.money = Math.round((p.money - price)*10)/10;
    const target = tp.group==='driving' ? p.attributes.driving : tp.group==='mental' ? p.attributes.mental : p.attributes.lifestyle;
    const before = target[tp.stat];
    const efficiency = clamp(1 - (before-70)/60, 0.25, 1);
    const simBonus = 1 + (this.state.facilities.simulator-1)*0.15;
    const gymBonus = 1 + (this.state.facilities.gym-1)*0.15;
    const bonus = tp.group==='driving' ? simBonus : tp.stat==='fitness' ? gymBonus : 1;
    const gain = Math.max(1, Math.round(2 * efficiency * bonus));
    target[tp.stat] = clamp(before + gain, 0, 99);
    p.attributes.lifestyle.stress = clamp(p.attributes.lifestyle.stress + 3);
    // Simulator-based driving programs also build the crew's read on the
    // player's personal setup tendency (feeds setupHintConfidence).
    if(tp.id.startsWith('sim_')){
      p.setupTrainingSessions = (p.setupTrainingSessions||0) + 1;
    }
    this.toast(`${tp.icon} ${tp.label} complete! +${gain} (-$${price.toFixed(1)}M)`);
    this.closeModal();
    this.saveState();
    this.rerenderCurrentScreen();
  },

  /* Rivals (grid drivers) store relationship-adjacent data directly on the
     driver object (memories, rivalryLevel, respect) rather than nested under
     a `.relationship` object like NPCs do, since that shape is also read by
     the race/rivalry-tracking code elsewhere. This adapter lets a rival be
     talked to and even romanced through the same interaction patterns as an
     NPC, without reshaping the shared rival data model. */
  renderRivalTalkModal(rivalId){
    const s = this.state; const p = s.player;
    const d = s.grid.find(x=>x.id===rivalId);
    if(!d) return;
    if(!d.romance) d.romance = { status:'none', spark:0 };
    // Wrap the rival's flat fields in a NPC-shaped view so getRomanceLinesFor
    // (which expects n.relationship.friendship/.affection etc.) works
    // unmodified. `romance` and `memories` are shared object references (not
    // copies) so mutations inside getRomanceLinesFor persist correctly onto
    // the real driver; `respectMeter` is a small persisted stand-in for
    // affection so that value isn't silently dropped either.
    if(d.respectMeter===undefined) d.respectMeter = 30;
    const relationshipView = { friendship: d.respect||50, get affection(){ return d.respectMeter; }, set affection(v){ d.respectMeter = v; }, memories: d.memories };
    const npcShim = { ...d, role:'Rival Driver', personality: d.drivingStyle||'Competitive', relationship: relationshipView };

    const genericLines = [
      {label:'Respectful chat after the race', effect:()=>{ d.respect = clamp((d.respect||50)+5); }, result:`${d.name} appreciates the sportsmanship.`, memory:'Had a respectful post-race chat'},
      {label:'Compare notes on the track', effect:()=>{ p.attributes.mental.focus = clamp(p.attributes.mental.focus+2); d.respect = clamp((d.respect||50)+2); }, result:'A useful, focused exchange.', memory:'Compared notes on the track'},
    ];
    const lines = [...genericLines, ...this.getRomanceLinesFor(npcShim)];

    this.openModal(`
      ${this.modalHeader('Talk to '+d.name)}
      <div class="section-sub">${TEAMS.find(t=>t.id===d.teamId).name} · ${d.drivingStyle||'Competitive'}</div>
      <div class="stack-8">
        ${lines.map((l,i)=>`<button class="pbtn full" data-rline="${i}">${l.label}</button>`).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-rline]').forEach(btn=>{
      btn.onclick = ()=>{
        const l = lines[parseInt(btn.dataset.rline)];
        l.effect();
        d.memories.unshift({text:l.memory||l.label, season:this.state.season, week:this.state.week});
        if(d.memories.length>10) d.memories.pop();
        this.toast(l.result);
        this.saveState();
        this.rerenderCurrentScreen();
        this.renderRelationshipsModal();
      };
    });
  },

  getCurrentPartner(){
    const s = this.state;
    const npcPartner = s.npcRoster.find(n=>n.romance && n.romance.status==='dating');
    if(npcPartner) return npcPartner;
    const rivalPartner = s.grid.find(d=>d.romance && d.romance.status==='dating');
    if(rivalPartner) return rivalPartner;
    if(s.metPartner && s.metPartner.romance && s.metPartner.romance.status==='dating') return s.metPartner;
    return null;
  },

  /* Applies the current partner's passive romanceType perk once per race --
     only s.metPartner-sourced partners carry a romanceType (NPC staff and
     rival-driver romances predate this system and don't have one), so this
     is a no-op for those without changing their existing behavior at all.
     Small, per-race, stacks with everything else already touching that
     stat -- see ROMANCE_TYPES in data.js for the exact amounts. */
  applyRomancePartnerPerk(){
    const s = this.state; const p = s.player;
    const partner = this.getCurrentPartner();
    if(!partner || !partner.romanceType) return;
    const type = romanceTypeInfo(partner.romanceType);
    if(!type || !type.perk) return;
    const {stat, amount} = type.perk;
    if(stat==='fanPopularity') p.fanPopularity = Math.max(0, p.fanPopularity + amount);
    else if(stat==='mediaReputation') p.mediaReputation = clamp(p.mediaReputation + amount, 0, 100);
    else if(stat==='stress') p.attributes.lifestyle.stress = clamp(p.attributes.lifestyle.stress + amount);
    else if(stat==='mood') p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood + amount);
    else if(stat==='energy') p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy + amount);
    else if(stat==='confidence') p.attributes.mental.confidence = clamp(p.attributes.mental.confidence + amount);
  },

  renderPixelBar(val, cls, segs){
    segs = segs || 10;
    const on = Math.round(clamp(val,0,100)/100*segs);
    let html = '<div class="pixel-bar-track">';
    for(let i=0;i<segs;i++){ html += `<div class="pixel-bar-seg ${i<on?'on '+cls:''}"></div>`; }
    html += '</div>';
    return html;
  },

  renderTalkModal(npcId, isMetPartner){
    const s = this.state;
    const n = isMetPartner ? s.metPartner : s.npcRoster.find(x=>x.id===npcId);
    const p = this.state.player;
    const lines = isMetPartner ? this.getRomanceLinesFor(n) : this.getTalkLinesForRole(n);
    this.openModal(`
      ${this.modalHeader('Talk to '+n.name)}
      <div class="section-sub">${n.role} · ${n.personality}</div>
      <div class="stack-8">
        ${lines.map((l,i)=>`<button class="pbtn full" data-line="${i}">${l.label}</button>`).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-line]').forEach(btn=>{
      btn.onclick = ()=>{
        const l = lines[parseInt(btn.dataset.line)];
        l.effect();
        n.relationship.memories.unshift({text:l.memory||l.label, season:this.state.season, week:this.state.week});
        if(n.relationship.memories.length>10) n.relationship.memories.pop();
        this.toast(l.result);
        this.saveState();
        this.rerenderCurrentScreen();
        // Return to a freshly-rendered Relationships modal (rather than just
        // closing) so the friendship/spark bar the player just changed is
        // visibly updated immediately, instead of silently updating in state
        // with no visual confirmation until the modal is reopened manually.
        this.renderRelationshipsModal();
      };
    });
  },

        {label:'Talk about managing stress', effect:()=>{ p.attributes.lifestyle.stress=clamp(p.attributes.lifestyle.stress-8); }, result:'Some helpful advice. Stress -8.', memory:'Talked about managing stress'},
      ],
      'Journalist': [
        {label:'Off-the-record chat', effect:()=>{ n.relationship.trust=clamp(n.relationship.trust+5); }, result:'A relaxed, honest conversation.', memory:'Had an off-the-record chat'},
        {label:'Ask what the paddock is saying', effect:()=>{ n.relationship.friendship=clamp(n.relationship.friendship+3); }, result:`${n.name} shares some paddock gossip with you.`, memory:'Asked about paddock gossip'},
      ],
      'Best Friend': [
        {label:'Grab a meal together', effect:()=>{ p.attributes.lifestyle.mood=clamp(p.attributes.lifestyle.mood+8); n.relationship.affection=clamp(n.relationship.affection+6); }, result:'A great catch-up. Mood +8.', memory:'Grabbed a meal together'},
        {label:'Vent about the season', effect:()=>{ p.attributes.lifestyle.stress=clamp(p.attributes.lifestyle.stress-10); n.relationship.friendship=clamp(n.relationship.friendship+5); }, result:'It feels good to talk it out. Stress -10.', memory:'Vented about the season'},
      ],

  /* ---------------- ROMANCE ----------------
     Heterosexual pairing model per product spec: eligible partners are NPCs/
     rivals of the opposite gender to the player. Kept intentionally light —
     no explicit content, just a rising "spark" meter through Flirt lines
     that eventually can become "dating," with small, tasteful effects
     (mood/stress) once together. Team Principal is included as an eligible
     partner like anyone else; nothing in the brief excluded them.
     A player can only be "dating" one person at a time — flirting with
     someone else while dating is allowed narratively (people are messy) but
     won't start a second relationship; it just risks the current one if
     taken too far (kept simple: it does nothing extra for now, not
     penalized, to avoid overcomplicating this pass). */
  isRomanceEligible(person){
    const p = this.state.player;
    if(!person.gender) return false;
    const wanted = p.gender==='F' ? 'M' : 'F';
    return person.gender === wanted;
  },

  startDatingMilestone(partnerName){
    const p = this.state.player;
    if(!p.milestones.includes('first_romance')){
      p.milestones.push('first_romance');
      this.toast(`🎉 ${p.name} finds love for the first time this career, with ${partnerName}!`);
      this.pushNews(`🎉 ${p.name} finds love for the first time this career, with ${partnerName}!`);
    }
  },

  getRomanceLinesFor(n){
    if(!this.isRomanceEligible(n)) return [];
    if(!n.romance) n.romance = { status:'none', spark:0 };
    const p = this.state.player;
    if(n.romance.status==='dating'){
      return [
        {label:'💞 Spend time together', effect:()=>{
          p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood+10);
          p.attributes.lifestyle.stress = clamp(p.attributes.lifestyle.stress-8);
          n.romance.spark = clamp(n.romance.spark+3, 0, 100);
        }, result:`A lovely time with ${n.name}. Mood +10, Stress -8.`, memory:`Spent quality time with ${n.name}`},
      ];
    }
    if(n.relationship.friendship < 40){
      return []; // not enough of a connection yet to flirt
    }
    return [
      {label:'💬 Flirt a little', effect:()=>{
        n.romance.spark = clamp((n.romance.spark||0) + randInt(6,14), 0, 100);
        n.relationship.affection = clamp(n.relationship.affection + 4);
        if(n.romance.spark >= 70 && !this.getCurrentPartner()){
          n.romance.status = 'dating';
          this.toast(`💞 ${n.name} says yes — you're officially seeing each other!`);
          this.pushNews(`💞 ${p.name} is now dating ${n.name}.`);
          this.startDatingMilestone(n.name);
        }
      }, result: n.romance.spark>=70 ? `Something clicked with ${n.name}!` : `A spark with ${n.name}... (${clamp((n.romance.spark||0),0,100)}/70)`, memory:`Flirted with ${n.name}`},
    ];
  },

  renderNightlifeModal(){

    const VENUES = [

  doNightlife(v){
    const s = this.state; const p = s.player;
    if(p.attributes.lifestyle.energy < v.cost){ this.toast('Too tired for a night out.'); return; }
    p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy - v.cost + 4); // a fun night still nets a little recovery
    p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood + v.mood);
    if(v.fans) p.fanPopularity = clamp(p.fanPopularity + v.fans, 0, 999);

    const hasPartner = this.getCurrentPartner();
    let metSomeone = false;
    if(!hasPartner && Math.random() < 0.35){
      const wanted = p.gender==='F' ? 'M' : 'F';
      // Surface 3 distinct candidates (different romance types + rolled
      // compatibility) instead of one random person, so there's a real
      // choice to make rather than a coin flip. Shuffle the finite
      // ROMANCE_TYPES list and take the first 3 -- bounded and guaranteed
      // to terminate regardless of RNG behavior, unlike a reject-and-retry
      // loop which could in principle spin forever if the RNG ever landed
      // on a degenerate sequence.
      const shuffledTypes = [...ROMANCE_TYPES].sort(()=>Math.random()-0.5).slice(0,3);
      const candidates = shuffledTypes.map(type=>generateRomanceCandidateOfType(type, wanted));
      s.pendingRomanceCandidates = candidates;
      metSomeone = true;
      this.toast(`✨ A few new faces caught your eye at the ${v.label.toLowerCase()}!`);
    } else {
      this.toast(`${v.icon} A fun night at the ${v.label}.`);
    }

    this.closeModal();
    this.saveState();
    this.rerenderCurrentScreen();
    if(metSomeone) this.renderRomanceCandidatesModal();
  },

  /* Presents the 3 rolled candidates side by side (name, type, bio,
     compatibility) and lets the player pick one to pursue -- the other two
     are simply not chosen, no rejection drama needed given the game's
     low-stakes tone. Picking sets s.metPartner (same field the rest of the
     romance flow already reads) and clears the other candidates. */
  renderRomanceCandidatesModal(){
    const s = this.state;
    const candidates = s.pendingRomanceCandidates||[];
    if(!candidates.length) return;
    this.openModal(`
      ${this.modalHeader('New Faces')}
      <div class="section-sub" style="margin:0 0 10px;">You hit it off with a few people tonight. Who do you want to get to know better?</div>
      <div class="stack-8">
        ${candidates.map((c,i)=>{
          const type = romanceTypeInfo(c.romanceType);
          return `
          <div class="pixel-panel" style="margin-bottom:0;">
            <div class="flex-between">
              <div><div style="font-weight:800; font-size:13px;">${c.name}</div><div class="section-sub" style="margin:2px 0 0;">${type.icon} ${type.label} · ${c.compatibility}% compatibility</div></div>
              <button class="pbtn small gold" data-pick-candidate="${i}">Choose</button>
            </div>
            <div class="section-sub" style="margin-top:6px;">${type.bio}</div>
          </div>
        `;}).join('')}
        <button class="pbtn full" id="btn-skip-candidates">👋 Not tonight</button>
      </div>
    `);
    // Override the default close-button behavior (which would otherwise
    // just dismiss the modal and leave s.pendingRomanceCandidates dangling)
    // so dismissing via the X does the same cleanup as "Not tonight".
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.onclick = ()=>{
      s.pendingRomanceCandidates = null;
      this.closeModal();
      this.saveState();
    };
    if(this.activeModal) this.activeModal.onclick = (e)=>{
      if(e.target===this.activeModal){ s.pendingRomanceCandidates = null; this.closeModal(); this.saveState(); }
    };
    document.querySelectorAll('[data-pick-candidate]').forEach(btn=>{
      btn.onclick = ()=>{
        const c = candidates[parseInt(btn.dataset.pickCandidate)];
        s.metPartner = c;
        s.pendingRomanceCandidates = null;
        this.toast(`✨ You exchange numbers with ${c.name}!`);
        this.pushNews(`✨ ${s.player.name} was spotted with a new face, ${c.name}, after a night out.`);
        this.closeModal();
        this.saveState();
        this.renderMetSomeoneModal();
      };
    });
    document.getElementById('btn-skip-candidates').onclick = ()=>{
      s.pendingRomanceCandidates = null;
      this.toast('A nice night out, nothing more.');
      this.closeModal();
      this.saveState();
    };
  },

  renderMetSomeoneModal(){
    const s = this.state; const person = s.metPartner;
    if(!person) return;
    this.openModal(`
      ${this.modalHeader('New Connection')}
      <div class="pixel-panel" style="text-align:center;">

  /* ---------------- MEDIA ---------------- */
  /* Interview questions are now contextual rather than one fixed pool:
     - Race-result questions only appear right after a race (uses the last
       result if available)
     - Rival-baiting questions only appear if the player has an active rival
     - Sponsor questions only appear if the player has signed sponsors
     - A generic pool always available as a fallback/filler
     This gives genuinely more variety over a career instead of cycling the
     same 4 questions regardless of what's actually happening. */
  renderMediaModal(){
    const s = this.state; const p = s.player;
    const journalist = s.npcRoster.find(n=>n.role==='Journalist');
    const hasHistory = journalist.relationship.memories.length>0;
    const rival = this.getRival ? this.getRival() : null;
    const lastRaceResult = s.lastRaceHeadline || null;

    const pools = [];

    if(lastRaceResult){
      // Tuning pass: the journalist's tone now depends on how well they know
      // the player (journalist.relationship.friendship), not a fixed question.
      // A poor result gets a harsher line from a journalist with low
      // friendship, and a much gentler one from a journalist who's built up
      // real rapport -- same effects/options underneath, just different
      // framing and, at low friendship on a bad result, one extra sharp option.
      const friendship = journalist.relationship.friendship||0;
      const wasPoorResult = lastRaceResult.dnf || (lastRaceResult.position && lastRaceResult.position>10);
      let reflectQ = `How do you reflect on your result at ${lastRaceResult.track}?`;
      if(wasPoorResult && friendship<30) reflectQ = `Some fans are already asking questions after ${lastRaceResult.track} — how do you respond to the criticism?`;
      else if(wasPoorResult && friendship>=70) reflectQ = `Tough weekend at ${lastRaceResult.track} — but you've earned the benefit of the doubt here. What happened?`;
      else if(!wasPoorResult && friendship>=70) reflectQ = `Great to see it pay off at ${lastRaceResult.track} — walk me through it?`;
      const reflectOptions = [
        {label:'Take full responsibility', effect:()=>{ journalist.relationship.trust=clamp(journalist.relationship.trust+4); }, result:'The press respects the accountability.', memory:'Took full responsibility for the last race result'},
        {label:'Focus on the positives', effect:()=>{ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence+3); }, result:'A confident, upbeat spin.', memory:'Focused on the positives from the last race'},
        {label:'Blame the car', effect:()=>{ this.adjustTeamMorale(p.teamId, -5); p.mediaReputation=clamp(p.mediaReputation-2,0,100); }, result:'The garage doesn\'t love hearing this.', memory:'Publicly blamed the car for the result'},
      ];
      if(wasPoorResult && friendship<30){
        reflectOptions.push({label:'Push back on the criticism', effect:()=>{ journalist.relationship.friendship=clamp(journalist.relationship.friendship-3); p.attributes.mental.pressure=clamp(p.attributes.mental.pressure+3); }, result:'Feisty response — not everyone will love it.', memory:'Pushed back hard against media criticism'});
      }
      pools.push({q:reflectQ, options:reflectOptions});
    }

    if(rival){
      pools.push({q:`${rival.name} has been getting the better of some battles lately — your response?`, options:[
        {label:'Respectful praise', effect:()=>{ rival.respect = clamp((rival.respect||50)+5); }, result:`${rival.name} appreciates the respect.`, memory:`Gave respectful praise to ${rival.name} in an interview`},
        {label:'Fire back with confidence', effect:()=>{ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence+4); rival.rivalryLevel=clamp((rival.rivalryLevel||0)+8,0,100); }, result:'Bold words — the rivalry heats up!', memory:`Fired back at ${rival.name} in the press`},
        {label:'Downplay the rivalry', effect:()=>{}, result:'You keep things diplomatic.', memory:'Downplayed the rivalry with the press'},
      ]});
      pools.push({q:`Some fans are calling this the best rivalry on the grid right now. Thoughts on ${rival.name}?`, options:[
        {label:'"They push me to be better"', effect:()=>{ p.fanPopularity=clamp(p.fanPopularity+3,0,999); rival.respect=clamp((rival.respect||50)+3); }, result:'A classy answer fans love.', memory:`Called ${rival.name} a positive influence`},
        {label:'"I want to beat them more than anyone"', effect:()=>{ rival.rivalryLevel=clamp((rival.rivalryLevel||0)+6,0,100); p.mediaReputation=clamp(p.mediaReputation+2,0,100); }, result:'Headlines write themselves.', memory:`Declared wanting to beat ${rival.name} more than anyone`},
      ]});
    }

    if(p.sponsors && p.sponsors.length){
      const sp = pick(p.sponsors);
      pools.push({q:`How's the partnership with ${sp.name} going?`, options:[
        {label:'Glowing praise', effect:()=>{ p.mediaReputation=clamp(p.mediaReputation+3,0,100); }, result:`${sp.name} will be thrilled to hear that.`, memory:`Praised the partnership with ${sp.name}`},
        {label:'Professional but brief', effect:()=>{}, result:'Short, safe, professional.', memory:`Kept comments about ${sp.name} brief`},
      ]});
    }

    // Generic fallback pool — always available
    pools.push({q:'How do you rate your season so far?', options:[
      {label:'Confident answer', effect:()=>{ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence+3); }, result:'Fans love the confidence!', memory:'Gave a confident, upbeat answer'},
      {label:'Humble answer', effect:()=>{ p.mediaReputation=clamp(p.mediaReputation+3,0,100); }, result:'The press appreciates it.', memory:'Stayed humble under questioning'},
      {label:'Credit the team', effect:()=>{ this.adjustTeamMorale(p.teamId, 4); }, result:'Team morale improves.', memory:'Gave the team credit publicly'},
    ]});
    pools.push({q:'Any message for the fans this weekend?', options:[
      {label:'Heartfelt thank-you', effect:()=>{ p.fanPopularity=clamp(p.fanPopularity+4,0,999); }, result:'Popularity +4!', memory:'Thanked the fans warmly'},
      {label:'Promise a big result', effect:()=>{ p.attributes.mental.pressure=clamp(p.attributes.mental.pressure+4); }, result:'Bold words raise the pressure.', memory:'Made a bold public promise'},
      {label:'Keep it brief', effect:()=>{}, result:'Short and professional.', memory:'Kept it short and professional'},
    ]});
    pools.push({q:'What do you make of the rumors linking you to a rival team?', options:[
      {label:'Deny it firmly', effect:()=>{ journalist.relationship.trust = clamp(journalist.relationship.trust+3); }, result:'A firm, clear denial. Trust improves.', memory:'Firmly denied transfer rumors'},
      {label:'Stay coy', effect:()=>{ p.mediaReputation=clamp(p.mediaReputation-2,0,100); }, result:'Speculation grows.', memory:'Stayed coy about their future'},
      {label:'"No comment"', effect:()=>{}, result:'You dodge the question entirely.', memory:'Refused to comment on rumors'},
    ]});
    if(hasHistory){
      pools.push({q:`Last time we spoke you mentioned ${journalist.relationship.memories[0].text.toLowerCase()} — any update?`, options:[
        {label:'Give an honest update', effect:()=>{ journalist.relationship.friendship=clamp(journalist.relationship.friendship+5); }, result:'The journalist appreciates the openness.', memory:'Gave an honest, open update'},
        {label:'Change the subject', effect:()=>{}, result:'You steer the conversation elsewhere.', memory:'Deflected the follow-up question'},
      ]});
    }

    const q = pick(pools);
    this.openModal(`
      ${this.modalHeader('Press Conference')}
      <div class="section-sub" style="margin-bottom:8px;">${journalist.name} · ${journalist.role}${hasHistory ? ' · knows you well' : ''}</div>
      <div class="pixel-panel"><div style="font-weight:800;">"${q.q}"</div></div>
      <div class="stack-8">
        ${q.options.map((o,i)=>`<button class="pbtn full" data-opt="${i}">${o.label}</button>`).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-opt]').forEach(btn=>{
      btn.onclick = ()=>{
        const o = q.options[parseInt(btn.dataset.opt)];
        // Media facility bonus: a higher Media level makes the press team
        // better at spinning good answers into real reputation gains --
        // scales any POSITIVE mediaReputation change from this choice by up
        // to +45% at Lv.5 (negative/neutral outcomes are never touched, so
        // this can only help, never punish a bad answer harder). This is
        // FACILITY_EFFECTS.media's "Boosts media reputation gains" promise,
        // now an actual mechanical effect instead of flavor text.
        const repBefore = p.mediaReputation;
        o.effect();
        const repDelta = p.mediaReputation - repBefore;
        if(repDelta>0){
          const mediaBonus = 1 + (this.state.facilities.media-1)*0.15;
          p.mediaReputation = clamp(repBefore + repDelta*mediaBonus, 0, 100);
        }
        journalist.relationship.memories.unshift({text:o.memory, season:s.season, week:s.week});
        if(journalist.relationship.memories.length>10) journalist.relationship.memories.pop();
        this.toast(o.result);
        this.closeModal();
        this.saveState();
        this.rerenderCurrentScreen();
      };
    });
  },

  checkSponsorTierUnlocks(){
    const s = this.state; const p = s.player;
    if(!p.unlockedSponsorTiers) p.unlockedSponsorTiers = [1];
    [2,3,4].forEach(tier=>{
      if(!p.unlockedSponsorTiers.includes(tier) && sponsorTierUnlocked(tier, p.careerStats)){
        p.unlockedSponsorTiers.push(tier);
        const newSponsors = SPONSOR_POOL.filter(sp=>sp.tier===tier);
        this.toast(`🤝 New prestige sponsors are interested in ${p.name}!`);
        this.pushNews(`🤝 ${p.name}'s results have caught the eye of bigger sponsors: ${newSponsors.map(s=>s.name).join(', ')}.`);
      }
    });
  },

  /* ---------------- SPONSORS ----------------
     Sponsors belong to the player object (p.sponsors), not the team --
     they're personal endorsement deals, so they always follow the driver
     through any team change (see rebalanceGridForTeamChange call sites in
     app_screens.js: neither switch path touches p.sponsors). Each deal now
     tracks goalsCompleted (0-10) toward becoming a permanent partner, and
     pay grows with a loyalty raise the longer the deal has run. */
  renderSponsorsModal(){
    const s = this.state; const p = s.player;
    const unlockedPool = SPONSOR_POOL.filter(sp=>sponsorTierUnlocked(sp.tier, p.careerStats));
    const available = unlockedPool.filter(sp=>!p.sponsors.find(m=>m.name===sp.name)).slice(0,4);
    const locked = SPONSOR_POOL.filter(sp=>!sponsorTierUnlocked(sp.tier, p.careerStats));
    this.openModal(`
      ${this.modalHeader('Sponsors')}
      <div class="section-sub" style="margin:0 0 10px;">Sponsors are personal deals — they stay with you if you switch teams.</div>
      <div class="section-title" style="font-size:10px;">Your Deals</div>
      ${p.sponsors.length===0 ? `<div class="empty-state"><div class="ic">🤝</div>No sponsors yet. Sign one below for extra income and bonus goals.</div>` :
        p.sponsors.map(sp=>{
          const loyaltyPct = Math.round(((sp._loyaltyMult||1)-1)*100);
          const goals = sp.goalsCompleted||0;
          return `
          <div class="pixel-panel" style="margin-bottom:8px;">
            <div class="flex-between">
              <div><div style="font-weight:800;">${sp.name}</div><div class="section-sub" style="margin:2px 0 0;">${sp.type} · +$${(sp.pay*1.2*(sp._loyaltyMult||1)).toFixed(1)}M per race${loyaltyPct>0?` <span style="color:#2a8a5c;">(+${loyaltyPct}% loyalty)</span>`:''}</div></div>
              <span class="chip ${sp.permanent?'mint':'gold'}">${sp.permanent?'🌟 Permanent':`${goals}/10`}</span>
            </div>
            ${sp.permanent
              ? `<div class="section-sub" style="margin-top:6px;">Permanent partner — no goals left, steady bonus pay every race.</div>`
              : `<div class="section-sub" style="margin-top:6px;">🎯 ${this.sponsorGoalText(sp)}</div>${this.renderPixelBar(goals*10,'confidence',5)}`}
          </div>
        `;}).join('')}
      <div class="section-title" style="font-size:10px; margin-top:14px;">Available</div>
      <div class="stack-8">
        ${available.map(sp=>`
          <div class="pixel-panel" style="margin-bottom:0;">
            <div class="flex-between">
              <div><div style="font-weight:800;">${sp.name}</div><div class="section-sub" style="margin:2px 0 0;">${sp.type} · ${sp.trait}</div></div>
              <button class="pbtn small gold" data-sign="${sp.name}">Sign (+$${sp.pay.toFixed(1)}M)</button>
            </div>
          </div>
        `).join('')}
        ${available.length===0 ? `<div class="section-sub">No new offers right now — check back after your next race.</div>` : ''}
      </div>
      ${locked.length ? `
        <div class="section-title" style="font-size:10px; margin-top:14px;">🔒 Prestige Partners</div>
        <div class="stack-8">
          ${locked.map(sp=>`
            <div class="pixel-panel" style="margin-bottom:0; opacity:0.55;">
              <div style="font-weight:800;">${sp.name} <span style="font-size:9px; color:var(--ink-soft); font-weight:600;">+$${sp.pay.toFixed(1)}M</span></div>
              <div class="section-sub" style="margin-top:2px;">${sp.type} · 🔒 ${sp.unlockText}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-sign]').forEach(btn=>{
      btn.onclick = ()=>{
        const base = SPONSOR_POOL.find(x=>x.name===btn.dataset.sign);
        const sp = {...base, goalsCompleted:0, permanent:false, signedSeason: s.season};
        p.sponsors.push(sp);
        p.money = Math.round((p.money + sp.pay)*10)/10;
        p.sponsorHistory.push({name:sp.name, season:s.season});
        this.toast(`Signed with ${sp.name}! +$${sp.pay.toFixed(1)}M`);
        this.pushNews(`🤝 ${p.name} announces a new partnership with ${sp.name}.`);
        p.journal.unshift({season:s.season, week:s.week, title:'New Sponsor', text:`Signed a deal with ${sp.name} (${sp.type}).`, icon:'🤝'});
        this.closeModal();
        this.saveState();
        this.rerenderCurrentScreen();
      };
    });
  },

  /* Sponsor goals now repeat: each sponsor tracks a running goalsCompleted
     count (0-10). Every time the CURRENT goal is met, goalsCompleted+1 and a
     small bonus pays out, then a fresh goal of the same flavor (same
     brand-personality check) is issued so there's always something active.
     After the 10th goal, the sponsor converts to a permanent partner (see
     checkSponsorObjectives below) and stops needing goals at all. */
  sponsorGoalText(sponsor){
    const goalMult = getDifficultySettings(this.state).sponsorGoalMult;
    const attackTarget = Math.max(1, Math.round(3*goalMult));
    const streakTarget = Math.max(1, Math.round(3*goalMult));
    const topNCutoff = clamp(Math.round(5/goalMult), 1, 10);
    const popTarget = Math.round(50*goalMult);
    if(sponsor.needsClean) return 'Finish a race with zero DNFs this season for a bonus.';
    if(sponsor.needsAggression) return `Record ${attackTarget} Attack-strategy race${attackTarget===1?'':'s'} for a bonus.`;
    if(sponsor.type==='Watchmaker') return `Finish in the points ${streakTarget} race${streakTarget===1?'':'s'} in a row.`;
    if(sponsor.needsPopularity) return `Reach ${popTarget}+ Fan Popularity for a bonus.`;
    return `Finish a race weekend in the Top ${topNCutoff}.`;
  },
  // kept for compatibility with existing sign-up call sites
  pickSponsorObjective(sponsor){ return this.sponsorGoalText(sponsor); },

  /* Called after each race to check + pay out sponsor goals, advance the
     10-goal partnership track, and pay recurring per-race income (including
     a loyalty raise the longer a sponsor has stuck with the driver). */
  checkSponsorObjectives(pos, dnf, approach){
    const s = this.state; const p = s.player;
    let recurringIncome = 0;
    p.sponsors.forEach(sp=>{
      // Loyalty raise: pay scales up the longer this sponsor has stuck with
      // the driver, regardless of team -- base +4% per season signed, and a
      // higher Hospitality facility level accelerates that raise (up to
      // +6%/season at Lv.5), still capped at +40% total so a single sponsor
      // never spirals unbounded. This is FACILITY_EFFECTS.hospitality's
      // "Improves sponsor relationships" promise, now an actual mechanical
      // effect instead of flavor text.
      const seasonsWithSponsor = Math.max(0, (s.season - (sp.signedSeason||s.season)));
      const hospitalityLevel = this.state.facilities.hospitality||1;
      const loyaltyRatePerSeason = 0.04 + (hospitalityLevel-1)*0.005;
      const loyaltyMult = 1 + clamp(seasonsWithSponsor * loyaltyRatePerSeason, 0, 0.4);
      sp._loyaltyMult = Math.round(loyaltyMult*100)/100;
      recurringIncome += sp.pay*1.2*loyaltyMult;

      if(sp.permanent) return; // no goals left to chase -- pure recurring income now

      // sponsorGoalMult (DIFFICULTY_SETTINGS): Casual 0.75x, Standard 1x,
      // Realistic 1.3x -- scales how many attack-races/streak-races are
      // needed and how strict the "finish in the points" cutoff is. This
      // was declared per-difficulty from the start but never actually read
      // anywhere; goals were exactly as hard on Casual as on Realistic.
      const goalMult = getDifficultySettings(s).sponsorGoalMult;
      const attackTarget = Math.max(1, Math.round(3*goalMult));
      const streakTarget = Math.max(1, Math.round(3*goalMult));
      const topNCutoff = clamp(Math.round(5/goalMult), 1, 10); // harder difficulty = smaller (stricter) top-N cutoff
      let done = false;
      if(sp.needsClean){ if(!dnf && p.careerStats.dnfs===0) done = true; }
      else if(sp.needsAggression){ sp._attackCount = (sp._attackCount||0) + (approach==='attack'?1:0); if(sp._attackCount>=attackTarget) done = true; }
      else if(sp.needsPopularity){ if(p.fanPopularity>=50*goalMult) done = true; }
      else if(sp.type==='Watchmaker'){ sp._streak = (!dnf && pos && pos<=10) ? (sp._streak||0)+1 : 0; if(sp._streak>=streakTarget) done = true; }
      else { if(!dnf && pos && pos<=topNCutoff) done = true; }

      if(done){
        sp.goalsCompleted = (sp.goalsCompleted||0) + 1;
        sp._attackCount = 0; sp._streak = 0; // reset per-goal progress counters for the next goal
        const bonus = Math.round(sp.pay*2*loyaltyMult*10)/10;
        p.money = Math.round((p.money+bonus)*10)/10;
        if(sp.goalsCompleted >= 10){
          sp.permanent = true;
          this.toast(`🌟 ${sp.name} is now a permanent partner! Bonus pay locked in every race.`);
          this.pushNews(`🌟 ${p.name} and ${sp.name} cement a long-term partnership after 10 completed goals together.`);
          p.journal.unshift({season:s.season, week:s.week, title:'Permanent Partner', text:`${sp.name} becomes a permanent sponsor after 10 completed goals -- no more objectives needed, just steady bonus pay.`, icon:'🌟'});
        } else {
          this.toast(`🎯 Sponsor goal complete (${sp.goalsCompleted}/10)! ${sp.name} pays a $${bonus}M bonus.`);
          this.pushNews(`🎯 ${p.name} completes a bonus goal for ${sp.name} (${sp.goalsCompleted}/10 toward a permanent deal).`);
        }
      }
    });
    if(recurringIncome>0){
      p.money = Math.round((p.money+recurringIncome)*10)/10;
    }
    return recurringIncome;
  },

});

    const recentNews = s.newsFeed.slice(0, 5);

    requestAnimationFrame(()=>{

  suggestedActivity(day){
    return { Tuesday:'training', Wednesday:'sponsor', Thursday:'travel' }[day] || 'free';
  },

  /* Presentation-only forecast-sharpening chip. The real round.trackTemp/
     weather driving pace and DNF risk are untouched -- this only renders a
     second, deliberately-noisy "early guess" that narrows into the true
     number as the weekend approaches, so temperature-sensitive planning
     (car development, setup) has a "forecast sharpening" feel across the
     week without any risk to already-shipped gameplay math. */
  renderForecastChip(round){
    if(!round) return '';
    const s = this.state;
    const fridayIdx = DAYS_OF_WEEK.indexOf('Friday');
    const daysUntil = Math.max(0, fridayIdx - s.dayIndex);
    const track = TRACKS.find(t=>t.id===round.trackId);
    if(!track) return '';
    if(daysUntil<=0){
      const band = tempBand(round.trackTemp);
      const line = round.weather==='rain' ? `🌧️ Rain · ${round.trackTemp}°C` : `${band.icon} Clear · ${round.trackTemp}°C`;
      return `<div class="chip mint" style="margin-top:6px;">📡 Forecast locked in: ${line}</div>`;
    }
    const guess = forecastGuess(round, daysUntil);
    const rangeText = guess.range>0 ? `${guess.temp-guess.range}–${guess.temp+guess.range}°C` : `${guess.temp}°C`;
    return `<div class="chip blue" style="margin-top:6px;">📡 Early forecast: roughly ${rangeText} (${guess.confidence}% confidence) — sharpens as the weekend nears</div>`;
  },

  renderComingUpHooks(dayAct, round){
    const s = this.state;
    const hooks = [];
    if(dayAct) hooks.push(`🏁 ${dayAct==='race' ? 'Race day is today!' : dayAct.charAt(0).toUpperCase()+dayAct.slice(1)+' is today.'}`);
    else if(round) hooks.push(`🏁 Next race: ${TRACKS.find(t=>t.id===round.trackId).name}`);
    const gap = Math.abs((s.standings['player']||0) - Math.max(0,...s.grid.map(d=>s.standings[d.id]||0)));
    if(this.standingPosition('player')>1 && gap<=20) hooks.push(`📊 Championship gap: only ${gap} points.`);
    const bestie = s.npcRoster.find(n=>n.role==='Best Friend');
    if(bestie && bestie.relationship.friendship>=70) hooks.push(`❤️ ${bestie.name} wants to catch up soon.`);
    if(hooks.length===0) hooks.push('🌤️ A quiet day in the paddock.');
    return hooks;
  },

  renderTodayActions(dayAct){
    const s = this.state;
    const round = this.getCurrentRound();
    // If the calendar has run out of rounds (season fully complete) but the
    // season-end modal hasn't been actioned yet for some reason, don't
    // render a race-weekend action button that points at nothing — this
    // previously let a stale/duplicate click crash executeRace() with an
    // undefined round.
    //
    // IMPORTANT: this guard used to only fire when dayAct was truthy (i.e.
    // only on a Fri/Sat/Sun race-weekend day). On any ordinary weekday
    // after the season's last round completed but before handleSeasonEnd()
    // had been actioned (e.g. the season-end modal was dismissed via the
    // close button before that button was removed -- see handleSeasonEnd's
    // comment), the code fell through to the normal Training/Free Time/
    // etc. action grid instead, and "End Day" just advanced dayIndex
    // forever with nothing ever re-checking the calendar. That's the
    // "stuck on an off week after the season ended" stall. Checking `!round`
    // on its own (not `dayAct && !round`) catches this on every day of the
    // week, not just race weekends, and its button re-runs the season-end
    // sequence directly instead of just advancing the day again.
    if(!round){
      return `<p class="section-sub">The season has concluded — see your final standings and move on to next season.</p><button class="pbtn full gold" id="btn-season-wrap">See Season Results →</button>`;
    }
    if(dayAct==='practice') return `<p class="section-sub">Free practice — dial in your setup before qualifying.</p><button class="pbtn full gold" id="btn-do-practice" ${round.completed?'disabled':''}>Run Practice</button>`;
    if(dayAct==='qualifying' && round.isSprint){
      return round.sprintCompleted
        ? `<p class="section-sub">Sprint complete — grid is set from Sprint results. See you Sunday!</p><button class="pbtn full gold" id="btn-advance-day">Continue</button>`
        : `<p class="section-sub">🏃 Sprint Weekend at ${this.getCurrentTrack().name} — a short sprint race sets Sunday's grid.</p><button class="pbtn full gold" id="btn-do-sprint">Start Sprint</button>`;
    }
    if(dayAct==='qualifying') return `<p class="section-sub">One lap. Everything on the line.</p><button class="pbtn full gold" id="btn-do-qualifying" ${round.completed?'disabled':''}>Start Qualifying</button>`;
    if(dayAct==='race') return `<p class="section-sub">${round.isSprint?'🏃 Sprint Weekend — ':''}Race day at ${this.getCurrentTrack().name}.</p><button class="pbtn full gold" id="btn-do-race" ${round.completed?'disabled':''}>Start Race</button>`;

    const actions = [
      {id:'training', icon:'💪', label:'Training'},
      {id:'lifestyle', icon:'🎯', label:'Free Time'},
      {id:'social', icon:'👥', label:'Socialize'},
      {id:'media', icon:'🎤', label:'Media'},
      {id:'sponsors', icon:'🤝', label:'Sponsors'},
      {id:'team', icon:'🔧', label:'Team & Car'},
    ];
    return `<div class="option-grid">
      ${actions.map(a=>`<button class="option-card" data-action="${a.id}" style="cursor:pointer;">${a.icon}<br>${a.label}</button>`).join('')}
    </div>
    <button class="pbtn full" id="btn-advance-day" style="margin-top:12px;">End Day →</button>`;
  },

  wireHubEvents(dayAct){
    const byId = (id)=> document.getElementById(id);
    if(byId('btn-do-practice')) byId('btn-do-practice').onclick = ()=> this.runPractice();
    if(byId('btn-do-qualifying')) byId('btn-do-qualifying').onclick = ()=> this.runQualifying();
    if(byId('btn-do-sprint')) byId('btn-do-sprint').onclick = ()=> this.runSprintRace();
    if(byId('btn-do-race')) byId('btn-do-race').onclick = ()=> this.runRace();
    if(byId('btn-advance-day')) byId('btn-advance-day').onclick = ()=> this.advanceDay();
    if(byId('btn-season-wrap')) byId('btn-season-wrap').onclick = ()=> this.handleSeasonEnd();
    if(byId('btn-open-stats')) byId('btn-open-stats').onclick = ()=> this.renderCareerStatsModal();
    if(byId('btn-open-journal')) byId('btn-open-journal').onclick = ()=> this.renderJournalModal();
    if(byId('btn-open-museum')) byId('btn-open-museum').onclick = ()=> this.renderMuseumModal();
    if(byId('btn-open-save')) byId('btn-open-save').onclick = ()=> this.renderSaveMenuModal();
    if(byId('btn-open-help')) byId('btn-open-help').onclick = ()=> this.renderHelpModal();
    if(byId('btn-view-calendar')) byId('btn-view-calendar').onclick = ()=> this.renderSeasonCalendarModal();

    document.querySelectorAll('[data-action]').forEach(btn=>{
      btn.onclick = ()=> this.openActionModal(btn.dataset.action);
    });

    const pod = byId('pod-tap');
    if(pod) pod.onclick = ()=> this.petDriver();
    const profileBtn = byId('pod-profile-btn');
    if(profileBtn) profileBtn.onclick = (e)=>{ e.stopPropagation(); this.renderProfileModal(); };
  },

  petDriver(){
    const p = this.state.player;
    p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood + 2);
    this.toast(`${p.name} feels appreciated! 💛`);
    this.saveState();
    this.renderHub();
  },

  handleNav(nav){
    if(nav==='home') this.renderHub();
    else if(nav==='race') this.renderRaceCenterScreen();
    else if(nav==='training') this.openActionModal('training');
    else if(nav==='team') this.renderTeamScreen();
    else if(nav==='social') this.renderRelationshipsModal();
    else if(nav==='career') this.renderCareerStatsModal();
  },

  advanceDay(){
    const s = this.state;
    s.player.attributes.lifestyle.energy = clamp(s.player.attributes.lifestyle.energy + 8);
    s.player.attributes.lifestyle.stress = clamp(s.player.attributes.lifestyle.stress - 3);

    // Celebrity encounters are rolled separately from RANDOM_EVENTS (own
    // gating by fanPopularity, own two-choice payoff) and take priority on
    // the days they fire, so the "what do I do with this photo op" choice
    // isn't buried under a same-day toast for something else.
    const celebRolled = this.maybeTriggerCelebrityEncounter();

    if(!celebRolled && Math.random() < 0.3){
      const ev = pick(RANDOM_EVENTS);
      const text = ev.text(s.player.name);
      ev.effect(s);
      this.toast(text);
      this.pushNews(text);
    }

    s.dayIndex = (s.dayIndex+1) % 7;
    if(s.dayIndex===0){
      s.week++;
      this.decayRelationships();
    }
    checkScoutingInterest(s);
    this.saveState();
    this.renderHub();
    if(celebRolled) this.renderCelebrityEncounterModal(celebRolled);
  },

  /* Returns the rolled celebrity object if an encounter fires this day,
     otherwise null. Kept separate from the modal renderer so advanceDay can
     decide whether to suppress the normal RANDOM_EVENTS roll on the same
     day without rendering anything yet (the hub re-render needs to happen
     first, then the modal opens on top of it). */
  maybeTriggerCelebrityEncounter(){
    const s = this.state; const p = s.player;
    const pool = eligibleCelebrities(p.fanPopularity);
    if(!pool.length) return null;
    // Base 4% per day, only among eligible-rarity celebrities -- deliberately
    // rare so it stays a moment, not a routine.
    if(Math.random() > 0.04) return null;
    return pick(pool);
  },

  renderCelebrityEncounterModal(celeb){
    const s = this.state; const p = s.player;
    this.openModal(`
      ${this.modalHeader('Celebrity Encounter')}
      <div class="pixel-panel" style="text-align:center;">
        <div style="font-size:32px;">${celeb.icon}</div>
        <div style="font-weight:800; font-size:14px; margin-top:4px;">${celeb.name}</div>
        <span class="chip ${CELEBRITY_RARITY_COLOR[celeb.rarity]}" style="margin-top:6px;">${celeb.rarity} · ${celeb.type}</span>
        <div class="section-sub" style="margin-top:8px;">${celeb.bio}</div>
      </div>
      <div class="section-sub" style="margin:10px 0;">You run into ${celeb.name} at an event. Photos are already being taken.</div>
      <div class="stack-8">
        <button class="pbtn full gold" id="btn-celeb-embrace">📸 Lean into it</button>
        <button class="pbtn full" id="btn-celeb-lowkey">🙂 Keep it low-key</button>
      </div>
    `);
    // No close button -- this is a quick, always-resolves-positively-or-
    // neutrally choice (matching the podium interview / quiz pattern for
    // "must-answer, no dead-end" modals), and by this point in advanceDay
    // the day has already advanced, so a dismiss-without-choosing path
    // would strand the player exactly like those other cases.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.getElementById('btn-celeb-embrace').onclick = ()=>{
      const [lo,hi] = celeb.fanGain;
      const gain = randInt(lo, hi);
      p.fanPopularity = clamp(p.fanPopularity + gain, 0, 999);
      const rumorHits = Math.random() < celeb.rumorChance;
      if(rumorHits){
        p.attributes.lifestyle.stress = clamp(p.attributes.lifestyle.stress + 8);
        this.toast(`📸 +${gain} Fan Popularity — but tabloids are already spinning a rumor about you two.`);
        this.pushNews(`📰 Rumors swirl after ${p.name} was seen with ${celeb.name}.`);
        p.journal.unshift({season:s.season, week:s.week, title:'Tabloid Rumor', text:`Photos with ${celeb.name} sparked tabloid speculation.`, icon:'📰'});
      } else {
        this.toast(`📸 +${gain} Fan Popularity from being seen with ${celeb.name}!`);
        this.pushNews(`📸 ${p.name} was spotted with ${celeb.type.toLowerCase()} ${celeb.name}.`);
      }
      p.journal.unshift({season:s.season, week:s.week, title:'Celebrity Encounter', text:`Ran into ${celeb.name} (${celeb.type}) and leaned into the publicity.`, icon:celeb.icon});
      this.closeModal();
      this.saveState();
      this.rerenderCurrentScreen();
    };
    document.getElementById('btn-celeb-lowkey').onclick = ()=>{
      const gain = Math.round(celeb.fanGain[0]*0.3);
      p.fanPopularity = clamp(p.fanPopularity + gain, 0, 999);
      this.toast(`🙂 You kept it low-key. +${gain} Fan Popularity, no rumor risk.`);
      p.journal.unshift({season:s.season, week:s.week, title:'Celebrity Encounter', text:`Ran into ${celeb.name} (${celeb.type}) but kept the moment low-key.`, icon:celeb.icon});
      this.closeModal();
      this.saveState();
      this.rerenderCurrentScreen();
    };
  },

  /* Weekly relationship decay: friendship/spark drift down slowly if the
     player never interacts with someone, modeling neglect. This is what
     makes "Talk"/"Flirt" have an ongoing cost of NOT doing them, not just a
     one-way ratchet upward — relationships now require some maintenance.
     A dating relationship whose spark decays below a low threshold has a
     real (not certain) chance of ending in a breakup each week it stays
     there, surfaced as news so it isn't a silent, confusing disappearance. */
  decayRelationships(){
    const s = this.state; const p = s.player;
    (s.npcRoster||[]).forEach(n=>{
      n.relationship.friendship = clamp(n.relationship.friendship - 1, 0, 100);
      if(n.romance && n.romance.status!=='none'){
        n.romance.spark = clamp(n.romance.spark - 2, 0, 100);
        if(n.romance.status==='dating' && n.romance.spark < 25 && Math.random() < 0.25){
          n.romance.status = 'none';
          this.toast(`💔 You and ${n.name} have broken up.`);
          this.pushNews(`💔 ${p.name} and ${n.name} have called it off.`);
        }
      }
    });
    if(s.metPartner && s.metPartner.romance){
      s.metPartner.romance.spark = clamp(s.metPartner.romance.spark - 2, 0, 100);
      if(s.metPartner.romance.status==='dating' && s.metPartner.romance.spark < 25 && Math.random() < 0.25){
        this.toast(`💔 You and ${s.metPartner.name} have broken up.`);
        this.pushNews(`💔 ${p.name} and ${s.metPartner.name} have called it off.`);
        s.metPartner = null;
      }
    }
    (s.grid||[]).forEach(d=>{
      if(d.romance && d.romance.status!=='none'){
        d.romance.spark = clamp(d.romance.spark - 2, 0, 100);
        if(d.romance.status==='dating' && d.romance.spark < 25 && Math.random() < 0.25){
          d.romance.status = 'none';
          this.toast(`💔 You and ${d.name} have broken up.`);
          this.pushNews(`💔 ${p.name} and ${d.name} have called it off.`);
        }
      }
    });
  },

});



/* ============================================================
