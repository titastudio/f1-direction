        </div>
      </div>

      <div class="pixel-panel">
        <div class="panel-title">Condition</div>
        <div class="pixel-bar-row">
          <div class="lbl-line"><span>⚡ Energy</span><span class="v">${Math.round(p.attributes.lifestyle.energy)}</span></div>
          ${this.renderPixelBar(p.attributes.lifestyle.energy,'energy')}
        </div>
        <div class="pixel-bar-row">
          <div class="lbl-line"><span>😊 Mood</span><span class="v">${Math.round(p.attributes.lifestyle.mood)}</span></div>
          ${this.renderPixelBar(p.attributes.lifestyle.mood,'mood')}
        </div>
        <div class="pixel-bar-row" style="margin-bottom:0;">
          <div class="lbl-line"><span>😰 Stress</span><span class="v">${Math.round(p.attributes.lifestyle.stress)}</span></div>
          ${this.renderPixelBar(p.attributes.lifestyle.stress,'stress')}
        </div>
      </div>

      <div class="pixel-panel">
        <div class="panel-title">${(()=>{
          if(!round) return 'This Week <span class="tag">Off Week</span>';
          const fridayIdx = DAYS_OF_WEEK.indexOf('Friday');
          const daysUntilRace = fridayIdx - s.dayIndex;
          const trackName = TRACKS.find(t=>t.id===round.trackId).name;
          if(daysUntilRace<=0){
            // Already Fri/Sat/Sun of this round's race weekend.
            return `This Week <span class="tag">${trackName}${round.isSprint ? ' 🏃' : ''}</span>`;
          }
          // Race weekend hasn't started yet -- say so explicitly instead of
          // naming the upcoming track as if it's already "this week", which
          // previously made closing a race result feel like it jumped
          // straight into the next race weekend when really only one day
          // had passed and several free days remained.
          return `This Week <span class="tag">Free — next race in ${daysUntilRace} day${daysUntilRace===1?'':'s'}</span>`;
        })()}</div>
        <div style="display:flex; gap:4px; overflow-x:auto; padding-bottom:2px;">
          ${DAYS_OF_WEEK.map((d,i)=>{
            const act = RACE_WEEKEND_DAYS[d] || this.suggestedActivity(d);
            const active = i===s.dayIndex;
            const isPast = i < s.dayIndex;
            return `<div style="flex-shrink:0; text-align:center; padding:6px 8px; border-radius:6px; border:2px solid var(--pixel-border); background:${active?'var(--candy-yellow)':'#fff'}; opacity:${isPast?0.45:1}; min-width:52px;">
              <div style="font-family:var(--font-pixel); font-size:7px;">${d.slice(0,3)}</div>
              <div style="font-size:14px; margin-top:3px;">${this.dayActivityIcon(act)}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="section-sub" style="margin:6px 0 0;">Race weekends are fixed (Fri/Sat/Sun). Other days are yours to plan freely — icons are just a suggestion.${round ? ` Next up: <b>${TRACKS.find(t=>t.id===round.trackId).name}</b>.` : ''}</div>
        ${this.renderForecastChip(round)}
        <button class="pbtn full" id="btn-view-calendar" style="margin-top:8px;">📅 Season Calendar</button>
      </div>

      <div class="pixel-panel">
        <div class="panel-title">Today — ${this.dayName().toUpperCase()} ${dayAct ? '🏁' : ''}</div>
        ${this.renderTodayActions(dayAct)}
      </div>

      <div class="pixel-panel">
        <div class="panel-title">Coming Up</div>
        <div class="section-sub" style="margin:0;">${this.renderComingUpHooks(dayAct, round).join('<br>')}</div>
      </div>

      ${this.renderRivalCard()}
      ${this.renderObjectivesSnapshot()}

      <div class="pbtn-row">
        <button class="pbtn small" id="btn-open-stats">📊 Stats</button>
        <button class="pbtn small" id="btn-open-journal">📔 Journal</button>
        <button class="pbtn small" id="btn-open-museum">🏆 Museum</button>
        <button class="pbtn small" id="btn-open-save">💾 Menu</button>
        <button class="pbtn small" id="btn-open-help">❓ Help</button>
      </div>
    `;
    this.wireHubEvents(dayAct);
    this.wireEditableNames(this.root);
    this.maybeShowTutorial();
  },

  renderRivalCard(){
    const rival = this.getRival ? this.getRival() : null;
    if(!rival) return '';
    const lvl = rivalryLevelName(rival.rivalryLevel||0);
    return `<div class="pixel-panel" style="border-color:#c0392b;">
      <div class="panel-title">⚔️ Your Rival <span class="tag">${lvl}</span></div>
      <div class="flex-between">
        <div>
          <div style="font-weight:800;">${rival.flag} ${rival.name}</div>
          <div class="section-sub" style="margin:2px 0 0;">${this.getTeam(rival.teamId).name} · P${this.standingPosition(rival.id)} in standings</div>
        </div>
      </div>
    </div>`;
  },

  renderObjectivesSnapshot(){
    const s = this.state;
    if(!s.seasonObjectives || s.seasonObjectives.length===0) return '';
    const top = s.seasonObjectives[0];
    const progress = this.objectiveProgress(top);
    const pct = Math.min(100, Math.round((progress/top.target)*100));
    return `<div class="pixel-panel">
      <div class="panel-title">Season Objective <span class="tag">${s.seasonObjectives.length} goals</span></div>
      <div class="flex-between" style="font-size:11.5px; margin-bottom:4px;"><span style="font-weight:700;">${top.text}</span><span style="color:var(--ink-soft);">${progress}/${top.target}</span></div>
      ${this.renderPixelBar(pct,'stat')}
      <div class="section-sub" style="margin:6px 0 0;">See all goals under Team & Car.</div>
    </div>`;
  },

  dayActivityIcon(act){
    return { practice:'🏎️', qualifying:'⏱️', race:'🏁', training:'💪', sponsor:'🤝', travel:'✈️', free:'🕐' }[act] || '🕐';
  },

  renderSeasonCalendarModal(){
    const s = this.state;
    const careerYearNum = s.season - (s.careerStartSeason||s.season) + 1;
    const isRegYear = isRegulationChangeYear(careerYearNum);
    this.openModal(`
      ${this.modalHeader('Season Calendar')}
      <div class="section-sub" style="margin-bottom:10px;">${seasonLabel(s)} · ${s.calendar.rounds.length} rounds${isRegYear ? ' · 📋 New FIA regulations this year' : ''}</div>
      <div class="stack-8">
        ${s.calendar.rounds.map(r=>{
          const track = TRACKS.find(t=>t.id===r.trackId);
          const isCurrent = r.round === s.calendar.currentRound+1;
          const isDone = r.completed;
          const wIcon = r.weather==='rain' ? '🌧️' : tempBand(r.trackTemp).icon;
          return `<div class="row-item" style="${isCurrent?'background:#fff8e6; border-radius:6px; padding-left:6px;':''} ${isDone?'opacity:0.5;':''}">
            <span class="rname" style="flex:0 0 24px;">${r.round}</span>
            <span class="rname">${track.country.split(' ')[0]} ${track.name}${r.isSprint?' 🏃':''}</span>
            <span class="rmeta">${wIcon} ${r.trackTemp}°C</span>
            <span class="rmeta">${isDone?'✓ Done':isCurrent?'Next up':''}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="section-sub" style="margin-top:10px;">🏃 = Sprint Weekend (an extra short race sets Sunday's grid)</div>
    `);
    this.wireModalClose();
  },

  suggestedActivity(day){
    return { Tuesday:'training', Wednesday:'sponsor', Thursday:'travel' }[day] || 'free';
  },

  /* Presentation-only forecast-sharpening chip. The real round.trackTemp/
     weather driving pace and DNF risk are untouched -- this only renders a
     second, deliberately-noisy "early guess" that narrows into the true
     number as the weekend approaches, so temperature-sensitive planning
     (car development, setup) has a "forecast sharpening" feel across the
     week without any risk to already-shipped gameplay math. */
  renderForecastChip(round){
    if(!round) return '';
    const s = this.state;
    const fridayIdx = DAYS_OF_WEEK.indexOf('Friday');
    const daysUntil = Math.max(0, fridayIdx - s.dayIndex);
    const track = TRACKS.find(t=>t.id===round.trackId);
    if(!track) return '';
    if(daysUntil<=0){
      const band = tempBand(round.trackTemp);
      const line = round.weather==='rain' ? `🌧️ Rain · ${round.trackTemp}°C` : `${band.icon} Clear · ${round.trackTemp}°C`;
      // Forecast-accuracy callback: compare the EARLIEST guess we ever showed
      // for this round (captured below, only the first time) against the
      // now-locked-in actual temperature. Purely a flavor line -- doesn't
      // touch round.weather/trackTemp themselves, which stay exactly as
      // fixed at calendar-build time.
      let callback = '';
      if(round._earlyGuess!==undefined){
        const diff = Math.abs(round._earlyGuess - round.trackTemp);
        callback = diff<=2
          ? `<div class="chip mint" style="margin-top:4px;">🎯 Your crew's early guess of ~${round._earlyGuess}°C was spot on.</div>`
          : `<div class="chip blue" style="margin-top:4px;">📋 Your crew predicted ~${round._earlyGuess}°C earlier in the week — it turned out to be ${round.trackTemp}°C.</div>`;
      }
      return `<div class="chip mint" style="margin-top:6px;">📡 Forecast locked in: ${line}</div>${callback}`;
    }
    const guess = forecastGuess(round, daysUntil);
    if(round._earlyGuess===undefined) round._earlyGuess = guess.temp;
    const rangeText = guess.range>0 ? `${guess.temp-guess.range}–${guess.temp+guess.range}°C` : `${guess.temp}°C`;
    return `<div class="chip blue" style="margin-top:6px;">📡 Early forecast: roughly ${rangeText} (${guess.confidence}% confidence) — sharpens as the weekend nears</div>`;
  },

  renderComingUpHooks(dayAct, round){
    const s = this.state;
    const hooks = [];
    if(dayAct) hooks.push(`🏁 ${dayAct==='race' ? 'Race day is today!' : dayAct.charAt(0).toUpperCase()+dayAct.slice(1)+' is today.'}`);
    else if(round) hooks.push(`🏁 Next race: ${TRACKS.find(t=>t.id===round.trackId).name}`);
    const gap = Math.abs((s.standings['player']||0) - Math.max(0,...s.grid.map(d=>s.standings[d.id]||0)));
    if(this.standingPosition('player')>1 && gap<=20) hooks.push(`📊 Championship gap: only ${gap} points.`);
    const bestie = s.npcRoster.find(n=>n.role==='Best Friend');
    if(bestie && bestie.relationship.friendship>=70) hooks.push(`❤️ ${bestie.name} wants to catch up soon.`);
    if(hooks.length===0) hooks.push('🌤️ A quiet day in the paddock.');
    return hooks;
  },

  renderTodayActions(dayAct){
    const s = this.state;
    const round = this.getCurrentRound();
    // If the calendar has run out of rounds (season fully complete) but the
    // season-end modal hasn't been actioned yet for some reason, don't
    // render a race-weekend action button that points at nothing — this
    // previously let a stale/duplicate click crash executeRace() with an
    // undefined round.
    //
    // IMPORTANT: this guard used to only fire when dayAct was truthy (i.e.
    // only on a Fri/Sat/Sun race-weekend day). On any ordinary weekday
    // after the season's last round completed but before handleSeasonEnd()
    // had been actioned (e.g. the season-end modal was dismissed via the
    // close button before that button was removed -- see handleSeasonEnd's
    // comment), the code fell through to the normal Training/Free Time/
    // etc. action grid instead, and "End Day" just advanced dayIndex
    // forever with nothing ever re-checking the calendar. That's the
    // "stuck on an off week after the season ended" stall. Checking `!round`
    // on its own (not `dayAct && !round`) catches this on every day of the
    // week, not just race weekends, and its button re-runs the season-end
    // sequence directly instead of just advancing the day again.
    if(!round){
      return `<p class="section-sub">The season has concluded — see your final standings and move on to next season.</p><button class="pbtn full gold" id="btn-season-wrap">See Season Results →</button>`;
    }
    if(dayAct==='practice') return `<p class="section-sub">${round.isSprint?'🏃 Sprint Weekend practice — shorter track time than usual, so every lap counts before Sprint Qualifying.':'Free practice — dial in your setup before qualifying.'}</p><button class="pbtn full gold" id="btn-do-practice" ${round.completed?'disabled':''}>Run Practice</button>`;
    if(dayAct==='qualifying' && round.isSprint){
      return round.sprintCompleted
        ? `<p class="section-sub">Sprint complete — grid is set from Sprint results. See you Sunday!</p><button class="pbtn full gold" id="btn-advance-day">Continue</button>`
        : `<p class="section-sub">🏃 Sprint Weekend at ${this.getCurrentTrack().name} — a short qualifying lap sets the sprint grid, then the Sprint itself sets Sunday's starting order.</p><button class="pbtn full gold" id="btn-do-sprint">Start Sprint Qualifying</button>`;
    }
    if(dayAct==='qualifying') return `<p class="section-sub">One lap. Everything on the line.</p><button class="pbtn full gold" id="btn-do-qualifying" ${round.completed?'disabled':''}>Start Qualifying</button>`;
    if(dayAct==='race') return `<p class="section-sub">${round.isSprint?'🏃 Sprint Weekend — ':''}Race day at ${this.getCurrentTrack().name}.</p><button class="pbtn full gold" id="btn-do-race" ${round.completed?'disabled':''}>Start Race</button>`;

    const actions = [
      {id:'training', icon:'💪', label:'Training'},
      {id:'lifestyle', icon:'🎯', label:'Free Time'},
      {id:'social', icon:'👥', label:'Socialize'},
      {id:'media', icon:'🎤', label:'Media'},
      {id:'sponsors', icon:'🤝', label:'Sponsors'},
      {id:'team', icon:'🔧', label:'Team & Car'},
    ];
    // Mentor action unlocks at homeLevel>=3 -- home tier's first real
    // mechanical hook (19.8), sharing its home with the mentor/protégé
    // system (19.1 #6) per the handoff doc's own recommendation not to
    // invent a second, unrelated hook for the same number.
    if(s.player.homeLevel>=3) actions.push({id:'mentor', icon:'🌟', label:'Mentor'});
    return `<div class="option-grid">
      ${actions.map(a=>`<button class="option-card" data-action="${a.id}" style="cursor:pointer;">${a.icon}<br>${a.label}</button>`).join('')}
    </div>
    <button class="pbtn full" id="btn-advance-day" style="margin-top:12px;">End Day →</button>`;
  },

  wireHubEvents(dayAct){
    const byId = (id)=> document.getElementById(id);
    if(byId('btn-do-practice')) byId('btn-do-practice').onclick = ()=> this.runPractice();
    if(byId('btn-do-qualifying')) byId('btn-do-qualifying').onclick = ()=> this.runQualifying();
    if(byId('btn-do-sprint')) byId('btn-do-sprint').onclick = ()=> this.runSprintQualifying();
    if(byId('btn-do-race')) byId('btn-do-race').onclick = ()=> this.runRace();
    if(byId('btn-advance-day')) byId('btn-advance-day').onclick = ()=> this.advanceDay();
    if(byId('btn-season-wrap')) byId('btn-season-wrap').onclick = ()=> this.handleSeasonEnd();
    if(byId('btn-open-stats')) byId('btn-open-stats').onclick = ()=> this.renderCareerStatsModal();
    if(byId('btn-open-journal')) byId('btn-open-journal').onclick = ()=> this.renderJournalModal();
    if(byId('btn-open-museum')) byId('btn-open-museum').onclick = ()=> this.renderMuseumModal();
    if(byId('btn-open-save')) byId('btn-open-save').onclick = ()=> this.renderSaveMenuModal();
    if(byId('btn-open-help')) byId('btn-open-help').onclick = ()=> this.renderHelpModal();
    if(byId('btn-view-calendar')) byId('btn-view-calendar').onclick = ()=> this.renderSeasonCalendarModal();

    document.querySelectorAll('[data-action]').forEach(btn=>{
      btn.onclick = ()=> this.openActionModal(btn.dataset.action);
    });

    const pod = byId('pod-tap');
    if(pod) pod.onclick = ()=> this.petDriver();
    const profileBtn = byId('pod-profile-btn');
    if(profileBtn) profileBtn.onclick = (e)=>{ e.stopPropagation(); this.renderProfileModal(); };
  },

  petDriver(){
    const p = this.state.player;
    p.attributes.lifestyle.mood = clamp(p.attributes.lifestyle.mood + 2);
    this.toast(`${p.name} feels appreciated! 💛`);
    this.saveState();
    this.renderHub();
  },

  handleNav(nav){
    if(nav==='home') this.renderHub();
    else if(nav==='race') this.renderRaceCenterScreen();
    else if(nav==='training') this.openActionModal('training');
    else if(nav==='team') this.showFirstTimeExplainer('seenDevSlotsExplainer', '🔧', 'Car Development', "Each season you get a limited number of dev slots — spend them on upgrades wisely. Higher Engineering facility levels mean more slots, and they reset fresh every new season.", ()=> this.renderTeamScreen());
    else if(nav==='social') this.renderRelationshipsModal();
    else if(nav==='career') this.renderCareerStatsModal();
  },

  advanceDay(){
    const s = this.state;
    s.player.attributes.lifestyle.energy = clamp(s.player.attributes.lifestyle.energy + 8);
    s.player.attributes.lifestyle.stress = clamp(s.player.attributes.lifestyle.stress - 3);

    // Celebrity encounters are rolled separately from RANDOM_EVENTS (own
    // gating by fanPopularity, own two-choice payoff) and take priority on
    // the days they fire, so the "what do I do with this photo op" choice
    // isn't buried under a same-day toast for something else.
    const celebRolled = this.maybeTriggerCelebrityEncounter();

    if(!celebRolled && Math.random() < 0.3){
      const ev = pick(RANDOM_EVENTS);
      const text = ev.text(s.player.name);
      ev.effect(s);
      this.toast(text);
      this.pushNews(text);
    }

    s.dayIndex = (s.dayIndex+1) % 7;
    if(s.dayIndex===0){
      s.week++;
      this.decayRelationships();
    }
    checkScoutingInterest(s);
    this.saveState();
    this.renderHub();
    if(celebRolled) this.showFirstTimeExplainer('seenCelebrityExplainer', '🌟', 'Celebrity Encounter', "As fame grows, you'll cross paths with celebrities. Handle it well and fan popularity goes up, though there's a small chance of a tabloid rumor too.", ()=> this.renderCelebrityEncounterModal(celebRolled));
  },

  /* Returns the rolled celebrity object if an encounter fires this day,
     otherwise null. Kept separate from the modal renderer so advanceDay can
     decide whether to suppress the normal RANDOM_EVENTS roll on the same
     day without rendering anything yet (the hub re-render needs to happen
     first, then the modal opens on top of it). */
  maybeTriggerCelebrityEncounter(){
    const s = this.state; const p = s.player;
    const pool = eligibleCelebrities(p.fanPopularity, p);
    if(!pool.length) return null;
    // Base 4% per day, only among eligible-rarity celebrities -- deliberately
    // rare so it stays a moment, not a routine.
    if(Math.random() > 0.04) return null;
    return pick(pool);
  },

  renderCelebrityEncounterModal(celeb){
    const s = this.state; const p = s.player;
    this.openModal(`
      ${this.modalHeader('Celebrity Encounter')}
      <div class="pixel-panel" style="text-align:center;">
        <div style="font-size:32px;">${celeb.icon}</div>
        <div style="font-weight:800; font-size:14px; margin-top:4px;">${celeb.name}</div>
        <span class="chip ${CELEBRITY_RARITY_COLOR[celeb.rarity]}" style="margin-top:6px;">${celeb.rarity} · ${celeb.type}</span>
        <div class="section-sub" style="margin-top:8px;">${celeb.bio}</div>
      </div>
      <div class="section-sub" style="margin:10px 0;">You run into ${celeb.name} at an event. Photos are already being taken.</div>
      <div class="stack-8">
        <button class="pbtn full gold" id="btn-celeb-embrace">📸 Lean into it</button>
        <button class="pbtn full" id="btn-celeb-lowkey">🙂 Keep it low-key</button>
      </div>
    `);
    // No close button -- this is a quick, always-resolves-positively-or-
    // neutrally choice (matching the podium interview / quiz pattern for
    // "must-answer, no dead-end" modals), and by this point in advanceDay
    // the day has already advanced, so a dismiss-without-choosing path
    // would strand the player exactly like those other cases.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.getElementById('btn-celeb-embrace').onclick = ()=>{
      const [lo,hi] = celeb.fanGain;
      const gain = randInt(lo, hi);
      p.fanPopularity = clamp(p.fanPopularity + gain, 0, 999);
      const rumorHits = Math.random() < celeb.rumorChance;
      if(rumorHits){
        p.attributes.lifestyle.stress = clamp(p.attributes.lifestyle.stress + 8);
        this.toast(`📸 +${gain} Fan Popularity — but tabloids are already spinning a rumor about you two.`);
        this.pushNews(`📰 Rumors swirl after ${p.name} was seen with ${celeb.name}.`);
        p.journal.unshift({season:s.season, week:s.week, title:'Tabloid Rumor', text:`Photos with ${celeb.name} sparked tabloid speculation.`, icon:'📰'});
      } else {
        this.toast(`📸 +${gain} Fan Popularity from being seen with ${celeb.name}!`);
        this.pushNews(`📸 ${p.name} was spotted with ${celeb.type.toLowerCase()} ${celeb.name}.`);
      }
      p.journal.unshift({season:s.season, week:s.week, title:'Celebrity Encounter', text:`Ran into ${celeb.name} (${celeb.type}) and leaned into the publicity.`, icon:celeb.icon});
      this.closeModal();
      this.saveState();
      this.rerenderCurrentScreen();
    };
    document.getElementById('btn-celeb-lowkey').onclick = ()=>{
      const gain = Math.round(celeb.fanGain[0]*0.3);
      p.fanPopularity = clamp(p.fanPopularity + gain, 0, 999);
      this.toast(`🙂 You kept it low-key. +${gain} Fan Popularity, no rumor risk.`);
      p.journal.unshift({season:s.season, week:s.week, title:'Celebrity Encounter', text:`Ran into ${celeb.name} (${celeb.type}) but kept the moment low-key.`, icon:celeb.icon});
      this.closeModal();
      this.saveState();
      this.rerenderCurrentScreen();
    };
  },

  /* Weekly relationship decay: friendship/spark drift down slowly if the
     player never interacts with someone, modeling neglect. This is what
     makes "Talk"/"Flirt" have an ongoing cost of NOT doing them, not just a
     one-way ratchet upward — relationships now require some maintenance.
     A dating relationship whose spark decays below a low threshold has a
     real (not certain) chance of ending in a breakup each week it stays
     there, surfaced as news so it isn't a silent, confusing disappearance. */
  decayRelationships(){
    const s = this.state; const p = s.player;
    (s.npcRoster||[]).forEach(n=>{
      n.relationship.friendship = clamp(n.relationship.friendship - 1, 0, 100);
      if(n.romance && n.romance.status!=='none'){
        n.romance.spark = clamp(n.romance.spark - 2, 0, 100);
        if(n.romance.status==='dating' && n.romance.spark < 25 && Math.random() < 0.25){
          n.romance.status = 'none';
          this.toast(`💔 You and ${n.name} have broken up.`);
          this.pushNews(`💔 ${p.name} and ${n.name} have called it off.`);
        }
      }
    });
    if(s.metPartner && s.metPartner.romance){
      s.metPartner.romance.spark = clamp(s.metPartner.romance.spark - 2, 0, 100);
      if(s.metPartner.romance.status==='dating' && s.metPartner.romance.spark < 25 && Math.random() < 0.25){
        this.toast(`💔 You and ${s.metPartner.name} have broken up.`);
        this.pushNews(`💔 ${p.name} and ${s.metPartner.name} have called it off.`);
        s.metPartner = null;
      }
    }
    (s.grid||[]).forEach(d=>{
      if(d.romance && d.romance.status!=='none'){
        d.romance.spark = clamp(d.romance.spark - 2, 0, 100);
        if(d.romance.status==='dating' && d.romance.spark < 25 && Math.random() < 0.25){
          d.romance.status = 'none';
          this.toast(`💔 You and ${d.name} have broken up.`);
          this.pushNews(`💔 ${p.name} and ${d.name} have called it off.`);
        }
      }
    });
  },

});



/* ============================================================
   FORMULA ONE DIRECTION — RACE WEEKEND
   ============================================================ */

Object.assign(App, {

  renderRaceCenterScreen(){
    this.currentScreen = 'race';
    const s = this.state;
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }

      ? 'Wet-weather skill matters more this weekend — check your driver\'s wetSkill and consider a cautious approach.'
      : band.label==='Hot'
      ? 'Hot track — tyres wear faster and reliability risk is higher. Tyre management and Save Tires strategy help more than usual.'
      : band.label==='Cold'
      ? 'Cold track — less grip for everyone. A cautious, smooth approach helps offset it.'

    this.root.innerHTML = `
      <div class="pod-wrap" style="margin-bottom:6px;">
        <div class="pod" style="width:96px; height:96px;">
          <span class="pod-sprite" style="font-size:40px;">🏎️</span>
        </div>
      </div>
      <div class="pixel-panel">
        <div class="panel-title">${track.country} <span class="tag">Round ${round.round}/${s.calendar.rounds.length}</span></div>
        <div style="font-weight:800; margin-bottom:4px;">${track.name}</div>
        <div class="section-sub" style="margin-bottom:0;">${track.character}</div>
        <div class="section-sub" style="margin:4px 0 0;">Familiarity: ${Math.round(this.trackFamiliarity(track.id))}%</div>
        <div class="chip ${this.overtakeTier(track.overtakeDiff).chip}" style="margin-top:8px;">${this.overtakeTier(track.overtakeDiff).icon} Overtaking: ${this.overtakeTier(track.overtakeDiff).label} (${track.overtakeDiff}/10)</div>
        <div class="section-sub" style="margin:4px 0 0;">${this.overtakeTier(track.overtakeDiff).note}</div>
      </div>

      <div class="pixel-panel" style="border-left:3px solid ${isRain?'var(--candy-blue)':band.label==='Hot'?'var(--candy-red)':band.label==='Cold'?'var(--candy-blue)':'var(--candy-mint)'};">
        <div class="panel-title">Weekend Forecast</div>
        <div style="font-weight:800; font-size:13px;">${weatherLine}</div>
        ${conditionsNote ? `<div class="section-sub" style="margin:4px 0 0;">${conditionsNote}</div>` : ''}
      </div>
      <div class="pixel-panel">
        <div class="panel-title">Car Setup</div>
        ${this.renderSetupSliders()}
      </div>
      <button class="pbtn full gold" id="btn-go-hub">Return to Hub</button>
    `;
    document.getElementById('btn-go-hub').onclick = ()=> this.renderHub();
    this.wireSetupSliders();
  },

  trackFamiliarity(trackId){
    return this.state.player.trackFamiliarity[trackId] || 65;
  },

  /* Presentational only -- surfaces the existing overtakeDiff number (already
     used in the startPenalty formula inside simulateRace) as plain-language
     tiers. No new math, no sim changes. */
  overtakeTier(diff){
    if(diff>=8) return {label:'Very Difficult', icon:'🔒', chip:'red', note:'Grid position matters a lot here — a strong qualifying lap is worth extra this weekend.'};
    if(diff>=6) return {label:'Difficult', icon:'🚧', chip:'pink', note:'Hard to pass — track position earned in qualifying tends to stick.'};
    if(diff>=4) return {label:'Moderate', icon:'⚖️', chip:'gold', note:'Overtaking is possible with a pace advantage, but not easy.'};
    return {label:'Easy', icon:'🏎️', chip:'mint', note:'A fast car can move through the field — grid position matters less here.'};
  },

  renderSetupSliders(){
    const s = this.state; const cs = s.currentSetup;
    const round = this.getCurrentRound();
    const track = round ? TRACKS.find(t=>t.id===round.trackId) : null;
    if(!track){
      return `
        <div class="slider-row"><div class="top-line"><label>Downforce</label><span class="sval" id="val-downforce">${cs.downforce}</span></div><div class="setup-track-wrap"><div class="setup-track-base"></div><input type="range" min="0" max="100" value="${cs.downforce}" id="slide-downforce"></div></div>
        <div class="slider-row"><div class="top-line"><label>Balance</label><span class="sval" id="val-balance">${cs.balance}</span></div><div class="setup-track-wrap"><div class="setup-track-base"></div><input type="range" min="0" max="100" value="${cs.balance}" id="slide-balance"></div></div>
        <div class="slider-row" style="margin-bottom:0;"><div class="top-line"><label>Gear Ratio</label><span class="sval" id="val-gearRatio">${cs.gearRatio}</span></div><div class="setup-track-wrap"><div class="setup-track-base"></div><input type="range" min="0" max="100" value="${cs.gearRatio}" id="slide-gearRatio"></div></div>
      `;
    }
    const confidence = setupHintConfidence(s, track.id);
    const keys = [{k:'downforce', label:'Downforce'}, {k:'balance', label:'Balance'}, {k:'gearRatio', label:'Gear Ratio'}];
    const hintLine = confidence<=0
      ? `<div class="section-sub" style="margin:0 0 10px;">🔍 Your crew hasn't gathered enough data yet — run Practice and Simulator Training to get setup hints.</div>`
      : confidence<15
      ? `<div class="section-sub" style="margin:0 0 10px;">🔍 Setup confidence: <b>${confidence}%</b> — still early, but your crew is starting to build a picture. Keep practicing here and training in the simulator.</div>`
      : `<div class="section-sub" style="margin:0 0 10px;">🔍 Setup confidence: <b>${confidence}%</b> — the shaded band below shows your crew's best guess at the ideal range. It narrows as you practice here and train in the simulator.</div>`;
    return `
      ${hintLine}
      ${keys.map(({k,label})=>{
        const ideal = confidence>0 ? this.estimatedIdealForDisplay(track, k, confidence) : null;
        return `
        <div class="slider-row">
          <div class="top-line"><label>${label}</label><span class="sval" id="val-${k}">${cs[k]}</span></div>
          <div class="setup-track-wrap">
            <div class="setup-track-base"></div>
            ${ideal ? `<div class="setup-hint-band" style="left:${ideal.min}%; width:${ideal.max-ideal.min}%;"></div>` : ''}
            <input type="range" min="0" max="100" value="${cs[k]}" id="slide-${k}">
          </div>
          ${ideal ? `<div class="section-sub" style="margin:2px 0 0; font-size:9px;">Crew hint: aim roughly ${ideal.min}–${ideal.max}</div>` : ''}
        </div>`;
      }).join('')}
    `;
  },
  estimatedIdealForDisplay(track, key, confidence){
    // shows the hint band centered on the TRACK-side ideal only (never the exact
    // true value, which also includes the hidden personal nudge) so there's
    // always a little discovery left even at high confidence.
    const base = track.idealSetup[key];
    return setupHintBand(base, confidence);
  },
  wireSetupSliders(){
    ['downforce','balance','gearRatio'].forEach(key=>{
      const slider = document.getElementById('slide-'+key);
      if(!slider) return;
      slider.oninput = (e)=>{
        this.state.currentSetup[key] = +e.target.value;
        document.getElementById('val-'+key).textContent = e.target.value;
      };
    });
  },

  /* 19.13a+b -- track-weighted quiz theme selection. Wet weather always
     forces 'tires' (directly relevant knowledge for the actual conditions
     the player is about to race in) -- everything else is a track-character
     weighting, not a hard override, so there's real variance rather than a
     second layer of rigid rules. */
  pickPracticeQuizTheme(track, weather){
    if(weather==='rain') return 'tires';
    // A track where overtaking is hard (high overtakeDiff) rewards nailing
    // the setup more heavily, since track position is destiny there --
    // weight toward 'setup' 70/30 instead of the flat 100% 'setup' before.
    return Math.random() < (0.5 + track.overtakeDiff*0.02) ? 'setup' : 'tires';
  },
  pickQualifyingQuizTheme(track, weather){
    if(weather==='rain') return 'tires';
    // A track where overtaking is hard makes qualifying position matter
    // more (rules/strategy knowledge about why grid slot matters), a track
    // where passing is easy leans toward the pure strategy-call framing.
    return Math.random() < (0.3 + track.overtakeDiff*0.04) ? 'rules' : 'strategy';
  },

  /* ---------------- PRACTICE (mini-game: Setup Briefing) ---------------- */
  runPractice(){
    const s = this.state; const p = s.player;
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }
    const track = TRACKS.find(t=>t.id===round.trackId);
    const theme = this.pickPracticeQuizTheme(track, round.weather);
    this.startQuizMiniGame({
      title: 'Setup Briefing',
      subtitle: `${track.name} — Free Practice${round.weather==='rain' ? ' (Wet)' : ''}`,
      theme,
      questionCount: 3,
      trackId: track.id,
      onComplete: (scorePct)=>{
        // Familiarity gain: a base amount everyone gets for showing up, plus
        // a bonus for a strong mini-game showing — so practice always helps
        // a little, but doing well at reading the track/setup helps more.
        const baseGain = 6;
        const bonusGain = Math.round(scorePct * 4); // up to +4 more on a perfect score
        const totalGain = baseGain + bonusGain;
        p.trackFamiliarity[track.id] = clamp((p.trackFamiliarity[track.id]||65) + totalGain, 65, 100);
        const line = scorePct>=0.99 ? 'Perfect read on the track — your engineers are thrilled.'
          : scorePct>=0.6 ? 'Solid session — good data collected.'
          : 'A quieter session, but every lap teaches you something.';
        this.toast(`🏎️ Practice complete. ${line}`);
        this.pushNews(`🏎️ ${p.name} completes Free Practice at ${track.name}.`);
        this.saveState();
        this.advanceDay();
      },
    });
  },

  /* ---------------- QUALIFYING (mini-game: Strategy Call) ---------------- */
  runQualifying(){
    const s = this.state; const p = s.player;
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }
    const track = TRACKS.find(t=>t.id===round.trackId);
    const theme = this.pickQualifyingQuizTheme(track, round.weather);
    this.startQuizMiniGame({
      title: 'Strategy Call',
      subtitle: `${track.name} — Qualifying${round.weather==='rain' ? ' (Wet)' : ''}`,
      theme,
      questionCount: 3,
      trackId: track.id,
      onComplete: (scorePct)=> this.resolveQualifying(track, scorePct),
    });
  },

  /* 19.1 #8 -- Engine/gearbox grid penalty tied to team reliability.
     Deliberately the same safe pattern as maybeApplySafetyCar (app_race.js):
     a POST-SCORING position demotion on the ALREADY-FINAL, already-sorted
     qualifying results array, never touching simulateQualifying's scoring
     logic. This sidesteps the qualifying->race handoff risk entirely --
     s.lastQualyResults still has the exact same shape (same length, same
     driverId set, positions still 1..N) by the time resolveQualifying
     hands off to the race weekend, so nothing downstream needs to change. */
  maybeApplyGridPenalty(results){
    const s = this.state; const p = s.player;
    const team = this.getTeam(p.teamId);
    // Lower reliability = higher chance of a grid penalty this qualifying --
    // scaled the same direction as the DNF-risk formula (engine.js) so a
    // weak car is meaningfully more exposed to BOTH risks, not just one.
    const reliabilityGap = Math.max(0, 10 - team.reliability); // 0 (best) to ~6 (worst)
    const penaltyChance = clamp(reliabilityGap * 0.015, 0, 0.09); // up to 9% at the weakest reliability
    if(Math.random() > penaltyChance) return null;
    const playerResult = results.find(r=>r.driverId==='player');
    if(!playerResult || playerResult.dnf) return null; // no such thing as a qualifying DNF here, but stay defensive
    const dropPositions = randInt(3, 5);
    const oldPos = playerResult.position;
    const newPos = Math.min(results.length, oldPos + dropPositions);
    if(newPos === oldPos) return null;
    // Shift everyone who was between oldPos+1 and newPos UP by one to fill
    // the gap, then place the player at newPos -- a straightforward
    // insertion-move, not a full reshuffle, so only the directly-affected
    // drivers' positions change.
    results.forEach(r=>{
      if(r.driverId==='player') return;
      if(r.position > oldPos && r.position <= newPos) r.position -= 1;
    });
    playerResult.position = newPos;
    results.sort((a,b)=> (a.dnf?999:a.position) - (b.dnf?999:b.position));
    return { oldPos, newPos, dropPositions: newPos-oldPos };
  },

  resolveQualifying(track, scorePct){
    const s = this.state; const p = s.player;
    const round = this.getCurrentRound();
    const weather = round.weather;
    const trackTemp = round.trackTemp;
    p.familiarityBonus = ((p.trackFamiliarity[track.id]||65) - 65) * 0.15;
    const ideal = trueIdealSetup(track, p);
    const setupBonus = setupMatchBonus(s.currentSetup, ideal, getDifficultySettings(s).setupWindow);
    // Mini-game bonus: up to ±1.6 pace units depending on quiz performance —
    // a real but modest slice of the outcome, same order of magnitude as the
    // setup-match bonus, so stats/setup/familiarity still carry most of the
    // result while a good "Strategy Call" session genuinely helps.
    const miniGameBonus = (scorePct - 0.5) * 3.2;
    const paceBonus = setupBonus + cosmeticPaceBonus(this.getCosmeticBonuses()) + miniGameBonus;
    const results = simulateQualifying(s.grid, p, track, weather, paceBonus, trackTemp);
    const gridPenalty = this.maybeApplyGridPenalty(results);
    s.lastQualyResults = results;
    s.lastWeather = weather;
    const playerResult = results.find(r=>r.driverId==='player');
    const gridPos = playerResult.position;
    if(gridPos===1) p.careerStats.poles++;
    if(gridPos<=3) s.seasonStats.q3count = (s.seasonStats.q3count||0)+1;

    // 19.13c -- Q1/Q2/Q3 elimination framing, purely cosmetic labeling of
    // the position band (real F1 format: Q3 is the top-10 shootout, Q2 is
    // P11-15, Q1 is everyone eliminated at P16+). Doesn't change
    // simulateQualifying's actual scoring at all -- this is describing the
    // SAME position the player already qualified in, just with the
    // familiar three-segment framing instead of a flat "you qualified P__".
    const qSegment = gridPos<=10 ? {label:'Q3', icon:'🟢', note:'Through to the final shootout.'}
      : gridPos<=15 ? {label:'Q2', icon:'🟡', note:'Eliminated in Q2.'}
      : {label:'Q1', icon:'🔴', note:'Eliminated in Q1.'};

    const top5 = results.slice(0,5).map(r=>{
      const drv = r.driverId==='player' ? p : s.grid.find(d=>d.id===r.driverId);
      const lapTime = plausibleLapTime(track, r.position, results.length);
      return `<div class="row-item"><span class="rname">P${r.position} ${drv.name}${r.driverId==='player'?' (you)':''}</span><span class="rmeta">${lapTime}</span></div>`;
    }).join('');

    this.openModal(`
      ${this.modalHeader('Qualifying Result')}
      ${gridPenalty ? `<div class="chip red" style="margin-bottom:8px; display:block;">🔧 Gearbox penalty — dropped from P${gridPenalty.oldPos} to P${gridPenalty.newPos} on the grid.</div>` : ''}
      <div class="pixel-panel" style="text-align:center;">
        <div class="section-sub" style="margin-bottom:2px;">You qualified</div>
        <div style="font-family:var(--font-pixel); font-size:34px; color:${gridPos<=3?'var(--candy-yellow)':'var(--ink)'};">P${gridPos}</div>
        <div class="chip ${qSegment.label==='Q3'?'mint':qSegment.label==='Q2'?'gold':'red'}" style="margin-top:6px; display:inline-block;">${qSegment.icon} ${qSegment.label} — ${qSegment.note}</div>
      </div>
      <div class="section-title" style="font-size:10px;">Top 5</div>
      ${top5}
      <button class="pbtn full gold" id="btn-close-quali" style="margin-top:12px;">Continue</button>
    `);
    // No X close button -- same reasoning as the race result modal: results
    // are already committed to state before this modal opens, so a bypass
    // path that skips advanceDay() would desync dayIndex from the calendar.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.getElementById('btn-close-quali').onclick = ()=>{
      this.closeModal();
      this.pushNews(`⏱️ Qualifying at ${track.name}: ${p.name} starts P${gridPos}.`);
      this.saveState();
      this.advanceDay();
    };
  },

  /* ---------------- SHARED QUIZ MINI-GAME ENGINE ----------------
     Deliberately multiple-choice with no timer/reflex component, per product
     direction ("not using accuracy mechanic, otherwise it will be hard for
     user to do accuracy"). Tracks recently-seen question ids on
     state.player.recentQuizIds (a short rolling window) so players see
     variety over a career without ever fully running out of questions —
     the pool is reused, just not back-to-back. */
  startQuizMiniGame({title, subtitle, theme, questionCount, trackId, onComplete}){
    const s = this.state; const p = s.player;
    if(!p.recentQuizIds) p.recentQuizIds = [];
    const questions = pickQuizQuestions(theme, questionCount, p.recentQuizIds, trackId);
    p.recentQuizIds = [...p.recentQuizIds, ...questions.map(q=>q.id)].slice(-14); // keep a rolling window

    this._quizState = { questions, index:0, correctCount:0, title, subtitle, onComplete };
    this.renderQuizQuestion();
  },

  renderQuizQuestion(){
    const qs = this._quizState;
    const q = qs.questions[qs.index];
    this.openModal(`
      ${this.modalHeader(qs.title)}
      <div class="section-sub" style="margin:0 0 10px;">${qs.subtitle} · Question ${qs.index+1}/${qs.questions.length}</div>
      <div class="pixel-panel">
        <div style="font-weight:700; margin-bottom:2px;">${q.q}</div>
      </div>
      <div class="stack-8" id="quiz-options">
        ${q.options.map((opt,i)=>`<button class="pbtn full" data-opt="${i}" style="justify-content:flex-start; text-align:left;">${opt}</button>`).join('')}
      </div>
    `);
    // No close button on quiz questions, and background-tap-to-dismiss is
    // disabled too — a mini-game shouldn't be skippable, since that would
    // let players dodge poor answers. The flow proceeds automatically once
    // all questions are answered.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.querySelectorAll('#quiz-options [data-opt]').forEach(btn=>{
      btn.onclick = ()=> this.answerQuizQuestion(parseInt(btn.dataset.opt,10));
    });
  },

  answerQuizQuestion(choiceIdx){
    const qs = this._quizState;
    const q = qs.questions[qs.index];
    const correct = choiceIdx === q.correct;
    if(correct) qs.correctCount++;

    // Brief, low-key feedback (no failure state, no penalty beyond the score
    // itself — keeps the mini-game low-pressure) then advance.
    const options = document.querySelectorAll('#quiz-options [data-opt]');
    options.forEach(btn=>{
      btn.style.pointerEvents = 'none';
      const idx = parseInt(btn.dataset.opt,10);
      if(idx===q.correct) btn.style.background = 'var(--candy-mint)';
      else if(idx===choiceIdx) btn.style.background = '#ffd7d7';
    });
    this.toast(correct ? '✅ Correct!' : '➡️ Noted — moving on.');

    setTimeout(()=>{
      qs.index++;
      if(qs.index < qs.questions.length){
        this.renderQuizQuestion();
      }else{
        this.finishQuizMiniGame();
      }
    }, 550);
  },

  finishQuizMiniGame(){
    const qs = this._quizState;
    const scorePct = qs.questions.length ? qs.correctCount / qs.questions.length : 0.5;
    this.closeModal();
    const cb = qs.onComplete;
    this._quizState = null;
    cb(scorePct);
  },

  /* ---------------- SPRINT (Sprint Weekend only) ----------------
     A shortened Saturday race: uses the same simulateRace() engine (with a
     dampened result-spread since sprints are short and less eventful) but
     awards only sprint points (top 8, 8-1) and — critically — its finishing
     order becomes Sunday's starting grid instead of a separate qualifying
     session, matching the real F1 Sprint format. */
  runSprintQualifying(){
    const s = this.state; const p = s.player;
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }
    const track = TRACKS.find(t=>t.id===round.trackId);
    this.startQuizMiniGame({
      title: 'Sprint Qualifying',
      subtitle: `${track.name} — one quick lap sets the sprint grid`,
      theme: 'strategy',
      questionCount: 2,
      trackId: track.id,
      onComplete: (scorePct)=> this.resolveSprintQualifying(track, round, scorePct),
    });
  },

  resolveSprintQualifying(track, round, scorePct){
    const s = this.state; const p = s.player;
    const weather = round.weather;
    const trackTemp = round.trackTemp;
    p.familiarityBonus = ((p.trackFamiliarity[track.id]||65) - 65) * 0.15;
    const ideal = trueIdealSetup(track, p);
    const setupBonus = setupMatchBonus(s.currentSetup, ideal, getDifficultySettings(s).setupWindow);
    const miniGameBonus = (scorePct - 0.5) * 3.2;
    const paceBonus = setupBonus + cosmeticPaceBonus(this.getCosmeticBonuses()) + miniGameBonus;
    const qualy = simulateQualifying(s.grid, p, track, weather, paceBonus, trackTemp);
    // Sprint Qualifying sets round.sprintQualyResults (the sprint race's own
    // grid) -- deliberately kept separate from s.lastQualyResults, which is
    // reserved for the MAIN Saturday/Sunday qualifying->race handoff. This
    // is also why sprint qualifying does NOT increment p.careerStats.poles
    // or s.seasonStats.q3count -- those are specifically about the
    // championship-race qualifying session, not the sprint's own.
    round.sprintQualyResults = qualy;
    const playerResult = qualy.find(r=>r.driverId==='player');
    const gridPos = playerResult.position;

    const top5 = qualy.slice(0,5).map(r=>{
      const drv = r.driverId==='player' ? p : s.grid.find(d=>d.id===r.driverId);
      const lapTime = plausibleLapTime(track, r.position, qualy.length);
      return `<div class="row-item"><span class="rname">P${r.position} ${drv.name}${r.driverId==='player'?' (you)':''}</span><span class="rmeta">${lapTime}</span></div>`;
    }).join('');

    this.openModal(`
      ${this.modalHeader('Sprint Qualifying')}
      <div class="pixel-panel" style="text-align:center;">
        <div class="section-sub" style="margin-bottom:2px;">Sprint grid position</div>
        <div style="font-family:var(--font-pixel); font-size:34px; color:${gridPos<=3?'var(--candy-yellow)':'var(--ink)'};">P${gridPos}</div>
      </div>
      <div class="section-title" style="font-size:10px;">Top 5</div>
      ${top5}
      <button class="pbtn full gold" id="btn-close-sprint-quali" style="margin-top:12px;">Continue to Sprint</button>
    `);
    // No X close button -- round.sprintQualyResults is already committed
    // before this modal opens, same reasoning as every other result modal.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.getElementById('btn-close-sprint-quali').onclick = ()=>{
      this.closeModal();
      this.renderSprintStrategyPrompt(track, round);
    };
  },

  /* Sprint strategy prompt -- deliberately just 2 options (not the main
     race's 4 + tire compound + formation lap), keeping the sprint feeling
     like the shorter, lower-stakes session it represents rather than a
     second full race weekend bolted on. */
  renderSprintStrategyPrompt(track, round){
    const engineer = this.state.npcRoster.find(n=>n.role==='Race Engineer');
    const line = radioLine(engineer.personality, 'push');
    this.openModal(`
      ${this.modalHeader('Sprint Strategy')}
      <div class="pixel-panel" style="border-left:3px solid var(--candy-blue);">
        <div class="section-sub" style="margin:0 0 4px;">📻 ${engineer.name} (Race Engineer)</div>
        <div style="font-weight:700; font-style:italic;">"${line}"</div>
      </div>
      <div class="section-sub" style="margin-bottom:8px;">Short sprint, no time to overthink it. Pick your approach.</div>
      <div class="stack-8">
        <button class="pbtn full" data-sprint-strat="push">🔥 Push — go for the sprint win</button>
        <button class="pbtn full" data-sprint-strat="saveTires">🛞 Save Tires — protect Sunday's grid slot</button>
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-sprint-strat]').forEach(btn=>{
      btn.onclick = ()=>{
        this.closeModal();
        this.resolveSprintRace(track, round, btn.dataset.sprintStrat);
      };
    });
  },

  resolveSprintRace(track, round, approach){
    const s = this.state; const p = s.player;
    const weather = round.weather;
    const trackTemp = round.trackTemp;
    const qualy = round.sprintQualyResults;
    const results = simulateRace(s.grid, p, qualy, track, weather, {approach: approach||'push'}, getDifficultySettings(s), this.getTeamMorale(p.teamId), 0, trackTemp);

    // Sprint points only (no career-stat wins/podiums/starts credit — a
    // sprint is its own mini-event, distinct from the championship race).
    results.forEach(r=>{
      const pts = sprintPointsForPosition(r.dnf ? null : r.position);
      if(pts) s.standings[r.driverId] = (s.standings[r.driverId]||0) + pts;
    });

    const playerResult = results.find(r=>r.driverId==='player');
    const sprintPos = playerResult.dnf ? null : playerResult.position;
    const sprintPts = sprintPointsForPosition(sprintPos);

    // Sunday's grid is set directly from the sprint finishing order.
    s.lastQualyResults = results.map((r,i)=>({driverId:r.driverId, position:i+1, score:0}));
    s.lastWeather = weather;
    round.sprintCompleted = true;

    // Sprint-specific flavor: distinct headline wording from the main race's
    // generateRaceHeadline (which always says "RACE REPORT"/mentions
    // championship stakes), so a sprint doesn't read like a smaller version
    // of Sunday's race but its own kind of event.
    const sprintHeadline = sprintPos===1 ? `${p.name} takes the Sprint win at ${track.name}!`
      : sprintPos && sprintPos<=3 ? `${p.name} lands on the Sprint podium at ${track.name}.`
      : sprintPos ? `${p.name} finishes the Sprint P${sprintPos} at ${track.name}.`
      : `A tough Sprint for ${p.name} at ${track.name} — DNF.`;

    const top5 = results.slice(0,5).map(r=>{
      const drv = r.driverId==='player' ? p : s.grid.find(d=>d.id===r.driverId);
      const lapTime = plausibleLapTime(track, r.position||results.length, results.length);
      return `<div class="row-item"><span class="rname">${r.dnf?'DNF':'P'+r.position} ${drv.name}${r.driverId==='player'?' (you)':''}</span><span class="rmeta">${r.dnf?'':lapTime}</span></div>`;
    }).join('');

    this.openModal(`
      ${this.modalHeader('Sprint Result')}
      <div class="pixel-panel" style="text-align:center;">
        <div class="section-sub" style="margin-bottom:2px;">Sprint finish</div>
        <div style="font-family:var(--font-pixel); font-size:34px; color:${sprintPos && sprintPos<=3?'var(--candy-yellow)':'var(--ink)'};">${sprintPos?'P'+sprintPos:'DNF'}</div>
        ${sprintPts?`<div class="section-sub">+${sprintPts} championship points</div>`:''}
      </div>
      <div class="section-sub" style="margin:8px 0 4px;">${sprintHeadline} This sets your starting grid for Sunday's race.</div>
      <div class="section-title" style="font-size:10px;">Top 5</div>
      ${top5}
      <button class="pbtn full gold" id="btn-close-sprint" style="margin-top:12px;">Continue</button>
    `);
    // No X close button -- same reasoning as the race/qualifying result
    // modals: round.sprintCompleted and standings points are already
    // committed before this modal opens.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.getElementById('btn-close-sprint').onclick = ()=>{
      this.closeModal();
      this.pushNews(`🏃 ${sprintHeadline}`);
      this.saveState();
      this.advanceDay();
    };
  },

  /* ---------------- RACE ---------------- */
  /* Race Engineer advice: picks a short, situationally-aware line based on
     actual conditions (hot/cold/rain) and the player's grid position on a
     track where passing is hard -- reusing overtakeTier() (same helper the
     Race Center screen already uses for its overtake-difficulty chip) so
     "tough to pass here" is judged consistently everywhere in the game.
     Pure content/logic, no new state, no sim changes -- the conditions and
     grid position it reads are already computed elsewhere in this flow. */
  raceEngineerAdvice(round, track){
    const s = this.state;
    const band = tempBand(round.trackTemp);
    const isRain = round.weather==='rain';
    const qualy = s.lastQualyResults;
    const playerQ = qualy ? qualy.find(q=>q.driverId==='player') : null;
    const gridPos = playerQ ? playerQ.position : null;
    if(isRain) return "Rain out there — Save Tires might be the smarter call today.";
    if(band.label==='Hot') return "Hot one today — tyres will go off fast, Save Tires is worth considering.";
    if(gridPos!==null && gridPos>=12 && this.overtakeTier(track.overtakeDiff).label!=='Easy'){
      return `You're starting P${gridPos} on a track where passing is tough — Defend could protect what we've got, or Attack if you want to gamble on it.`;
    }
    if(gridPos!==null && gridPos<=4){
      return `Good grid slot, P${gridPos}. Push hard and control this from the front.`;
    }
    return null; // no situational advice -- fall back to the normal radio-personality line
  },

      <div class="stack-8">
