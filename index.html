   ============================================================ */

Object.assign(App, {

  renderRaceCenterScreen(){
    this.currentScreen = 'race';
    const s = this.state;
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }
    const track = TRACKS.find(t=>t.id===round.trackId);
    this.updateStatusStrip();
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.nav==='race'));

    const band = tempBand(round.trackTemp);
    const isRain = round.weather==='rain';
    const weatherLine = isRain
      ? `🌧️ Rain expected · ${round.trackTemp}°C`
      : `${band.icon} Clear · ${round.trackTemp}°C (${band.label})`;
    const conditionsNote = isRain
      ? 'Wet-weather skill matters more this weekend — check your driver\'s wetSkill and consider a cautious approach.'
      : band.label==='Hot'
      ? 'Hot track — tyres wear faster and reliability risk is higher. Tyre management and Save Tires strategy help more than usual.'
      : band.label==='Cold'
      ? 'Cold track — less grip for everyone. A cautious, smooth approach helps offset it.'
      : '';

    this.root.innerHTML = `
      <div class="pod-wrap" style="margin-bottom:6px;">
        <div class="pod" style="width:96px; height:96px;">
          <span class="pod-sprite" style="font-size:40px;">🏎️</span>
        </div>
      </div>
      <div class="pixel-panel">
        <div class="panel-title">${track.country} <span class="tag">Round ${round.round}/${s.calendar.rounds.length}</span></div>
        <div style="font-weight:800; margin-bottom:4px;">${track.name}</div>
        <div class="section-sub" style="margin-bottom:0;">${track.character}</div>
        <div class="section-sub" style="margin:4px 0 0;">Familiarity: ${Math.round(this.trackFamiliarity(track.id))}%</div>
        <div class="chip ${this.overtakeTier(track.overtakeDiff).chip}" style="margin-top:8px;">${this.overtakeTier(track.overtakeDiff).icon} Overtaking: ${this.overtakeTier(track.overtakeDiff).label} (${track.overtakeDiff}/10)</div>
        <div class="section-sub" style="margin:4px 0 0;">${this.overtakeTier(track.overtakeDiff).note}</div>
      </div>

      <div class="pixel-panel" style="border-left:3px solid ${isRain?'var(--candy-blue)':band.label==='Hot'?'var(--candy-red)':band.label==='Cold'?'var(--candy-blue)':'var(--candy-mint)'};">
        <div class="panel-title">Weekend Forecast</div>
        <div style="font-weight:800; font-size:13px;">${weatherLine}</div>
        ${conditionsNote ? `<div class="section-sub" style="margin:4px 0 0;">${conditionsNote}</div>` : ''}
      </div>
      <div class="pixel-panel">
        <div class="panel-title">Car Setup</div>
        ${this.renderSetupSliders()}
      </div>
      <button class="pbtn full gold" id="btn-go-hub">Return to Hub</button>
    `;
    document.getElementById('btn-go-hub').onclick = ()=> this.renderHub();
    this.wireSetupSliders();
  },

  trackFamiliarity(trackId){
    return this.state.player.trackFamiliarity[trackId] || 65;
  },

  /* Presentational only -- surfaces the existing overtakeDiff number (already
     used in the startPenalty formula inside simulateRace) as plain-language
     tiers. No new math, no sim changes. */
  overtakeTier(diff){
    if(diff>=8) return {label:'Very Difficult', icon:'🔒', chip:'red', note:'Grid position matters a lot here — a strong qualifying lap is worth extra this weekend.'};
    if(diff>=6) return {label:'Difficult', icon:'🚧', chip:'pink', note:'Hard to pass — track position earned in qualifying tends to stick.'};
    if(diff>=4) return {label:'Moderate', icon:'⚖️', chip:'gold', note:'Overtaking is possible with a pace advantage, but not easy.'};
    return {label:'Easy', icon:'🏎️', chip:'mint', note:'A fast car can move through the field — grid position matters less here.'};
  },

  renderSetupSliders(){
    const s = this.state; const cs = s.currentSetup;
    const round = this.getCurrentRound();
    const track = round ? TRACKS.find(t=>t.id===round.trackId) : null;
    if(!track){
      return `
        <div class="slider-row"><div class="top-line"><label>Downforce</label><span class="sval" id="val-downforce">${cs.downforce}</span></div><div class="setup-track-wrap"><div class="setup-track-base"></div><input type="range" min="0" max="100" value="${cs.downforce}" id="slide-downforce"></div></div>
        <div class="slider-row"><div class="top-line"><label>Balance</label><span class="sval" id="val-balance">${cs.balance}</span></div><div class="setup-track-wrap"><div class="setup-track-base"></div><input type="range" min="0" max="100" value="${cs.balance}" id="slide-balance"></div></div>
        <div class="slider-row" style="margin-bottom:0;"><div class="top-line"><label>Gear Ratio</label><span class="sval" id="val-gearRatio">${cs.gearRatio}</span></div><div class="setup-track-wrap"><div class="setup-track-base"></div><input type="range" min="0" max="100" value="${cs.gearRatio}" id="slide-gearRatio"></div></div>
      `;
    }
    const confidence = setupHintConfidence(s, track.id);
    const keys = [{k:'downforce', label:'Downforce'}, {k:'balance', label:'Balance'}, {k:'gearRatio', label:'Gear Ratio'}];
    const hintLine = confidence<=0
      ? `<div class="section-sub" style="margin:0 0 10px;">🔍 Your crew hasn't gathered enough data yet — run Practice and Simulator Training to get setup hints.</div>`
      : confidence<15
      ? `<div class="section-sub" style="margin:0 0 10px;">🔍 Setup confidence: <b>${confidence}%</b> — still early, but your crew is starting to build a picture. Keep practicing here and training in the simulator.</div>`
      : `<div class="section-sub" style="margin:0 0 10px;">🔍 Setup confidence: <b>${confidence}%</b> — the shaded band below shows your crew's best guess at the ideal range. It narrows as you practice here and train in the simulator.</div>`;
    return `
      ${hintLine}
      ${keys.map(({k,label})=>{
        const ideal = confidence>0 ? this.estimatedIdealForDisplay(track, k, confidence) : null;
        return `
        <div class="slider-row">
          <div class="top-line"><label>${label}</label><span class="sval" id="val-${k}">${cs[k]}</span></div>
          <div class="setup-track-wrap">
            <div class="setup-track-base"></div>
            ${ideal ? `<div class="setup-hint-band" style="left:${ideal.min}%; width:${ideal.max-ideal.min}%;"></div>` : ''}
            <input type="range" min="0" max="100" value="${cs[k]}" id="slide-${k}">
          </div>
          ${ideal ? `<div class="section-sub" style="margin:2px 0 0; font-size:9px;">Crew hint: aim roughly ${ideal.min}–${ideal.max}</div>` : ''}
        </div>`;
      }).join('')}
    `;
  },
  estimatedIdealForDisplay(track, key, confidence){
    // shows the hint band centered on the TRACK-side ideal only (never the exact
    // true value, which also includes the hidden personal nudge) so there's
    // always a little discovery left even at high confidence.
    const base = track.idealSetup[key];
    return setupHintBand(base, confidence);
  },
  wireSetupSliders(){
    ['downforce','balance','gearRatio'].forEach(key=>{
      const slider = document.getElementById('slide-'+key);
      if(!slider) return;
      slider.oninput = (e)=>{
        this.state.currentSetup[key] = +e.target.value;
        document.getElementById('val-'+key).textContent = e.target.value;
      };
    });
  },

  /* ---------------- PRACTICE (mini-game: Setup Briefing) ---------------- */
  runPractice(){
    const s = this.state; const p = s.player;
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }
    const track = TRACKS.find(t=>t.id===round.trackId);
    this.startQuizMiniGame({
      title: 'Setup Briefing',
      subtitle: `${track.name} — Free Practice`,
      theme: 'setup',
      questionCount: 3,
      onComplete: (scorePct)=>{
        // Familiarity gain: a base amount everyone gets for showing up, plus
        // a bonus for a strong mini-game showing — so practice always helps
        // a little, but doing well at reading the track/setup helps more.
        const baseGain = 6;
        const bonusGain = Math.round(scorePct * 4); // up to +4 more on a perfect score
        const totalGain = baseGain + bonusGain;
        p.trackFamiliarity[track.id] = clamp((p.trackFamiliarity[track.id]||65) + totalGain, 65, 100);
        const line = scorePct>=0.99 ? 'Perfect read on the track — your engineers are thrilled.'
          : scorePct>=0.6 ? 'Solid session — good data collected.'
          : 'A quieter session, but every lap teaches you something.';
        this.toast(`🏎️ Practice complete. ${line}`);
        this.pushNews(`🏎️ ${p.name} completes Free Practice at ${track.name}.`);
        this.saveState();
        this.advanceDay();
      },
    });
  },

  /* ---------------- QUALIFYING (mini-game: Strategy Call) ---------------- */
  runQualifying(){
    const s = this.state; const p = s.player;
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }
    const track = TRACKS.find(t=>t.id===round.trackId);
    this.startQuizMiniGame({
      title: 'Strategy Call',
      subtitle: `${track.name} — Qualifying`,
      theme: 'strategy',
      questionCount: 3,
      onComplete: (scorePct)=> this.resolveQualifying(track, scorePct),
    });
  },

  resolveQualifying(track, scorePct){
    const s = this.state; const p = s.player;
    const round = this.getCurrentRound();
    const weather = round.weather;
    const trackTemp = round.trackTemp;
    p.familiarityBonus = ((p.trackFamiliarity[track.id]||65) - 65) * 0.15;
    const ideal = trueIdealSetup(track, p);
    const setupBonus = setupMatchBonus(s.currentSetup, ideal, getDifficultySettings(s).setupWindow);
    // Mini-game bonus: up to ±1.6 pace units depending on quiz performance —
    // a real but modest slice of the outcome, same order of magnitude as the
    // setup-match bonus, so stats/setup/familiarity still carry most of the
    // result while a good "Strategy Call" session genuinely helps.
    const miniGameBonus = (scorePct - 0.5) * 3.2;
    const paceBonus = setupBonus + cosmeticPaceBonus(this.getCosmeticBonuses()) + miniGameBonus;
    const results = simulateQualifying(s.grid, p, track, weather, paceBonus, trackTemp);
    s.lastQualyResults = results;
    s.lastWeather = weather;
    const playerResult = results.find(r=>r.driverId==='player');
    const gridPos = playerResult.position;
    if(gridPos===1) p.careerStats.poles++;
    if(gridPos<=3) s.seasonStats.q3count = (s.seasonStats.q3count||0)+1;

    const top5 = results.slice(0,5).map(r=>{
      const drv = r.driverId==='player' ? p : s.grid.find(d=>d.id===r.driverId);
      return `<div class="row-item"><span class="rname">P${r.position} ${drv.name}${r.driverId==='player'?' (you)':''}</span></div>`;
    }).join('');

    this.openModal(`
      ${this.modalHeader('Qualifying Result')}
      <div class="pixel-panel" style="text-align:center;">
        <div class="section-sub" style="margin-bottom:2px;">You qualified</div>
        <div style="font-family:var(--font-pixel); font-size:34px; color:${gridPos<=3?'var(--candy-yellow)':'var(--ink)'};">P${gridPos}</div>
      </div>
      <div class="section-title" style="font-size:10px;">Top 5</div>
      ${top5}
      <button class="pbtn full gold" id="btn-close-quali" style="margin-top:12px;">Continue</button>
    `);
    this.wireModalClose();
    document.getElementById('btn-close-quali').onclick = ()=>{
      this.closeModal();
      this.pushNews(`⏱️ Qualifying at ${track.name}: ${p.name} starts P${gridPos}.`);
      this.saveState();
      this.advanceDay();
    };
  },

  /* ---------------- SHARED QUIZ MINI-GAME ENGINE ----------------
     Deliberately multiple-choice with no timer/reflex component, per product
     direction ("not using accuracy mechanic, otherwise it will be hard for
     user to do accuracy"). Tracks recently-seen question ids on
     state.player.recentQuizIds (a short rolling window) so players see
     variety over a career without ever fully running out of questions —
     the pool is reused, just not back-to-back. */
  startQuizMiniGame({title, subtitle, theme, questionCount, onComplete}){
    const s = this.state; const p = s.player;
    if(!p.recentQuizIds) p.recentQuizIds = [];
    const questions = pickQuizQuestions(theme, questionCount, p.recentQuizIds);
    p.recentQuizIds = [...p.recentQuizIds, ...questions.map(q=>q.id)].slice(-14); // keep a rolling window

    this._quizState = { questions, index:0, correctCount:0, title, subtitle, onComplete };
    this.renderQuizQuestion();
  },

  renderQuizQuestion(){
    const qs = this._quizState;
    const q = qs.questions[qs.index];
    this.openModal(`
      ${this.modalHeader(qs.title)}
      <div class="section-sub" style="margin:0 0 10px;">${qs.subtitle} · Question ${qs.index+1}/${qs.questions.length}</div>
      <div class="pixel-panel">
        <div style="font-weight:700; margin-bottom:2px;">${q.q}</div>
      </div>
      <div class="stack-8" id="quiz-options">
        ${q.options.map((opt,i)=>`<button class="pbtn full" data-opt="${i}" style="justify-content:flex-start; text-align:left;">${opt}</button>`).join('')}
      </div>
    `);
    // No close button on quiz questions, and background-tap-to-dismiss is
    // disabled too — a mini-game shouldn't be skippable, since that would
    // let players dodge poor answers. The flow proceeds automatically once
    // all questions are answered.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.querySelectorAll('#quiz-options [data-opt]').forEach(btn=>{
      btn.onclick = ()=> this.answerQuizQuestion(parseInt(btn.dataset.opt,10));
    });
  },

  answerQuizQuestion(choiceIdx){
    const qs = this._quizState;
    const q = qs.questions[qs.index];
    const correct = choiceIdx === q.correct;
    if(correct) qs.correctCount++;

    // Brief, low-key feedback (no failure state, no penalty beyond the score
    // itself — keeps the mini-game low-pressure) then advance.
    const options = document.querySelectorAll('#quiz-options [data-opt]');
    options.forEach(btn=>{
      btn.style.pointerEvents = 'none';
      const idx = parseInt(btn.dataset.opt,10);
      if(idx===q.correct) btn.style.background = 'var(--candy-mint)';
      else if(idx===choiceIdx) btn.style.background = '#ffd7d7';
    });
    this.toast(correct ? '✅ Correct!' : '➡️ Noted — moving on.');

    setTimeout(()=>{
      qs.index++;
      if(qs.index < qs.questions.length){
        this.renderQuizQuestion();
      }else{
        this.finishQuizMiniGame();
      }
    }, 550);
  },

  finishQuizMiniGame(){
    const qs = this._quizState;
    const scorePct = qs.questions.length ? qs.correctCount / qs.questions.length : 0.5;
    this.closeModal();
    const cb = qs.onComplete;
    this._quizState = null;
    cb(scorePct);
  },

  /* ---------------- SPRINT (Sprint Weekend only) ----------------
     A shortened Saturday race: uses the same simulateRace() engine (with a
     dampened result-spread since sprints are short and less eventful) but
     awards only sprint points (top 8, 8-1) and — critically — its finishing
     order becomes Sunday's starting grid instead of a separate qualifying
     session, matching the real F1 Sprint format. */
  runSprintRace(){
    const s = this.state; const p = s.player;
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }
    const track = TRACKS.find(t=>t.id===round.trackId);
    this.startQuizMiniGame({
      title: 'Sprint Shootout',
      subtitle: `${track.name} — Sprint Qualifying`,
      theme: 'strategy',
      questionCount: 2,
      onComplete: (scorePct)=> this.resolveSprintRace(track, round, scorePct),
    });
  },

  resolveSprintRace(track, round, scorePct){
    const s = this.state; const p = s.player;
    const weather = round.weather;
    const trackTemp = round.trackTemp;
    p.familiarityBonus = ((p.trackFamiliarity[track.id]||65) - 65) * 0.15;
    const ideal = trueIdealSetup(track, p);
    const setupBonus = setupMatchBonus(s.currentSetup, ideal, getDifficultySettings(s).setupWindow);
    const miniGameBonus = (scorePct - 0.5) * 3.2;
    const paceBonus = setupBonus + cosmeticPaceBonus(this.getCosmeticBonuses()) + miniGameBonus;
    const qualy = simulateQualifying(s.grid, p, track, weather, paceBonus, trackTemp);
    const results = simulateRace(s.grid, p, qualy, track, weather, {approach:'push'}, getDifficultySettings(s), this.getTeamMorale(p.teamId), paceBonus, trackTemp);

    // Sprint points only (no career-stat wins/podiums/starts credit — a
    // sprint is its own mini-event, distinct from the championship race).
    results.forEach(r=>{
      const pts = sprintPointsForPosition(r.dnf ? null : r.position);
      if(pts) s.standings[r.driverId] = (s.standings[r.driverId]||0) + pts;
    });

    const playerResult = results.find(r=>r.driverId==='player');
    const sprintPos = playerResult.dnf ? null : playerResult.position;
    const sprintPts = sprintPointsForPosition(sprintPos);

    // Sunday's grid is set directly from the sprint finishing order.
    s.lastQualyResults = results.map((r,i)=>({driverId:r.driverId, position:i+1, score:0}));
    s.lastWeather = weather;
    round.sprintCompleted = true;

    const top5 = results.slice(0,5).map(r=>{
      const drv = r.driverId==='player' ? p : s.grid.find(d=>d.id===r.driverId);
      return `<div class="row-item"><span class="rname">P${r.position} ${drv.name}${r.driverId==='player'?' (you)':''}</span></div>`;
    }).join('');

    this.openModal(`
      ${this.modalHeader('Sprint Result')}
      <div class="pixel-panel" style="text-align:center;">
        <div class="section-sub" style="margin-bottom:2px;">Sprint finish</div>
        <div style="font-family:var(--font-pixel); font-size:34px; color:${sprintPos && sprintPos<=3?'var(--candy-yellow)':'var(--ink)'};">${sprintPos?'P'+sprintPos:'DNF'}</div>
        ${sprintPts?`<div class="section-sub">+${sprintPts} championship points</div>`:''}
      </div>
      <div class="section-sub" style="margin:8px 0 4px;">This sets your starting grid for Sunday's race.</div>
      <div class="section-title" style="font-size:10px;">Top 5</div>
      ${top5}
      <button class="pbtn full gold" id="btn-close-sprint" style="margin-top:12px;">Continue</button>
    `);
    this.wireModalClose();
    document.getElementById('btn-close-sprint').onclick = ()=>{
      this.closeModal();
      this.pushNews(`🏃 Sprint at ${track.name}: ${p.name} finishes ${sprintPos?'P'+sprintPos:'DNF'}.`);
      this.saveState();
      this.advanceDay();
    };
  },

  /* ---------------- RACE ---------------- */
  renderRaceStrategyPrompt(){
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }
    const engineer = this.state.npcRoster.find(n=>n.role==='Race Engineer');
    const line = radioLine(engineer.personality, 'push');
    const band = tempBand(round.trackTemp);
    const isRain = round.weather==='rain';
    const conditionsChip = isRain ? `🌧️ Rain · ${round.trackTemp}°C` : `${band.icon} ${band.label} · ${round.trackTemp}°C`;
    this.openModal(`
      ${this.modalHeader('Race Strategy')}
      <div class="pixel-panel" style="border-left:3px solid var(--candy-blue);">
        <div class="section-sub" style="margin:0 0 4px;">📻 ${engineer.name} (Race Engineer)</div>
        <div style="font-weight:700; font-style:italic;">"${line}"</div>
      </div>
      <div class="section-sub" style="margin-bottom:8px;">Conditions: <b>${conditionsChip}</b>${isRain ? ' — wet skill matters more.' : band.label==='Hot' ? ' — tyres wear faster, DNF risk up.' : band.label==='Cold' ? ' — less grip for everyone.' : ''}</div>
      <div class="section-sub">Choose your approach for today's race.</div>
      <div class="stack-8">
        <button class="pbtn full" data-strat="push">🔥 Push — higher risk, higher reward</button>
        <button class="pbtn full" data-strat="attack">⚡ Attack — chase every overtake</button>
        <button class="pbtn full" data-strat="defend">🛡️ Defend — protect track position</button>
        <button class="pbtn full" data-strat="saveTires">🛞 Save Tires — steady and consistent</button>
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-strat]').forEach(btn=>{
      btn.onclick = ()=>{
        this.closeModal();
        this.executeRace(btn.dataset.strat);
      };
    });
  },

  runRace(){
    this.renderRaceStrategyPrompt();
  },

  executeRace(approach){
    const s = this.state; const p = s.player;
    const round = this.getCurrentRound();
    if(!round){ this.renderHub(); return; }
    const track = TRACKS.find(t=>t.id===round.trackId);
    const weather = round.weather;
    const trackTemp = round.trackTemp;
    const ideal = trueIdealSetup(track, p);
    const setupBonus = setupMatchBonus(s.currentSetup, ideal, getDifficultySettings(s).setupWindow);
    const paceBonus = setupBonus + cosmeticPaceBonus(this.getCosmeticBonuses());
    const qualy = s.lastQualyResults || simulateQualifying(s.grid, p, track, weather, paceBonus, trackTemp);
    const results = simulateRace(s.grid, p, qualy, track, weather, {approach}, getDifficultySettings(s), this.getTeamMorale(p.teamId), paceBonus, trackTemp);

    const playerResult = results.find(r=>r.driverId==='player');
    const teammateEntry = s.grid.find(d=>d.teamId===p.teamId);

    // apply points & career stats to everyone
    results.forEach(r=>{
      const isPlayer = r.driverId==='player';
      const drv = isPlayer ? p : s.grid.find(d=>d.id===r.driverId);
      if(!drv) return;
      drv.careerStats.starts++;
      if(r.dnf){ drv.careerStats.dnfs++; return; }
      const pts = pointsForPosition(r.position);
      drv.careerStats.points += pts;
      s.standings[r.driverId] = (s.standings[r.driverId]||0) + pts;
      if(r.position===1){ drv.careerStats.wins++; if(isPlayer) s.seasonStats.wins++; if(weather==='rain' && isPlayer) drv.careerStats.wetWins++; }
      if(r.position<=3){ drv.careerStats.podiums++; if(isPlayer) s.seasonStats.podiums++; }
      if(isPlayer) s.seasonStats.points += pts;
    });

    if(playerResult && !playerResult.dnf && teammateEntry){
      const tmResult = results.find(r=>r.driverId===teammateEntry.id);
      if(tmResult && (tmResult.dnf || playerResult.position < tmResult.position)) s.seasonStats.beatTeammate = true;
    }

    this.checkSponsorTierUnlocks();

    // money & fans
    const pos = playerResult.dnf ? null : playerResult.position;
    let moneyGain = 2 + (this.getTeam(p.teamId).tier===1?3:this.getTeam(p.teamId).tier===2?1.5:0.6);
    let fanGain = 15;
    if(pos){
      moneyGain += pointsForPosition(pos)*0.3;
      fanGain += pointsForPosition(pos)*8;
      if(pos===1){ fanGain+=150; moneyGain+=4; }
      else if(pos<=3){ fanGain+=60; moneyGain+=2; }
    } else { fanGain -= 15; }
    p.money = Math.round((p.money + moneyGain)*10)/10;
    const cosmeticBonuses = this.getCosmeticBonuses();
    if(cosmeticBonuses.fanPopularity) fanGain += cosmeticBonuses.fanPopularity;
    p.fanPopularity = Math.max(0, p.fanPopularity + fanGain);
    if(cosmeticBonuses.mediaReputation) p.mediaReputation = clamp(p.mediaReputation + cosmeticBonuses.mediaReputation * 0.3, 0, 100);

    // mood/confidence feedback
    if(pos && pos<=3){ p.attributes.mental.confidence = clamp(p.attributes.mental.confidence+6); p.attributes.lifestyle.mood=clamp(p.attributes.lifestyle.mood+10); }
    else if(playerResult.dnf){ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence-5); p.attributes.lifestyle.mood=clamp(p.attributes.lifestyle.mood-8); p.attributes.lifestyle.stress=clamp(p.attributes.lifestyle.stress+10); }
    else if(pos && pos<=10){ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence+2); }
    else { p.attributes.mental.confidence=clamp(p.attributes.mental.confidence-2); p.attributes.lifestyle.stress=clamp(p.attributes.lifestyle.stress+5); }
    p.attributes.lifestyle.energy = clamp(p.attributes.lifestyle.energy-30);

    this.applyRomancePartnerPerk();

    this.checkTraitEvolution();
    this.checkMilestones(pos, playerResult.dnf, track);
    this.checkNewArchetypes();

    const newStyle = recordStyleProgress(p, approach);
    if(newStyle){
      this.toast(`✨ You've developed a signature style: ${newStyle}!`);
      this.pushNews(`✨ ${p.name} is earning a reputation as a ${newStyle} driver.`);
    }
    this.updateRivalry(results, pos);
    const sponsorIncome = this.checkSponsorObjectives(pos, playerResult.dnf, approach);

    // team chemistry responds to results
    if(!playerResult.dnf && pos<=3) this.adjustTeamMorale(p.teamId, 4);
    else if(playerResult.dnf) this.adjustTeamMorale(p.teamId, -3);
    else if(pos && pos<=10) this.adjustTeamMorale(p.teamId, 1);
    // Leadership: a driver who leads well lifts the garage's mood a little
    // every single race regardless of result, on top of the result-based
    // swings above -- small (max +0.5 at 99 leadership), but this was
    // previously a mental stat with zero effect anywhere in the game.
    const leadershipBoost = (p.attributes.mental.leadership/99) * 0.5;
    if(leadershipBoost>0) this.adjustTeamMorale(p.teamId, leadershipBoost);

    round.completed = true;
    s.calendar.currentRound++;
    s.lastQualyResults = null;
    if(!s.cosmetics) s.cosmetics = this.initialCosmeticsState();
    s.cosmetics.totalRoundsCompletedThisSeason = s.calendar.currentRound;
    this.checkCosmeticUnlocks();

    const headline = this.generateRaceHeadline(pos, playerResult.dnf, track);
    p.journal.unshift({season:s.season, week:s.week, title:headline.title, text:headline.body, icon:'🏁'});
    this.pushNews(`🏁 ${track.name}: ${p.name} finishes ${playerResult.dnf?'DNF':'P'+pos}.`);
    s.lastRaceHeadline = { track: track.name, position: pos, dnf: playerResult.dnf };

    const playerQualy = qualy.find(q=>q.driverId==='player');
    this.openModal(this.renderRaceResultHtml(results, pos, playerResult.dnf, headline, moneyGain, fanGain, sponsorIncome, playerQualy, track));
    this.wireModalClose();
    const closeBtn = document.getElementById('btn-close-race');
    closeBtn.onclick = ()=>{
      this.closeModal();
      this.saveState();
      const advance = ()=>{
        if(s.calendar.currentRound >= s.calendar.rounds.length){
          this.handleSeasonEnd();
        } else {
          this.advanceDay();
        }
      };
      // Podium interview: a short, race-result-triggered variant of the
      // Media modal, gated to top-3 finishes only. Reuses the same
      // choice/effect/memory pattern as renderMediaModal -- no new state.
      if(pos && pos<=3 && !playerResult.dnf){
        this.renderPodiumInterviewModal(pos, track, advance);
      } else {
        advance();
      }
    };
  },

  renderPodiumInterviewModal(pos, track, onDone){
    const s = this.state; const p = s.player;
    const journalist = s.npcRoster.find(n=>n.role==='Journalist');
    const podiumWord = pos===1 ? 'the win' : pos===2 ? 'second place' : 'third place';
    const options = pos===1 ? [
      {label:'Dedicate it to the team', effect:()=>{ this.adjustTeamMorale(p.teamId, 5); }, result:'The garage loves hearing that.', memory:`Dedicated the win at ${track.name} to the team`},
      {label:'Soak in the moment', effect:()=>{ p.fanPopularity=clamp(p.fanPopularity+5,0,999); }, result:'Fans eat this up.', memory:`Savored the win at ${track.name} in the press`},
      {label:'Stay businesslike', effect:()=>{ journalist.relationship.trust=clamp(journalist.relationship.trust+2); }, result:'Professional, if a little flat.', memory:`Kept a businesslike tone after winning at ${track.name}`},
    ] : [
      {label:'Praise the team\'s effort', effect:()=>{ this.adjustTeamMorale(p.teamId, 3); }, result:'The garage appreciates the shoutout.', memory:`Praised the team after the podium at ${track.name}`},
      {label:'Say you were chasing more', effect:()=>{ p.attributes.mental.confidence=clamp(p.attributes.mental.confidence+3); }, result:'Hungry, ambitious answer.', memory:`Said they were chasing more than ${podiumWord} at ${track.name}`},
      {label:'Thank the fans', effect:()=>{ p.fanPopularity=clamp(p.fanPopularity+4,0,999); }, result:'Popularity +4!', memory:`Thanked the fans for the podium at ${track.name}`},
    ];
    this.openModal(`
      ${this.modalHeader('Podium Interview')}
      <div class="section-sub" style="margin-bottom:8px;">${journalist.name} · ${journalist.role} · trackside</div>
      <div class="pixel-panel"><div style="font-weight:800;">"Congratulations on ${podiumWord} at ${track.name} — what's going through your mind right now?"</div></div>
      <div class="stack-8">
        ${options.map((o,i)=>`<button class="pbtn full" data-podium-opt="${i}">${o.label}</button>`).join('')}
      </div>
    `);
    // No close button here, matching the quiz mini-game pattern in this same
    // file: the round is already marked completed and the calendar has
    // already advanced by the time this modal opens, so a dismiss-without-
    // choosing path would strand the player on a closed modal with nothing
    // left to click (the exact "stall" bug class documented for
    // renderRaceStrategyPrompt/quiz modals). Answering is quick and always
    // has a positive-or-neutral effect, so this isn't a hardship.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.querySelectorAll('[data-podium-opt]').forEach(btn=>{
      btn.onclick = ()=>{
        const o = options[parseInt(btn.dataset.podiumOpt)];
        o.effect();
        journalist.relationship.memories.unshift({text:o.memory, season:s.season, week:s.week});
        if(journalist.relationship.memories.length>10) journalist.relationship.memories.pop();
        this.toast(o.result);
        this.closeModal();
        this.saveState();
        onDone();
      };
    });
  },

  generateRaceHeadline(pos, dnf, track){
    const p = this.state.player;
    if(dnf) return {title:`HEARTBREAK FOR ${p.name.toUpperCase()}`, body:`A race-ending incident at ${track.name} denies a shot at points.`};
    if(pos===1) return {title:`${p.name.toUpperCase()} WINS AT ${track.name.toUpperCase()}!`, body:`A commanding drive takes the chequered flag first.`};
    if(pos<=3) return {title:`PODIUM FOR ${p.name.toUpperCase()}`, body:`A strong weekend converts into a podium at ${track.name}.`};
    if(pos<=10) return {title:`POINTS SECURED AT ${track.name.toUpperCase()}`, body:`A solid drive nets valuable championship points.`};
    return {title:`QUIET WEEKEND FOR ${p.name.toUpperCase()}`, body:`A tough race leaves ${p.name} outside the points at ${track.name}.`};
  },

  renderRaceResultHtml(results, pos, dnf, headline, moneyGain, fanGain, sponsorIncome, playerQualy, track){
    const top10 = results.slice(0,10).map(r=>{
      const isPlayer = r.driverId==='player';
      const drv = isPlayer ? this.state.player : this.state.grid.find(d=>d.id===r.driverId);
      return `<div class="row-item"><span class="rname">${r.dnf?'DNF':'P'+r.position} ${drv.name}${isPlayer?' (you)':''}</span><span class="rmeta">${r.dnf?'':pointsForPosition(r.position)+' pts'}</span></div>`;
    }).join('');
    this.checkHomeEvolution();
    const engineer = this.state.npcRoster.find(n=>n.role==='Race Engineer');
    const category = dnf ? 'dnf' : pos===1 ? 'win' : pos<=3 ? 'podium' : pos<=10 ? 'points' : 'poor';
    // Rivalry-specific radio chatter: if the current rival finished close by
    // (adjacent on track, same window as updateRivalry's rivalry-building
    // check), swap in a rival-flavored line instead of the generic bank.
    // Falls back to radioLine() untouched whenever there's no rival nearby.
    let radio = null;
    const rival = this.getRival();
    if(rival && !dnf && pos!==null){
      const rivalResult = results.find(r=>r.driverId===rival.id);
      if(rivalResult && !rivalResult.dnf){
        const gap = Math.abs(pos - rivalResult.position);
        if(gap<=2){
          if(pos < rivalResult.position){
            radio = rivalRadioLine((rivalResult.position-pos)>=5 ? 'wonOverRivalBig' : 'beatRival', rival.name);
          } else if(pos > rivalResult.position){
            radio = rivalRadioLine('lostToRival', rival.name);
          }
        }
      }
    }
    if(!radio) radio = radioLine(engineer.personality, category);
    // Grid-penalty callout: same startPenalty formula already used inside
    // simulateRace (track.overtakeDiff*0.35 per grid slot), surfaced here as
    // plain language. Purely presentational -- no new math.
    let gridNote = '';
    if(playerQualy && track && !dnf && pos!==null){
      const startPos = playerQualy.position;
      const delta = startPos - pos;
      const estCost = Math.round(startPos * track.overtakeDiff * 0.35);
      if(delta>0) gridNote = `<div class="section-sub" style="margin:6px 0 0;">Started P${startPos}, gained ${delta} place${delta===1?'':'s'} — nice recovery drive.</div>`;
      else if(delta<0) gridNote = `<div class="section-sub" style="margin:6px 0 0;">Started P${startPos}, lost ${Math.abs(delta)} place${Math.abs(delta)===1?'':'s'} on race day.</div>`;
      else if(startPos>3) gridNote = `<div class="section-sub" style="margin:6px 0 0;">Started P${startPos} and held station — the grid penalty here cost roughly ${estCost} tenths of pace off the line.</div>`;
    }
    return `
      ${this.modalHeader('Race Result')}
      <div class="headline-card">
        <div class="kicker">RACE REPORT</div>
        <h3>${headline.title}</h3>
        <p>${headline.body}</p>
      </div>
      <div class="pixel-panel" style="border-left:3px solid var(--candy-blue);">
        <div class="section-sub" style="margin:0 0 4px;">📻 ${engineer.name}</div>
        <div style="font-weight:700; font-style:italic;">"${radio}"</div>
        ${gridNote}
      </div>
      <div class="section-title" style="font-size:10px;">Top 10</div>
      ${top10}
      <div class="pixel-panel" style="margin-top:10px;">
        <div class="flex-between"><span class="section-sub" style="margin:0;">Race Earnings</span><span style="font-family:var(--font-pixel); font-size:10px; color:#2a8a5c;">+$${moneyGain.toFixed(1)}M</span></div>
        ${sponsorIncome>0 ? `<div class="flex-between" style="margin-top:6px;"><span class="section-sub" style="margin:0;">Sponsor Income</span><span style="font-family:var(--font-pixel); font-size:10px; color:#2a8a5c;">+$${sponsorIncome.toFixed(1)}M</span></div>` : ''}
        <div class="flex-between" style="margin-top:6px;"><span class="section-sub" style="margin:0;">Fans</span><span style="font-family:var(--font-pixel); font-size:10px; color:var(--candy-blue);">+${fanGain}</span></div>
      </div>
      <button class="pbtn full gold" id="btn-close-race" style="margin-top:12px;">Continue</button>
    `;
  },

  updateRivalry(results, playerPos){
    const s = this.state; const p = s.player;
    if(!playerPos) return; // DNF builds no rivalry this round
    const idx = results.findIndex(r=>r.driverId==='player');
    const nearby = [results[idx-1], results[idx+1]].filter(Boolean).map(r=>r.driverId);
    nearby.forEach(id=>{
      if(id==='player') return;
      const drv = s.grid.find(d=>d.id===id);
      if(!drv) return;
      drv.rivalryLevel = clamp((drv.rivalryLevel||0) + 6, 0, 100);
      // Head-to-head record: who finished ahead this race, tracked per rival
      // so the Rival Profile can show a genuine "you lead 7-3" style record.
      if(!drv.headToHead) drv.headToHead = { wins:0, losses:0 };
      const rivalPos = results.find(r=>r.driverId===id)?.position;
      if(rivalPos){
        if(playerPos < rivalPos) drv.headToHead.wins++;
        else if(playerPos > rivalPos) drv.headToHead.losses++;
      }
    });
    // slow decay for everyone else so rivalries fade if you stop racing them closely
    s.grid.forEach(d=>{ if(!nearby.includes(d.id)) d.rivalryLevel = clamp((d.rivalryLevel||0) - 1, 0, 100); });

    const prevRivalId = s.rivalId;
    const top = [...s.grid].sort((a,b)=>(b.rivalryLevel||0)-(a.rivalryLevel||0))[0];
    if(top && top.rivalryLevel>=20 && top.id!==prevRivalId){
      s.rivalId = top.id;
      if(top.id!==prevRivalId){
        this.toast(`⚔️ ${top.name} is becoming your rival!`);
        this.pushNews(`⚔️ A rivalry is forming: ${p.name} vs ${top.name}.`);
      }
    }
  },

  getRival(){
    const s = this.state;
    if(!s.rivalId) return null;
    return s.grid.find(d=>d.id===s.rivalId) || null;
  },

  checkNewArchetypes(){
    const p = this.state.player;
    const earnedIds = checkReputationArchetypes(p);
    earnedIds.forEach(id=>{
      if(!p.reputationArchetypes.includes(id)){
        p.reputationArchetypes.push(id);
        const arch = REPUTATION_ARCHETYPES.find(a=>a.id===id);
        this.toast(`${arch.icon} New reputation: ${arch.name}!`);
        this.pushNews(`${arch.icon} The paddock is calling ${p.name} "${arch.name}".`);
        p.journal.unshift({season:this.state.season, week:this.state.week, title:'New Reputation', text:`Earned the reputation: ${arch.name}.`, icon:arch.icon});
      }
    });
  },

  checkTraitEvolution(){
    const p = this.state.player;
    if(p.careerStats.dnfs>=3 && !p.traits.includes('Nervous Under Pressure')){
      p.traits.push('Nervous Under Pressure');
    }
    if(p.age>=28 && p.careerStats.starts>=60 && !p.traits.includes('Composed Veteran')){
      p.traits.push('Composed Veteran');
      p.traits = p.traits.filter(t=>t!=='Nervous Under Pressure');
    }
    if(p.fanPopularity>=80 && !p.traits.includes('Fan Favorite')) p.traits.push('Fan Favorite');
  },

  checkMilestones(pos, dnf, track){
    const p = this.state.player;
    const fire = (key, text)=>{
      if(!p.milestones.includes(key)){
        p.milestones.push(key);

    if(!dnf && pos===1) fire('first_win', `${p.name} wins their first career race!`);
    if(p.careerStats.starts>=50) fire('50_starts', `${p.name} completes 50 career race starts.`);
    if(p.careerStats.points>=100) fire('100_points', `${p.name} passes 100 career championship points.`);
  },

const FACILITY_EFFECTS = {
  gym:'Boosts fitness training gains', simulator:'Boosts driving skill gains',
  engineering:'More car development slots per season', factory:'Cheaper car upgrades',
  media:'Bigger media reputation gains from good press answers', hospitality:'Faster sponsor loyalty pay raises',
};

function generateSeasonObjectives(state){
  const team = TEAMS.find(t=>t.id===state.player.teamId);
  const objectives = [];
  if(team.tier===1) objectives.push({type:'championshipPosition', text:'Finish in the Top 3', target:3, reward:{money:8, rep:6}});
  else if(team.tier===2) objectives.push({type:'standingPosition', text:'Finish in the Top 10', target:10, reward:{money:5, rep:5}});
  else objectives.push({type:'points', text:'Score 20 championship points', target:20, reward:{money:4, rep:4}});
  objectives.push({type:'beatTeammate', text:'Out-score your teammate', target:1, reward:{money:2, rep:3}});
  objectives.push({type:'q3count', text:'Reach the Top 3 in qualifying 3 times', target:3, reward:{money:3, rep:3}});
  return objectives;
}

function homeUpgradeThreshold(level){
  // money thresholds for automatic home tier upgrade (career earnings milestone, not spendable cash)
  return [0, 20, 45, 80, 130, 200][level] ?? 999999;
}

Object.assign(App, {

  moraleDescription(val){
    if(val>=80) return 'Excellent team spirit.';
    if(val>=60) return 'Good working relationship.';
    if(val>=40) return 'Steady but unremarkable.';
    if(val>=20) return 'Tension in the garage.';
    return 'Relationship is strained.';
  },

  objectiveProgress(o){
    const s = this.state; const p = s.player;
    if(o.type==='points') return Math.min(o.target, s.seasonStats.points);
    if(o.type==='standingPosition' || o.type==='championshipPosition'){
      // Live progress toward a position target: being further inside the
      // target band shows more filled progress, so the bar actually moves
      // meaningfully week to week instead of jumping straight from 0 to
      // 100% only once the season is already over.
      const totalDrivers = s.grid.length + 1;
      const current = this.standingPosition(p.id);
      if(current <= o.target) return o.target; // fully met right now
      const worstCase = totalDrivers;
      const progressFrac = clamp(1 - (current-o.target)/(worstCase-o.target), 0, 0.95);
      return Math.round(progressFrac*o.target);
    }
    if(o.type==='beatTeammate') return s.seasonStats.beatTeammate ? 1 : 0;
    if(o.type==='q3count') return Math.min(o.target, s.seasonStats.q3count||0);
    return 0;
  },

  checkHomeEvolution(){
    const s = this.state; const p = s.player;
    const lifetimeEarnings = p.careerStats.points*0.4 + p.money; // rough proxy for career success
    let newLevel = p.homeLevel;
    for(let lvl=HOME_TIERS.length; lvl>=1; lvl--){
      if(lifetimeEarnings >= homeUpgradeThreshold(lvl-1) && lvl > p.homeLevel){ newLevel = lvl; break; }
    }
    if(newLevel > p.homeLevel){
      p.homeLevel = newLevel;
      const tier = HOME_TIERS[newLevel-1];
      this.toast(`${tier.icon} You've moved to a ${tier.name}!`);
      this.pushNews(`${tier.icon} ${p.name} upgrades their home to a ${tier.name}.`);
      p.journal.unshift({season:s.season, week:s.week, title:'Home Upgrade', text:`Moved into a ${tier.name}. ${tier.desc}`, icon:tier.icon});
    }
  },

  /* ---------------- COSMETICS (Helmet/Livery/Suit/Gloves) ---------------- */
  checkCosmeticUnlocks(){
    const s = this.state;
    if(!s.cosmetics) s.cosmetics = this.initialCosmeticsState();
    const unlocked = computeUnlockedCosmetics(s.cosmetics.careerStartSeason, s.season, s.cosmetics.totalRoundsCompletedThisSeason);
    const prevUnlocked = s.cosmetics.lastKnownUnlocked || ['helmet_default','livery_default','suit_default','gloves_default'];
    const newlyUnlocked = unlocked.filter(id=>!prevUnlocked.includes(id));
    newlyUnlocked.forEach(id=>{
      const item = COSMETIC_POOL.find(c=>c.id===id);
      if(item){
        this.toast(`${item.icon} New ${item.category} unlocked: ${item.name}!`);
        this.pushNews(`${item.icon} ${s.player.name} unlocks a new ${item.category}: "${item.name}".`);

  },

  getUnlockedCosmetics(){
    const s = this.state;
    if(!s.cosmetics) s.cosmetics = this.initialCosmeticsState();
    return computeUnlockedCosmetics(s.cosmetics.careerStartSeason, s.season, s.cosmetics.totalRoundsCompletedThisSeason);
  },

  /* Sum of all equipped cosmetics' stat bonuses, applied live (not baked into
     base attributes) so equipping/unequipping is always fully reversible and
     never inflates a driver's "true" trained stats. */
  getCosmeticBonuses(){
    const s = this.state;
    if(!s.cosmetics) return {};
    const bonuses = {};
    Object.values(s.cosmetics.equipped||{}).forEach(id=>{
      const item = COSMETIC_POOL.find(c=>c.id===id);
      if(item && item.bonus){
        bonuses[item.bonus.stat] = (bonuses[item.bonus.stat]||0) + item.bonus.amount;
      }
    });
    return bonuses;
  },

  renderProfileModal(){

      : `<span class="section-sub" style="margin:0;">No cosmetic bonuses equipped yet.</span>`;

              <span>${item.icon} <b>${item.name}</b>${isEquipped?' ✓':''}<br><span style="font-size:8.5px; color:var(--ink-soft);">${isUnlocked ? item.desc : this.lockedCosmeticHint(item)}</span></span>

  /* Season wins are tracked live only for the player (seasonStats.wins);
     for AI grid drivers we approximate season wins by comparing their
     career win total against a season-start snapshot, so this stays cheap
     and doesn't require tracking a parallel seasonStats object per AI
     driver just for a standings-screen nice-to-have. */
  seasonWinsForDriver(driverId){
    const s = this.state;
    if(!s.seasonStartCareerWins) return 0;
    const drv = s.grid.find(d=>d.id===driverId);
    if(!drv) return 0;
    const startWins = s.seasonStartCareerWins[driverId] || 0;
    return Math.max(0, (drv.careerStats.wins||0) - startWins);
  },

  /* Dynamic upgrade pricing: base price rises 8% per level already owned
     (buying the next level always costs more than the last, same shape as
     the training-cost curve), and a higher Factory facility level softens
     that climb -- this is what FACILITY_EFFECTS.factory's "Reduces future
     upgrade costs" description promises, now actually wired up instead of
     being flavor text with no mechanical effect. Facility upgrades
     themselves use the same rising-price curve but aren't discounted by
     Factory (that would be circular), so they stay a simple, predictable
     long-term investment.

     Car development now belongs to the TEAM (team.upgrades), not the
     player, and money alone isn't enough to buy a level -- every team
     (including the player's) only gets a limited number of development
     SLOTS per season (team.devSlotsUsed vs devSlotsMax), reset at
     startNextSeason but never un-developing existing levels. This is what
     makes development fair across teams: a rich player can't just outspend
     the system, and a poor AI team isn't just "worse forever" -- everyone
     works from the same seasonal budget, scaled only by facility level. */
  carUpgradeCost(key){
    const s = this.state;
    const team = this.getTeam(s.player.teamId);
    const level = (team.upgrades && team.upgrades[key]) || 0;
    const base = 3 * Math.pow(1.08, level);
    const factoryDiscount = 1 - ((s.facilities.factory||1)-1)*0.06; // up to -24% at Factory Lv.5
    return Math.round(base * Math.max(0.7, factoryDiscount) * 10) / 10;
  },
  facilityUpgradeCost(key){
    const s = this.state;
    const level = s.facilities[key]||0;
    return Math.round(4 * Math.pow(1.15, level) * 10) / 10;
  },
  /* Engineering facility raises how many development actions the player's
     team can take in a season -- base 3 slots at Lv.1, +1 slot per
     Engineering level above 1 (so Lv.5 Engineering gives 7 slots/season).
     This is FACILITY_EFFECTS.engineering's "Speeds up car development"
     promise, now an actual mechanical effect instead of flavor text. AI
     teams don't need a UI for this -- their existing end-of-season
     developTeamsForNewSeason() roll already represents a whole season of
     (equivalently slot-limited) work in one step. */
  devSlotsMax(){
    return 3 + ((this.state.facilities.engineering||1)-1);
  },

  /* ---------------- SEASON END ---------------- */
  computeSeasonAwards(){
    const s = this.state; const p = s.player;
    const awards = [];
    const allDrivers = [...s.grid, p];
    const byOvertaking = [...allDrivers].sort((a,b)=>b.attributes.driving.overtaking-a.attributes.driving.overtaking)[0];
    if(byOvertaking.id==='player') awards.push('Best Overtaker');
    const rookiesByPoints = allDrivers.filter(d=>d.age<=19).sort((a,b)=>(s.standings[b.id]||0)-(s.standings[a.id]||0));
    if(rookiesByPoints.length && rookiesByPoints[0].id==='player') awards.push('Rookie of the Year');
    if(p.fanPopularity>=70) awards.push('Most Popular Driver');
    if(p.attributes.driving.qualifyingPace>=80) awards.push('Best Qualifier');
    if((p.careerStats.dnfs||0)===0 && p.careerStats.starts>0) awards.push('Cleanest Driver');
    if(s.seasonStats.beatTeammate) awards.push('Team Player');
    return awards;
  },

  /* Season objectives previously showed a progress bar with zero actual
     payoff when completed — this closes that gap. Runs once at season end
     (championshipPosition/standingPosition can only be judged fairly once
     the season is actually over) and pays out each objective's reward. */
  processSeasonObjectiveRewards(){
    const s = this.state; const p = s.player;
    const completed = [];
    (s.seasonObjectives||[]).forEach(o=>{
      const progress = this.objectiveProgress(o);
      const met = o.type==='beatTeammate' ? progress>=1 : progress>=o.target;
      if(met && o.reward){
        p.money = Math.round((p.money + o.reward.money)*10)/10;
        p.mediaReputation = clamp(p.mediaReputation + o.reward.rep, 0, 100);
        completed.push(o);
      }
    });
    if(completed.length){
      this.toast(`🎯 ${completed.length} season objective(s) completed!`);
      completed.forEach(o=>{
        p.journal.unshift({season:s.season, week:s.week, title:'Objective Complete', text:`"${o.text}" — +$${o.reward.money}M, +${o.reward.rep} media reputation.`, icon:'🎯'});
      });
      this.pushNews(`🎯 ${p.name} completed ${completed.length} season objective(s), earning bonus pay and reputation.`);
    }
    return completed;
  },

  handleSeasonEnd(){
    const s = this.state; const p = s.player;
    // Idempotency guard: this function does one-time-per-season things
    // (age++, retirements/staff turnover, awards, a history entry, a
    // journal entry) that must never apply twice. Without this guard, the
    // new #btn-season-wrap recovery button (see renderTodayActions -- it
    // exists specifically to rescue a save that got stuck on an off week
    // after the season-end modal was dismissed without being actioned)
    // could double-apply an entire season's worth of aging/awards/history
    // if clicked, or if handleSeasonEnd() were ever reachable twice for the
    // same season through some other path. s.lastWrappedSeason records
    // which season number was last fully wrapped; if we're being asked to
    // wrap that same season again, skip straight to re-showing the summary
    // modal (recomputed from already-applied state) instead of re-running
    // the one-time effects.
    if(s.lastWrappedSeason === s.season){
      this.renderSeasonWrapModal(s._lastSeasonWrapData);
      return;
    }
    const standing = this.standingPosition('player');
    const points = s.standings['player']||0;
    const team = this.getTeam(p.teamId);
    s.history.push({season:s.season, team:team.name, standing, points});

    p.age++;
    s.grid.forEach(d=> d.age++);
    const retirees = processGridRetirements(s);
    processStaffTurnover(s, retirees.length);
    p.contract.years = Math.max(0, p.contract.years - 1);

    // Performance-clause check: if this contract has a clause and it's
    // unmet, force the contract to expire right now regardless of years
    // remaining -- triggers the normal contract-offer flow, but the player
    // is now negotiating having just broken a promise to their team, which
    // the standing-based eligibleTiers logic in renderContractOffersModal
    // already naturally reflects (a bad season = worse tiers anyway; this
    // just makes sure the SAME season's shortfall can't be papered over by
    // a contract that still had years left on it).
    let clauseMissed = null;
    if(p.contract.clause && p.contract.clause.met===null){
      const metNow = checkContractClauseMet(p.contract.clause, s, standing);
      p.contract.clause.met = metNow;
      if(!metNow){
        clauseMissed = contractClauseText(p.contract.clause);
        p.contract.years = 0;
        this.pushNews(`📉 ${p.name} misses a contract clause with ${team.name} — renewal talks will be tougher.`);
        p.journal.unshift({season:s.season, week:s.week, title:'Clause Missed', text:`${clauseMissed} was not met — the contract ends early.`, icon:'📉'});
      }
    }

    const awards = this.computeSeasonAwards();
    p.seasonAwardsWon.push(...awards.map(a=>({season:s.season, award:a})));

    const completedObjectives = this.processSeasonObjectiveRewards();

    this.checkHomeEvolution();

    const wins = s.seasonStats.wins||0, podiums = s.seasonStats.podiums||0;
    const tone = standing<=3 ? 'a championship-contending' : standing<=10 ? 'a solidly competitive' : 'a challenging rebuilding';
    const yearNum = seasonLabel(s);
    const summary = `${yearNum} complete: ${p.name} finishes P${standing} with ${points} points, ${wins} win(s), ${podiums} podium(s) — ${tone} campaign.`;

    p.journal.unshift({season:s.season, week:s.week, title:`${yearNum} Wrap`, text:summary, icon:'📖'});

    s.lastWrappedSeason = s.season;
    s._lastSeasonWrapData = { standing, points, awards, completedObjectives, summary, yearNum, clauseMissed };
    this.renderSeasonWrapModal(s._lastSeasonWrapData);
    this.saveState();
  },

  renderSeasonWrapModal({ standing, points, awards, completedObjectives, summary, yearNum, clauseMissed }){
    const s = this.state; const p = s.player;
    this.openModal(`
      ${this.modalHeader(`${yearNum} Complete`)}
      <div class="headline-card">
        <div class="kicker">SEASON WRAP</div>
        <h3>${standing<=3?'A CAMPAIGN TO REMEMBER':standing<=10?'STEADY PROGRESS':'A YEAR TO REGROUP'}</h3>
        <p>${summary}</p>
      </div>
      <div class="pixel-panel" style="text-align:center;">
        <div style="font-family:var(--font-pixel); font-size:30px; color:${standing<=3?'var(--candy-yellow)':'var(--ink)'};">P${standing}</div>
        <div class="section-sub">${points} championship points</div>
      </div>
      ${clauseMissed ? `<div class="pixel-panel" style="border-left:3px solid var(--candy-red);"><div class="panel-title">⚠️ Contract Clause Missed</div><div class="section-sub" style="margin:0;">${clauseMissed} — your contract ends early, and renewal talks will reflect it.</div></div>` : ''}
      ${awards.length ? `<div class="pixel-panel"><div class="panel-title">Season Awards</div><div class="pbtn-row">${awards.map(a=>`<span class="chip gold">🏅 ${a}</span>`).join('')}</div></div>` : ''}
      ${completedObjectives.length ? `<div class="pixel-panel"><div class="panel-title">Objectives Completed</div>${completedObjectives.map(o=>`<div class="section-sub" style="margin:4px 0;">🎯 ${o.text} — +$${o.reward.money}M, +${o.reward.rep} reputation</div>`).join('')}</div>` : ''}
      <button class="pbtn full gold" id="btn-next-season">Continue</button>
    `);
    // No close button here -- this modal MUST resolve to startNextSeason(),
    // renderContractOffersModal(), or offerRetirement(). Dismissing via the
    // X (or a background tap) left the calendar permanently past its last
    // round with no route back to this modal, which is exactly the
    // "stuck cycling through an off week forever" stall this game's other
    // must-answer modals (quiz, podium interview, celebrity encounter) were
    // already built to avoid -- this one had been missed.
    const closeBtn = document.getElementById('modal-close-btn');
    if(closeBtn) closeBtn.style.display = 'none';
    if(this.activeModal) this.activeModal.onclick = null;
    document.getElementById('btn-next-season').onclick = ()=>{
      this.closeModal();
      if(p.age>=42){
        this.offerRetirement();
      } else if(p.contract.years<=0){
        this.renderContractOffersModal();
      } else {
        this.startNextSeason();
      }
    };
    this.saveState();
  },

      this.closeModal();
      this.saveState();
      this.renderTeamScreen();
    };
  },

  renderContractOffersModal(){
    const s = this.state; const p = s.player;
    const currentTeam = this.getTeam(p.teamId);
    // generate 2-3 offers: current team renewal + 1-2 other teams scaled to reputation
    const standing = this.standingPosition('player');
    let eligibleTiers = standing<=5 ? [1,2] : standing<=14 ? [2,3] : [3];
    if(s.pendingTierOffer){
      // Legacy perk "Old Racing Contacts": widen the eligible tiers once, on the
      // very first contract renewal, regardless of current standing.
      eligibleTiers = [...new Set([...eligibleTiers, Math.max(1, Math.min(...eligibleTiers)-1)])];
      s.pendingTierOffer = false;
      this.pushNews(`🤝 Old contacts open a door — a stronger team takes notice of ${p.name}.`);
    }
    const otherTeams = TEAMS.filter(t=>t.id!==currentTeam.id && eligibleTiers.includes(t.tier)).sort(()=>Math.random()-0.5).slice(0,2);
    const offers = [
      {teamId:currentTeam.id, years:randInt(1,2), salary:Math.max(1, p.contract.salary+randInt(0,2)), clause:pickContractClause(currentTeam)},
      ...otherTeams.map(t=>({teamId:t.id, years:randInt(1,3), salary:Math.max(1, Math.round(t.carStrength/10)), clause:pickContractClause(t)})),
    ];
    this.openModal(`
      ${this.modalHeader('Contract Offers')}
      <div class="section-sub">Your contract has expired. Choose where you'll race next season.</div>
      <div class="stack-8">
        ${offers.map((o,i)=>{
          const t = this.getTeam(o.teamId);
          const clauseText = contractClauseText(o.clause);
          return `<button class="pbtn full" style="justify-content:flex-start; text-align:left; height:auto; padding:12px;" data-offer="${i}">
            <span>${t.flag} <b>${t.name}</b><br><span style="font-size:8px; color:var(--ink-soft);">${o.years}yr · $${o.salary}M/season · Car ${t.carStrength}</span>${clauseText?`<br><span style="font-size:8px; color:var(--candy-red);">⚠️ ${clauseText}</span>`:''}</span>
          </button>`;
        }).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-offer]').forEach(btn=>{
      btn.onclick = ()=>{
        const o = offers[parseInt(btn.dataset.offer)];
        const t = this.getTeam(o.teamId);
        const changedTeam = o.teamId !== p.teamId;
        if(changedTeam) rebalanceGridForTeamChange(s, p.teamId, o.teamId);
        p.teamId = o.teamId;
        p.contract = {teamId:o.teamId, years:o.years, salary:o.salary, clause:o.clause};
        const clauseText = contractClauseText(o.clause);
        if(changedTeam){
          this.toast(`🤝 You've signed with ${t.name}!`);
          this.pushNews(`🤝 ${p.name} signs with ${t.name} for ${o.years} year(s).`);
          p.journal.unshift({season:s.season, week:s.week, title:'New Contract', text:`Signed with ${t.name} for ${o.years} year(s) at $${o.salary}M/season.${clauseText?' '+clauseText+'.':''}`, icon:'📝'});
        } else {
          this.toast(`📝 Contract renewed with ${t.name}.`);
          p.journal.unshift({season:s.season, week:s.week, title:'Contract Renewed', text:`Stayed with ${t.name} for ${o.years} more year(s).${clauseText?' '+clauseText+'.':''}`, icon:'📝'});
        }
        this.closeModal();
        this.startNextSeason();
      };
    });
  },

  /* ---------------- RETIREMENT ---------------- */
  offerRetirement(){
    const s = this.state; const p = s.player;
    this.openModal(`
      ${this.modalHeader('End of an Era')}
      <div class="section-sub">${p.name} is ${p.age}. Many drivers consider retirement around this age.</div>
      <div class="stack-8">
        <button class="pbtn full gold" id="btn-retire-now">🏆 Retire Now</button>
        <button class="pbtn full" id="btn-race-on">🏁 Race One More Season</button>
      </div>
    `);
    this.wireModalClose();
    document.getElementById('btn-retire-now').onclick = ()=>{ this.closeModal(); this.renderRetirementScreen(); };
    document.getElementById('btn-race-on').onclick = ()=>{
      this.closeModal();
      if(p.contract.years<=0) this.renderContractOffersModal();
      else this.startNextSeason();
    };
  },

  renderRetirementScreen(){
    const s = this.state; const p = s.player;
    p.retired = true;
    s.retiredFlag = true;
    // Write this career into the persistent, multi-career Hall of Fame
    // exactly once -- renderRetirementScreen can be reached more than once
    // for the same retirement (e.g. navigating back to it), so guard on a
    // flag rather than assuming this function only ever runs a single time.
    if(!s._hofRecorded){
      appendToHallOfFame(buildHallOfFameEntry(s));
      s._hofRecorded = true;
    }
    this.saveState();
    document.getElementById('status-strip').style.display = 'none';
    document.getElementById('ticker').style.display = 'none';
    const cs = p.careerStats;
    const legacyDone = !!loadPendingLegacy();
    this.root.innerHTML = `
      <div class="boot-wrap">
        <div class="boot-sprite">🏆</div>
        <div class="boot-eyebrow">Career Complete</div>
        <div class="boot-title" style="font-size:20px;">${p.name}<br><span class="accent">RETIRES</span></div>
        <div class="pixel-panel" style="text-align:left; width:100%; max-width:300px;">
          <div class="panel-title">Final Career Record</div>
          <div class="grid-2">
            <div style="text-align:center;"><div style="font-family:var(--font-pixel); font-size:16px;">${cs.starts}</div><div class="section-sub">Starts</div></div>
            <div style="text-align:center;"><div style="font-family:var(--font-pixel); font-size:16px;">${cs.wins}</div><div class="section-sub">Wins</div></div>
            <div style="text-align:center;"><div style="font-family:var(--font-pixel); font-size:16px;">${cs.podiums}</div><div class="section-sub">Podiums</div></div>
            <div style="text-align:center;"><div style="font-family:var(--font-pixel); font-size:16px;">${cs.points}</div><div class="section-sub">Points</div></div>
          </div>
        </div>
        <div class="stack-8" style="width:100%; max-width:300px;">
          <button class="pbtn full ${legacyDone?'':'gold'}" id="btn-postgame-legacy">${legacyDone ? '✅ Legacy Set — Change Choice' : '🌟 Pass Down Your Legacy'}</button>
          <button class="pbtn full mint" id="btn-postgame-retrospective">📖 Career Retrospective</button>
          <button class="pbtn full" id="btn-postgame-museum">🏆 Hall of Fame</button>
          <button class="pbtn full" id="btn-postgame-title">🚪 Return to Title${legacyDone?' &amp; Start New Career':''}</button>
        </div>
      </div>
    `;
    document.getElementById('btn-postgame-title').onclick = ()=>{ deleteSave(); this.renderBoot(); };
    document.getElementById('btn-postgame-legacy').onclick = ()=> this.renderLegacyPerkModal();
    document.getElementById('btn-postgame-retrospective').onclick = ()=> this.renderCareerRetrospectiveModal();
    document.getElementById('btn-postgame-museum').onclick = ()=> this.renderMuseumModal();
  },

  renderCareerRetrospectiveModal(){
    const s = this.state; const p = s.player;
    const cs = p.careerStats;
    const winPct = cs.starts>0 ? Math.round(cs.wins/cs.starts*100) : 0;
    const bestSeason = [...s.history].sort((a,b)=>a.standing-b.standing)[0];
    const totalYears = s.history.length;
    const teamsRaced = [...new Set(s.history.map(h=>h.team))];
    const highlightJournal = p.journal.filter(j=>j.icon==='🏁'||j.icon==='🎉'||j.icon==='🏅').slice(0,6);
    this.openModal(`
      ${this.modalHeader('Career Retrospective')}
      <div class="headline-card">
        <div class="kicker">${totalYears} YEAR${totalYears===1?'':'S'} IN MOTORSPORT</div>
        <h3>${p.name}</h3>
        <p>Raced for ${teamsRaced.length} team${teamsRaced.length===1?'':'s'}: ${teamsRaced.join(', ')||'—'}.</p>
      </div>
      <div class="grid-2">
        <div class="pixel-panel" style="text-align:center;"><div style="font-family:var(--font-pixel); font-size:18px;">${cs.wins}</div><div class="section-sub">Career Wins</div></div>
        <div class="pixel-panel" style="text-align:center;"><div style="font-family:var(--font-pixel); font-size:18px;">${cs.podiums}</div><div class="section-sub">Podiums</div></div>
        <div class="pixel-panel" style="text-align:center;"><div style="font-family:var(--font-pixel); font-size:18px;">${winPct}%</div><div class="section-sub">Win Rate</div></div>
        <div class="pixel-panel" style="text-align:center;"><div style="font-family:var(--font-pixel); font-size:18px;">${bestSeason?('P'+bestSeason.standing):'—'}</div><div class="section-sub">Best Finish</div></div>
      </div>
      ${highlightJournal.length ? `
        <div class="section-title" style="margin-top:14px; font-size:10px;">Career Highlights</div>
        ${highlightJournal.map(j=>`<div class="row-item"><span class="rname">${j.icon} ${j.title}</span></div>`).join('')}
      ` : ''}
      <div class="section-sub" style="margin-top:12px; text-align:center;">Thank you for the ride, ${p.name}. 🏁</div>
    `);
    this.wireModalClose();
  },

  renderLegacyPerkModal(){
    const p = this.state.player;
    const existing = loadPendingLegacy();
    this.openModal(`
      ${this.modalHeader('Pass Down Your Legacy')}
      <div class="section-sub" style="margin-bottom:10px;">${p.name}'s career won't be forgotten. Choose ONE perk to carry into your next driver's career — and ${p.name} will appear as a legendary AI driver on the new grid, racing under their own name.</div>
      <div class="stack-8">
        ${LEGACY_PERKS.map(perk=>`
          <button class="pbtn full ${existing && existing.perkId===perk.id ? 'gold' : ''}" style="justify-content:flex-start; text-align:left; height:auto; padding:12px;" data-perk="${perk.id}">
            <span>${perk.icon} <b>${perk.name}</b><br><span style="font-size:9px; color:var(--ink-soft);">${perk.desc}</span></span>
          </button>
        `).join('')}
      </div>
    `);
    this.wireModalClose();
    document.querySelectorAll('[data-perk]').forEach(btn=>{
      btn.onclick = ()=>{
        const perk = LEGACY_PERKS.find(x=>x.id===btn.dataset.perk);
        savePendingLegacy({
          perkId: perk.id,
          retiredPlayerSnapshot: JSON.parse(JSON.stringify(p)),
        });
        this.toast(`🌟 Legacy set: ${perk.name}`);
        this.closeModal();
        this.renderRetirementScreen();
      };
    });
  },

  startNextSeason(){
    const s = this.state;
    s.season++;
    const careerYearNum = s.season - (s.careerStartSeason||s.season) + 1;
    s.prevTeamStrength = Object.fromEntries(TEAMS.map(t=>[t.id, t.carStrength]));
    // Development itself is NEVER wiped -- last year's upgrade levels persist
    // and keep compounding, matching how a real team doesn't un-develop its
    // car over the winter. Only the SEASON'S BUDGET of dev actions resets,
    // so every team (player included) gets a fresh allotment of upgrade
    // slots to spend through the new season rather than an infinite tap.
    TEAMS.forEach(t=>{ t.devSlotsUsed = 0; });
    developTeamsForNewSeason(s, getDifficultySettings(s));
    if(isRegulationChangeYear(careerYearNum)){
      applyRegulationChange(s);
      this.toast('📋 New FIA regulations have shaken up the grid this year!');
    }
    s.calendar = { rounds: buildSeasonCalendar(careerYearNum), currentRound: 0 };
    s.lastRaceHeadline = null;
    s.standings = {};
    s.seasonStats = { wins:0, podiums:0, points:0, beatTeammate:false, q3count:0 };
    s.seasonObjectives = generateSeasonObjectives(s);
    s.dayIndex = 0; s.week = 1;
    if(!s.cosmetics) s.cosmetics = this.initialCosmeticsState();
    s.cosmetics.totalRoundsCompletedThisSeason = 0;
    this.checkCosmeticUnlocks();
    s.seasonStartCareerWins = Object.fromEntries(s.grid.map(d=>[d.id, d.careerStats.wins||0]));
    this.pushNews(`📅 ${seasonLabel(s)} begins! The grid resets to zero.`);
    this.toast(`Welcome to ${seasonLabel(s)}.`);
    this.saveState();
    this.renderHub();
  },

});
